\\\end\\tcheck_tiddlers_type_for_table_from_indexes\\n\"},\"$:/plugins/kookma/shiraz/tables/segments/dt-tbody\":{\"title\":\"$:/plugins/kookma/shiraz/tables/segments/dt-tbody\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\function tableFilter()   \\\"[subfilter\u003CinputFilter>]:sort:$(sortType)$:$(sortFlag)$[$(getType)$\u003CsortIndex>else[title]]\\\" :map[substitute[]]\\n\\\\function tableFilter_with_pagination(thisTableFilter)    [subfilter\u003CthisTableFilter>first\u003Chigh>] -[subfilter\u003CthisTableFilter>first\u003Clow>]\\n\\n\\\\procedure generate-table-body-rows()\\n\u003C$let getType={{{ [\u003CdataType>match[field]then[get]else[getindex]] }}}>\u003C!-- get a field or get an index -->\\n\u003C$list filter=\\\"[\u003Cpagination>match[yes]] :then[function[tableFilter_with_pagination],\u003CtableFilter>] :else[subfilter\u003CtableFilter>]\\\" variable=\\\"currentRecord\\\">\\n\u003C\u003Cdisplay-one-record>>\\n\u003C/$list>\\n\u003C/$let>\\n\\\\end generate-table-body-rows\\n\\n\\\\procedure display-expanded-record()\\n\u003Ctd colspan=\u003C\u003CcolumnsCount>> class=\\\"shiraz-dtable-expanded-record\\\">\\n\u003C$tiddler tiddler=\u003C\u003CcurrentRecord>> >\\n\\t\u003C!-- in edit mode select between two editors: simple textbox or TW main editor e.g. codemirror -->\\n\\t\u003C%if [\u003CtempTableEdit>getindex[mode]match[edit]] %>\\n\\t\\t\u003C%if [[$:/config/shiraz/dynamictables/editor-type]get[text]match[main-editor]] %>\u003C!-- use main editor -->\\n\\t\\t\\t\u003Cdiv class=\\\"shiraz-dtable-maineditor\\\">\\n\\t\\t\\t\\t{{||$:/core/ui/EditTemplate/body}}\\n\\t\\t\\t\u003C/div>\\n\\t\\t\u003C%else%>\u003C!-- use simple text-edit area -->\\n\\t\\t\\t\u003Cdiv>\\n\\t\\t\\t\u003C$edit-text class=\\\"tbl-inpt-edit\\\" tiddler=\u003C\u003CcurrentRecord>> field=\\\"text\\\" tag=textarea/>\\n\\t\\t\\t\u003C/div>\\n\\t\\t\u003C%endif%>\\n\\t\u003C%else%>\\n\\t\\t{{||$:/core/ui/ViewTemplate/body}}\\n\\t\u003C%endif%>\\n\u003C/$tiddler>\\n\u003C/td>\\n\\\\end display-expanded-record\\n\\n\\\\procedure display-one-record()\\n\\\\function tbl-row-class() [\u003CcurrentRecord>get[status]match[complete]then[tbl-record-complete]]\\n\u003Ctr class=\u003C\u003Ctbl-row-class>> >\\n\u003C$list filter=\u003C\u003CcoulmnFilter>> variable=currentColumn>\\n\u003C$set name=\\\"bodyLookup\\\" \\n  filter=\\\"[all[tiddlers+shadows]tag[$:/tags/Table/BodyTemplate]!is[draft]contains:tbl-column-list\u003CcurrentColumn>]\\n          +[limit[1]get[title]]\\\"\\n  value=\u003C\u003CbodyLookup>> \\n  emptyValue=\\\"$:/plugins/kookma/shiraz/tables/templates/body/default\\\">\\n\u003C$transclude tiddler=\u003C\u003CbodyLookup>> field=\\\"text\\\" mode=\\\"inline\\\"/>\\n\u003C/$set>\\n\u003C/$list>\\n\u003C/tr>\\n\u003C!-- reveal expanded record-->\\n\u003C%if [\u003CtempTableExpand>getindex\u003CcurrentRecord>match[show]] %>\\n\u003Ctr>\u003C\u003Cdisplay-expanded-record>>\u003C/tr>\\n\u003C%endif%>\\n\\\\end display-one-record\\n\\n\\n\u003C!-- setup pagination variables -->\\n\u003C$let total-entries={{{ [subfilter\u003CinputFilter>count[]]                      }}}\\n\\tpage-number=      {{{ [\u003CpageStateTiddler>get[text]] ~[[1]]                 }}} \\n\\tentries-per-page= {{{ [\u003CentryPerPageStateTiddler>get[text]] ~[[25]]        }}} \\n\\tlow=              {{{ [\u003Cpage-number>subtract[1]multiply\u003Centries-per-page>] }}}  \\n\\thigh=             {{{ [\u003Cpage-number>multiply\u003Centries-per-page>]            }}}\\n>\\t \\n\u003C$transclude $variable=\\\"generate-table-body-rows\\\" />\\n\u003C!--on demand display the pagination row-->\\n\u003C%if [\u003Cpagination>match[yes]] %>\\n\u003Ctr class=\\\"shiraz-dtable-page-footer\\\">\\n\u003Ctd colspan=\u003C\u003CcolumnsCount>> >\\n\u003C\u003Cprev-button>>\\nDisplaying \u003C$text text={{{[\u003Clow>add[1]]}}}/> through \u003C$text text={{{ [\u003Chigh>compare:number:lt\u003Ctotal-entries>then\u003Chigh>else\u003Ctotal-entries>] }}}/> of \u003C\u003Ctotal-entries>> Results | \u003C\u003Climit-entries>>\\n\u003C\u003Cnext-button>>\\n\u003C/td>\\n\u003C/tr>\\n\u003C%endif%>\\n\u003C/$let>\"},\"$:/plugins/kookma/shiraz/tables/segments/dt-tfoot\":{\"title\":\"$:/plugins/kookma/shiraz/tables/segments/dt-tfoot\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\function frows() \\\"[range[1,$(footerRows)$]addprefix[footer-]]\\\" :map[substitute[]]\\n\u003C%if [\u003CfooterRows>compare:integer:gt[0]] %>\\n\u003Ctr>\u003Ctd colspan=\u003C\u003CcolumnsCount>> class=\\\"shiraz-dtable-numerical-summary-lbl\\\">Numerical summary:\u003C/td>\u003C/tr>\\n\u003C$list filter=\u003C\u003Cfrows>> variable=footerRow>\\n\u003Ctr>\\n\u003C$list filter=\u003C\u003CcoulmnFilter>> variable=currentColumn>\\n\\t\u003C$set name=\\\"footerLookup\\\"\\n\\t\\t\\t\\tfilter=\\\"[all[tiddlers+shadows]tag[$:/tags/Table/FooterTemplate]!is[draft]contains:tbl-column-list\u003CcurrentColumn>limit[1]get[title]]\\\"\\n\\t\\t\\t\\tvalue=\u003C\u003CfooterLookup>>\\n\\t\\t\\t\\temptyValue=\\\"$:/plugins/kookma/shiraz/tables/templates/footer/default\\\">\\n\\t\u003C$transclude $tiddler=\u003C\u003CfooterLookup>> $field=\\\"text\\\" $mode=\\\"inline\\\"/>\\n\\t\u003C/$set>\\n\u003C/$list>\\n\u003C/tr>\\n\u003C/$list>\\n\u003C%endif%>\"},\"$:/plugins/kookma/shiraz/tables/segments/dt-thead\":{\"title\":\"$:/plugins/kookma/shiraz/tables/segments/dt-thead\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C$transclude $variable=\\\"check_tiddlers_type_for_table_from_indexes\\\"/>\\n\u003C$transclude $variable=\\\"confirm-delete\\\"/>\\n\u003Ctr class=\\\"shiraz-dtable-header\\\">\\n\u003C$list filter=\u003C\u003CcoulmnFilter>> variable=\\\"currentColumn\\\" >\\n\u003C$set name=\\\"headerLookup\\\"\\n      filter=\\\"[all[tiddlers+shadows]tag[$:/tags/Table/HeaderTemplate]!is[draft]contains:tbl-column-list\u003CcurrentColumn>limit[1]get[title]]\\\"\\n      value=\u003C\u003CheaderLookup>>\\n      emptyValue=\\\"$:/plugins/kookma/shiraz/tables/templates/header/default\\\"\\n>\\n  \u003C$transclude $tiddler=\u003C\u003CheaderLookup>> $field=\\\"text\\\" $mode=\\\"inline\\\"/>\\n\u003C/$set>\\n\u003C/$list>\\n\u003C/tr>\"},\"$:/plugins/kookma/shiraz/tables/styles/ct-katex\":{\"title\":\"$:/plugins/kookma/shiraz/tables/styles/ct-katex\",\"text\":\".falign .katex-display > .katex {text-align:left;}\\n.ralign .katex-display > .katex {text-align:right;}\\n.table-mathbox  tr td{vertical-align: baseline;} /* baseline aligned text and fomula in table cell*/\\n\\n/*\\nOnly used with csv table + katex\\nSee $:/plugins/kookma/shiraz/macros/csvtables/formats-math\\n*/\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/tables/styles/ct-star\":{\"title\":\"$:/plugins/kookma/shiraz/tables/styles/ct-star\",\"text\":\"/* Styles for star rating used with table-csv macro */\\n.shiraz-star svg{\\nwidth: 1.2em;\\nheight: 1.2em;\\nvertical-align: middle;\\nfill:#FF9529; /*Deep Saffron*/\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/tables/styles/ct-tables\":{\"title\":\"$:/plugins/kookma/shiraz/tables/styles/ct-tables\",\"text\":\"/* todo section ------------*/\\n.tc-tiddler-body p.dblock,\\n.tc-tiddler-preview-preview p.dblock {\\n\\tdisplay:none;\\n}\\n\\n/* button caption style on dynamic table header\\nthis style can be overriden locally by user */\\ntable thead .shiraz-csvtable-header  th button {\\n    text-transform: capitalize; /* Capitalize the first letter of any word*/\\n}\\n\\n/*\\nOnly used with csv table\\nSee $:/plugins/kookma/shiraz/macros/csvtables/table-csv\\nThe @@ produces a p tag.\\n*/\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/tables/styles/dt-edit-tags\":{\"title\":\"$:/plugins/kookma/shiraz/tables/styles/dt-edit-tags\",\"text\":\"/* These css are taken from vanilla theme and modified to work in dynamic table tag cell */\\n\\n/* for close svg button*/\\n.shiraz-dtable-tc-edit-tags button.tc-remove-tag-button svg {\\n\\tfont-size: 0.7em;\\n\\tvertical-align: middle;\\n}\\n\\n/* for add button and input */\\n.shiraz-dtable-tc-edit-tags > .tc-edit-add-tag {\\n\\tfont-size:0.8em;\\n}\\n\\n/* for added tags displayed */\\n.shiraz-dtable-tc-edit-tags span.tc-tag-label{\\n\\tfont-size:0.85em;\\n}\\n\\n/* for dropdown tags */\\n.shiraz-dtable-tc-edit-tags .tc-block-tags-dropdown span.tc-tag-label {\\n\\tfont-size:1.05em;\\n}\\n\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/tables/styles/dt-tables-var\":{\"title\":\"$:/plugins/kookma/shiraz/tables/styles/dt-tables-var\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"/* these are dynamic or variable properties based on the tiddlywiki palette */\\n\\n.shiraz-dtable-page-footer select{\\n\\tbackground-color: \u003C\u003Ccolor table-header-background>>;\\n\\tcolor:\u003C\u003Ccolor foreground>>;\\n}\\n\\n.shiraz-dtable-page-footer > td{\\n\\tbackground-color: \u003C\u003Ccolor table-header-background>>;\\n}\\n\\n/* customize the table footer used for numerical summary*/\\n.shiraz-dtable-footer tr td{\\n\\tbackground-color: \u003C\u003Ccolor table-footer-background>>40;\\n\\tborder:none;\\n}\\n\\n/* correct button color to support dark theme */\\n.tbl-container table thead th button{\\n\\tcolor:\u003C\u003Ccolour button-foreground>>\\n}\\n.tbl-container table thead th button svg {\\n\\tfill:\u003C\u003Ccolour button-foreground>>;\\n}\\n\\n/* for checked row in task explorer */\\n.shiraz-dtable-item-completed{\\n color:\u003C\u003Ccolour foreground>>;\\n background-color:\u003C\u003Ccolour table-header-background>>;\\n}\\n \"},\"$:/plugins/kookma/shiraz/tables/styles/dt-tables\":{\"title\":\"$:/plugins/kookma/shiraz/tables/styles/dt-tables\",\"text\":\"/* main editor toolbar settings for dynamic table */\\n.shiraz-dtable-maineditor .tc-editor-toolbar button svg{\\n\\theight:0.9em;  /* make toolbar buttons smaller */\\n\\twidth:0.9em\\n}\\n/* make third party plugins like KaTeX button smaller */\\n.shiraz-dtable-maineditor .tc-editor-toolbar button .katex{\\n\\tfont-size: 0.9em;\\n\\tline-height:1em;\\n}\\n\\n/* edit-text box for dynamic table */\\n.shiraz-dtable-textbox {\\n\\twidth:100%;\\n\\tpadding-left: 5px;\\n\\tborder: none;\\n}\\n\\n.shiraz-dtable-textbox:focus {\\n\\toutline: none;\\n\\tborder: 1px solid #5778d8;\\n\\tbackground: transparent;\\n}\\n\\n.tbl-inpt-edit { width: 100%; background-color: transparent; border: none; color: #000000;}\\n\\nbutton.tbl-sort-svg > svg { text-shadow: none; fill:#000000; height:10px; padding:0 0 2px 0; }\\n\\nth .tc-tiddlylink, th a { text-shadow: none; margin: 0 0 0 0; padding: 0 0 0 0; color:unset; font-weight: bold; }\\n\\n\\n/* DELETE CONFIRMATION */\\ntable thead .tbl-delete-confirm > th {\\n\\tcolor: white;\\n\\tbackground-color:#ff0033;\\n\\tpadding: 8px;\\n\\tmargin: 0px;\\n\\ttext-align:center;\\n\\tfont-weight:normal;\\n}\\n\\ntable thead .tbl-delete-confirm > th > button {\\n\\tcolor: white;\\n\\tfill: white;\\n}\\n\\n/* -- pagination --*/\\n.shiraz-dtable-page-footer td{\\n\\tmargin: 0 0 0 0;\\n\\tpadding: 4px 7px 4px 7px;\\n}\\n\\n.shiraz-dtable-page-footer select{\\n\\tpadding:0;\\n\\tmargin:0;\\n\\tborder:none;\\t\\n}\\n\\n.shiraz-dtable-page-footer {\\n\\ttext-align:center;\\n}\\n\\n.shiraz-dtable-page-prev{\\n\\tfloat:left;\\n\\tmargin-right:8px;\\n}\\n\\n.shiraz-dtable-page-next{\\n\\tfloat:right;\\n\\tmargin-left:8px;\\n}\\n\\n.shiraz-dtable-page-footer button svg {height:0.7em;}\\n.shiraz-dtable-page-footer button {outline: none; line-height:normal;}\\n.shiraz-dtable-page-footer button:disabled {display:none;}\\n\\n/* format the expanded record (tiddler body) - for local customization like KaTeX numbering */\\n.shiraz-dtable-expanded-record{ }\\n\\n/* adjust the column width for date/due-date/status/linktype fields*/\\n.shiraz-dtable-col-fixedsize{\\n\\twidth:5.5rem;\\n\\twhite-space: nowrap;\\n}\\n.shiraz-dtable-priority{\\n\\twidth:6.5rem;\\n\\twhite-space: nowrap;\\n}\\n/* adjust the size of column with svg icons like: tbl-expand, tbl-clone, tbl-delete, tbl-checkbox */\\n.shiraz-dtable-svg{\\n\\ttext-align: center;\\n\\twidth:28px;\\n\\tmin-width:28px;\\n\\tmax-width:28px;\\n}\\n\\n/* this ensure short title in small width table */\\n.shiraz-dtable-title{\\n\\tmax-width: 15rem;\\n\\toverflow: hidden;\\n\\ttext-overflow: ellipsis;\\n\\twhite-space: nowrap;\\n}\\n\\n/*NEW 2024.06.01 ---------------*/\\n.shiraz-dtable-date{\\n\\twidth:6.5rem;\\n\\twhite-space: nowrap;\\n}\\n\\n.shiraz-default-cursore{ /* for tbl-linktype */\\n\\tcursor:default;\\n}\\n.shiraz-dtable-locked-cell{\\n\\t/* for styling the locked cell */\\n\\tfont-style:oblique;\\n}\\n.shiraz-cell-centered { /* centered table cell */\\n\\ttext-align: center;\\n\\tvertical-align: middle;\\n}\\n\\n/* Numerical summary label */\\n.shiraz-dtable-numerical-summary-lbl{\\n\\tfont-weight:bold;\\n\\tbackground-color:transparent;\\n}\\n\\n/* button caption style on dynamic table header\\nthis style can be overriden locally by user */\\ntable thead .shiraz-dtable-header  th button {\\n\\ttext-transform: capitalize; /* Capitalize the first letter of any word*/\\n}\\n\\n/* if TW-Utility is installed, The Code button will be hidden in Dynamic table */\\n.tbl-container .kk-utility-details{\\n\\tdisplay: none;\\t\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/tables/templates/body/color\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/color\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"color\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure box(stroke-color, fill)\\n\\\\parameters (width:40, height:18)\\n\u003Csvg width=\u003C\u003Cwidth>> height=\u003C\u003Cheight>> >\\n\u003Crect width=\u003C\u003Cwidth>> height=\u003C\u003Cheight>> x=\\\"0\\\" y=\\\"0\\\" rx=\\\"10\\\" ry=\\\"10\\\" stroke=\u003C\u003Cstroke-color>>  fill=\u003C\u003Cfill>> stroke-width=\\\"0\\\"/>\\n\u003C/svg>\\n\\\\end\\n\\\\procedure show-cell()   \u003C$transclude $variable=box fill={{{ [\u003CcurrentRecord>get[color]else[transparent]] }}}/>\\n\\\\procedure show-cell-locked()  \u003Cspan class=\\\"\\\">\u003C\u003Cshow-cell>>\u003C/span>\\n\\\\procedure edit-cell() \u003C$edit-text tag=input type=color tiddler=\u003C\u003CcurrentRecord>> field=\u003C\u003CcurrentColumn>>/>\\n\\n\\n\u003Ctd class=\\\"shiraz-cell-centered\\\">\\n\u003C%if [\u003CtempTableEdit>getindex[mode]!match[edit]] %>\\n\u003C\u003Cshow-cell>>\\n\u003C%elseif [\u003CtempTableSort>getindex[sortIndex]match\u003CcurrentColumn>] %>\u003C!--check if the current column is not selected for sorting-->\\n\u003C\u003Cshow-cell-locked>>\\n\u003C%else%>\\n\u003C\u003Cedit-cell>>\\n\u003C%endif%>\\n\u003C/td>\\n\u003C!-- when tiddler has no color\\ntransparent is used. You can make it black by leaving it empty.\\n-->\"},\"$:/plugins/kookma/shiraz/tables/templates/body/date\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/date\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"created modified\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003Ctd class=\\\"shiraz-dtable-date\\\">\\n\u003C$view tiddler=\u003C\u003CcurrentRecord>> field=\u003C\u003CcurrentColumn>> format=\\\"date\\\" template=\\\"YYYY.0MM.0DD\\\"/>\\n\u003C/td>\"},\"$:/plugins/kookma/shiraz/tables/templates/body/default\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/default\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003Ctd>\\n\u003C%if [\u003CtempTableEdit>is[missing]] :or[\u003CtempTableEdit>getindex[mode]!match[edit]] %>\\n\u003C\u003Cshow-cell>>\\n\u003C%elseif [\u003CtempTableSort>getindex[sortIndex]match\u003CcurrentColumn>] %>\u003C!--check if the current column is not selected for sorting-->\\n\u003C\u003Cshow-cell-locked>>\\n\u003C%else%>\\n\u003C\u003Cedit-cell>>\\n\u003C%endif%>\\n\u003C/td>\"},\"$:/plugins/kookma/shiraz/tables/templates/body/due-date\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/due-date\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"due-date due\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure show-cell()\\n\u003C$let fmt=\\\"[UTC]YYYY.0MM.0DD\\\"\\n      due-date={{{ [\u003CcurrentRecord>get\u003CcurrentColumn>] }}} >\\n\\t\u003C$text text={{{[\u003Cdue-date>split[-]split[.]join[]format:date\u003Cfmt>]}}} />\\n\u003C/$let>\\n\\\\end show-cell\\n\\n\\\\procedure show-cell-locked() \u003Cspan class=\\\"shiraz-dtable-locked-cell\\\">\u003C\u003Cshow-cell>>\u003C/span>\\n\\n\\\\procedure edit-date() \\n\\t\u003C%if [[$:/plugins/kookma/pikaday]!is[missing]] :filter[lookup:no[$:/config/Plugins/Disabled/]match[no]] %>\\n\\t\\t\u003C\u003Cedit-cell>>\\n\\t\u003C%else%>\\n\\t\\t\u003C$edit-text tag=input type=date tiddler=\u003C\u003CcurrentRecord>> field=\u003C\u003CcurrentColumn>>/>\\n\\t\u003C%endif%>\\n\\\\end edit-date\\n\\n\u003Ctd class=\\\"shiraz-dtable-date\\\">\\n\\t\u003C%if [\u003CtempTableEdit>is[missing]] :or[\u003CtempTableEdit>getindex[mode]!match[edit]] %>\\n\\t\\t\u003C\u003Cshow-cell>>\\n\\t\u003C%elseif [\u003CtempTableSort>getindex[sortIndex]match\u003CcurrentColumn>] %>\u003C!--check if the current column is not selected for sorting-->\\n\\t\\t\u003C\u003Cshow-cell-locked>>\\n\\t\u003C%else%>\\n\\t\\t\u003C\u003Cedit-date>>\\n\\t\u003C%endif%>\\n\u003C/td>\\n\\n\u003C!-- Part of Task Manager\\n  this template ALWAYS works on fields -->\"},\"$:/plugins/kookma/shiraz/tables/templates/body/email\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/email\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"email\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\function href() [\u003CcurrentRecord>get\u003CcurrentColumn>addprefix[mailto:]]\\n\\n\\\\procedure display-email-address() \\n\\t\u003Ca class=\\\"tc-tiddlylink-external\\\" href=\u003C\u003Chref>> rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\">\u003C\u003Cshow-cell>>\u003C/a>\\n\\\\end\\n\\\\procedure display-email-address-locked()\\n\\t\u003Ca class=\\\"tc-tiddlylink-external\\\" href=\u003C\u003Chref>> rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\">\u003C\u003Cshow-cell-locked>>\u003C/a>\\n\\\\end\\n\\n\u003Ctd>\\n\u003C%if [\u003CtempTableEdit>is[missing]] :or[\u003CtempTableEdit>getindex[mode]!match[edit]] %>\\n\\t\u003C\u003Cdisplay-email-address>>\\n\u003C%elseif [\u003CtempTableSort>getindex[sortIndex]match\u003CcurrentColumn>] %>\u003C!--check if the current column is not selected for sorting-->\\n\\t\u003C\u003Cdisplay-email-address-locked>>\\n\u003C%else%>\\n\\t\u003C\u003Cedit-cell>>\\n\u003C%endif%>\\n\u003C/td>\"},\"$:/plugins/kookma/shiraz/tables/templates/body/priority\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/priority\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"priority\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure circle(stcolor, fill)\\n\u003Csvg width=\\\"12\\\" height=\\\"12\\\" >\\n\u003Ccircle cx=\\\"6\\\" cy=\\\"6\\\" r=\\\"5\\\" stroke=\u003C\u003Cstcolor>>  fill=\u003C\u003Cfill>> stroke-width=\\\"1\\\"/>\\n\u003C/svg>\\n\\\\end\\n\\n\\\\procedure show-cell()\\n\\t\u003C%if [\u003CcurrentRecord>get\u003CcurrentColumn>match[5]] %>\\n\\t\\t\u003C$transclude $variable=\\\"circle\\\" stcolor=\\\"#dc3545\\\" fill=\\\"#f8d7da\\\"/>&nbsp;very high\\n\\t\u003C%elseif [\u003CcurrentRecord>get\u003CcurrentColumn>match[4]] %>\\n\\t\\t\u003C$transclude $variable=\\\"circle\\\" stcolor=\\\"#ff8c00\\\" fill=\\\"#fff3cd\\\"/>&nbsp;high\\n\\t\u003C%elseif [\u003CcurrentRecord>get\u003CcurrentColumn>match[3]] %>\\n\\t\\t\u003C$transclude $variable=\\\"circle\\\" stcolor=\\\"#17a2b8\\\" fill=\\\"#d1ecf1\\\"/>&nbsp;normal\\n\\t\u003C%elseif [\u003CcurrentRecord>get\u003CcurrentColumn>match[2]] %>\\n\\t\\t\u003C$transclude $variable=\\\"circle\\\" stcolor=\\\"#007bff\\\" fill=\\\"#cce5ff\\\"/>&nbsp;low\\n\\t\u003C%elseif [\u003CcurrentRecord>get\u003CcurrentColumn>match[1]] %>\\n\\t\\t\u003C$transclude $variable=\\\"circle\\\" stcolor=\\\"#6c757d\\\" fill=\\\"#e2e3e5\\\"/>&nbsp;very low\\n\\t\u003C%endif%>\\n\\\\end\\n\\n\\\\procedure show-cell-locked() \u003Cspan class=\\\"shiraz-dtable-locked-cell\\\">\u003C\u003Cshow-cell>>\u003C/span>\\n\\n\\\\procedure select_priority()\\n\u003C$select tiddler=\u003C\u003CcurrentRecord>> field=\u003C\u003CcurrentColumn>> default=\\\"\\\">\u003Coption value=''>Select...\u003C/option>\u003Coption value='5'>very high\u003C/option>\u003Coption value='4'>high\u003C/option>\u003Coption value='3'>normal\u003C/option>\u003Coption value='2'>low\u003C/option>\u003Coption value='1'>very low\u003C/option>\u003Coption value=''>no priority\u003C/option>\u003C/$select>\\n\\\\end\\n\\n\u003Ctd class=\\\"shiraz-dtable-priority\\\">\\n\u003C%if [\u003CtempTableEdit>is[missing]] :or[\u003CtempTableEdit>getindex[mode]!match[edit]] %>\\n\\t\u003C\u003Cshow-cell>>\\n\u003C%elseif [\u003CtempTableSort>getindex[sortIndex]match\u003CcurrentColumn>] %>\u003C!--check if the current column is not selected for sorting-->\\n\\t\u003C\u003Cshow-cell-locked>>\\n\u003C%else%>\\n\\t\u003C\u003Cselect_priority>>\\n\u003C%endif%>\\n\u003C/td>\\n\\n\\n\u003C!-- Part of Task Manager\\n   this template ALWAYS works on fields\\n  -->\"},\"$:/plugins/kookma/shiraz/tables/templates/body/status\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/status\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"status\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure show-cell() \u003C$transclude tiddler=\u003C\u003CcurrentRecord>> field=\u003C\u003CcurrentColumn>> mode=\\\"inline\\\" />\\n\\\\procedure show-cell-locked() \u003Cspan class=\\\"shiraz-dtable-locked-cell\\\">\u003C\u003Cshow-cell>>\u003C/span>\\n\\\\function status-values() open in-work on-hold complete rework closed\\n\\\\procedure select_status()\\n\\t\u003C$select tiddler=\u003C\u003CcurrentRecord>> field=\u003C\u003CcurrentColumn>> default=\\\"\\\">\\n\\t\\t\u003Coption value=''>Select...\u003C/option>\\n\\t\\t\u003C$list filter=\\\"[function[status-values]]\\\" variable=status>\u003Coption>\u003C$text text=\u003C\u003Cstatus>>/>\u003C/option>\u003C/$list>\\n\\t\u003C/$select>\\n\\\\end\\n\\n\u003Ctd class=\\\"shiraz-dtable-col-fixedsize\\\">\\n\\t\u003C%if [\u003CtempTableEdit>is[missing]] :or[\u003CtempTableEdit>getindex[mode]!match[edit]] %>\\n\\t\\t\u003C\u003Cshow-cell>>\\n\\t\u003C%elseif [\u003CtempTableSort>getindex[sortIndex]match\u003CcurrentColumn>] %>\u003C!--check if the current column is not selected for sorting-->\\n\\t\\t\u003C\u003Cshow-cell-locked>>\\n\\t\u003C%else%>\\n\\t\\t\u003C\u003Cselect_status>>\\n\\t\u003C%endif%>\\n\u003C/td>\\n\\n\u003C!-- Part of Task Manager\\n  this template ALWAYS works on fields\\n\\tchange default staus values  `open in-work on-hold complete rework closed` as you like-->\"},\"$:/plugins/kookma/shiraz/tables/templates/body/tag-template\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/tag-template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C!-- This is a copy of core tiddler: $:/core/ui/TagTemplate.\\nThis is NOT a dynamic table body tempalte. This template itself used by $:/plugins/kookma/shiraz/templates/body/tags\\nOn update Shiraz to a new release of TiddlyWiki, check the latest TiddlyWiki $:/core/ui/TagTemplate core tiddler.\\n\\nRemarks: In $:/core/ui/TagTemplate every:  \u003C\u003Cqualify \\\"$:/state/popup/tag\\\">> has been changed to: `${[\u003Cqualify \\\"$:/state/popup/tag\\\">][\u003CcurrentTable>][\u003CcurrentRecord>]+[join[/]]}$`\\nThis solution allows to to get unique popups in a list widget (here in dyanmic table, tags column template)\\nSee https://tiddlywiki.com to learn how substituted attributes work! \\n-->\\n\\n\\n\\\\whitespace trim\\n\u003Cspan class=\\\"tc-tag-list-item\\\" data-tag-title=\u003C\u003CcurrentTiddler>>>\\n\u003C$set name=\\\"transclusion\\\" value=\u003C\u003CcurrentTiddler>>>\\n\\t\u003C$macrocall $name=\\\"tag-pill-body\\\"\\n\\t\\ttag=\u003C\u003CcurrentTiddler>>\\n\\t\\ticon={{{ [\u003CcurrentTiddler>] :cascade[all[shadows+tiddlers]tag[$:/tags/TiddlerIconFilter]!is[draft]get[text]] }}}\\n\\t\\tcolour={{{ [\u003CcurrentTiddler>] :cascade[all[shadows+tiddlers]tag[$:/tags/TiddlerColourFilter]!is[draft]get[text]] }}}\\n\\t\\tpalette={{$:/palette}}\\n\\t\\telement-tag=\\\"$button\\\"\\n\\t\\telement-attributes=\\\"\\\"\\\"popup=`${[\u003Cqualify \\\"$:/state/popup/tag\\\">][\u003CcurrentTable>][\u003CcurrentRecord>]+[join[/]]}$` dragFilter=\\\"[all[current]tagging[]]\\\" tag='span'\\\"\\\"\\\"\\n\\t/>\\n\\t\u003C$reveal state=`${[\u003Cqualify \\\"$:/state/popup/tag\\\">][\u003CcurrentTable>][\u003CcurrentRecord>]+[join[/]]}$` type=\\\"popup\\\" position=\\\"below\\\" animate=\\\"yes\\\" class=\\\"tc-drop-down\\\">\\n\\t\\t\u003C$set name=\\\"tv-show-missing-links\\\" value=\\\"yes\\\">\\n\\t\\t\\t\u003C$transclude tiddler=\\\"$:/core/ui/ListItemTemplate\\\"/>\\n\\t\\t\u003C/$set>\\n\\t\\t\u003C$list filter=\\\"[all[shadows+tiddlers]tag[$:/tags/TagDropdown]!has[draft.of]]\\\" variable=\\\"listItem\\\"> \\n\\t\\t\\t\u003C$transclude tiddler=\u003C\u003ClistItem>>/> \\n\\t\\t\u003C/$list>\\n\\t\\t\u003Chr>\\n\\t\\t\u003C$macrocall $name=\\\"list-tagged-draggable\\\" tag=\u003C\u003CcurrentTiddler>>/>\\n\\t\u003C/$reveal>\\n\u003C/$set>\\n\u003C/span>\\n\"},\"$:/plugins/kookma/shiraz/tables/templates/body/tags\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/tags\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"tags\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure show-cell()\\n\u003C$list filter=\\\"[\u003CcurrentRecord>tags[]sort[title]]  :except[subfilter\u003Csv-exclude-tags>]\\\">\\n\u003C$transclude tiddler=\\\"$:/plugins/kookma/shiraz/tables/templates/body/tag-template\\\"/>\\n\u003C/$list>\\n\\\\end\\n\\n\\\\procedure show-cell-locked()  \u003Cspan class=\\\"\\\">\u003C\u003Cshow-cell>>\u003C/span>\\n\\n\\\\procedure edit-cell()\\n\\\\import $:/core/ui/EditTemplate/tags\\n\\\\whitespace trim\\n\u003Cdiv class=\\\"shiraz-dtable-tc-edit-tags\\\">\\n\u003C$let currentTiddler=\u003C\u003CcurrentRecord>> transclusion=\u003C\u003CcurrentTiddler>> saveTiddler=\u003C\u003CcurrentRecord>> >\\n\u003C$list filter=\\\"[list[!!tags]sort[title]]\\\" storyview=\\\"pop\\\">\\n\u003C$macrocall $name=\\\"tag-body\\\" colour={{{ [\u003CcurrentTiddler>] :cascade[all[shadows+tiddlers]tag[$:/tags/TiddlerColourFilter]!is[draft]get[text]] }}} palette={{$:/palette}} icon={{{ [\u003CcurrentTiddler>] :cascade[all[shadows+tiddlers]tag[$:/tags/TiddlerIconFilter]!is[draft]get[text]] }}} tagField=\\\"tags\\\"/>\\n\u003C/$list>\\n\u003C$vars tabIndex={{$:/config/EditTabIndex}} cancelPopups=\\\"yes\\\">\\n\u003C$macrocall $name=\\\"tag-picker\\\" tagField=\\\"tags\\\"/>\\n\u003C/$vars>\\n\u003C/$let>\\n\u003C/div>\\n\\\\end\\n\\n\\n\u003Ctd>\\n\u003C%if [\u003CtempTableEdit>is[missing]] :or[\u003CtempTableEdit>getindex[mode]!match[edit]] %>\\n\u003C\u003Cshow-cell>>\\n\u003C%elseif [\u003CtempTableSort>getindex[sortIndex]match\u003CcurrentColumn>] %>\u003C!--check if the current column is not selected for sorting-->\\n\u003C\u003Cshow-cell-locked>>\\n\u003C%else%>\\n\u003C\u003Cedit-cell>>\\n\u003C%endif%>\\n\u003C/td>\\n\\n\\n\u003C!-- The edit tags (edit-cell procedure) is copied from $:/core/ui/EditTemplate/tags.\\nSo when you upgrade to new TW version pay attention to this\\n-->\"},\"$:/plugins/kookma/shiraz/tables/templates/body/tbl-checkbox\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/tbl-checkbox\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"tbl-checkbox\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure check-actions()\\n\\t\\t\u003C$action-setfield $tiddler=\u003C\u003CcurrentRecord>> status=\\\"complete\\\"/>\\n\\\\end\\n\\\\procedure unchek-actions()\\n\\t\\t\u003C$action-setfield $tiddler=\u003C\u003CcurrentRecord>> status=\\\"rework\\\"/>\\n\\\\end\\n\\n\u003Ctd td class=\\\"shiraz-dtable-svg\\\">\\n\\t\u003C$checkbox tiddler=\u003C\u003CcurrentRecord>> tag=\\\"Done\\\" checkactions=\u003C\u003Ccheck-actions>> uncheckactions=\u003C\u003Cunchek-actions>> />\\n\u003C/td>\"},\"$:/plugins/kookma/shiraz/tables/templates/body/tbl-clone\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/tbl-clone\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"tbl-clone\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure clone-record() \u003C$action-createtiddler $basetitle=\u003C\u003CcurrentRecord>> $template=\u003C\u003CcurrentRecord>> />\\n\\n\u003C%if [\u003CtempTableEdit>getindex[mode]match[edit]] %>\u003C!-- only works in edit mode-->\\n\u003Ctd class=\\\"shiraz-dtable-svg\\\">\\n  \u003C$button class=\\\"tc-btn-invisible\\\" actions=\u003C\u003Cclone-record>>>\\n\\t  {{$:/core/images/clone-button}}\\n\\t\u003C/$button>\\n\u003C/td>\\n\u003C%endif%>\"},\"$:/plugins/kookma/shiraz/tables/templates/body/tbl-delete\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/tbl-delete\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"tbl-delete\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure delete-record() \u003C$action-sendmessage $message=\\\"tm-delete-tiddler\\\" $param=\u003C\u003CcurrentRecord>>/>\\n\\\\procedure move-record-to-trashbin() \\n\\t\\\\import $:/plugins/kookma/trashbin/macros/move-to-trashbin\\n\\t\u003C$macrocall $name=\\\"move-to-trashbin\\\" tiddler=\u003C\u003CcurrentRecord>> />\\n\\\\end\\n\\n\u003C%if [\u003CtempTableEdit>getindex[mode]match[edit]] %>\u003C!-- only works in edit mode-->\\n\\t\u003C$let doDelete= {{{ [[$:/plugins/kookma/trashbin]!is[missing]then[move-record-to-trashbin]else[delete-record]] }}} >\\n\\t\\t\u003Ctd class=\\\"shiraz-dtable-svg\\\">\\n\\t\\t\\t\u003C$button class=\\\"tc-btn-invisible\\\" tooltip=\\\"delete this record or move it to trash\\\" aria-label=\\\"\\\" actions='\u003C$transclude $variable=\u003C\u003CdoDelete>>/>' >\\n\\t\\t\\t\\t{{$:/core/images/delete-button}}\\n\\t\\t\\t\u003C/$button>\\n\\t\\t\u003C/td>\\n\\t\u003C/$let>\\n\u003C%endif%>\"},\"$:/plugins/kookma/shiraz/tables/templates/body/tbl-expand\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/tbl-expand\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"tbl-expand\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure doExpand()   \u003C$action-setfield $tiddler=\u003C\u003CtempTableExpand>> $index=\u003C\u003CcurrentRecord>> $value=\\\"show\\\" />\\n\\\\procedure doCollapse() \u003C$action-setfield $tiddler=\u003C\u003CtempTableExpand>> $index=\u003C\u003CcurrentRecord>> />\\n\u003C%if [\u003CtempTableExpand>getindex\u003CcurrentRecord>match[show]] %>\\n\\t\u003Ctd>\u003C$button class=\\\"tc-btn-invisible tc-tiddlylink\\\" actions=\u003C\u003CdoCollapse>> >\\n\\t\\t{{$:/core/images/down-arrow}}\\n\\t\u003C/$button>\u003C/td>\\n\u003C%else%>\\n\\t\u003Ctd>\u003C$button class=\\\"tc-btn-invisible tc-tiddlylink\\\" actions=\u003C\u003CdoExpand>> >\\n\\t\\t{{$:/core/images/right-arrow}}\\n\\t\u003C/$button>\u003C/td>\\n\u003C%endif%>\"},\"$:/plugins/kookma/shiraz/tables/templates/body/tbl-nodetype\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/tbl-nodetype\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"tbl-linktype tbl-nodetype\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003Ctd class=\\\"shiraz-dtable-col-fixedsize\\\">\\n\u003C$let subtiddler-pattern=`(^${[\u003CcurrentTiddler>escaperegexp[]]}$\\\\s*/|^${[\u003CcurrentTiddler>escaperegexp[]]}$\\\\s*:)` >\\n\u003C$text text={{{ \\n[all[current]links[]match\u003CcurrentRecord>then[link]]\\n[all[current]backlinks[]match\u003CcurrentRecord>then[backlink]]\\n[all[current]tagging[]match\u003CcurrentRecord>then[tagging]]\\n[\u003CcurrentRecord>regexp\u003Csubtiddler-pattern>then[subtiddler]]\\n[all[current]transcludes[]match\u003CcurrentRecord>then[transclude]]\\n[all[current]backtranscludes[]match\u003CcurrentRecord>then[backtransclude]]\\n:else[[unknown]] }}} />\\n\u003C/$let>\\n\u003C/td>\\n\u003C!-- \\ntb-linktype is not sortable not editable. The priority is as below:\\nlink, backlink, tagging, subtiddler, transclusion, and backtransclusion\\n-->\"},\"$:/plugins/kookma/shiraz/tables/templates/body/title\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/title\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"title\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003Ctd class=\\\"shiraz-dtable-title\\\">\\n\u003C$link to=\u003C\u003CcurrentRecord>>>\u003C$text text=\u003C\u003CcurrentRecord>> />\u003C/$link>\\n\u003C/td>\"},\"$:/plugins/kookma/shiraz/tables/templates/body/type\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/body/type\",\"tags\":\"$:/tags/Table/BodyTemplate\",\"tbl-column-list\":\"type\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure show-cell() \u003C$transclude $tiddler=\u003C\u003CcurrentRecord>> $field=\u003C\u003CcurrentColumn>> mode=\\\"inline\\\" />\\n\u003Ctd>\u003C\u003Cshow-cell>>\u003C/td>\\n\\n\u003C!-- Note that the show-cell here overrides the global show-cell from table-dynamic macro -->\"},\"$:/plugins/kookma/shiraz/tables/templates/footer/default\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/footer/default\",\"tags\":\"$:/tags/Table/FooterTemplate\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C$let\\tidx={{{ [\u003CcurrentColumn>addsuffix[/]addsuffix\u003CfooterRow>] }}} >\\n\\t\u003C%if [\u003CtempTableEdit>getindex[mode]match[edit]] %>\\n\\t\\t\u003Ctd>\\n\\t\\t\\t\u003C$edit-text tiddler=\u003C\u003CstateTableFooter>> index=\u003C\u003Cidx>> tag=\\\"input\\\" class=\\\"shiraz-dtable-textbox\\\"/>\\n\\t\\t\u003C/td>\\n\\t\u003C%else%>\\n\\t\\t\u003Ctd>\\n\\t\\t\\t\u003C$transclude tiddler=\u003C\u003CstateTableFooter>> index=\u003C\u003Cidx>> mode=\\\"inline\\\" />\\n\\t\\t\u003C/td>\\n\\t\u003C%endif%>\\n\u003C/$let>\"},\"$:/plugins/kookma/shiraz/tables/templates/footer/tbl-clone\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/footer/tbl-clone\",\"tags\":\"$:/tags/Table/FooterTemplate\",\"tbl-column-list\":\"tbl-clone\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C%if [\u003CtempTableEdit>getindex[mode]match[edit]] %>\\n\u003Ctd>\u003C/td>\\n\u003C%endif%>\"},\"$:/plugins/kookma/shiraz/tables/templates/footer/tbl-delete\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/footer/tbl-delete\",\"tags\":\"$:/tags/Table/FooterTemplate\",\"tbl-column-list\":\"tbl-delete\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C%if [\u003CtempTableEdit>getindex[mode]match[edit]] %>\\n\u003Ctd>\u003C/td>\\n\u003C%endif%>\"},\"$:/plugins/kookma/shiraz/tables/templates/footer/tbl-expand\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/footer/tbl-expand\",\"tags\":\"$:/tags/Table/FooterTemplate\",\"tbl-column-list\":\"tbl-expand\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003Ctd class=\\\"shiraz-dtable-svg\\\">\u003C/td>\"},\"$:/plugins/kookma/shiraz/tables/templates/header/default\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/header/default\",\"tags\":\"$:/tags/Table/HeaderTemplate\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003Cth>\\n\u003C%if [\u003CtempTableSort>getindex[sortIndex]match\u003CcurrentColumn>] %>\u003C!--if table is sorted based on current column -->\\n\\t\u003C%if [\u003CtempTableSort>getindex[hasnegate]match[false]] %>\u003C!--set negate for sort-->\\n\\t\\t\u003C$button setTitle=\u003C\u003CtempTableSort>> setIndex=\\\"hasnegate\\\" setTo=\\\"true\\\" class=\\\"tbl-sort-svg tc-btn-invisible tc-tiddlylink\\\" >\\n\\t\\t\\t\u003C$action-setfield $tiddler=\u003C\u003CtempTableSort>> $index=\\\"sortFlag\\\" $value=\\\"reverse,caseinsensitive\\\"/>\\n\\t\\t\\t\u003C$text text=\u003C\u003CcurrentColumn>>/>&nbsp;{{$:/core/images/down-arrow}}\\n\\t\\t\u003C/$button>\\n\\t\u003C%elseif [\u003CtempTableSort>getindex[hasnegate]match[true]] %>\u003C!--remove negate for sort-->\\n\\t\\t\u003C$button setTitle=\u003C\u003CtempTableSort>> setIndex=\\\"hasnegate\\\" setTo=\\\"false\\\" class=\\\"tbl-sort-svg tc-btn-invisible tc-tiddlylink\\\" >\\n\\t\\t\\t\u003C$action-setfield $tiddler=\u003C\u003CtempTableSort>> $index=\\\"sortFlag\\\" $value=\\\"\\\"/>\\n\\t\\t\\t\u003C$text text=\u003C\u003CcurrentColumn>>/>&nbsp;{{$:/core/images/up-arrow}}\\n\\t\\t\u003C/$button>\\n\\t\u003C%endif%>\u003C!-- end of nested if: set negate -->\\n\u003C%else%>\u003C!--if table is not sorted based on current column -->\\n\\t\u003C$button setTitle=\u003C\u003CtempTableSort>> setIndex=\\\"sortIndex\\\" setTo=\u003C\u003CcurrentColumn>> class=\\\"tc-btn-invisible tc-tiddlylink\\\" >\\n\\t\\t\u003C$action-setfield $tiddler=\u003C\u003CtempTableSort>> $index=\\\"hasnegate\\\" $value=\\\"false\\\"/>\\n\\t\\t\u003C$action-setfield $tiddler=\u003C\u003CtempTableSort>> $index=\\\"sortFlag\\\" $value=\\\"\\\"/>\\n\\t\\t\u003C$text text=\u003C\u003CcurrentColumn>>/>\\n\\t\u003C/$button>\\n\u003C%endif%>\\n\u003C/th>\"},\"$:/plugins/kookma/shiraz/tables/templates/header/tbl-checkbox\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/header/tbl-checkbox\",\"tags\":\"$:/tags/Table/HeaderTemplate\",\"tbl-column-list\":\"tbl-checkbox\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure chk-checkactions()\\n\u003C$list filter=\\\"[subfilter\u003CinputFilter>]\\\" variable=\\\"currentRecord\\\">\\n\\t\u003C$action-listops  $tiddler=\u003C\u003CcurrentRecord>> $tags=\\\"+[append[Done]]\\\" />\\n\\t\u003C$action-setfield $tiddler=\u003C\u003CcurrentRecord>> status=\\\"complete\\\"/>\\n\u003C/$list>\\n\\\\end\\n\\\\procedure chk-uncheckactions()\\n\u003C$list filter=\\\"[subfilter\u003CinputFilter>]\\\" variable=\\\"currentRecord\\\">\\n\\t\u003C$action-listops  $tiddler=\u003C\u003CcurrentRecord>> $tags=\\\"+[remove[Done]]\\\" />\\n\\t\u003C$action-setfield $tiddler=\u003C\u003CcurrentRecord>> status=\\\"rework\\\"/>\\n\u003C/$list>\\n\\\\end\\n\\n\u003Cth class=\\\"shiraz-dtable-svg\\\">\\n\u003C$checkbox checkactions=\u003C\u003Cchk-checkactions>> uncheckactions=\u003C\u003Cchk-uncheckactions>> />\\n\u003C/th>\"},\"$:/plugins/kookma/shiraz/tables/templates/header/tbl-clone\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/header/tbl-clone\",\"tags\":\"$:/tags/Table/HeaderTemplate\",\"tbl-column-list\":\"tbl-clone\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure clone-all-records()\\n\\t\u003C$list filter=\\\"[subfilter\u003CinputFilter>]\\\" variable=\\\"currentRecord\\\">\\n\\t\\t\u003C$action-createtiddler $basetitle=\u003C\u003CcurrentRecord>> $template=\u003C\u003CcurrentRecord>> />\\n\\t\u003C$list>\\n\\\\end\\n\u003C%if [\u003CtempTableEdit>getindex[mode]match[edit]] %>\\n\\t\u003Cth class=\\\"shiraz-dtable-svg\\\">\\n\\t\\t\u003Cspan>\\n\\t\\t\\t\u003C$button class=\\\"tc-btn-invisible\\\" tooltip={{$:/language/Buttons/Clone/Hint}} aria-label={{$:/language/Buttons/Clone/Caption}} actions=\u003C\u003Cclone-all-records>> >\\n\\t\\t\\t\\t{{$:/core/images/clone-button}}\\n\\t\\t\\t\u003C/$button>\\n\\t\\t\u003C/span>\\n\\t\u003C/th>\\n\u003C%endif%>\\n\\n\u003C!--\\nclone button is only shown in edit not\\n-->\"},\"$:/plugins/kookma/shiraz/tables/templates/header/tbl-delete\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/header/tbl-delete\",\"tags\":\"$:/tags/Table/HeaderTemplate\",\"tbl-column-list\":\"tbl-delete\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure mark-for-delete() \u003C$action-setfield $tiddler=\\\"$:/temp/dynamictables/delete-all-records\\\" $index=\u003C\u003CcurrentTable>> $value=\\\"to-be-deleted\\\"/>\\n\\n\u003C%if [\u003CtempTableEdit>getindex[mode]match[edit]] %>\\n\u003Cth class=\\\"shiraz-dtable-svg\\\">\\n  \u003Cspan>\\n  \u003C$button class=\\\"tc-btn-invisible\\\" tooltip=\\\"delete all records or move them to trashbin\\\" aria-label=\\\"\\\" actions=\u003C\u003Cmark-for-delete>> >\\n\\t  {{$:/core/images/delete-button}}\\n  \u003C/$button>\\n  \u003C/span>\\n\u003C/th>\\n\u003C%endif%>\\n\u003C!--\\ndelete button is only shown in edit not\\n-->\"},\"$:/plugins/kookma/shiraz/tables/templates/header/tbl-expand\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/header/tbl-expand\",\"tags\":\"$:/tags/Table/HeaderTemplate\",\"tbl-column-list\":\"tbl-expand\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure collapse-all-expanded() \u003C$action-setfield $tiddler=\u003C\u003CtempTableExpand>> text=\\\"\\\"/>\\n\u003Cth class=\\\"shiraz-dtable-svg\\\">\\n\\t\u003C%if [\u003CtempTableExpand>indexes[]limit[1]] %>\\n\\t\\t\u003C$button class=\\\"tc-btn-invisible\\\" actions=\u003C\u003Ccollapse-all-expanded>> >\\n\\t\\t\\t{{$:/core/images/fold-button}}\\n\\t\\t\u003C/$button>\\n\\t\u003C%endif%>\\n\u003C/th>\"},\"$:/plugins/kookma/shiraz/tables/templates/header/tbl-nodetype\":{\"title\":\"$:/plugins/kookma/shiraz/tables/templates/header/tbl-nodetype\",\"tags\":\"$:/tags/Table/HeaderTemplate\",\"tbl-column-list\":\"tbl-linktype tbl-nodetype\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003Cth class=\\\"shiraz-default-cursore\\\">Node\u003C/th>\\n\u003C!-- \\ntb-nodetype is not sortable not editable\\n-->\"},\"$:/plugins/kookma/shiraz/ui/breadcrumbs\":{\"title\":\"$:/plugins/kookma/shiraz/ui/breadcrumbs\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure configTiddler() $:/config/Shiraz\\n\\n\u003C$checkbox tiddler=\\\"$:/config/Shiraz\\\" index=\\\"breadcrumbs-enabled\\\" checked=\\\"yes\\\"> Display breadcrumbs\u003C/$checkbox>\u003Cbr/>\\n\u003C$checkbox tiddler=\\\"$:/config/Shiraz\\\" index=\\\"breadcrumbs-type\\\" checked=\\\"$:/plugins/kookma/shiraz/breadcrumbs/storylist\\\"> Use $:/StoryList for breadcrumbs\u003C/$checkbox>\u003Cbr/>\\n\u003C$checkbox tiddler=\\\"$:/config/Shiraz\\\" index=\\\"breadcrumbs-type\\\" checked=\\\"$:/plugins/kookma/shiraz/breadcrumbs/historylist\\\" default=\\\"$:/plugins/kookma/shiraz/breadcrumbs/historylist\\\"> Use $:/HistoryList for breadcrumbs\u003C/$checkbox>\\n\\n\"},\"$:/plugins/kookma/shiraz/ui/Buttons/switch-palette\":{\"title\":\"$:/plugins/kookma/shiraz/ui/Buttons/switch-palette\",\"caption\":\"{{$:/plugins/kookma/shiraz/images/switch-palette}} {{$:/language/Buttons/Shiraz/SwitchPalette/Caption}}\",\"description\":\"{{$:/language/Buttons/Shiraz/SwitchPalette/Hint}}\",\"list-after\":\"\",\"tags\":\"$:/tags/PageControls\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure configTid() $:/config/Shiraz\\n\\\\procedure switchPeletteTid() $:/plugins/kookma/shiraz/ui/switch-palette\\n\\\\function light-palette-default() [\u003CswitchPeletteTid>get[light-palette]]\\n\\\\function warm-palette-default() [\u003CswitchPeletteTid>get[warm-palette]]\\n\\\\function dark-palette-default() [\u003CswitchPeletteTid>get[dark-palette]]\\n\\n\\\\procedure switchActions() \u003C$action-setfield $tiddler=\\\"$:/palette\\\" $field=\\\"text\\\" $value=\u003C\u003Cnext-palette>> />\\n\\n\\\\whitespace trim\\n\\n\u003C$let \\n selected-palettes={{{\\n   [\u003CconfigTid>getindex[light-palette]else\u003Clight-palette-default>]\\n   [\u003CconfigTid>getindex[warm-palette]else\u003Cwarm-palette-default>]\\n\\t [\u003CconfigTid>getindex[dark-palette]else\u003Cdark-palette-default>] :and[join[ ]] }}}\\n\\t\\n default-palette={{{\\n   [\u003CconfigTid>get[light-palette]]\\n\\t [[$:/palettes/Vanilla]] :and[first[]] }}}\\t\\t\\t\\t\\t \\n next-palette={{{\\n   [[$:/palette]get[text]]\\n  +[cycle\u003Cselected-palettes>] :and[last[]]\\n  :else[\u003Cdefault-palette>] }}}\\t\\t\\t\\t\\n>\\n\u003C$button \\n\\t\\t\\ttooltip={{$:/language/Buttons/Shiraz/SwitchPalette/Hint}} \\n\\t\\t\\taria-label={{$:/language/Buttons/Shiraz/SwitchPalette/Caption}} \\n\\t\\t\\tclass=\u003C\u003Ctv-config-toolbar-class>>\\n\\t\\t\\tactions=\u003C\u003CswitchActions>>\\n>\\n\\t\\t\u003C$list filter=\\\"[\u003Ctv-config-toolbar-icons>match[yes]]\\\">\\n\\t\\t\\t\\t{{$:/plugins/kookma/shiraz/images/switch-palette}}\\n\\t\\t\u003C/$list>\\n\\t\\t\u003C$list filter=\\\"[\u003Ctv-config-toolbar-text>match[yes]]\\\">\\n\\t\\t\\t\u003Cspan class=\\\"tc-btn-text\\\">\\n\\t\\t\\t\\t\u003C$text text={{$:/language/Buttons/Shiraz/SwitchPalette/Caption}}/>\\n\\t\\t\\t\u003C/span>\\n\\t\\t\u003C/$list>\\n\u003C/$button>\\n\u003C/$let>\"},\"$:/plugins/kookma/shiraz/ui/ControlPanel/Settings\":{\"title\":\"$:/plugins/kookma/shiraz/ui/ControlPanel/Settings\",\"caption\":\"Shiraz\",\"tags\":\"$:/tags/ControlPanel/SettingsTab $:/tags/MoreSideBar\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure dynamictables-editortype() $:/config/shiraz/dynamictables/editor-type\\n\\nThese settings let you customise the behaviour of Shiraz plugin.\\n\\n---\\n\\n;Show Shiraz setting in more sidebar\\n:\u003C$checkbox tiddler=\\\"$:/plugins/kookma/shiraz/ui/ControlPanel/Settings\\\" tag=\\\"$:/tags/MoreSideBar\\\"> Show setting in more sidebar\u003C/$checkbox>\\n\\n\\n;Options\\n:\u003C$checkbox tiddler=\\\"$:/config/Shiraz\\\" index=\\\"colorify-ui-buttons\\\" checked=\\\"yes\\\"> Colorify UI buttons\u003C/$checkbox>\\n:\u003C$checkbox tiddler=\\\"$:/config/Shiraz\\\" index=\\\"view-toolbar-buttons-visibility\\\" checked=\\\"yes\\\"> Hide tiddler's view toolbar and show on mouse hover\u003C/$checkbox>\\n:\u003C$checkbox tiddler=\\\"$:/config/Shiraz\\\" index=\\\"colorify-sidebar-active-tab\\\" checked=\\\"yes\\\"> Colorify active sidebar tab\u003C/$checkbox>\\n\\n\\n;Set dark and light palettes\\n{{$:/plugins/kookma/shiraz/ui/switch-palette}}\\n\\n\\n;Breadcrumbes\\n:{{$:/plugins/kookma/shiraz/ui/breadcrumbs}}\\n\\n---\\n\\n; Choose Local Editor for Dynamic Table\\n:\u003C$checkbox tiddler=\u003C\u003Cdynamictables-editortype>> field=\\\"text\\\" checked=\\\"main-editor\\\" unchecked=\\\"simple-textarea\\\" default=\\\"simple-textarea\\\"> Use Tiddlywiki main editor \u003C/$checkbox>\\n:\u003C$checkbox tiddler=\u003C\u003Cdynamictables-editortype>> field=\\\"text\\\" checked=\\\"simple-textarea\\\" unchecked=\\\"main-editor\\\" default=\\\"simple-textarea\\\"> Use simple text area \u003C/$checkbox>\"},\"$:/plugins/kookma/shiraz/ui/switch-palette\":{\"title\":\"$:/plugins/kookma/shiraz/ui/switch-palette\",\"dark-palette\":\"$:/palettes/Nord\",\"light-palette\":\"$:/palettes/Vanilla\",\"type\":\"text/vnd.tiddlywiki\",\"warm-palette\":\"$:/palettes/SolarFlare\",\"text\":\"\\\\procedure configTiddler() $:/config/Shiraz\\n\\n\\\\function f.warm() \\n[[$:/palettes/DesertSand]]\\n[[$:/palettes/SolarFlare]]\\n[[$:/palettes/SolarizedLight]]\\n[[$:/palettes/FlexokiLight]]\\n\\\\end\\n\\\\function f.day()   [all[tiddlers+shadows]tag[$:/tags/Palette]] :filter[get[color-scheme]match[light]]  -[f.warm[]]\\n\\\\function f.night() [all[tiddlers+shadows]tag[$:/tags/Palette]] :filter[get[color-scheme]match[dark]]   -[f.warm[]]\\n\\n\\n\\\\procedure selectPelette(title, filter, default, tiddler, index)\\n\u003Clabel class=\\\"shiraz-switch-label\\\">\u003C$text text=\u003C\u003Ctitle>>/>\u003C/label>\\n\u003C$select tiddler=\u003C\u003Ctiddler>> index=\u003C\u003Cindex>> default=\u003C\u003Cdefault>> >\\n\u003C$list filter=\u003C\u003Cfilter>> >\\n\u003Coption value=\u003C\u003CcurrentTiddler>> >\\n\u003C$view field='name'>\\n  \u003C$view field='title'/>\\n\u003C/$view>\\n\u003C/option>\\n\u003C/$list>\\n\u003C/$select>\\n\\\\end selectPelette\\n\\n\u003Cdiv class=\\\"shiraz-switch-palette\\\">\\n\\n\u003C$transclude $variable=selectPelette \\n  title=\\\"Light palette\\\" filter=\\\"[f.day[]]\\\"\\n\\tdefault={{!!light-palette}} index=\\\"light-palette\\\" \\n\\ttiddler=\u003C\u003CconfigTiddler>> />\\t\\n\\t\\n\u003C$transclude $variable=selectPelette  \\n  title=\\\"Warm palette\\\" filter=\\\"[f.warm[]]\\\" \\n\\tdefault={{!!warm-palette}} index=\\\"warm-palette\\\" \\n\\ttiddler=\u003C\u003CconfigTiddler>> />\\n\\n\u003C$transclude $variable=selectPelette \\n  title=\\\"Dark palette\\\" filter=\\\"[f.night[]]\\\" \\n\\tdefault={{!!dark-palette}} index=\\\"dark-palette\\\" \\n\\ttiddler=\u003C\u003CconfigTiddler>> />\u003Cbr>\\n\\n\u003Clabel class=\\\"shiraz-switch-label\\\">Reset to default\u003C/label>\\n\u003C$button> {{$:/core/images/erase}}\\n\\n\u003C$action-setfield \\n  $tiddler=\u003C\u003CconfigTiddler>> \\n\\t$index=dark-palette \\n  $value={{!!dark-palette}} />\\n\\n\u003C$action-setfield \\n  $tiddler=\u003C\u003CconfigTiddler>> \\n\\t$index=warm-palette \\n\\t$value={{!!warm-palette}} />\\t\\n\\t\\n\u003C$action-setfield \\n  $tiddler=\u003C\u003CconfigTiddler>> \\n\\t$index=light-palette \\n\\t$value={{!!light-palette}} />\\t\\n\\t\\n\u003C$action-setfield \\n  $tiddler=\\\"$:/palette\\\" \\n\\t$field=text\\n\\t$value={{!!light-palette}} />\\t\\t\\n\u003C/$button>\\n\u003C/div>\"},\"$:/plugins/kookma/shiraz/viewtemplates/sticky-footer\":{\"title\":\"$:/plugins/kookma/shiraz/viewtemplates/sticky-footer\",\"list-after\":\"\",\"tags\":\"$:/tags/ViewTemplate\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C$list filter=\\\"[all[current]has[sticky-footer]]\\\">\\n\u003Cdiv class=\\\"sticky-footer\\\">\\n{{!!sticky-footer}}\\n\u003C/div>\\n\u003C/$list>\\n\"}}}","revision":"0","bag":"default"},
{"created":"20251220132309943","text":"\\procedure dynamictables-editortype() $:/config/shiraz/dynamictables/editor-type\n\nThese settings let you customise the behaviour of Shiraz plugin.\n\n---\n\n;Show Shiraz setting in more sidebar\n:\u003C$checkbox tiddler=\"$:/plugins/kookma/shiraz/ui/ControlPanel/Settings\" tag=\"$:/tags/MoreSideBar\"> Show setting in more sidebar\u003C/$checkbox>\n\n\n;Options\n:\u003C$checkbox tiddler=\"$:/config/Shiraz\" index=\"colorify-ui-buttons\" checked=\"yes\"> Colorify UI buttons\u003C/$checkbox>\n:\u003C$checkbox tiddler=\"$:/config/Shiraz\" index=\"view-toolbar-buttons-visibility\" checked=\"yes\"> Hide tiddler's view toolbar and show on mouse hover\u003C/$checkbox>\n:\u003C$checkbox tiddler=\"$:/config/Shiraz\" index=\"colorify-sidebar-active-tab\" checked=\"yes\"> Colorify active sidebar tab\u003C/$checkbox>\n\n\n;Set dark and light palettes\n{{$:/plugins/kookma/shiraz/ui/switch-palette}}\n\n\n;Breadcrumbes\n:{{$:/plugins/kookma/shiraz/ui/breadcrumbs}}\n\n---\n\n; Choose Local Editor for Dynamic Table\n:\u003C$checkbox tiddler=\u003C\u003Cdynamictables-editortype>> field=\"text\" checked=\"main-editor\" unchecked=\"simple-textarea\" default=\"simple-textarea\"> Use Tiddlywiki main editor \u003C/$checkbox>\n:\u003C$checkbox tiddler=\u003C\u003Cdynamictables-editortype>> field=\"text\" checked=\"simple-textarea\" unchecked=\"main-editor\" default=\"simple-textarea\"> Use simple text area \u003C/$checkbox>","title":"$:/plugins/kookma/shiraz/ui/ControlPanel/Settings","caption":"Shiraz","tags":"$:/tags/ControlPanel/SettingsTab","type":"text/vnd.tiddlywiki","modified":"20251220132309943"},
{"text":"{\"tiddlers\":{\"$:/config/Cycle\":{\"title\":\"$:/config/Cycle\",\"created\":\"20200922145100000\",\"modified\":\"20200922145100000\",\"tags\":\"\",\"text\":\"0\\n\"},\"$:/config/IgnoreKeyboardLayout\":{\"title\":\"$:/config/IgnoreKeyboardLayout\",\"created\":\"20200512220816000\",\"modified\":\"20200512220816000\",\"tags\":\"\",\"text\":\"0\\n\"},\"$:/plugins/MaxGyver83/tw5-keyboard-navigation/config\":{\"title\":\"$:/plugins/MaxGyver83/tw5-keyboard-navigation/config\",\"created\":\"20200511221340000\",\"modified\":\"20200922145300000\",\"tags\":\"\",\"text\":\"\u003C$checkbox tiddler=\\\"$:/config/IgnoreKeyboardLayout\\\" field=\\\"text\\\" checked=\\\"1\\\" unchecked=\\\"0\\\" default=\\\"0\\\"> Ignore keyboard layout (act as if it's QWERTY)\u003C/$checkbox>\u003Cbr>\\n\u003C$checkbox tiddler=\\\"$:/config/Cycle\\\" field=\\\"text\\\" checked=\\\"1\\\" unchecked=\\\"0\\\" default=\\\"0\\\"> Jump to first tiddler after end of list\u003C/$checkbox>\\n\"},\"keyboard-navigation.css\":{\"title\":\"keyboard-navigation.css\",\"created\":\"20190621094602422\",\"modified\":\"20191101072404775\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"div.tc-tiddler-frame.activeTiddler {\\n  border-left: 3px solid #557AFF;\\n}\\n\\n\"},\"keyboard-navigation.js\":{\"title\":\"keyboard-navigation.js\",\"created\":\"20191026223026465\",\"modified\":\"20231007192800000\",\"module-type\":\"startup\",\"tags\":\"\",\"type\":\"application/javascript\",\"text\":\"(function () {\\n\\n/*jslint node: false, browser: true */\\n/*global $tw: false */\\n\\\"use strict\\\";\\n\\nexports.name = \\\"tw5-keyboard-navigation\\\"; exports.after = [\\\"rootwidget\\\"];\\n\\nexports.startup = function () {\\n\\n// Keybinds section\\nconst navigate_up_key = 'k';\\nconst navigate_down_key = 'j';\\nconst bindings = {\\n\\t'more-tiddler-actions': 'm',\\n\\tinfo: null,\\n\\t'new-here': null,\\n\\t'new-journal-here': null,\\n\\tclone: null,\\n\\t'export-tiddler': null,\\n\\tedit: 'e',\\n\\tdelete: null,\\n\\tpermalink: null,\\n\\tpermaview: null,\\n\\t'open-window': null,\\n\\t'close-others': null,\\n\\tclose: 'c',\\n\\t'fold-others': null,\\n\\tfold: null\\n};\\n// if you're using an alternative keyboard layout,\\n// provide a list of key codes which should be ignored\\nconst alternativeLayoutIgnoreKeys = [\\\"ArrowUp\\\"];\\n// if you just want to add/change keybindings, you don't need to look further\\n\\n// tiddler buttons have classnames in the form `BTN_CLASSNAME_PREFIX`{button name}\\nconst BTN_CLASSNAME_PREFIX = 'tc-btn-%24%3A%2Fcore%2Fui%2FButtons%2F';\\n// all transitions with `navigate_up_key` and `navigate_down_key` are instant\\nconst INSTANT_NAVIGATION = false;\\n// if navigated before x milliseconds, transition is instant\\nconst INSTANT_NAVIGATION_BEFORE = 800;\\n\\nconst MARK_CURRENT_TIDDLER = true;\\n// tiddler's top position should be +/- LIMIT pixels in order to be considered the topmost\\nconst LIMIT = 50;\\n\\nvar ignoreKeyboardLayout = false;\\nvar cycle = false;\\nvar tiddlers;\\nvar tiddler_index = -1;\\nvar tiddler_title = \\\"\\\";\\nvar timestamp_last_navigation = 0;\\n\\n// unselect search box on startup\\nvar activeElement = document.activeElement;\\nactiveElement.blur();\\n\\n// mark first tiddler on startup\\ntiddlers = document.getElementsByClassName(\\\"tc-tiddler-frame\\\");\\nif (tiddlers.length > 0) {\\n\\ttiddler_index = 0;\\n\\tif (MARK_CURRENT_TIDDLER) {\\n\\t\\ttiddlers[tiddler_index].classList.add(\\\"activeTiddler\\\");\\n\\t}\\n}\\n\\n\\n// refresh active tiddler marker after page refresh (p.e. after closing or editing a tiddler)\\n$tw.hooks.addHook(\\\"th-page-refreshed\\\", function() {\\n\\ttiddlers = document.getElementsByClassName(\\\"tc-tiddler-frame\\\");\\n\\n\\tif (!MARK_CURRENT_TIDDLER) return;\\n\\tif (tiddler_index \u003C 0 && tiddlers.length) tiddler_index = 0;\\n\\n\\tif (!markTiddlerByTitle()) {\\n\\t\\t// if tiddler_index > last_visible_index, select the last visible tiddler\\n\\t\\tvar last_visible_index = tiddlers.length - 1;\\n\\t\\twhile (last_visible_index >= 0 && tiddlers[last_visible_index].style.opacity === \\\"0\\\") {\\n\\t\\t\\tlast_visible_index--;  // might be -1\\n\\t\\t}\\n\\t\\tif (tiddler_index > last_visible_index) {\\n\\t\\t\\ttiddler_index = last_visible_index;\\n\\t\\t}\\n\\t\\tif (tiddler_index \u003C 0) return;\\n\\n\\t\\t// if the current tiddler is invisible, find the next visible one\\n\\t\\tvar i = tiddler_index;\\n\\t\\twhile (i \u003C tiddlers.length && tiddlers[i].style.opacity === \\\"0\\\") {\\n\\t\\t\\ti++;\\n\\t\\t}\\n\\t\\t// if no visible tiddler was found, search upwards\\n\\t\\tif (i == tiddlers.length) {\\n\\t\\t\\ti = tiddler_index;\\n\\t\\t\\twhile (i >= 0 && tiddlers[i].style.opacity === \\\"0\\\") {\\n\\t\\t\\t\\ti--;\\n\\t\\t\\t}\\n\\t\\t}\\n\\t\\ttiddler_index = i;\\n\\t}\\n\\tupdateActiveTiddlerClass();\\n});\\n\\n\\n// get name of new/edited tiddler after saving\\n$tw.hooks.addHook(\\\"th-saving-tiddler\\\", function(tiddler) {\\n\\ttiddler_title = tiddler.getFieldString(\\\"title\\\");\\n\\treturn tiddler;\\n});\\n\\n\\n// mark new tiddler after navigating to it\\n$tw.hooks.addHook(\\\"th-navigating\\\", function(event) {\\n\\ttiddler_title = event.navigateTo;\\n\\tmarkTiddlerByTitle();\\n\\treturn event;\\n});\\n\\n\\nfunction markTiddlerByTitle() {\\n\\ttiddlers = document.getElementsByClassName(\\\"tc-tiddler-frame\\\");\\n\\tfor (var i=0; i\u003Ctiddlers.length; i++) {\\n\\t\\tif (tiddlers[i].getAttribute(\\\"data-tiddler-title\\\") == tiddler_title\\n\\t\\t\\t\\t&& tiddlers[i].style.opacity === \\\"1\\\") {\\n\\t\\t\\tif (MARK_CURRENT_TIDDLER) {\\n\\t\\t\\t\\tif (tiddlers[tiddler_index] !== undefined)\\n\\t\\t\\t\\t\\ttiddlers[tiddler_index].classList.remove(\\\"activeTiddler\\\");\\n\\t\\t\\t\\ttiddlers[i].classList.add(\\\"activeTiddler\\\");\\n\\t\\t\\t}\\n\\t\\t\\ttiddler_index = i;\\n\\t\\t\\treturn true;\\n\\t\\t}\\n\\t}\\n\\treturn false;\\n}\\n\\n\\nfunction updateActiveTiddlerClass() {\\n\\tfor (var i=0; i\u003Ctiddlers.length; i++) {\\n\\t\\tif (i != tiddler_index) {\\n\\t\\t\\ttiddlers[i].classList.remove(\\\"activeTiddler\\\");\\n\\t\\t}\\n\\t}\\n\\ttiddlers[tiddler_index].classList.add(\\\"activeTiddler\\\");\\n}\\n\\n\\nfunction getActiveTiddlersTitle() {\\n\\ttiddler_title = (tiddler_index \u003C 0) ? \\\"\\\" : tiddlers[tiddler_index].getAttribute(\\\"data-tiddler-title\\\");\\n}\\n\\n\\nfunction isInViewport(el) {\\n\\tvar rect = el.getBoundingClientRect();\\n\\treturn (\\n\\t\\trect.bottom > 0 &&\\n\\t\\trect.top \u003C (window.innerHeight || document.documentElement.clientHeight)\\n\\t);\\n}\\n\\n\\nfunction isElementCloseToTop(el) {\\n\\tvar rect = el.getBoundingClientRect();\\n\\treturn (rect.top >= -LIMIT && rect.top \u003C= LIMIT);\\n}\\n\\n\\nfunction findTopmostTiddler(tiddlers) {\\n\\tvar i = 0;\\n\\twhile (i \u003C tiddlers.length && tiddlers[i].getBoundingClientRect().top \u003C= -LIMIT) {\\n\\t\\ti++;\\n\\t}\\n\\treturn i;\\n}\\n\\n\\nfunction switchTiddler(scrollTo) {\\n\\tif (scrollTo) {\\n\\t\\tif (INSTANT_NAVIGATION ||\\n\\t\\t\\t\\tDate.now() - timestamp_last_navigation \u003C INSTANT_NAVIGATION_BEFORE) {\\n\\t\\t\\t// if user navigates quickly or wants to navigate instantly,\\n\\t\\t\\t// jump instantly to next or previous tiddler\\n\\t\\t\\ttiddlers[tiddler_index].scrollIntoView();\\n\\t\\t} else {\\n\\t\\t\\t// scroll smoothly to next or previous tiddler\\n\\t\\t\\ttiddlers[tiddler_index].scrollIntoView(\\n\\t\\t\\t\\t{behavior: \\\"smooth\\\", block: \\\"start\\\", inline: \\\"nearest\\\"});\\n\\t\\t}\\n\\t}\\n\\ttimestamp_last_navigation = Date.now();\\n\\tif (MARK_CURRENT_TIDDLER) {\\n\\t\\tupdateActiveTiddlerClass();\\n\\t}\\n\\tgetActiveTiddlersTitle();\\n}\\n\\n\\ndocument.onclick = function(e) {\\n\\tvar elem = e.target;\\n\\n\\twhile (elem && !elem.classList.contains(\\\"tc-tiddler-frame\\\")) {\\n\\t\\telem = elem.parentElement;\\n\\t}\\n\\tif (!elem) return;\\n\\tconst titleOfClickedTiddler = elem.getAttribute(\\\"data-tiddler-title\\\");\\n\\ttiddlers = document.getElementsByClassName(\\\"tc-tiddler-frame\\\");\\n\\tfor (var i=0; i\u003Ctiddlers.length; i++) {\\n\\t\\tif (tiddlers[i].getAttribute(\\\"data-tiddler-title\\\") == titleOfClickedTiddler) {\\n\\t\\t\\ttiddler_index = i;\\n\\t\\t\\tswitchTiddler(false);\\n\\t\\t\\treturn;\\n\\t\\t}\\n\\t}\\n};\\n\\n\\ndocument.onkeydown = function(e) {\\n\\tif (e.repeat) return;\\n\\tif (e.ctrlKey || e.altKey || e.metaKey || e.shiftKey) return;\\n\\tif (e.target.className == \\\"tc-tiddler-preview\\\") return;\\n\\tif (e.target.tagName.toLowerCase() == \\\"div\\\") return;\\n\\n\\tvar activeElement = document.activeElement;\\n\\tif (activeElement) {\\n\\t\\tif (activeElement.tagName.toLowerCase() == \\\"textarea\\\") return;\\n\\t\\tif (activeElement.tagName.toLowerCase() == \\\"input\\\") return;\\n\\t}\\n\\n\\t// if (e.code == \\\"Escape\\\") {\\n\\t// \\t// menu = document.getElementsByClassName(\\\"tc-drop-down\\\");\\n\\t// \\tvar menu = document.querySelector(\\\"div.tc-drop-down\\\");\\n\\t// \\tif (menu) {\\n\\t// \\t\\tmenu.parentElement.previousSibling.click();\\n\\t// \\t}\\n\\t// }\\n\\n\\ttiddlers = document.getElementsByClassName(\\\"tc-tiddler-frame\\\");\\n\\tif (tiddlers.length == 0) return;\\n\\n\\tvar tiddlerIgnoreKeyboardLayout = $tw.wiki.getTiddler(\\\"$:/config/IgnoreKeyboardLayout\\\");\\n\\tignoreKeyboardLayout = (tiddlerIgnoreKeyboardLayout.fields.text.trim() == \\\"1\\\");\\n\\n\\tvar tiddlerCycle = $tw.wiki.getTiddler(\\\"$:/config/Cycle\\\");\\n\\tcycle = (tiddlerCycle.fields.text.trim() == \\\"1\\\");\\n\\n\\tvar down_key_pressed = ignoreKeyboardLayout ? (e.code == \\\"Key\\\" + navigate_down_key.toUpperCase())\\n\\t                                            : (e.key == navigate_down_key);\\n\\tvar up_key_pressed = ignoreKeyboardLayout ? (e.code == \\\"Key\\\" + navigate_up_key.toUpperCase())\\n\\t                                          : (e.key == navigate_up_key);\\n\\tvar other_bind_used = Object.keys(bindings).find(k => {\\n\\t\\tif (!bindings[k]) return false;\\n\\t\\tif (ignoreKeyboardLayout)\\n\\t\\t\\treturn e.code == (\\\"Key\\\" + bindings[k].toUpperCase()) &&\\n\\t\\t\\t       !alternativeLayoutIgnoreKeys.find(ak => ak == e.key);\\n\\t\\treturn e.key == bindings[k];\\n\\t});\\n\\n\\tif (tiddler_title) {\\n\\t\\tif (tiddler_index \u003C 0 || tiddler_index >= tiddlers.length ||\\n\\t\\t        tiddlers[tiddler_index].getAttribute(\\\"data-tiddler-title\\\") != tiddler_title) {\\n\\t\\t\\ttiddler_index = -1;\\n\\t\\t\\t// find correct index (after editing or creating a new tiddler)\\n\\t\\t\\tfor (var i=0; i\u003Ctiddlers.length; i++) {\\n\\t\\t\\t\\tif (tiddlers[i].getAttribute(\\\"data-tiddler-title\\\") == tiddler_title) {\\n\\t\\t\\t\\t\\ttiddler_index = i;\\n\\t\\t\\t\\t\\tbreak;\\n\\t\\t\\t\\t}\\n\\t\\t\\t}\\n\\t\\t}\\n\\t}\\n\\n\\tif (down_key_pressed || up_key_pressed || other_bind_used) {\\n\\t\\tif (tiddler_index \u003C 0 || (!isInViewport(tiddlers[tiddler_index]) &&\\n\\t\\t                          !isElementCloseToTop(tiddlers[tiddler_index]))) {\\n\\t\\t\\ttiddler_index = findTopmostTiddler(tiddlers);\\n\\t\\t\\tif (down_key_pressed) tiddler_index -= 1;\\n\\t\\t}\\n\\t\\tif (down_key_pressed) {\\n\\t\\t\\t// go down\\n\\t\\t\\ttiddler_index += 1;\\n\\t\\t\\tif (tiddler_index >= tiddlers.length)\\n\\t\\t\\t\\ttiddler_index = cycle ? 0 : tiddlers.length - 1;\\n\\t\\t\\tswitchTiddler(true);\\n\\t\\t} else if (up_key_pressed) {\\n\\t\\t\\t// go up\\n\\t\\t\\ttiddler_index -= 1;\\n\\t\\t\\tif (tiddler_index \u003C 0)\\n\\t\\t\\t\\ttiddler_index = cycle ? tiddlers.length - 1 : 0;\\n\\t\\t\\tswitchTiddler(true);\\n\\t\\t} else { // other bind used\\n\\t\\t\\tif (tiddlers[tiddler_index] === undefined) return;\\n\\t\\t\\tif (!isInViewport(tiddlers[tiddler_index])) return;\\n\\t\\t\\tvar button = tiddlers[tiddler_index].\\n\\t\\t\\t\\t\\t\\t\\tgetElementsByClassName(BTN_CLASSNAME_PREFIX+other_bind_used)[0];\\n\\t\\t\\tif (!button) return;\\n\\t\\t\\tbutton.click();\\n\\t\\t\\tif (other_bind_used == 'close' || other_bind_used == 'delete') {\\n\\t\\t\\t\\ttiddlers[tiddler_index].classList.remove(\\\"activeTiddler\\\");\\n\\t\\t\\t\\tif (tiddlers.length == 1) {\\n\\t\\t\\t\\t\\ttiddler_index = -1;\\n\\t\\t\\t\\t} else { // tiddlers.length >= 2\\n\\t\\t\\t\\t\\tif (tiddler_index >= tiddlers.length - 1) { // last tiddler selected\\n\\t\\t\\t\\t\\t\\ttiddler_index = tiddlers.length - 2; // select second to last tiddler\\n\\t\\t\\t\\t\\t\\tif (MARK_CURRENT_TIDDLER)\\n\\t\\t\\t\\t\\t\\t\\ttiddlers[tiddler_index].classList.add(\\\"activeTiddler\\\");\\n\\t\\t\\t\\t\\t} else {\\n\\t\\t\\t\\t\\t\\tif (MARK_CURRENT_TIDDLER)\\n\\t\\t\\t\\t\\t\\t\\t// use tiddler_index + 1 because the `tiddlers` array wasn't yet updated\\n\\t\\t\\t\\t\\t\\t\\ttiddlers[tiddler_index+1].classList.add(\\\"activeTiddler\\\");\\n\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t}\\n\\t\\t\\t}\\n\\t\\t\\tgetActiveTiddlersTitle();\\n\\t\\t}\\n\\t}\\n};\\n\\ndocument.onkeyup = function(e) {\\n\\tif (e.ctrlKey || e.altKey || e.metaKey || e.shiftKey) return;\\n\\tif (e.target.className == \\\"tc-tiddler-preview\\\") return;\\n\\tif (e.target.tagName.toLowerCase() == \\\"div\\\") return;\\n\\n\\tvar activeElement = document.activeElement;\\n\\tif (activeElement && activeElement.tagName.toLowerCase() == \\\"textarea\\\") return;\\n\\tif (activeElement && activeElement.tagName.toLowerCase() == \\\"input\\\") {\\n\\t\\tif (e.code == \\\"Escape\\\") {\\n\\t\\t\\t// check if search drop down menu is open\\n\\t\\t\\tvar dropdown = document.querySelector(\\\"div.tc-search-drop-down\\\");\\n\\t\\t\\tif (dropdown) {\\n\\t\\t\\t\\t// if (dropdown[0].classList.contains\\n\\t\\t\\t\\tvar elem = dropdown.parentNode.parentNode;\\n\\t\\t\\t\\telem.querySelector(\\\"svg.tc-image-close-button\\\");\\n\\t\\t\\t\\tif (elem && elem.parentNode) {\\n\\t\\t\\t\\t\\telem.parentNode.click();\\n\\t\\t\\t\\t}\\n\\t\\t\\t}\\n\\t\\t\\t// unfocus search box\\n\\t\\t\\tactiveElement.blur();\\n\\t\\t}\\n\\t\\treturn;\\n\\t}\\n\\tif (e.code == \\\"Escape\\\") {\\n\\t\\tvar menu = document.querySelector(\\\"div.tc-drop-down\\\");\\n\\t\\tif (menu) {\\n\\t\\t\\tmenu.parentElement.previousSibling.click();\\n\\t\\t}\\n\\t}\\n};\\n\\n}\\n\\n})();\\n\"},\"/home/max/dev/TW5/plugins/MaxGyver83/tw5-keyboard-navigation/latest_changes.patch\":{\"title\":\"/home/max/dev/TW5/plugins/MaxGyver83/tw5-keyboard-navigation/latest_changes.patch\",\"text\":\"diff --git a/keyboard-navigation.js.tid b/keyboard-navigation.js.tid\\nindex 6d178e5..9efd6e4 100644\\n--- a/keyboard-navigation.js.tid\\n+++ b/keyboard-navigation.js.tid\\n@@ -18,6 +18,7 @@ exports.startup = function () {\\n // Keybinds section\\n const navigate_up_key = 'k';\\n const navigate_down_key = 'j';\\n+const edit_content_key = 'e'; // edit and focus content\\n const bindings = {\\n \\t'more-tiddler-actions': 'm',\\n \\tinfo: null,\\n@@ -25,7 +26,7 @@ const bindings = {\\n \\t'new-journal-here': null,\\n \\tclone: null,\\n \\t'export-tiddler': null,\\n-\\tedit: 'e',\\n+\\tedit: 't', // edit and focus title\\n \\tdelete: null,\\n \\tpermalink: null,\\n \\tpermaview: null,\\n@@ -219,7 +220,7 @@ document.onclick = function(e) {\\n };\\n \\n \\n-document.onkeydown = function(e) {\\n+document.onkeydown = async function(e) {\\n \\tif (e.repeat) return;\\n \\tif (e.ctrlKey || e.altKey || e.metaKey || e.shiftKey) return;\\n \\tif (e.target.className == \\\"tc-tiddler-preview\\\") return;\\n@@ -252,6 +253,8 @@ document.onkeydown = function(e) {\\n \\t                                            : (e.key == navigate_down_key);\\n \\tvar up_key_pressed = ignoreKeyboardLayout ? (e.code == \\\"Key\\\" + navigate_up_key.toUpperCase())\\n \\t                                          : (e.key == navigate_up_key);\\n+\\tvar edit_content_key_pressed = ignoreKeyboardLayout ? (e.code == \\\"Key\\\" + edit_content_key.toUpperCase())\\n+\\t                                          : (e.key == edit_content_key);\\n \\tvar other_bind_used = Object.keys(bindings).find(k => {\\n \\t\\tif (!bindings[k]) return false;\\n \\t\\tif (ignoreKeyboardLayout)\\n@@ -274,7 +277,7 @@ document.onkeydown = function(e) {\\n \\t\\t}\\n \\t}\\n \\n-\\tif (down_key_pressed || up_key_pressed || other_bind_used) {\\n+\\tif (down_key_pressed || up_key_pressed || edit_content_key_pressed || other_bind_used) {\\n \\t\\tif (tiddler_index \u003C 0 || (!isInViewport(tiddlers[tiddler_index]) &&\\n \\t\\t                          !isElementCloseToTop(tiddlers[tiddler_index]))) {\\n \\t\\t\\ttiddler_index = findTopmostTiddler(tiddlers);\\n@@ -292,6 +295,36 @@ document.onkeydown = function(e) {\\n \\t\\t\\tif (tiddler_index \u003C 0)\\n \\t\\t\\t\\ttiddler_index = cycle ? tiddlers.length - 1 : 0;\\n \\t\\t\\tswitchTiddler(true);\\n+\\t\\t} else if (edit_content_key_pressed) {\\n+\\t\\t\\tif (tiddlers[tiddler_index] === undefined) return;\\n+\\t\\t\\tif (!isInViewport(tiddlers[tiddler_index])) return;\\n+\\t\\t\\tvar button = tiddlers[tiddler_index].\\n+\\t\\t\\t\\t\\t\\t\\tgetElementsByClassName(BTN_CLASSNAME_PREFIX+'edit')[0];\\n+\\t\\t\\tif (!button) return;\\n+\\t\\t\\tbutton.click();\\n+\\t\\t\\tawait new Promise(r => setTimeout(r, 500));\\n+\\t\\t\\tvar activeElement = document.activeElement;\\n+\\t\\t\\tconsole.log(activeElement);\\n+\\t\\t\\tif (activeElement.tagName.toLowerCase() != \\\"input\\\") return;\\n+\\t\\t\\tif (activeElement.className != \\\"tc-titlebar tc-edit-texteditor\\\") return;\\n+\\t\\t\\tvar parent = activeElement.parentNode;\\n+\\t\\t\\tconsole.log(parent);\\n+\\t\\t\\tvar editor = null;\\n+\\t\\t\\tfor (var i = 0; i \u003C parent.childNodes.length; i++) {\\n+\\t\\t\\t\\tif (parent.childNodes[i].className == \\\"tc-dropzone-editor\\\") {\\n+\\t\\t\\t\\t\\teditor = parent.childNodes[i];\\n+\\t\\t\\t\\t\\tconsole.log(editor);\\n+\\t\\t\\t\\t\\teditor.focus();\\n+\\t\\t\\t\\t\\tbreak;\\n+\\t\\t\\t\\t}        \\n+\\t\\t\\t}\\n+\\t\\t\\tif (!focus) return;\\n+\\t\\t\\tvar possibleEditorNodes = editor.querySelectorAll('textarea');\\n+\\t\\t\\tif (!possibleEditorNodes) return;\\n+\\t\\t\\tconsole.log(possibleEditorNodes);\\n+\\t\\t\\tconsole.log(possibleEditorNodes[0]);\\n+\\t\\t\\tpossibleEditorNodes[0].focus();\\n+\\t\\t\\tgetActiveTiddlersTitle();\\n \\t\\t} else { // other bind used\\n \\t\\t\\tif (tiddlers[tiddler_index] === undefined) return;\\n \\t\\t\\tif (!isInViewport(tiddlers[tiddler_index])) return;\\n\",\"type\":\".patch\"},\"$:/plugins/MaxGyver83/tw5-keyboard-navigation/readme\":{\"title\":\"$:/plugins/MaxGyver83/tw5-keyboard-navigation/readme\",\"created\":\"20191103104315571\",\"modified\":\"20231007192800000\",\"tags\":\"\",\"text\":\"This plugin enables some global shortcuts for comfortable navigation without a mouse.\\n\\n!! How to use\\nPress \u003Ckbd>Esc\u003C/kbd> to unfocus the sidebar search field.\\nThen you can jump to the next or previous open tiddler in the story river by pressing \u003Ckbd>j\u003C/kbd> or \u003Ckbd>k\u003C/kbd>, respectively (inspired by [[vim|https://www.vim.org/]]).\\nPress \u003Ckbd>e\u003C/kbd> if you want to edit the current tiddler. Press \u003Ckbd>Ctrl\u003C/kbd>+\u003Ckbd>Return\u003C/kbd> when you're done (as usual).\\n\u003Ckbd>c\u003C/kbd> is for closing a tiddler. \u003Ckbd>m\u003C/kbd> opens the \\\"more tiddler actions\\\" menu.\\n\\nWhen you search your TiddlyWiki (\u003Ckbd>Ctrl\u003C/kbd>+\u003Ckbd>Shift\u003C/kbd>+\u003Ckbd>f\u003C/kbd> by default), just press \u003Ckbd>Return\u003C/kbd> to open or \u003Ckbd>Tab\u003C/kbd> to focus the first match (without this plugin you have to press \u003Ckbd>Tab\u003C/kbd> four times).\\n\\n\u003Ckbd>Esc\u003C/kbd> also closes the search result popup window or \\\"more tiddler actions\\\" menu.\\n\\n!! Source code\\nThere is a public [[github repository|https://github.com/MaxGyver83/tw5-keyboard-navigation]] for `tw5-keyboard-navigation`.\\n\\n!! Author\\n[[Max Schillinger|https://www.maximilian-schillinger.de]]\\n\\n!! Contributers\\n[[Soren Bjornstad|https://github.com/sobjornstad]],\\n[[Tadeáš Paule|https://github.com/tadeaspaule]]\\n\"}}}","version":"0.7.3","type":"application/json","title":"$:/plugins/MaxGyver83/tw5-keyboard-navigation","source":"https://github.com/MaxGyver83/tw5-keyboard-navigation","plugin-type":"plugin","list":"readme config","description":"Keyboard navigation: jump to next/previous tiddler, edit or close tiddler, and more","dependents":"","core-version":">=5.1.21","author":"Max Schillinger"},
{"title":"$:/plugins/tiddlywiki/bibtex","name":"BibTeX","description":"BibTeX importer","author":"Henrik Muehe and Mikola Lysenko","list":"readme license","stability":"STABILITY_2_STABLE","version":"5.3.6","plugin-type":"plugin","dependents":"","type":"application/json","text":"{\"tiddlers\":{\"$:/plugins/tiddlywiki/bibtex/deserializer.js\":{\"title\":\"$:/plugins/tiddlywiki/bibtex/deserializer.js\",\"text\":\"/*\\\\\\ntitle: $:/plugins/tiddlywiki/bibtex/deserializer.js\\ntype: application/javascript\\nmodule-type: tiddlerdeserializer\\n\\nBibTeX file deserializer\\n\\n\\\\*/\\n(function(){\\n\\n/*jslint node: true, browser: true */\\n/*global $tw: false */\\n\\\"use strict\\\";\\n\\nvar bibtexParse = require(\\\"$:/plugins/tiddlywiki/bibtex/bibtexParse.js\\\");\\n\\n/*\\nParse an BibTeX file into tiddlers\\n*/\\nexports[\\\"application/x-bibtex\\\"] = function(text,fields) {\\n\\tvar data,\\n\\t\\tresults = [];\\n\\t// Parse the text\\n\\ttry {\\n\\t\\tdata = bibtexParse.toJSON(text)\\n\\t} catch(ex) {\\n\\t\\tdata = ex.toString();\\n\\t}\\n\\tif(typeof data === \\\"string\\\") {\\n\\t\\treturn [{\\n\\t\\t\\ttitle: \\\"BibTeX import error\\\",\\n\\t\\t\\ttext: data\\n\\t\\t}];\\n\\t}\\n\\t// Convert each entry\\n\\t$tw.utils.each(data,function(entry) {\\n\\t\\tvar fields = {\\n\\t\\t\\ttitle: entry.citationKey,\\n\\t\\t\\t\\\"bibtex-entry-type\\\": entry.entryType\\n\\t\\t};\\n\\t\\t$tw.utils.each(entry.entryTags,function(value,name) {\\n\\t\\t\\tfields[\\\"bibtex-\\\" + name.toLowerCase()] = value;\\n\\t\\t});\\n\\t\\tresults.push(fields);\\n\\t});\\n\\t// Return the output tiddlers\\n\\treturn results;\\n};\\n\\n})();\\n\",\"type\":\"application/javascript\",\"module-type\":\"tiddlerdeserializer\"},\"$:/plugins/tiddlywiki/bibtex/readme\":{\"title\":\"$:/plugins/tiddlywiki/bibtex/readme\",\"text\":\"The BibTeX plugin provides a deserializer that can convert bibliographic entries in `.bib` files into individual tiddlers.\\n\\nYou can use it in the browser by dragging and dropping a `.bib` file into the TiddlyWiki window. Under Node.js, use the `--load` command to load a `.bib` file.\\n\\nThe conversion is as follows:\\n\\n* `title` comes from citationKey\\n* `bibtex-entry-type` comes from entryType\\n* all `entryTags` are assigned to fields with the prefix `bibtex-`\\n\\nThe BibTeX plugin is based on the library [[bibtexParseJs by Henrik Muehe and Mikola Lysenko|https://github.com/ORCID/bibtexParseJs]].\\n\"},\"$:/plugins/tiddlywiki/bibtex/bibtexParse.js\":{\"text\":\"/* start bibtexParse 0.0.24 */\\n\\n//Original work by Henrik Muehe (c) 2010\\n//\\n//CommonJS port by Mikola Lysenko 2013\\n//\\n//Choice of compact (default) or pretty output from toBibtex:\\n//\\t\\tNick Bailey, 2017.\\n//\\n//Port to Browser lib by ORCID / RCPETERS\\n//\\n//Issues:\\n//no comment handling within strings\\n//no string concatenation\\n//no variable values yet\\n//Grammar implemented here:\\n//bibtex -> (string | preamble | comment | entry)*;\\n//string -> '@STRING' '{' key_equals_value '}';\\n//preamble -> '@PREAMBLE' '{' value '}';\\n//comment -> '@COMMENT' '{' value '}';\\n//entry -> '@' key '{' key ',' key_value_list '}';\\n//key_value_list -> key_equals_value (',' key_equals_value)*;\\n//key_equals_value -> key '=' value;\\n//value -> value_quotes | value_braces | key;\\n//value_quotes -> '\\\"' .*? '\\\"'; // not quite\\n//value_braces -> '{' .*? '\\\"'; // not quite\\n(function(exports) {\\n\\n    function BibtexParser() {\\n\\n        this.months = [\\\"jan\\\", \\\"feb\\\", \\\"mar\\\", \\\"apr\\\", \\\"may\\\", \\\"jun\\\", \\\"jul\\\", \\\"aug\\\", \\\"sep\\\", \\\"oct\\\", \\\"nov\\\", \\\"dec\\\"];\\n        this.notKey = [',','{','}',' ','='];\\n        this.pos = 0;\\n        this.input = \\\"\\\";\\n        this.entries = new Array();\\n\\n        this.currentEntry = \\\"\\\";\\n\\n        this.setInput = function(t) {\\n            this.input = t;\\n        };\\n\\n        this.getEntries = function() {\\n            return this.entries;\\n        };\\n\\n        this.isWhitespace = function(s) {\\n            return (s == ' ' || s == '\\\\r' || s == '\\\\t' || s == '\\\\n');\\n        };\\n\\n        this.match = function(s, canCommentOut) {\\n            if (canCommentOut == undefined || canCommentOut == null)\\n                canCommentOut = true;\\n            this.skipWhitespace(canCommentOut);\\n            if (this.input.substring(this.pos, this.pos + s.length) == s) {\\n                this.pos += s.length;\\n            } else {\\n                throw TypeError(\\\"Token mismatch: match\\\", \\\"expected \\\" + s + \\\", found \\\"\\n                        + this.input.substring(this.pos));\\n            };\\n            this.skipWhitespace(canCommentOut);\\n        };\\n\\n        this.tryMatch = function(s, canCommentOut) {\\n            if (canCommentOut == undefined || canCommentOut == null)\\n                canCommentOut = true;\\n            this.skipWhitespace(canCommentOut);\\n            if (this.input.substring(this.pos, this.pos + s.length) == s) {\\n                return true;\\n            } else {\\n                return false;\\n            };\\n            this.skipWhitespace(canCommentOut);\\n        };\\n\\n        /* when search for a match all text can be ignored, not just white space */\\n        this.matchAt = function() {\\n            while (this.input.length > this.pos && this.input[this.pos] != '@') {\\n                this.pos++;\\n            };\\n\\n            if (this.input[this.pos] == '@') {\\n                return true;\\n            };\\n            return false;\\n        };\\n\\n        this.skipWhitespace = function(canCommentOut) {\\n            while (this.isWhitespace(this.input[this.pos])) {\\n                this.pos++;\\n            };\\n            if (this.input[this.pos] == \\\"%\\\" && canCommentOut == true) {\\n                while (this.input[this.pos] != \\\"\\\\n\\\") {\\n                    this.pos++;\\n                };\\n                this.skipWhitespace(canCommentOut);\\n            };\\n        };\\n\\n        this.value_braces = function() {\\n            var bracecount = 0;\\n            this.match(\\\"{\\\", false);\\n            var start = this.pos;\\n            var escaped = false;\\n            while (true) {\\n                if (!escaped) {\\n                    if (this.input[this.pos] == '}') {\\n                        if (bracecount > 0) {\\n                            bracecount--;\\n                        } else {\\n                            var end = this.pos;\\n                            this.match(\\\"}\\\", false);\\n                            return this.input.substring(start, end);\\n                        };\\n                    } else if (this.input[this.pos] == '{') {\\n                        bracecount++;\\n                    } else if (this.pos >= this.input.length - 1) {\\n                        throw TypeError(\\\"Unterminated value: value_braces\\\");\\n                    };\\n                };\\n                if (this.input[this.pos] == '\\\\\\\\' && escaped == false)\\n                    escaped = true;\\n                else\\n                    escaped = false;\\n                this.pos++;\\n            };\\n        };\\n\\n        this.value_comment = function() {\\n            var str = '';\\n            var brcktCnt = 0;\\n            while (!(this.tryMatch(\\\"}\\\", false) && brcktCnt == 0)) {\\n                str = str + this.input[this.pos];\\n                if (this.input[this.pos] == '{')\\n                    brcktCnt++;\\n                if (this.input[this.pos] == '}')\\n                    brcktCnt--;\\n                if (this.pos >= this.input.length - 1) {\\n                    throw TypeError(\\\"Unterminated value: value_comment\\\", + this.input.substring(start));\\n                };\\n                this.pos++;\\n            };\\n            return str;\\n        };\\n\\n        this.value_quotes =

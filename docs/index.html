function() {\\n            this.match('\\\"', false);\\n            var start = this.pos;\\n            var escaped = false;\\n            while (true) {\\n                if (!escaped) {\\n                    if (this.input[this.pos] == '\\\"') {\\n                        var end = this.pos;\\n                        this.match('\\\"', false);\\n                        return this.input.substring(start, end);\\n                    } else if (this.pos >= this.input.length - 1) {\\n                        throw TypeError(\\\"Unterminated value: value_quotes\\\", this.input.substring(start));\\n                    };\\n                }\\n                if (this.input[this.pos] == '\\\\\\\\' && escaped == false)\\n                    escaped = true;\\n                else\\n                    escaped = false;\\n                this.pos++;\\n            };\\n        };\\n\\n        this.single_value = function() {\\n            var start = this.pos;\\n            if (this.tryMatch(\\\"{\\\")) {\\n                return this.value_braces();\\n            } else if (this.tryMatch('\\\"')) {\\n                return this.value_quotes();\\n            } else {\\n                var k = this.key();\\n                if (k.match(\\\"^[0-9]+$\\\"))\\n                    return k;\\n                else if (this.months.indexOf(k.toLowerCase()) >= 0)\\n                    return k.toLowerCase();\\n                else\\n                    throw \\\"Value expected: single_value\\\" + this.input.substring(start) + ' for key: ' + k;\\n\\n            };\\n        };\\n\\n        this.value = function() {\\n            var values = [];\\n            values.push(this.single_value());\\n            while (this.tryMatch(\\\"#\\\")) {\\n                this.match(\\\"#\\\");\\n                values.push(this.single_value());\\n            };\\n            return values.join(\\\"\\\");\\n        };\\n\\n        this.key = function(optional) {\\n            var start = this.pos;\\n            while (true) {\\n                if (this.pos >= this.input.length) {\\n                    throw TypeError(\\\"Runaway key: key\\\");\\n                };\\n                                // а-яА-Я is Cyrillic\\n                //console.log(this.input[this.pos]);\\n                if (this.notKey.indexOf(this.input[this.pos]) >= 0) {\\n                    if (optional && this.input[this.pos] != ',') {\\n                        this.pos = start;\\n                        return null;\\n                    };\\n                    return this.input.substring(start, this.pos);\\n                } else {\\n                    this.pos++;\\n\\n                };\\n            };\\n        };\\n\\n        this.key_equals_value = function() {\\n            var key = this.key();\\n            if (this.tryMatch(\\\"=\\\")) {\\n                this.match(\\\"=\\\");\\n                var val = this.value();\\n                key = key.trim()\\n                return [ key, val ];\\n            } else {\\n                throw TypeError(\\\"Value expected, equals sign missing: key_equals_value\\\",\\n                     this.input.substring(this.pos));\\n            };\\n        };\\n\\n        this.key_value_list = function() {\\n            var kv = this.key_equals_value();\\n            this.currentEntry['entryTags'] = {};\\n            this.currentEntry['entryTags'][kv[0]] = kv[1];\\n            while (this.tryMatch(\\\",\\\")) {\\n                this.match(\\\",\\\");\\n                // fixes problems with commas at the end of a list\\n                if (this.tryMatch(\\\"}\\\")) {\\n                    break;\\n                }\\n                ;\\n                kv = this.key_equals_value();\\n                this.currentEntry['entryTags'][kv[0]] = kv[1];\\n            };\\n        };\\n\\n        this.entry_body = function(d) {\\n            this.currentEntry = {};\\n            this.currentEntry['citationKey'] = this.key(true);\\n            this.currentEntry['entryType'] = d.substring(1);\\n            if (this.currentEntry['citationKey'] != null) {\\n                this.match(\\\",\\\");\\n            }\\n            this.key_value_list();\\n            this.entries.push(this.currentEntry);\\n        };\\n\\n        this.directive = function() {\\n            this.match(\\\"@\\\");\\n            return \\\"@\\\" + this.key();\\n        };\\n\\n        this.preamble = function() {\\n            this.currentEntry = {};\\n            this.currentEntry['entryType'] = 'PREAMBLE';\\n            this.currentEntry['entry'] = this.value_comment();\\n            this.entries.push(this.currentEntry);\\n        };\\n\\n        this.comment = function() {\\n            this.currentEntry = {};\\n            this.currentEntry['entryType'] = 'COMMENT';\\n            this.currentEntry['entry'] = this.value_comment();\\n            this.entries.push(this.currentEntry);\\n        };\\n\\n        this.entry = function(d) {\\n            this.entry_body(d);\\n        };\\n\\n        this.alernativeCitationKey = function () {\\n            this.entries.forEach(function (entry) {\\n                if (!entry.citationKey && entry.entryTags) {\\n                    entry.citationKey = '';\\n                    if (entry.entryTags.author) {\\n                        entry.citationKey += entry.entryTags.author.split(',')[0] += ', ';\\n                    }\\n                    entry.citationKey += entry.entryTags.year;\\n                }\\n            });\\n        }\\n\\n        this.bibtex = function() {\\n            while (this.matchAt()) {\\n                var d = this.directive();\\n                this.match(\\\"{\\\");\\n                if (d.toUpperCase() == \\\"@STRING\\\") {\\n                    this.string();\\n                } else if (d.toUpperCase() == \\\"@PREAMBLE\\\") {\\n                    this.preamble();\\n                } else if (d.toUpperCase() == \\\"@COMMENT\\\") {\\n                    this.comment();\\n                } else {\\n                    this.entry(d);\\n                }\\n                this.match(\\\"}\\\");\\n            };\\n\\n            this.alernativeCitationKey();\\n        };\\n    };\\n\\n    exports.toJSON = function(bibtex) {\\n        var b = new BibtexParser();\\n        b.setInput(bibtex);\\n        b.bibtex();\\n        return b.entries;\\n    };\\n\\n    /* added during hackathon don't hate on me */\\n    /* Increased the amount of white-space to make entries\\n     * more attractive to humans. Pass compact as false\\n     * to enable */\\n    exports.toBibtex = function(json, compact) {\\n        if (compact === undefined) compact = true;\\n        var out = '';\\n        \\n        var entrysep = ',';\\n        var indent = '';\\n        if (!compact) {\\n\\t\\t      entrysep = ',\\\\n';\\n\\t\\t      indent = '    ';        \\n        }\\n        for ( var i in json) {\\n            out += \\\"@\\\" + json[i].entryType;\\n            out += '{';\\n            if (json[i].citationKey)\\n                out += json[i].citationKey + entrysep;\\n            if (json[i].entry)\\n                out += json[i].entry ;\\n            if (json[i].entryTags) {\\n                var tags = indent;\\n                for (var jdx in json[i].entryTags) {\\n                    if (tags.trim().length != 0)\\n                        tags += entrysep + indent;\\n                    tags += jdx + (compact ? '={' : ' = {') + \\n                            json[i].entryTags[jdx] + '}';\\n                }\\n                out += tags;\\n            }\\n            out += compact ? '}\\\\n' : '\\\\n}\\\\n\\\\n';\\n        }\\n        return out;\\n\\n    };\\n\\n})(typeof exports === 'undefined' ? this['bibtexParse'] = {} : exports);\\n\\n/* end bibtexParse */\\n\",\"type\":\"application/javascript\",\"title\":\"$:/plugins/tiddlywiki/bibtex/bibtexParse.js\",\"module-type\":\"library\"},\"$:/plugins/tiddlywiki/bibtex/license\":{\"text\":\"\\nThe MIT License (MIT)\\nCopyright (c) 2013 ORCID, Inc.\\n\\nCopyright (c) 2010 Henrik Muehe\\n\\nPermission is hereby granted, free of charge, to any person obtaining a copy\\nof this software and associated documentation files (the \\\"Software\\\"), to deal\\nin the Software without restriction, including without limitation the rights\\nto use, copy, modify, merge, publish, distribute, sublicense, and/or sell\\ncopies of the Software, and to permit persons to whom the Software is\\nfurnished to do so, subject to the following conditions:\\n\\nThe above copyright notice and this permission notice shall be included in\\nall copies or substantial portions of the Software.\\n\\nTHE SOFTWARE IS PROVIDED \\\"AS IS\\\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\\nFITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\\nAUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\\nLIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\\nOUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN\\nTHE SOFTWARE.\\n\",\"type\":\"text/plain\",\"title\":\"$:/plugins/tiddlywiki/bibtex/license\"}}}"},
{"title":"$:/plugins/tiddlywiki/consent-banner","name":"Consent Banner","description":"Consent banner for GDPR etc","list":"readme docs youtube config","stability":"STABILITY_2_STABLE","version":"5.3.8","plugin-type":"plugin","dependents":"","type":"application/json","text":"{\"tiddlers\":{\"$:/plugins/tiddlywiki/consent-banner/banner\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/banner\",\"tags\":\"$:/tags/PageTemplate\",\"text\":\"\\\\whitespace trim\\n\\n\u003C%if [\u003Ctv-config-static>!match[yes]] %>\\n\\n\u003C$reveal state=\\\"$:/state/consent-banner/accepted\\\" type=\\\"match\\\" text=\\\"\\\" tag=\\\"div\\\">\\n\\n\u003Cdiv class=\\\"tc-consent-backdrop\\\">\\n\\n\u003C/div>\\n\\n\u003Cdiv class=\\\"tc-consent-banner tc-consent-banner-left\\\">\\n\\n\u003C$transclude tiddler=\\\"$:/config/plugins/tiddlywiki/consent-banner/greeting-message\\\" mode=\\\"block\\\"/>\\n\\n\u003Cdiv class=\\\"tc-consent-buttons\\\">\\n\\n\u003C$list filter=\\\"[all[shadows+tiddlers]tag[$:/tags/ConsentBanner/Button]]\\\">\\n\\n\u003C$transclude tiddler=\u003C\u003CcurrentTiddler>> mode=\\\"inline\\\"/>\\n\\n\u003C/$list>\\n\\n\u003C/div>\\n\\n\u003C/div>\\n\\n\u003C/$reveal>\\n\\n\u003C%endif%>\"},\"$:/plugins/tiddlywiki/consent-banner/blocked-embed-message-wrapper\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/blocked-embed-message-wrapper\",\"text\":\"\\\\define styles()\\nwidth:$(width)$;height:$(height)$;\\n\\\\end\\n\\n\u003Cdiv class=\\\"tc-blocked-embedded-content\\\" style=\u003C\u003Cstyles>>>\\n\u003Cdiv class=\\\"tc-blocked-embedded-content-inner\\\">\\n\u003Cdiv class=\\\"tc-blocked-embedded-content-inner-inner\\\">\\n\u003C$transclude tiddler=\\\"$:/config/plugins/tiddlywiki/consent-banner/blocked-embed-message\\\" mode=\\\"inline\\\"/>\\n\u003C/div>\\n\u003C/div>\\n\u003C/div>\\n\"},\"$:/plugins/tiddlywiki/consent-banner/buttons/accept\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/buttons/accept\",\"tags\":\"$:/tags/ConsentBanner/Button\",\"text\":\"\u003C$button message=\\\"tm-consent-accept\\\" class=\\\"tc-consent-button tc-consent-button-default tc-btn-invisible\\\" tooltip={{$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/hint}}>\\n{{$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/caption}}\\n\u003C/$button>\\n\"},\"$:/plugins/tiddlywiki/consent-banner/buttons/decline\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/buttons/decline\",\"tags\":\"$:/tags/ConsentBanner/Button\",\"text\":\"\u003C$button message=\\\"tm-consent-decline\\\" class=\\\"tc-consent-button tc-btn-invisible\\\" tooltip={{$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/hint}}>\\n{{$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/caption}}\\n\u003C/$button>\\n\"},\"$:/config/DefaultColourMappings/consent-banner-backdrop-background\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-backdrop-background\",\"text\":\"rgba(0,0,0,0.2)\"},\"$:/config/DefaultColourMappings/consent-banner-background\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-background\",\"text\":\"#009677\"},\"$:/config/DefaultColourMappings/consent-banner-button-background\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-button-background\",\"text\":\"transparent\"},\"$:/config/DefaultColourMappings/consent-banner-button-border\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-button-border\",\"text\":\"#fff\"},\"$:/config/DefaultColourMappings/consent-banner-button-default-background\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-button-default-background\",\"text\":\"#fff\"},\"$:/config/DefaultColourMappings/consent-banner-button-default-foreground\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-button-default-foreground\",\"text\":\"#009677\"},\"$:/config/DefaultColourMappings/consent-banner-button-foreground\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-button-foreground\",\"text\":\"#fff\"},\"$:/config/DefaultColourMappings/consent-banner-button-hover-background\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-button-hover-background\",\"text\":\"#fff\"},\"$:/config/DefaultColourMappings/consent-banner-button-hover-border\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-button-hover-border\",\"text\":\"#fff\"},\"$:/config/DefaultColourMappings/consent-banner-button-hover-foreground\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-button-hover-foreground\",\"text\":\"#009577\"},\"$:/config/DefaultColourMappings/consent-banner-foreground\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-foreground\",\"text\":\"#fff\"},\"$:/config/DefaultColourMappings/consent-banner-hr-background\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-hr-background\",\"text\":\"rgba(255,255,255,.25)\"},\"$:/config/DefaultColourMappings/consent-banner-link-foreground\":{\"title\":\"$:/config/DefaultColourMappings/consent-banner-link-foreground\",\"text\":\"#fff\"},\"$:/config/plugins/tiddlywiki/consent-banner/block-embedded-content\":{\"title\":\"$:/config/plugins/tiddlywiki/consent-banner/block-embedded-content\",\"text\":\"yes\"},\"$:/config/plugins/tiddlywiki/consent-banner/blocked-embed-message\":{\"title\":\"$:/config/plugins/tiddlywiki/consent-banner/blocked-embed-message\",\"text\":\"Blocked embedded content from\u003Cbr/>\u003Ca href=\u003C\u003Curl>> class=\\\"tc-tiddlylink-external\\\" target=\\\"_blank\\\" rel=\\\"noopener noreferrer\\\">\u003C$text text=\u003C\u003Curl>>/>\u003C/a>\\n\\n\u003Chr/>\\n\\n{{$:/plugins/tiddlywiki/consent-banner/buttons/accept}} cookies to unblock\"},\"$:/config/plugins/tiddlywiki/consent-banner/blocked-raw-message\":{\"title\":\"$:/config/plugins/tiddlywiki/consent-banner/blocked-raw-message\",\"text\":\"\u003Cdiv class=\\\"tc-blocked-embedded-content\\\" style=\\\"width:100%;\\\">\\n\\n\u003Cdiv class=\\\"tc-blocked-embedded-content-inner\\\">\\n\\n\u003Cdiv class=\\\"tc-blocked-embedded-content-inner-inner\\\">\\n\\nBlocked raw content\\n\\n\u003Chr/>\\n\\n{{$:/plugins/tiddlywiki/consent-banner/buttons/accept}} cookies to unblock\\n\\n\u003C/div>\\n\\n\u003C/div>\\n\\n\u003C/div>\\n\"},\"$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/caption\":{\"title\":\"$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/caption\",\"text\":\"Accept\"},\"$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/hint\":{\"title\":\"$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/hint\",\"text\":\"Accept cookies\"},\"$:/config/plugins/tiddlywiki/consent-banner/buttons/clear/caption\":{\"title\":\"$:/config/plugins/tiddlywiki/consent-banner/buttons/clear/caption\",\"text\":\"Clear\"},\"$:/config/plugins/tiddlywiki/consent-banner/buttons/clear/hint\":{\"title\":\"$:/config/plugins/tiddlywiki/consent-banner/buttons/clear/hint\",\"text\":\"Clear cookies\"},\"$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/caption\":{\"title\":\"$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/caption\",\"text\":\"Decline\"},\"$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/hint\":{\"title\":\"$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/hint\",\"text\":\"Decline cookies\"},\"$:/config/cookie-consent-required\":{\"title\":\"$:/config/cookie-consent-required\",\"text\":\"yes\"},\"$:/config/plugins/tiddlywiki/consent-banner/greeting-message\":{\"title\":\"$:/config/plugins/tiddlywiki/consent-banner/greeting-message\",\"text\":\"! Our use of cookies\\n\\nWe use necessary cookies to make our site work. We’d also like to set optional analytics to help us improve it. We won’t set optional cookies unless you enable them. Using this tool will set a cookie on your device to remember your preferences.\\n\\n---\\n\\n!! Necessary cookies\\n\\nNecessary cookies enable core functionality such as security, network management, and accessibility. You may disable these by changing your browser settings, but this may affect how the website functions.\\n\\n---\\n\\n!! Analytics cookies\\n\\nWe’d like to set non-essential cookies, such as Google Analytics, to help us to improve our website by collecting and reporting information on how you use it. The cookies collect information in a way that does not directly identify anyone.\\n\\n---\\n\"},\"$:/plugins/tiddlywiki/consent-banner/tv-block-embedded-content\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/tv-block-embedded-content\",\"tags\":\"$:/tags/Macro\",\"text\":\"\u003C$set name=\\\"tv-block-embedded-content\\\" value={{{ [{$:/config/cookie-consent-required}else[no]match[yes]then{$:/state/consent-banner/accepted}!match[yes]then[yes]] }}}/>\\n\"},\"$:/plugins/tiddlywiki/consent-banner/config\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/config\",\"caption\":\"Consent Banner\",\"tags\":\"$:/tags/ControlPanel/SettingsTab\",\"text\":\"! [[Greeting Message|$:/config/plugins/tiddlywiki/consent-banner/greeting-message]]\\n\\n\u003Cdiv style=\\\"\\\">\\n\\n\u003Cdiv style=\\\"display:inline-block;vertical-align:top;width:45%;\\\">\\n\\n\u003C$edit-text tiddler=\\\"$:/config/plugins/tiddlywiki/consent-banner/greeting-message\\\" tag=\\\"textarea\\\" class=\\\"tc-edit-texteditor\\\"/>\\n\\n\u003C/div>\\n\\n\u003Cdiv style=\\\"display:inline-block;vertical-align:top;width:45%;margin:0.5em;border:1px solid black;padding:0.5em;\\\" class=\\\"tc-consent-banner\\\">\\n\\n\u003C$transclude tiddler=\\\"$:/config/plugins/tiddlywiki/consent-banner/greeting-message\\\" mode=\\\"block\\\"/>\\n\\n\u003C/div>\\n\\n\u003C/div>\\n\\n! Buttons\\n\\n|[[Accept caption|$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/caption]] |\u003C$edit-text tiddler=\\\"$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/caption\\\" tag=\\\"input\\\"/> |\\n|[[Accept hint|$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/hint]] |\u003C$edit-text tiddler=\\\"$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/hint\\\" tag=\\\"input\\\"/> |\\n|[[Decline caption|$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/caption]] |\u003C$edit-text tiddler=\\\"$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/caption\\\" tag=\\\"input\\\"/> |\\n|[[Decline hint|$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/hint]] |\u003C$edit-text tiddler=\\\"$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/hint\\\" tag=\\\"input\\\"/> |\\n\\n! [[Consent Accepted Status|$:/state/consent-banner/accepted]]\\n\\nCurrent status: {{$:/state/consent-banner/accepted}} (blank indicates that consent has not yet been granted or declined)\\n\\n\u003C$button message=\\\"tm-consent-accept\\\" tooltip={{$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/hint}}>\\n{{$:/config/plugins/tiddlywiki/consent-banner/buttons/accept/caption}}\\n\u003C/$button>\\n\\n\u003C$button message=\\\"tm-consent-decline\\\" tooltip={{$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/hint}}>\\n{{$:/config/plugins/tiddlywiki/consent-banner/buttons/decline/caption}}\\n\u003C/$button>\\n\\n\u003C$button message=\\\"tm-consent-clear\\\" tooltip={{$:/config/plugins/tiddlywiki/consent-banner/buttons/clear/hint}}>\\n{{$:/config/plugins/tiddlywiki/consent-banner/buttons/clear/caption}}\\n\u003C/$button>\\n\\n! Embedded Content Blocking\\n\\n//Requires page reload//\\n\\n\u003C$checkbox tiddler=\\\"$:/config/plugins/tiddlywiki/consent-banner/block-embedded-content\\\" field=\\\"text\\\" checked=\\\"yes\\\" unchecked=\\\"no\\\" default=\\\"no\\\"> Block all embedded content such as &lt;iframe>, &lt;embed> and &lt;object> unless consent has been granted\u003C/$checkbox>\\n\"},\"$:/plugins/tiddlywiki/consent-banner/docs\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/docs\",\"text\":\"! Features\\n\\nIf the same wiki is opened in multiple tabs then once the warning has been accepted or declined in one tab then the other tabs will autonatically follow suit.\\n\\nConsent is automatically granted if the user logged in (ie the tiddler [[$:/status/IsLoggedIn]] is set to `yes`).\\n\\n! Consent Banner Palette Entries\\n\\nAdd these entries to your current colour palette to change the colours used by the consent banner:\\n\\n* ''consent-banner-backdrop-background'' - the colour of the backdrop behind the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-backdrop-background}})\\n* ''consent-banner-background'' - the background colour of the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-background}})\\n* ''consent-banner-button-background'' - the background colour of buttons within the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-button-background}})\\n* ''consent-banner-button-border'' - the border colour of buttons within the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-button-border}})\\n* ''consent-banner-button-default-background'' - the background colour for the default button within the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-button-default-background}})\\n* ''consent-banner-button-default-foreground'' - the foreground colour for the default button within the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-button-default-foreground}})\\n* ''consent-banner-button-foreground'' - the foreground colour of buttons within the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-button-foreground}})\\n* ''consent-banner-button-hover-background'' - the background colour of hovered buttons within the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-button-hover-background}})\\n* ''consent-banner-button-hover-border'' - the border colour of hovered buttons within the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-button-hover-border}})\\n* ''consent-banner-button-hover-foreground'' - the foreground colour of hovered buttons within the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-button-hover-foreground}})\\n* ''consent-banner-foreground'' - the foreground colour of the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-foreground}})\\n* ''consent-banner-hr-background'' - the background colour of horizontal rules within the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-hr-background}})\\n* ''consent-banner-link-foreground'' - the foreground colour of tiddler links within the consent banner (defaults to {{$:/config/DefaultColourMappings/consent-banner-link-foreground}})\\n\\n! Embedded Content Blocking\\n\\nUnless disabled via the config tab, content embedded via &lt;iframe>, &lt;embed> or &lt;object> is blocked until the user consents to accept cookies.\\n\\n!! Implementation Details\\n\\nEmbedded content is blocked if the variable `tv-block-embedded-content` is set to `yes`. It is set to the current consent status by a [[global macro|$:/plugins/tiddlywiki/consent-banner/tv-block-embedded-content]]:\\n\\n\u003C$codeblock code={{$:/plugins/tiddlywiki/consent-banner/tv-block-embedded-content}}/>\\n\\n! ~YouTube macro\\n\\nA simple macro for embedding ~YouTube videos is provided to show how to adapt content according to whether consent has been granted. It works by checking the tiddler [[$:/state/consent-banner/accepted]] for the following values:\\n\\n* ''empty or missing'' - the user has yet to accept or decline to give their consent\\n* `yes` - the user has granted consent\\n* `no` - the user has declined consent\\n\\n! Customising banner buttons\\n\\nThe [[\\\"accept\\\"|$:/plugins/tiddlywiki/consent-banner/buttons/accept]] and [[\\\"decline\\\"|$:/plugins/tiddlywiki/consent-banner/buttons/decline]] buttons in the banner are individual tiddlers with the tag [[$:/tags/ConsentBanner/Button]], allowing them to be customised and extended.\\n\\nA common use case is to add a \\\"login\\\" button allowing users to login directly to bypass the banner. This could be implemented as a tiddler tagged [[$:/tags/ConsentBanner/Button]] with the following text:\\n\\n```\\n\u003C$button message=\\\"tm-login\\\" class=\\\"tc-consent-button tc-btn-invisible\\\">\\nLogin\\n\u003C/$button>\\n```\\n\\n! Integration with other plugins\\n\\nThird party plugins that set cookies can configure themselves to defer setting cookies until the user grants consent. There are several parts to this mechanism:\\n\\n* The consent-banner plugin includes a shadow tiddler [[$:/config/cookie-consent-required]] with the text `yes`. The third-party plugin should inspect this tiddler at startup; if it is not set to \\\"yes\\\" then it can proceed to set tiddlers immediately\\n* Otherwise, the third-party plugin should listen for changes to the tiddler [[$:/state/consent-banner/accepted]] and only start setting cookies when and if the value changes to \\\"yes\\\"\\n\\nThe [[Google Analytics plugin|https://github.com/TiddlyWiki/TiddlyWiki5/tree/master/plugins/tiddlywiki/googleanalytics]] shows an example of how this mechanism can be implemented.\\n\"},\"$:/core/modules/widgets/raw.js\":{\"title\":\"$:/core/modules/widgets/raw.js\",\"text\":\"/*\\\\\\ntitle: $:/core/modules/widgets/raw.js\\ntype: application/javascript\\nmodule-type: widget\\n\\nAn override of the raw widget that blocks raw content until the user has consented to accept cookies\\n\\n\\\\*/\\n\\n\\\"use strict\\\";\\n\\nvar Widget = require(\\\"$:/core/modules/widgets/widget.js\\\").widget;\\n\\nvar RawWidget = function(parseTreeNode,options) {\\n\\tthis.initialise(parseTreeNode,options);\\n};\\n\\n/*\\nInherit from the base widget class\\n*/\\nRawWidget.prototype = new Widget();\\n\\n/*\\nRender this widget into the DOM\\n*/\\nRawWidget.prototype.render = function(parent,nextSibling) {\\n\\tthis.parentDomNode = parent;\\n\\tthis.execute();\\n\\tthis.blocked = this.getVariable(\\\"tv-block-embedded-content\\\",\\\"no\\\") === \\\"yes\\\";\\n\\tif(this.blocked) {\\n\\t\\tthis.makeChildWidgets([{\\n\\t\\t\\ttype: \\\"transclude\\\",\\n\\t\\t\\tattributes: {\\n\\t\\t\\t\\ttiddler: {type: \\\"string\\\", value: \\\"$:/config/plugins/tiddlywiki/consent-banner/blocked-raw-message\\\"}\\n\\t\\t\\t}\\n\\t\\t}]);\\n\\t\\t// Render child widgets\\n\\t\\tthis.renderChildren(parent,null);\\n\\t} else {\\n\\t\\tvar div = this.document.createElement(\\\"div\\\");\\n\\t\\tdiv.innerHTML=this.parseTreeNode.html;\\n\\t\\tparent.insertBefore(div,nextSibling);\\n\\t\\tthis.domNodes.push(div);\\n\\t}\\n};\\n\\n/*\\nCompute the internal state of the widget\\n*/\\nRawWidget.prototype.execute = function() {\\n};\\n\\n/*\\nSelectively refreshes the widget if needed. Returns true if the widget or any of its children needed re-rendering\\n*/\\nRawWidget.prototype.refresh = function(changedTiddlers) {\\n\\tif(this.blocked) {\\n\\t\\treturn this.refreshChildren(changedTiddlers);\\n\\t} else {\\n\\t\\treturn false;\\t\\t\\n\\t}\\n};\\n\\nexports.raw = RawWidget;\\n\",\"type\":\"application/javascript\",\"module-type\":\"widget\"},\"$:/plugins/tiddlywiki/consent-banner/readme\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/readme\",\"text\":\"The ''consent-banner'' plugin helps make websites that are compliant with \\\"cookie legislation\\\" such as the [[EU General Data Protection Regulation|https://gdpr.eu/cookies/]].\\nIt presents a banner inviting the user to accept or reject cookies, keeping track of their consent in local storage so that the banner can be hidden on subsequent visits.\\n\\nBy default, content embedded with &lt;iframe>, &lt;embed> and &lt;object> is blocked unless the user consents to accept cookies.\\n\\nConsent status is  available via a configuration tiddler so that it is possible to construct content that behaves differently depending upon whether consent has been granted. As an example, a macro is provided for embedding ~YouTube videos that automatically uses the youtube-nocookie.com variant of video URLs unless the user has accepted cookies.\\n\\nPlease note that using this plugin does not guarantee compliance with any particular legislation. You will need to understand the technical issues specific to your situation, and if necessary seek legal advice.\\n\"},\"$:/plugins/tiddlywiki/consent-banner/startup.js\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/startup.js\",\"text\":\"/*\\\\\\ntitle: $:/plugins/tiddlywiki/consent-banner/startup.js\\ntype: application/javascript\\nmodule-type: startup\\n\\nStartup initialisation\\n\\n\\\\*/\\n\\n\\\"use strict\\\";\\n\\n// Export name and synchronous status\\nexports.name = \\\"consent-banner\\\";\\nexports.platforms = [\\\"browser\\\"];\\nexports.after = [\\\"startup\\\"];\\nexports.before = [\\\"render\\\"];\\nexports.synchronous = true;\\n\\nvar CHECK_CONSENT_INTERVAL = 1000, // Milliseconds between checking local storage\\n\\tIS_LOGGED_IN_TITLE = \\\"$:/status/IsLoggedIn\\\",\\n\\tCONSENT_KEY = \\\"COOKIE_CONSENT\\\", // Local storage keyname\\n\\tCONSENT_TITLE = \\\"$:/state/consent-banner/accepted\\\", // \\\"\\\": undeclared, \\\"yes\\\": accepted, \\\"no\\\": declined\\n\\tCONFIG_BLOCK_EMBEDDED_CONTENT_TITLE = \\\"$:/config/plugins/tiddlywiki/consent-banner/block-embedded-content\\\",\\n\\tEMBEDDED_MESSAGE_WRAPPER_TITLE = \\\"$:/plugins/tiddlywiki/consent-banner/blocked-embed-message-wrapper\\\";\\n\\nexports.startup = function() { \\n\\tvar consentState = \\\"\\\",\\n\\t\\tsetConsentStatus = function(state) {\\n\\t\\t\\tif(consentState !== state) {\\n\\t\\t\\t\\tconsentState = state;\\n\\t\\t\\t\\t// Write to local storage\\n\\t\\t\\t\\twindow.localStorage.setItem(CONSENT_KEY,state);\\n\\t\\t\\t\\t// Write to a state tiddler\\n\\t\\t\\t\\t$tw.wiki.addTiddler(new $tw.Tiddler({\\n\\t\\t\\t\\t\\ttitle: CONSENT_TITLE,\\n\\t\\t\\t\\t\\ttext: state\\n\\t\\t\\t\\t}));\\n\\t\\t\\t}\\n\\t\\t},\\n\\t\\tcalculateConsentStatus = function() {\\n\\t\\t\\t// Consent is implied for logged in users, otherwise we check local storage\\n\\t\\t\\treturn ($tw.wiki.getTiddlerText(IS_LOGGED_IN_TITLE) === \\\"yes\\\" && \\\"yes\\\") || window.localStorage.getItem(CONSENT_KEY) || \\\"\\\";\\n\\t\\t},\\n\\t\\tcheckConsentStatus = function() {\\n\\t\\t\\tsetConsentStatus(calculateConsentStatus());\\n\\t\\t\\tif(consentState === \\\"\\\") {\\n\\t\\t\\t\\tpollConsentStatus();\\n\\t\\t\\t}\\n\\t\\t},\\n\\t\\tpollConsentStatus = function() {\\n\\t\\t\\tsetTimeout(checkConsentStatus,CHECK_CONSENT_INTERVAL);\\n\\t\\t};\\n\\t// Set the current consent status\\n\\tcheckConsentStatus();\\n\\t// Listen for consent messages\\n\\t$tw.rootWidget.addEventListener(\\\"tm-consent-accept\\\",function(event) {\\n\\t\\tsetConsentStatus(\\\"yes\\\");\\n\\t});\\n\\t$tw.rootWidget.addEventListener(\\\"tm-consent-decline\\\",function(event) {\\n\\t\\tsetConsentStatus(\\\"no\\\");\\n\\t});\\n\\t$tw.rootWidget.addEventListener(\\\"tm-consent-clear\\\",function(event) {\\n\\t\\tsetConsentStatus(\\\"\\\");\\n\\t});\\n\\t// Add our element rendering hook\\n\\tif($tw.wiki.getTiddlerText(CONFIG_BLOCK_EMBEDDED_CONTENT_TITLE,\\\"no\\\") === \\\"yes\\\") {\\n\\t\\t$tw.hooks.addHook(\\\"th-rendering-element\\\",function(parseTreeNodes,widget) {\\n\\t\\t\\tif(parseTreeNodes) {\\n\\t\\t\\t\\treturn parseTreeNodes;\\n\\t\\t\\t}\\n\\t\\t\\tif([\\\"iframe\\\",\\\"object\\\",\\\"embed\\\"].indexOf(widget.tag) !== -1 && widget.getVariable(\\\"tv-block-embedded-content\\\",\\\"no\\\") === \\\"yes\\\") {\\n\\t\\t\\t\\tvar url = widget.getAttribute(\\\"src\\\"),\\n\\t\\t\\t\\t\\taddUnitsIfMissing = function(str) {\\n\\t\\t\\t\\t\\t\\tstr = \\\"\\\" + str;\\n\\t\\t\\t\\t\\t\\treturn str + ((\\\"\\\" + parseInt(str,10)) === str ? \\\"px\\\" : \\\"\\\");\\n\\t\\t\\t\\t\\t},\\n\\t\\t\\t\\t\\twidth = addUnitsIfMissing(widget.getAttribute(\\\"width\\\",\\\"\\\")),\\n\\t\\t\\t\\t\\theight = addUnitsIfMissing(widget.getAttribute(\\\"height\\\",\\\"\\\"));\\n\\t\\t\\t\\treturn [\\n\\t\\t\\t\\t\\t{\\n\\t\\t\\t\\t\\t\\ttype: \\\"vars\\\",\\n\\t\\t\\t\\t\\t\\tattributes: {\\n\\t\\t\\t\\t\\t\\t\\turl: {type: \\\"string\\\", value: url},\\n\\t\\t\\t\\t\\t\\t\\twidth: {type: \\\"string\\\", value: width},\\n\\t\\t\\t\\t\\t\\t\\theight: {type: \\\"string\\\", value: height}\\n\\t\\t\\t\\t\\t\\t},\\n\\t\\t\\t\\t\\t\\tchildren: [\\n\\t\\t\\t\\t\\t\\t\\t{\\n\\t\\t\\t\\t\\t\\t\\t\\ttype: \\\"transclude\\\",\\n\\t\\t\\t\\t\\t\\t\\t\\tattributes: {\\n\\t\\t\\t\\t\\t\\t\\t\\t\\ttiddler: {type: \\\"string\\\", value: EMBEDDED_MESSAGE_WRAPPER_TITLE},\\n\\t\\t\\t\\t\\t\\t\\t\\t\\tmode: {type: \\\"string\\\", value: \\\"inline\\\"}\\n\\t\\t\\t\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t\\t\\t]\\n\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t];\\n\\t\\t\\t}\\n\\t\\t\\treturn null;\\n\\t\\t});\\n\\t}\\n};\\n\",\"type\":\"application/javascript\",\"module-type\":\"startup\"},\"$:/plugins/tiddlywiki/consent-banner/styles\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/styles\",\"tags\":\"$:/tags/Stylesheet\",\"text\":\".tc-consent-backdrop {\\n\\tz-index: 1999;\\n\\tposition: fixed;\\n\\tleft: 0;\\n\\tright: 0;\\n\\ttop: 0;\\n\\tbottom: 0;\\n\\tbackground: \u003C\u003Ccolour consent-banner-backdrop-background>>;\\n}\\n\\n.tc-consent-banner-left {\\n\\tz-index: 2000;\\n\\tposition: fixed;\\n\\tleft: 0;\\n\\ttop: 0;\\n\\tbottom: 0;\\n\\tmax-width: 500px;\\n\\toverflow-y: auto;\\n}\\n\\n.tc-consent-banner {\\n\\tpadding: 1em;\\n\\tbackground: \u003C\u003Ccolour consent-banner-background>>;\\n\\tcolor: \u003C\u003Ccolour consent-banner-foreground>>;\\n\\tbox-shadow: 0 0 20px rgba(0,0,0,.2);\\n}\\n\\n.tc-consent-banner a.tc-tiddlylink-external {\\n\\ttext-decoration: underline;\\n\\tcolor: \u003C\u003Ccolour consent-banner-link-foreground>>;\\n\\tbackground-color: inherit;\\n}\\n\\n.tc-consent-banner a.tc-tiddlylink-external:visited {\\n\\tcolor: \u003C\u003Ccolour consent-banner-link-foreground>>;\\n\\tbackground-color: inherit;\\n}\\n\\n.tc-consent-banner hr {\\n\\tclear: both;\\n\\tpadding: 0;\\n\\twidth: 100%;\\n\\toverflow: hidden;\\n\\ttext-align: left;\\n\\tborder: 0 none;\\n\\tmargin: 24px 0;\\n\\theight: 1px;\\n\\tmax-height: 1px;\\n\\tbackground: \u003C\u003Ccolour consent-banner-hr-background>>;\\n}\\n\\n.tc-consent-buttons {\\n\\t\\n}\\n\\n.tc-consent-banner .tc-consent-button {\\n\\tmargin-right: 1em;\\n}\\n\\n.tc-consent-button {\\n\\tborder: 1px solid \u003C\u003Ccolour consent-banner-button-border>>;\\n\\tmargin-top: 1em;\\n\\tpadding: 0.75em 1.5em;\\n\\tcolor: \u003C\u003Ccolour consent-banner-button-foreground>>;\\n\\tbackground: \u003C\u003Ccolour consent-banner-button-background>>;\\n\\tfont-weight: bold;\\n}\\n\\n.tc-consent-button:hover {\\n\\tcolor: \u003C\u003Ccolour consent-banner-button-hover-foreground>>;\\n\\tborder-color: \u003C\u003Ccolour consent-banner-button-hover-border>>;\\n\\tbackground: \u003C\u003Ccolour consent-banner-button-hover-background>>;\\n\\topacity: .6;\\n}\\n\\n.tc-consent-button-default {\\n\\tcolor: \u003C\u003Ccolour consent-banner-button-default-foreground>>;\\n\\tbackground: \u003C\u003Ccolour consent-banner-button-default-background>>;\\n}\\n\\n.tc-blocked-embedded-content {\\n\\tdisplay: inline-block;\\n\\toverflow: hidden;\\n\\tcolor: \u003C\u003Ccolour background>>;\\n\\tbackground: \u003C\u003Ccolour muted-foreground>>;\\n\\tborder: 1px solid \u003C\u003Ccolour foreground>>;\\n\\t\u003C\u003Cbox-shadow \\\"inset 0 0 8px rgba(0, 0, 0, 0.15)\\\">>\\n}\\n\\n.tc-blocked-embedded-content-inner {\\n  display: flex;\\n  justify-content: center;\\n  align-items: center;\\n  width: 100%;\\n  height: 100%;\\n}\\n\\n.tc-blocked-embedded-content-inner-inner {\\n\\tdisplay: inline-block;\\n\\ttext-align: center;\\n}\\n\\n.tc-blocked-embedded-content-inner-inner hr {\\n    background: \u003C\u003Ccolour foreground>>;\\n    height: 1px;\\n    width: 80%;\\n    border: none;\\n}\\n\"},\"$:/plugins/tiddlywiki/consent-banner/youtube\":{\"title\":\"$:/plugins/tiddlywiki/consent-banner/youtube\",\"tags\":\"$:/tags/Macro\",\"text\":\"\\\\define embed-video-with-consent(code)\\n\u003C$set name=\\\"tv-block-embedded-content\\\" value=\\\"no\\\">\\n\u003C$reveal state=\\\"$:/state/consent-banner/accepted\\\" type=\\\"match\\\" text=\\\"yes\\\" tag=\\\"div\\\">\\n\u003Ciframe width=\\\"560\\\" height=\\\"315\\\" src=\\\"https://www.youtube.com/embed/$code$\\\" frameborder=\\\"0\\\" allow=\\\"autoplay; encrypted-media\\\" allowfullscreen>\u003C/iframe>\\n\u003C/$reveal>\\n\u003C$reveal state=\\\"$:/state/consent-banner/accepted\\\" type=\\\"nomatch\\\" text=\\\"yes\\\" tag=\\\"div\\\">\\n\u003Ciframe width=\\\"560\\\" height=\\\"315\\\" src=\\\"https://www.youtube-nocookie.com/embed/$code$\\\" frameborder=\\\"0\\\" allow=\\\"autoplay; encrypted-media\\\" allowfullscreen>\u003C/iframe>\\n\u003C/$reveal>\\n\u003C/$set>\\n\\\\end\\n\\n! Macro source\\n\\n\u003C$codeblock code={{$:/plugins/tiddlywiki/consent-banner/youtube}}/>\\n\\n! Example\\n\\n\u003C\u003Cembed-video-with-consent KtCUr83XgyE>>\\n\"}}}"},

{"title":"$:/themes/tiddlywiki/snowwhite","name":"Snow White","author":"JeremyRuston","core-version":">=5.0.0","plugin-type":"theme","description":"Emphasises individual tiddlers","dependents":"$:/themes/tiddlywiki/vanilla","plugin-priority":"0","version":"5.3.8","type":"application/json","text":"{\"tiddlers\":{\"$:/themes/tiddlywiki/snowwhite/base\":{\"title\":\"$:/themes/tiddlywiki/snowwhite/base\",\"tags\":\"[[$:/tags/Stylesheet]]\",\"text\":\"\\\\define sidebarbreakpoint-minus-one()\\n\u003C$text text={{{ [{$:/themes/tiddlywiki/vanilla/metrics/sidebarbreakpoint}removesuffix[px]subtract[1]addsuffix[px]] ~[{$:/themes/tiddlywiki/vanilla/metrics/sidebarbreakpoint}] }}}/>\\n\\\\end\\n\\n\\\\rules only filteredtranscludeinline transcludeinline macrodef macrocallinline\\n\\n.tc-sidebar-header {\\n\\ttext-shadow: 0 1px 0 \u003C\u003Ccolour sidebar-foreground-shadow>>;\\n}\\n\\n.tc-tiddler-info {\\n\\t\u003C\u003Cbox-shadow \\\"inset 1px 2px 3px rgba(0,0,0,0.1)\\\">>\\n}\\n\\n@media screen {\\n\\t.tc-tiddler-frame {\\n\\t\\t\u003C\u003Cbox-shadow \\\"1px 1px 5px rgba(0, 0, 0, 0.3)\\\">>\\n\\t}\\n}\\n\\n@media (max-width: \u003C\u003Csidebarbreakpoint-minus-one>>) {\\n\\t.tc-tiddler-frame {\\n\\t\\t\u003C\u003Cbox-shadow none>>\\n\\t}\\n}\\n\\n.tc-page-controls button svg, .tc-tiddler-controls button svg, .tc-topbar button svg {\\n\\t\u003C\u003Ctransition \\\"fill 150ms ease-in-out\\\">>\\n}\\n\\n.tc-tiddler-controls button.tc-selected,\\n.tc-page-controls button.tc-selected {\\n\\t\u003C\u003Cfilter \\\"drop-shadow(0px -1px 2px rgba(0,0,0,0.25))\\\">>\\n}\\n\\n.tc-tiddler-frame input.tc-edit-texteditor,\\n.tc-tiddler-frame select.tc-edit-texteditor {\\n\\t\u003C\u003Cbox-shadow \\\"inset 0 1px 8px rgba(0, 0, 0, 0.15)\\\">>\\n}\\n\\n.tc-edit-tags {\\n\\t\u003C\u003Cbox-shadow \\\"inset 0 1px 8px rgba(0, 0, 0, 0.15)\\\">>\\n}\\n\\n.tc-tiddler-frame .tc-edit-tags input.tc-edit-texteditor {\\n\\t\u003C\u003Cbox-shadow \\\"none\\\">>\\n\\tborder: none;\\n\\toutline: none;\\n}\\n\\ntextarea.tc-edit-texteditor {\\n\\tfont-family: {{$:/themes/tiddlywiki/vanilla/settings/editorfontfamily}};\\n}\\n\\ncanvas.tc-edit-bitmapeditor  {\\n\\t\u003C\u003Cbox-shadow \\\"2px 2px 5px rgba(0, 0, 0, 0.5)\\\">>\\n}\\n\\n.tc-drop-down {\\n\\tborder-radius: 4px;\\n\\t\u003C\u003Cbox-shadow \\\"2px 2px 10px rgba(0, 0, 0, 0.5)\\\">>\\n}\\n\\n.tc-block-dropdown {\\n\\tborder-radius: 4px;\\n\\t\u003C\u003Cbox-shadow \\\"2px 2px 10px rgba(0, 0, 0, 0.5)\\\">>\\n}\\n\\n.tc-modal {\\n\\tborder-radius: 6px;\\n\\t\u003C\u003Cbox-shadow \\\"0 3px 7px rgba(0,0,0,0.3)\\\">>\\n}\\n\\n.tc-modal-footer {\\n\\tborder-radius: 0 0 6px 6px;\\n\\t\u003C\u003Cbox-shadow \\\"inset 0 1px 0 #fff\\\">>;\\n}\\n\\n\\n.tc-alert {\\n\\tborder-radius: 6px;\\n\\t\u003C\u003Cbox-shadow \\\"0 3px 7px rgba(0,0,0,0.6)\\\">>\\n}\\n\\n.tc-notification {\\n\\tborder-radius: 6px;\\n\\t\u003C\u003Cbox-shadow \\\"0 3px 7px rgba(0,0,0,0.3)\\\">>\\n\\ttext-shadow: 0 1px 0 rgba(255,255,255, 0.8);\\n}\\n\\n.tc-sidebar-lists .tc-tab-set .tc-tab-divider {\\n\\tborder-top: none;\\n\\theight: 1px;\\n\\t\u003C\u003Cbackground-linear-gradient \\\"left, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.0) 100%\\\">>\\n}\\n\\n.tc-more-sidebar > .tc-tab-set > .tc-tab-buttons > button {\\n\\t\u003C\u003Cbackground-linear-gradient \\\"left, rgba(0,0,0,0.01) 0%, rgba(0,0,0,0.1) 100%\\\">>\\n}\\n\\n.tc-more-sidebar > .tc-tab-set > .tc-tab-buttons > button.tc-tab-selected {\\n\\t\u003C\u003Cbackground-linear-gradient \\\"left, rgba(0,0,0,0.05) 0%, rgba(255,255,255,0.05) 100%\\\">>\\n}\\n\\n.tc-message-box img {\\n\\t\u003C\u003Cbox-shadow \\\"1px 1px 3px rgba(0,0,0,0.5)\\\">>\\n}\\n\\n.tc-plugin-info {\\n\\t\u003C\u003Cbox-shadow \\\"1px 1px 3px rgba(0,0,0,0.5)\\\">>\\n}\\n\"}}}"},

C\u003Ccolour pre-background>>;\\n\\tborder: 1px solid \u003C\u003Ccolour pre-border>>;\\n\\tpadding: 0 3px 2px;\\n\\tborder-radius: 3px;\\n\\tfont-family: {{$:/themes/tiddlywiki/vanilla/settings/codefontfamily}};\\n}\\n\\ncode {\\n\\tcolor: \u003C\u003Ccolour code-foreground>>;\\n\\tbackground-color: \u003C\u003Ccolour code-background>>;\\n\\tborder: 1px solid \u003C\u003Ccolour code-border>>;\\n\\twhite-space: pre-wrap;\\n\\tpadding: 0 3px 2px;\\n\\tborder-radius: 3px;\\n\\tfont-family: {{$:/themes/tiddlywiki/vanilla/settings/codefontfamily}};\\n}\\n\\nblockquote {\\n\\tborder-left: 5px solid \u003C\u003Ccolour blockquote-bar>>;\\n\\tmargin-left: 25px;\\n\\tpadding-left: 10px;\\n\\tquotes: \\\"\\\\201C\\\"\\\"\\\\201D\\\"\\\"\\\\2018\\\"\\\"\\\\2019\\\";\\n}\\n\\nblockquote > div {\\n\\tmargin-top: 1em;\\n\\tmargin-bottom: 1em;\\n}\\n\\nblockquote.tc-big-quote {\\n\\tfont-family: Georgia, serif;\\n\\tposition: relative;\\n\\tbackground: \u003C\u003Ccolour pre-background>>;\\n\\tborder-left: none;\\n\\tmargin-left: 50px;\\n\\tmargin-right: 50px;\\n\\tpadding: 10px;\\n\\tborder-radius: 8px;\\n}\\n\\nblockquote.tc-big-quote cite:before {\\n\\tcontent: \\\"\\\\2014 \\\\2009\\\";\\n}\\n\\nblockquote.tc-big-quote:before {\\n\\tfont-family: Georgia, serif;\\n\\tcolor: \u003C\u003Ccolour blockquote-bar>>;\\n\\tcontent: open-quote;\\n\\tfont-size: 8em;\\n\\tline-height: 0.1em;\\n\\tmargin-right: 0.25em;\\n\\tvertical-align: -0.4em;\\n\\tposition: absolute;\\n\\tleft: -50px;\\n\\ttop: 42px;\\n}\\n\\nblockquote.tc-big-quote:after {\\n\\tfont-family: Georgia, serif;\\n\\tcolor: \u003C\u003Ccolour blockquote-bar>>;\\n\\tcontent: close-quote;\\n\\tfont-size: 8em;\\n\\tline-height: 0.1em;\\n\\tmargin-right: 0.25em;\\n\\tvertical-align: -0.4em;\\n\\tposition: absolute;\\n\\tright: -80px;\\n\\tbottom: -20px;\\n}\\n\\ndl dt {\\n\\tfont-weight: bold;\\n\\tmargin-top: 6px;\\n}\\n\\ntextarea,\\ninput[type=text],\\ninput[type=search],\\ninput[type=number],\\ninput[type=password],\\ninp /detail?id=999088, https://bugs.webkit.org/show_bug.cgi?id=201297)\\n2. Correct table border color inheritance in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=935729, https://bugs.webkit.org/show_bug.cgi?id=195016)\\n*/\\n\\ntable {\\n\\ttext-indent: 0; /* 1 */\\n\\tborder-color: inherit; /* 2 */\\n}\\n\\n/*\\nForms\\n=====\\n*/\\n\\n/**\\n1. Change the font styles in all browsers.\\n2. Remove the margin in Firefox and Safari.\\n*/\\n\\nbutton,\\ninput,\\noptgroup,\\nselect,\\ntextarea {\\n\\tfont-family: inherit; /* 1 */\\n\\tfont-size: 100%; /* 1 */\\n\\tline-height: 1.15; /* 1 */\\n\\tmargin: 0; /* 2 */\\n}\\n\\n/**\\nRemove the inheritance of text transform in Edge and Firefox.\\n*/\\n\\nbutton,\\nselect {\\n\\ttext-transform: none;\\n}\\n\\n/**\\nCorrect the inability to style clickable types in iOS and Safari.\\n*/\\n\\nbutton,\\n[type='button'],\\n[type='reset'],\\n[type='submit'] {\\n\\t-webkit-appearance: button;\\n}\\n\\n/**\\nRemove the inner border and padding in Firefox.\\n*/\\n\\n::-moz-focus-inner {\\n\\tborder-style: none;\\n\\tpadding: 0;\\n}\\n\\n/**\\nRestore the focus styles unset by the previous rule.\\n*/\\n\\n:-moz-focusring {\\n\\toutline: 1px dotted ButtonText;\\n}\\n\\n/**\\nRemove the additional ':invalid' styles in Firefox.\\nSee: https://github.com/mozilla/gecko-dev/blob/2f9eacd9d3d995c937b4251a5557d95d494c9be1/layout/style/res/forms.css#L728-L737\\n*/\\n\\n:-moz-ui-invalid {\\n\\tbox-shadow: none;\\n}\\n\\n/**\\nRemove the padding so developers are not caught out when they zero out 'fieldset' elements in all browsers.\\n*/\\n\\nlegend {\\n\\tpadding: 0;\\n}\\n\\n/**\\nAdd the correct vertical alignment in Chrome and Firefox.\\n*/\\n\\nprogress {\\n\\tvertical-align: baseline;\\n}\\n\\n/**\\nCorrect the cursor style of increment and decrement buttons in Safari.\\n*/\\n\\n::-webkit-inner-spin-button,\\n::-webkit-outer-spin-button {\\n\\theight: auto;\\n}\\n\\n/**\\n1. Correct the odd appearance in Chrome and Safari.\\n2. Correct the outline style in Safari.\\n*/\\n\\n[type='search'] {\\n\\t-webkit-appearance: textfield; /* 1 */\\n\\toutline-offset: -2px; /* 2 */\\n}\\n\\n/**\\nRemove the inner padding in Chrome and Safari on macOS.\\n*/\\n\\n::-webkit-search-decoration {\\n\\t-webkit-appearance: none;\\n}\\n\\n/**\\n1. Correct the inability to style clickable types in iOS and Safari.\\n2. Change font properties to 'inherit' in Safari.\\n*/\\n\\n::-webkit-file-upload-button {\\n\\t-webkit-appearance: button; /* 1 */\\n\\tfont: inherit; /* 2 */\\n}\\n\\n/*\\nInteractive\\n===========\\n*/\\n\\n/*\\nAdd the correct display in Chrome and Safari.\\n*/\\n\\nsummary {\\n\\tdisplay: list-item;\\n}\\n\"},\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\",\"text\":\"-apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", \\\"Noto Sans\\\", sans-serif, Helvetica, Arial, \\\"Apple Color Emoji\\\", \\\"Segoe UI Emoji\\\"\"},\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\",\"text\":\"ui-monospace, \\\"SFMono-Regular\\\", \\\"SF Mono\\\", Menlo, Consolas, \\\"Liberation Mono\\\", monospace\"},\"$:/themes/tiddlywiki/vanilla/settings/backgroundimageattachment\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/backgroundimageattachment\",\"text\":\"fixed\"},\"$:/themes/tiddlywiki/vanilla/settings/backgroundimagesize\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/backgroundimagesize\",\"text\":\"auto\"},\"$:/themes/tiddlywiki/vanilla/sticky\":{\"title\":\"$:/themes/tiddlywiki/vanilla/sticky\",\"code-body\":\"yes\",\"text\":\"\u003C$reveal state=\\\"$:/themes/tiddlywiki/vanilla/options/stickytitles\\\" type=\\\"match\\\" text=\\\"yes\\\">\\n``\\n.tc-tiddler-title {\\n\\tposition: -webkit-sticky;\\n\\tposition: -moz-sticky;\\n\\tposition: -o-sticky;\\n\\tposition: -ms-sticky;\\n\\tposition: sticky;\\n\\ttop: 0px;\\n\\tbackground: ``\u003C\u003Ccol {"created":"20260108091538359","text":"Das WechselWiki Forum ist der Platz für aktiven Austausch, für Fragen, Ideen, Ratschläge und Zuspruch rund um das Thema Wechseljahre und Menopause. Um dabei zu sein, melde Dich hier an: https://wechselwiki.freeflarum.com\n\n\u003Ciframe src=\"https://wechselwiki.freeflarum.com\" style=\"border:1px solid  #eee; width: 100%; min-height:550px\">\u003C/iframe>","tags":"","title":"$:/WechselWiki Forum","modified":"20260125084715921"},
{"created":"20251223094710461","text":"2026 soll der Dokumentarfilm «Mein neues altes Ich» erscheinen:\n\n\u003C\u003C\u003C\nIn MEIN NEUES ALTES ICH begibt sich die Filmemacherin Louise Unmack Kjeldsen auf eine emotionale Reise in das Mysterium der Menopause. Louise und andere betroffene Frauen aus aller Welt erzählen offen über ihre Erlebnisse mit starken Symptomen der Menopause. \nObwohl die Hälfte der Weltbevölkerung die Menopause erlebt und viele Frauen darunter so leiden, dass ihr Alltag stark beeinträchtigt ist, ist diese Lebensphase noch immer wenig erforscht. Über Jahrhunderte trugen historische Vorurteile dazu bei, dass viele Betroffene im Stillen litten und Wissen bis heute begrenzt ist.\nNun suchen Forschende weltweit nach Antworten, um die Auswirkungen des Östrogenrückgangs auf Körper und Gehirn zu ergründen.\nWarum haben vier von fünf Frauen Hitzewallungen, mehr als ein Viertel Schlafstörungen? Warum leider 41% unter Gedächtnisproblemen? Warum hat die Altersgruppe 45-54 Jahre die höchste Selbstmordrate? Wie hängen Menopause-Symptome mit dem dreifach höheren Alzheimer-Risiko von Frauen und Depressionen zusammen? Welche Möglichkeiten gibt es, entgegen zu wirken?\nMEIN NEUES ALTES ICH bricht Tabus, deckt Mythen und Fehlinformationen auf und rückt die Menopause in ein neues Licht. \n\u003C\u003C\u003C\n\n\"\"\"\nhttps://menopause.film\nInstagram: @menopause.film\n\"\"\"\n","title":"2025-12-23: Neuer Dokumentarfilm zum Thema Menopause","tags":"Aktuelles","modified":"20260215095550961","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260125075407601","text":"Am 22.01.2026 hat die Stiftung Warentest (Deutschland) einen Test von 57 Mitteln gegen Wechseljahresbeschwerden veröffentlicht. Darunter sind pflanzliche wie hormonelle Mittel in verschiedenen Darreichungsformen von Tabletten über Pflaster bis zu Gels.\n\nDie Mittel werden genannt, doch die Testergebnisse sind hinter einer Paywall von 4.90 EUR versteckt. Sicher muss auch die Stiftung Warentest Geld verdienen. Doch von den Pharmaunternehmen kommt vermutlich genug herein, dass man(n) bei einem so wichtigen Thema, das die Hälfte der Menschheit betrifft, die Ergebnisse einmal offenlegt. 🤯🤬💩 \n\nhttps://www.test.de/Wechseljahre-Was-Beschwerden-wirklich-lindert-4885038-0/","title":"2026-01-25: Stiftung Warentest testet Mittel gegen Wechseljahresbeschwerden","tags":"Aktuelles","modified":"20260215095607016","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20251220141105305","text":"\"\"\"\n''Universitätsspital Zürich, \n Klinik für Reproduktions-Endokrinologie: \nWechseljahre Sprechstunde''\nBeratung und Betreuung. Selbstanmeldung oder mit Zuweisung.\n\nWeb: https://www.usz.ch/sprechstunde/wechseljahre-und-menopause/\nTel. +41 44 255 50 09\nMail: [[repro-endo@usz.ch|mailto:repro-endo@usz.ch]],  [[endo@usz.ch|mailto:endo@usz.ch]]\nTelefonzeiten: Montag – Freitag:  9.00 – 12.00 Uhr und 13.00 – 16.30 Uhr\n\"\"\"\n\n---\n\n\"\"\"\n''Inselspital Bern: Menopausenzentrum''\nErstkonsultationen nur mit Zuweisung und Wartezeiten. Bei Zuweisung via Mail werden dringend folgende Angaben benötigt: Name, Vorname, Geburtsdatum, Adresse, Telefonnummer\n\nWeb: https://frauenheilkunde.insel.ch/de/unser-angebot/kinderwunsch-und-hormone/menopause\nMail: [[Kontaktformular|https://frauenheilkunde.insel.ch/de/unser-angebot/kinderwunsch-und-hormone/menopause/kontaktformular-menopause]]\nTel. +41 31 632 13 10\nTelefonzeiten: Dienstag, Mittwoch und Donnerstag von 14.00 – 16.00 Uhr\n\"\"\"\n\n---\n\n\"\"\"\n''Hôpitaux Universitaires Genève: Unité de médecine de la reproduction et endocrinologie gynécologique''\n\nPropose une consultation pour une prise en charge personnalisée des troubles persistants liés à la ménopause. Cette consultation spécialisée reçoit les femmes adressées par leur gynécologue ou leur médecin traitant et qui nécessitent une prise en soins complexes. Il peut également s'agir d'un deuxième avis. L'équipe accompagne les femmes dans cette étape importante pour les aider à mieux vivre la ménopause. \nL'offre de soins repose aussi sur des réunions d’informations en petits groupes dédiée à cette thématique, pour aborder toutes les problématiques associées, et échanger. \n\nWeb: [[https://www.hug.ch/en/gynecologie/menopause|https://www.hug.ch/en/gynecologie/menopause]] \nTéléphone : +41 (0)22 372 43 04\nEmail : [[secretariat.umreg@hug.ch|mailto:secretariat.umreg@hug.ch]]\n\"\"\"","tags":"Anlaufstellen","title":"Ärzte und Therapeuten","modified":"20260215101100793","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20251228091416981","text":"Progesteron hat eine atmungssteigernde Wirkung, die sich durch leichte Hyperventilation äussern kann. Durch die erhöhten Hormonwerte kann das ein Begleitsymptom bei Schwangerschaft sein und in den Wechseljahren bei Progesterongabe im Rahmen einer [[Hormonersatztherapie (HRT)]] \u003C\u003Ccite doringWeitereUntersuchungenUber1950>>.\u003C\u003Cfnote \"Döring, G.K., Loeschcke, H.H. & Ochwadt, B. Weitere Untersuchungen über die Wirkung der Sexualhormone auf die Atmung. Pflügers Archiv 252, 216–230 (1950). https://doi.org/10.1007/BF00361677\">>\u003C\u003Cfnote \"Wikipedia contributors. (2025, December 28). Pharmacokinetics of progesterone. In Wikipedia, The Free Encyclopedia. Retrieved 21:55, December 29, 2025, from https://en.wikipedia.org/w/index.php?title=Pharmacokinetics_of_progesterone&oldid=1329788045\">>\n\n\n\n!!!! Quellen:\n\nDöring, G.K., Loeschcke, H.H. & Ochwadt, B. Weitere Untersuchungen über die Wirkung der Sexualhormone auf die Atmung. Pflügers Archiv 252, 216–230 (1950). https://doi.org/10.1007/BF00361677\n\n\u003C\u003Cshowfnotes title:\"''''\">>\n\n\u003C\u003Cbibliography citedfilter:\"_\" furtherfilter:\"[has[bibtex-title]suffix[1950]]\">>\n\n\n!!!! Siehe auch:\n[[Erfahrung: Hyperventilation]]\n\n\n\n","creator":"ww","tags":"","title":"Beispiel Zitation","modified":"20251230085441578","modifier":"ww"},

{"created":"20251220151241927","text":"Bei der bioidentischen Hormontherapie werden nur Substanzen verwendet, wie sie vom menschlichen Körper selbst gebildet werden. Für die bioidentische Hormontherapie werden diese synthetisch hergestellt. Damit sollen Risiken verringert werden, die unter der Hormonersatztherapie mit equinen (=von Pferden) konjugierten Estrogenen beobachtet wurden. Die bioidentischen Hormone werden teils oral, teils transdermal (=über die Haut) angewendet. ","tags":"[[Hormonersatztherapie (HRT)]]","title":"Bioidentische Hormone","modified":"20260215182952718","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260103143534105","text":"Beim Eisprung verlässt die reife Eizelle den Eifollikel, welcher zurückbleibt und durch Platzen seiner Granulosazellen eine gelbe Farbe annimmt. Ab dann nennt man ihn Gelbkörper, oder auch Corpus luteum. Die Aufgabe des Gelbkörpers besteht vor allem darin, Progesteron zu produzieren. In der zweiten Zyklushälfte führt das zur Vorbereitung der Gebärmutter für eine mögliche Schwangerschaft, nach erfolgreicher Befruchtung zur Aufrechterhaltung derselben. Zunächst wird die Gebärmutterschleimhaut gebildet und nach erfolgreicher Einnistung mit Nährstoffen versorgt.","title":"Der Gelbkörper","modified":"20260215095902984","type":"","tags":"Progesteron","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260227104801802","text":"Der Wirkstoff Dienogest ist ein Nortestosteron-Derivat, das unter anderem als Monotherapie zur Behandlung der Endometriose indiziert ist. In Kombination mit einer Estrogenkomponente wird Dienogest darüber hinaus zur Kontrazeption und zur Hormonsubstitution eingesetzt.\u003C\u003Cfnote \"Online, Gelbe Liste: Dienogest - Anwendung, Wirkung, Nebenwirkungen | Gelbe Liste. In: Gelbe Liste Online. Online unter: https://www.gelbe-liste.de/wirkstoffe/Dienogest_18867.\n\">>\u003C\u003Cfnote \"Gestagen Dienogest (Visanne) bei Endometriose. Online unter: https://www.arznei-telegramm.com/de/4199/gestagen-dienogest-visanne-bei-endometriose.\n\">>\u003C\u003Cfnote \"Strowitzki, Thomas et al. (2010): Dienogest in the treatment of endometriosis-associated pelvic pain: a 12-week, randomized, double-blind, placebo-controlled study. In: European Journal of Obstetrics & Gynecology and Reproductive Biology 151, S. 193–198.\n\">>\n\n[[Hormonersatztherapie nach Endometriose]]\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"Medikamente","title":"Dienogest","modified":"20260227110104825","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20251228171709715","text":"","title":"doringWeitereUntersuchungenUber1950","bibtex-entry-type":"article","bibtex-title":"Weitere Untersuchungen über die Wirkung der Sexualhormone auf die Atmung","bibtex-author":"Döring, Gerd K. and Loeschcke, Hans Hermann and Ochwadt, Bruno","bibtex-date":"1950-03-01","bibtex-journaltitle":"Pflüger's Archiv für die gesamte Physiologie des Menschen und der Tiere","bibtex-shortjournal":"Pflüger's Archiv für die gesamte Physiologie des Menschen und der Tiere","bibtex-volume":"252","bibtex-number":"2","bibtex-pages":"216--230","bibtex-issn":"1432-2013","bibtex-doi":"10.1007/BF00361677","bibtex-url":"https://doi.org/10.1007/BF00361677","bibtex-abstract":"An 5 Versuchspersonen wurden vor und 24 Std nach Injektion von 25 mg Follikelhormon bzw. 50 mg Corpusluteum-Hormon + 25 mg Follikelhormon bzw. 50 mg Corpus-luteum-Hormon die Erregbarkeitskurven der Atmung auf CO2 bestimmt, gleichzeitig die Rectaltemperatur gemessen und arterielles Blut entnommen, um daraus Blut-ph und Alkalireserve zu bestimmen.","bibtex-year":"1950","bibtex-zotero-key":"CZI34ZEF","modified":"20260107192537843","caption":"Weitere Untersuchungen über die Wirkung der Sexualhormone auf die Atmung","tags":"bibtex pubmed"},

{"created":"20251220145251934","text":"\nWillkommen beim WechselWiki!\n\nDas WechselWiki ist eine wachsende Sammlung von Infos zu den Wechseljahren, die ich seit Oktober 2025 recherchiert habe, weil ich mich mit meinen Symptomen weder von Fachpersonal ausreichend informiert und betreut sehe, noch im Internet umfassende und vor allem unabhängige Informationen gefunden habe.\n\nIm Gegenteil, ich stellte fest, die Wechseljahre sind ein Geschäft und die Obskurität bzw. bewusste Verbreitung von Halbwissen ist ein gewollter Teil davon. Entsprechend habe ich begonnen, selbst Informationen zu sammeln, mit meinen Erfahrungen in Beziehung zu setzen und mir ein umfassendes Bild zu machen, um  Empfehlungen – ärztlich oder woher auch immer – besser einordnen und für mich selbst gute Entscheidungen treffen zu können. Das Ergebnis ist dieses Wiki.\n\nWeil ich bei meinen Recherchen gesehen habe, wie weit verbreitet die Unsicherheit bei diesem Thema ist, stelle ich das WechselWiki allen zur Verfügung, die auch Informationen suchen und daran interessiert sind, sich eine eigene Meinung zu bilden. Es ist ein reiner Wissensspeicher, der keine bestimmte medizinische, religiöse oder politische Richtung vertritt und nur Wissen enthält, das auf nachvollziehbare Quellen zurückgeht. Alle Inhalte sind selbständig und ohne KI recherchiert, um keine Fehler zu replizieren. __Dennoch ist es kein kritiklos zu übernehmender Ratgeber, sondern ein möglicher Startpunkt für Deine eigenen Recherchen!__ \n\nDas Wiki wächst zur Zeit fast täglich. Möchtest Du es mit weiteren Informationen oder auf andere Weise unterstützen, bist Du herzlich eingeladen. Du findest die verschiedenen Möglichkeiten auf der Seite [[Unterstützung ♡]]. \n\nEllen \n","tags":"","title":"Ein unabhängiges Recherche-Tool zum Thema Wechseljahre","modified":"20260110102947909","caption":"Intro"},
{"created":"20260130163855187","text":"Labore geben ihre Messergebnisse in unterschiedlichen Einheiten aus. Um eigene Werte mit Referenzwerten vergleichen zu können, müssen diese manchmal umgerechnet werden. \n\nViele Webseiten bieten entsprechende Umrechnungstools an, aber nur wenige enthalten alle Hormone, die während der Wechseljahre eine Rolle spielen.\n\nDie folgenden Seiten decken neben Estradiol, Progesteron, Testosteron auch FSH (Follikelstimulierendes Hormon) und LH (Luteinisierendes Hormon) ab und geben den Umrechnungsfaktor an:\n\n\"\"\"\n[[Unitslab.com|https://unitslab.com/taxonomy/term/8]] (LH, FSH)\n[[Laborteam.ch|https://www.laborteam.ch/de/tools/berechnungsformeln]]\n[[IMD-Berlin.de|https://www.imd-berlin.de/leistungsverzeichnis/einheitenrechner]] (inkl. Faktoren)\n[[Blutwerte.de|https://blutwerte.de/umrechner/]]\n\"\"\"","tags":"[[Tests + Labor]]","title":"Einheiten-Umrechner","modified":"20260215100527557","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260215161235095","text":"Elinzanetant, ein dualer Neurokinin-1- und -3-Rezeptorantagonist, konnte in ersten Studien eine signifikante Verbesserung der Schlafqualität erzielen. Für den Wirkstoff ist eine EU-Zulassung beantragt. In einer im Juni 2025 veröffentlichten Studie an Frauen mit vasomotorischen Symptomen nach endokriner Hormontherapie bei Brustkrebs gaben die Teilnehmerinnen an, dass sich unter Elinzanetant neben den Hitzewallungen auch das Schlafverhalten verbessert habe.\u003Cspan style=\"display:none\">\u003C\u003Cfnote \"Avoxa-Mediengruppe Deutscher Apotheker: Therapieoptionen: Besser schlafen in den Wechseljahren. In: Pharmazeutische Zeitung online. Online unter: https://www.pharmazeutische-zeitung.de/besser-schlafen-in-den-wechseljahren-157613/.\">>\u003C\u003Cfnote \" Avoxa-Mediengruppe Deutscher Apotheker: Wechseljahre: Elinzanetant verbessert Hitzewallungen und Schlaf. In: Pharmazeutische Zeitung online. Online unter: https://www.pharmazeutische-zeitung.de/elinzanetant-verbessert-hitzewallungen-und-schlaf-149474/.\">>\n\u003C/span>\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"[[Therapie: Medikamentöse HRT-Alternativen]] Schlafstörungen Hitzewallungen","title":"Elinzanetant","modified":"20260216194851617","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20251228092259222","text":"Mit Steigerung der Einnahme von Progesteron (bioidentisch) auf 200 mg > \n100 mg am Abend / 50 mg am Morgen / 50 mg am Nachmittag habe ich ca. eine halbe bis dreiviertel Stunde nach der Dosis am Morgen eine ungewöhnliche Erleichterung der Atmung (Hyperventilation) gespürt, die mehrere Stunden anhielt. Der Schweregrad ist unterschiedlich, triggert jedoch zusätzlich wieder Nervosität und Angstgefühle. \n\nWichtig scheint mir hier die Reihenfolge: //Erst// setzt die Hyperventilation ein, //dann// folgen Unsicherheits- und Angstgefühle. Das ist 100% konträr zum Phänomen von Hyperventilation als Folge von Angstzuständen. \n\n\n[[Progesteron und Hyperventilation]]","title":"Erfahrung: Hyperventilation durch Progesteron","modified":"20260217140434649","type":"","tags":"[[Eigene Erfahrung]]"},

{"created":"20251225110525891","text":"Manchmal habe ich geringfügige Ohrgeräusche, die nach kurzer Zeit von selbst wieder verschwinden. Viel störender als das ist jedoch, dass mein ohnehin schon überdurchschnittlich feines Gehör noch viel empflindlicher geworden ist und mir jetzt manche alltägliche Geräusche Schmerzen bereiten. Das betrifft das Rauschen des Wassers im Duschkopf und das Geräusch von bratendem Fleisch in der Pfanne. Beides ist viel zu laut für mich und ich muss mir mit Ohrstöpseln behelfen.\n\n[[Symptom: Ohrensausen (Tinnitus), Geräuschempfindlichkeit]]","tags":"[[Eigene Erfahrung]]","title":"Erfahrung: Pssst …","modified":"20260129191717307"},

{"created":"20260208143749935","text":"\u003C\u003Cdetails label:\"Was ist das WechselWiki?\" src:\"Das WechselWiki ist ein Wissensspeicher zum Thema Wechseljahre/Menopause, der bereits verfügbare Informationen aus verschiedenen Quellen (Bücher, Zeitschriften, Webseiten, Foren, SocialMedia Posts, TV-Beiträge) sammelt, zusammenfasst, miteinander verknüpft und um eigene Beiträge ergänzt.\">>\n\n\u003C\u003Cdetails label:\"Warum gibt es das WechselWiki?\" src:\"Das WechseWiki ist als private Datensammlung im Oktober 2025 gestartet, weil ich mich von Fachpersonen unzufriedenstellend betreut und informiert gesehen habe. Zwangsläufig begann ich, selbst zu recherchieren. Die gefundenen Informationen habe ich für mich in Wiki-Form zusammengestellt, um den Überblick zu behalten und Zusammenhänge darzustellen. Da ich besonders in Foren feststellen konnte, dass viele Frauen das gleiche Schicksal teilen, habe ich mich entschlossen, das Wiki als Recherchetool öffentlich zugänglich zu machen.\">>\n\n\u003C\u003Cdetails label:\"Wie nutze ich das WechselWiki am besten?\" src:\"So, wie es Dir liegt: entweder steigst Du über die Themenblöcke im Inhaltsverzeichnis ein oder nutzt das Suchfeld für ein spezifisches Stichwort. Was sonst noch möglich ist, erfährst\nauf der WechselWiki-Tour.\">>\n\n\u003C\u003Cdetails label:\"Wo kann ich Probleme, Texte, Feature Requests melden?\" src:\"Erstelle eine [[Meldung auf Github|https://github.com/3113nbr4/wechselwiki/issues/new]] oder [[sende ein E-Mail|mailto:wechselwiki@proton.me]]. \u003Cbr>Beschreibe Dein Problem so genau wie möglich inkl. Link zur Seite, auf der es aufgetreten ist. Bei Textmeldungen (Vorschläge, Änderungen) vergiss bitte nicht die Quellenangaben.\">>\n\n\u003C\u003Cdetails label:\"Wie kann ich das WechselWiki unterstützen?\" src:\"Du kannst das WechselWiki durch Zuarbeit oder finanziell unterstützen. Die einzelnen Möglichkeiten findest Du unter [[Unterstützung ♡|Unterstützung ♡]].\">>\n\n\u003C\u003Cdetails label:\"Wo bekomme ich Neuigkeiten zum Projekt?\" src:\"Es gibt dafür 3 Anlaufstellen: \n\n# Newsletter: Er fasst in unregelmässigen Abständen die neu erschienenen Einträge zusammen und informiert über alles Wichtige rund um das Projekt. Abonniere ihn hier: [[WechselWiki Newsletter|Newsletter abonnieren]]. \n# Github: Das [[WechselWiki-Repository |https://github.com/3113nbr4/WechselWiki]]dokumentiert monatlich alle im Wiki enthaltenen vollständigen Einträge.\n# [[Changelog]]: Hier findest Du alle Änderungen in Struktur und Funktionen.\">>\n\n\u003C\u003Cdetails label:\"Was ist mit Werbung und Werbetracking?\" src:\"Das WechselWiki ist unabhängig und werbefrei. Das bedeutet, dass\n\n* keine Werbung im Wiki angezeigt wird\n* keine Werbung im Wiki möglich ist\n* kein werbeorientiertes Nutzertracking stattfindet.\">>\n\n","tags":"[[Über dieses Wiki]]","title":"FAQ","modified":"20260215113919962","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260215155432772","text":"Seit Anfang 2024 ist mit Fezolinetant (Veoza®) ein erster Neurokinin-3-Rezeptorantagonist in Deutschland auf dem Markt. Der Wirkstoff greift im Gehirn in die Thermoregulation ein, ohne hormonell zu wirken. Fezolinetant ist zur Behandlung vasomotorischer Symptome in den Wechseljahren indiziert und kann auf diese Weise daraus resultierende Schlafstörungen verbessern. \u003Cspan style=\"display:none\">\u003C\u003Cfnote \"Avoxa-Mediengruppe Deutscher Apotheker: Therapieoptionen: Besser schlafen in den Wechseljahren. In: Pharmazeutische Zeitung online. Online unter: https://www.pharmazeutische-zeitung.de/besser-schlafen-in-den-wechseljahren-157613/.\">>\u003C/span>\n\nFezolinetant ist in der Schweiz seit 2023 zugelassen.\u003Cspan style=\"display:none\">\u003C\u003Cfnote \"Swissmedic 2019, Kurzbericht Zulassung – Veoza®. Online unter: https://www.swissmedic.ch/swissmedic/de/home/ueber-uns/publikationen/public-summary-swiss-par/public-summary-swiss-par-veoza.html.\">>\u003C/span>\n\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"[[Therapie: Medikamentöse HRT-Alternativen]] Schlafstörungen Hitzewallungen","title":"Fezolinetant","modified":"20260216194851618","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20251225132432393","text":"Das follikelstimulierende Hormon (FSH) regt die Östrogenproduktion im Eierstock und die Reifung des Eis an. In den Wechseljahren nehmen Progesteron- und Östrogenproduktion ab. Der Körper versucht, diesem Prozess über eine erhöhte Ausschüttung von FSH entgegenzusteuern. Der Wert kann auf das 10- bis 15-fache ansteigen. Ein erhöhter FSH-Spiegel kann somit auf den Beginn der Wechseljahre hindeuten. \n\n[[FSH-Bestimmung zur Vorhersage der Menopause]]\n\u003C!-- {{{ [tag[Follikelstimulierendes Hormon (FSH)]sort[title]] }}} -->","tags":"Hormone","title":"Follikelstimulierendes Hormon (FSH)","modified":"20260215100213834","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20251220141029176","text":"\"\"\"\n''Navigator Medizin: Gesundheitsthema Wechseljahre''\nhttps://www.navigator-medizin.de/gesundheitsthemen/wechseljahre.html\nHier kann man öffentlich Fragen an einen Arzt stellen.\n\n''Lifeline Forum Wechseljahre''\nhttps://fragen.lifeline.de/forum/frauenheilkunde/wechseljahre/\nDas Forum mit Expertenrat wurde 2025 geschlossen, die umfangreichen Beiträge sind aber weiterhin einsehbar. Die Community-Managerin verweist auf das Wechseljahre-Forum bei Onmeda.\n\n''Onmeda Wechseljahre-Forum''\nhttps://fragen.lifeline.de/forum/frauenheilkunde/wechseljahre/\nÖffentlicher Austausch und private Nachrichten-Funktion.\n\"\"\"\n","tags":"Anlaufstellen","title":"Foren","modified":"20260215101133322","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260201101927308","text":"Bei noch erhaltener Menstruation wird zu Beginn des Zyklus (1. - 5. Tag) eine Bestimmung von FSH durchgeführt. FSH-Spiegel über 12 IE/l zeigen eine nahen Menopause (=letzte Menstruation) an. \u003Cspan style=\"display: none\">\u003C\u003Cfnote \"Hübl, Wolfgang Prof. Dr. med.: FSH und LH bei der Frau. Online unter: https://med4you.at/laborbefunde/lbef3/lbef_fsh_lh.htm.\n\">>\u003C/span>\n\n\"\"\"\n[[Referenzbereiche FSH]]\n[[Einheiten-Umrechner]]\n[[Was muss man bei der Messung von FSH und LH beachten?]]\n\"\"\"\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"[[Follikelstimulierendes Hormon (FSH)]] [[Tests + Labor]]","title":"FSH-Bestimmung zur Vorhersage der Menopause","modified":"20260215100307139","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20251230124747756","text":"Ja und nein. Es gibt keinen hundertprozentig zuverlässigen Test, der aussagt, ob man tatsächlich in den Wechseljahren ist oder wie weit die Wechseljahre bereits fortgeschritten sind. \n\nWas man machen kann, ist ein Bluttest auf die Hormone [[FSH|Follikelstimulierendes Hormon (FSH)]] und [[LH|Luteinisierendes Hormon (LH)]]. Liegen die Werte innerhalb bzw. ausserhalb eines bestimmten Referenzbereiches, ist das ein Indikator, dass man sich in den Wechseljahren befindet. Typischerweise steigt z. B. das FSH in den Wechseljahren an, weil das Gehirn mit der vermehrten Ausschüttung Eisprünge provozieren möchte.\n\nAusser, man ist z. B. altersmässig noch weit vor den Wechseljahren unterwegs (hat aber Symptome), macht ein Test nur begrenzt Sinn, denn (1) schwanken die Hormone in der Perimenopause sehr stark und (2) müssten die Blutennahmen idealerweise an bestimmten Zyklustagen entnommen werden, die jedoch während der Wechseljahre oft nicht mehr eindeutig bestimmt werden können, weil der Zyklus bereits aus dem Takt geraten ist. Aufgrund dieser mangelnden Aussagekraft sehen manche Gynäkologen von einem Test ab.\n\n\u003C!-- \n{{Referenzbereiche FSH}}\n\n\n{{Referenzbereiche LH}}\n\n\nQuelle: Analytica Laboratorien Zürich, [[Analysenverzeichnis|https://lvz.analytica.ch]] -->\n\n[[FSH-Bestimmung zur Vorhersage der Menopause]]","tags":"[[Häufige Fragen (FAQ)]]","title":"Gibt es einen Test auf Wechseljahre?","modified":"20260213152337787","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260124193055543","text":"GPnotebook ist ein klinisches Nachschlagewerk, das sich auf die Bedürfnisse von Allgemeinmedizinern konzentriert.\n\nSeit ihrer Einführung im Jahr 2001 hat sich die Website zu einer der wichtigsten Ressourcen für Allgemeinmediziner und andere Angehörige der Primärversorgung entwickelt. Die im Vereinigten Königreich gestartete Website erfreut sich zunehmender Beliebtheit und wird inzwischen von Zehntausenden von Fachleuten weltweit täglich genutzt.\n\nDie Website umfasst mehr als 30 000 prägnante, miteinander verknüpfte klinische Referenzartikel, die jeweils ein bestimmtes klinisches Thema behandeln. Die einfache und schnelle Nutzung macht sie für viele Nutzer zu einer unverzichtbaren Beratungshilfe.\n\nIn den letzten Jahren wurde die Website um Video- und Podcast-Material sowie um Ressourcen erweitert, die speziell für die Fortbildung von Hausärzten und die berufliche Entwicklung gedacht sind.\u003Cspan style=\"display:none\">\u003C\u003Cfnote \"About - Europe PMC. Online unter: https://gpnotebook.com/de/uber-gpnotebook.\n\n\">>\u003C/span>\n\nhttps://gpnotebook.com/de\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"Publikationen","title":"GPnotebook","modified":"20260215102011049","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20251220214945431","text":"(HRT = //engl.// für Hormone Replacement Therapy)\n\nZiel der Hormonersatztherapie ist es, durch die Gabe [[synthetischer|Synthetische Hormone]] oder [[bioidentischer Hormone|Bioidentische Hormone]] schwankende Hormonspiegel auszugleichen oder fehlende Hormone zu ersetzen, um Wechseljahressymptome zu lindern.\nEingesetzt wird in der Regel eine Kombination aus einer Östrogen- und Gestagenkomponente. Die HRT sollte aufgrund möglicher Kontraindikationen und Nebenwirkungen immer nach individueller Nutzen-Risiko-Abwägung eingesetzt werden, wenn durch nicht-hormonelle Massnahmen kein ausreichender Effekt erzielt werden kann.\n\n\"\"\"\n[[Leitlinien Menopause der Gesellschaften für Gynäkologie und Geburtshilfe DE/CH/AT]]\n[[Warum die Hormonersatztherapie kein Allerheilmittel ist|Warum die Hormonersatztherapie kein Allerheilmittel ist]]\n[[Hormonersatztherapie nach Endometriose|Hormonersatztherapie nach Endometriose]]\n\n\"\"\"","tags":"Therapien","title":"Hormonersatztherapie (HRT)","modified":"20260303093102167","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260218134228007","text":"Der Artikel «Hormonersatztherapie nach Endometriose» ist im Journal für Gynäkologische Endokrinologie/Schweiz erschienen und am 17. März 2025 online publiziert worden: \n\n\u003C\u003C\u003C\n''Zusammenfassung:'' \nEndometriose bildet sich nach der Menopause (postmenopausal) in der Regel zurück, jedoch zeigen sich bei 2–5 % der postmenopausalen Frauen persistierende Beschwerden oder Rezidive nach Hormonersatztherapie (HRT). Für diesen Artikel wurden eine Umfrage unter Gynäkologen zum Wissensstand über HRT und Endometriose sowie eine Literaturrecherche zu diesem Thema durchgeführt. Unter den befragten Gynäkologen zeigte sich ein eher uneinheitliches Bild. In der Literatur wurde unterstrichen, dass die Möglichkeit eines Rezidivs auch postmenopausal nicht ausser Acht gelassen werden darf. Die Wahl der richtigen Hormonersatztherapie ist dabei von höchster Bedeutung. Empfohlen wird eine kontinuierlich-kombinierte HRT, bevorzugt mit [[Dienogest]] als Gestagen, alternativ ist [[Tibolon]] einsetzbar.\u003C\u003Cfnote \"Müller, Katharina/Römer, Thomas (2025): Hormonersatztherapie nach Endometriose. In: Journal für Gynäkologische Endokrinologie/Schweiz 28, S. 14–20.\n\">>\n\u003C\u003C\u003C\n\n\n\nhttps://link.springer.com/content/pdf/10.1007/s41975-025-00381-2.pdf\n\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"[[Hormonersatztherapie (HRT)]]","title":"Hormonersatztherapie nach Endometriose","modified":"20260227110141634","sticky-footer":"\u003C\u003C.foot>>","list-after":"Synthetische Hormone"},

{"created":"20260203130813955","text":"Die Leitlinie richtet sich an Ärzte*, die peri- und postmenopausale Frauen über die physiologischen Veränderungen sowie Störungen und deren Behandlungsmöglichkeiten beraten und behandeln. Diese Leitlinie richtet sich an folgende Personenkreise: Gynäkologen* in der Niederlassung; Gynäkologen* mit Klinikanstellung; Ärzte*, die peri- und postmenopausale Frauen beraten bzw. deren Beschwerden und Erkrankungen behandeln, wie z. B. Allgemeinärzte*, Internisten*, Psychiater*, Neurologen*, u. a.\u003C\u003Cfnote \"Deutsche Gesellschaft für Gynäkologie und Geburtshilfe e.V. (DGGG): S3-Leitlinie Peri- und Postmenopause - Diagnostik und Interventionen. Online unter: https://register.awmf.org/de/leitlinien/detail/015-062.\">>\n\nhttps://register.awmf.org/de/leitlinien/detail/015-062\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"Leitlinien rev","title":"Leitlinien Menopause der Gesellschaften für Gynäkologie und Geburtshilfe DE/CH/AT","modified":"20260215183250828","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20251225132626509","text":"Das luteinisierende Hormon (LH) fördert in der 1. Zyklushälfte vor allem die Produktion von Östrogenen. In der 2. Zyklushälfte ist es für die Ausbildung des Gelbkörpers und damit auch für die Progesteronproduktion verantwortlich. In den Wechseljahren kann der LH-Spiegel auf das 4- bis 5-fache ansteigen. Auch hier wird die Produktion in der Hirnanhangdrüse erhöht, um die Eierstöcke zur Hormonausschüttung zu animieren.\n\n{{{ [tag[Luteinisierendes Hormon (LH)]sort[title]] }}}","tags":"Hormone","title":"Luteinisierendes Hormon (LH)","modified":"20260215100420933","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260210125059946","text":"Auch wenn Melatonin zu den Hormonen gehört, ist es hier gelistet, weil es nicht zur klassischen [[Hormonersatztherapie (HRT)]]  gehört. Diese ersetzt nur [[Progesteron]] und [[Östrogen]].\n\nMelatonin ist als Arzneimittel zur Kurzzeittherapie von Schlafstörungen bei Personen über 55 Jahre zugelassen. Aufgrund der Schwankungen des Melatoninspiegels sollte immer mit einer niedrigen Dosis gestartet werden. Auch hier kann es konzentrationsabhängig zu negativen Auswirkungen auf eine bestehende [[Depression|Symptom: Depression]] kommen. Eine Behandlung mit Melatonin in der Selbstmedikation sollte nur im Ausnahmefall, kurzzeitig und niedrig dosiert angeraten werden. Bei bestehenden Begleiterkrankungen ist immer ein Arztbesuch zu empfehlen.\u003Cspan style=\"display:none\">\u003C\u003Cfnote \"Avoxa-Mediengruppe Deutscher Apotheker: Therapieoptionen: Besser schlafen in den Wechseljahren. In: Pharmazeutische Zeitung online. Online unter: https://www.pharmazeutische-zeitung.de/besser-schlafen-in-den-wechseljahren-157613/.\">>\u003C/span>\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"[[Therapie: Medikamentöse HRT-Alternativen]] Schlafstörungen","title":"Melatonin","modified":"20260216194851618","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260103171215018","text":"@@background:#fff;! Dieser Artikel betrifft [[bioidentische Hormone|Bioidentische Hormone]]@@\n\nDie Anwendung von Progesteron im Rahmen einer Hormonersatztherapie (HRT) kann folgende Nebenwirkungen haben:\n\nOrale Einnahme:\n\n* Schwindel\n* Müdigkeit\n* depressive Verstimmungen\n\n\nVaginale Anwendung:\n\n* Zwischenblutungen\n* Schmierblutungen\n* Kopfschmerzen\n* Müdigkeit\n* Berührungsempfindlichkeit der Brüste\n* leichte Verdauungsbeschwerden\n* Schleimhautreizungen (sind eher auf eine Überempfindlichkeit auf die Zusatzstoffe zurückzuführen als auf das Progesteron selbst) ","tags":"Progesteron [[Bioidentische Hormone]]","title":"Nebenwirkungen bei Progesterongabe","modified":"20260216194406565","sticky-footer":"\u003C\u003C.foot>>"},

{"title":"$:/plugins/kookma/refnotes","author":"Mohammad Rahmani","core-version":">=5.2.5","description":"References, citations, footnotes and abbreviations in Tiddlywiki","list":"readme license history","name":"Refnotes","plugin-type":"plugin","source":"https://github.com/kookma/TW-Refnotes","tags":"","type":"application/json","version":"1.9.0","text":"{\"tiddlers\":{\"$:/plugins/kookma/refnotes/history\":{\"title\":\"$:/plugins/kookma/refnotes/history\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"Full change log  https://kookma.github.io/TW-Refnotes/#ChangeLog\\n\\n* ''1.8.1'' -- 2022.06.03 -- many improvements to APA7 and BibTeX support in Refnotes\\n* ''1.8.0'' -- 2022.05.27 -- many improvements, refrence manager has APA7 as default style\\n* ''1.7.4'' -- 2022.05.18 -- stable release based on TW 5.2.2, minor bugs fixed\\n* ''1.7.2'' -- 2021.09.19 -- stable release based on TW 5.2.0\\n* ''1.6.0'' -- 2021.04.02 -- development (beta) of new release\\n* ''1.0.3'' -- 2019.03.20 -- first stable release\\n\"},\"$:/plugins/kookma/refnotes/license\":{\"title\":\"$:/plugins/kookma/refnotes/license\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"Distributed under an MIT license.\\n\\nCopyright (c) 2019-2023 [[Mohammad Rahmani|https://github.com/kookma]]\\n\\n\u003C\u003C\u003C\\nPermission is hereby granted, free of charge, to any person obtaining a copy of this software and associated documentation files (the \\\"Software\\\"), to deal in the Software without restriction, including without limitation the rights to use, copy, modify, merge, publish, distribute, sublicense, and/or sell copies of the Software, and to permit persons to whom the Software is furnished to do so, subject to the following conditions:\\n\\nThe above copyright notice and this permission notice shall be included in all copies or substantial portions of the Software.\\n\\nTHE SOFTWARE IS PROVIDED \\\"AS IS\\\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\\n\u003C\u003C\u003C\"},\"$:/plugins/kookma/refnotes/macros/abbr\":{\"title\":\"$:/plugins/kookma/refnotes/macros/abbr\",\"tags\":\"$:/tags/Macro\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define abbr(term:\\\"\\\", dict:\\\"Glossary\\\")\\n\u003C$set name=\\\"abbreviation\\\" \\n tiddler=\u003C\u003C__dict__>>\\n index=\u003C\u003C__term__>>\\n emptyValue=\\\"Term not found\\\">\\n \u003Cspan class=refnotes-abbr>\u003Cabbr title=\u003C\u003Cabbreviation>> >\u003C$text text=\u003C\u003C__term__>> />\u003C/abbr>\u003C/span>\\n\u003C/$set>\\n\\\\end\\n\"},\"$:/plugins/kookma/refnotes/macros/apa/authors\":{\"title\":\"$:/plugins/kookma/refnotes/macros/apa/authors\",\"code-body\":\"yes\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define show-authors-in-citation(conjunction:\\\"&\\\")\\n\u003C!-- used in ref macro APA7 -->\\n\u003C$let authorlist=      {{{ [\u003C__tid__>get[bibtex-author]]     }}}\\n      number-authors=  {{{ [\u003Cauthorlist>split[ and ]!is[blank]count[]] }}}\\n>\\n\u003C!-- single authors -->\\n\u003C$list filter=\\\"[\u003Cnumber-authors>compare:number:eq[1]]\\\" variable=null>\\n\u003C$list filter=\\\"[\u003Cauthorlist>split[ and ]first[]]\\\" variable=author>\\n\u003C\u003CauthorName \\\"LastName\\\">>\\n\u003C/$list>\\n\u003C/$list>\\n\\n\u003C!-- two authors -->\\n\u003C$list filter=\\\"[\u003Cnumber-authors>compare:number:eq[2]]\\\" variable=null>\\n\u003C$list filter=\\\"[\u003Cauthorlist>split[ and ]first[]]\\\" variable=author>\u003C\u003CauthorName \\\"LastName\\\">> $conjunction$\u003C/$list>\\n\u003C$list filter=\\\"[\u003Cauthorlist>split[ and ]last[]]\\\"  variable=author>\u003C\u003CauthorName \\\"LastName\\\">>\u003C/$list>\\n\u003C/$list>\\n\\n\u003C!-- multiple authors -->\\n\u003C$list filter=\\\"[\u003Cnumber-authors>compare:number:gt[2]]\\\" variable=null>\\n\u003C$list filter=\\\"[\u003Cauthorlist>split[ and ]first[]]\\\" variable=author>\\n\u003C\u003CauthorName \\\"LastName\\\">> et al.\\n\u003C/$list>\\n\u003C/$list>\\n\\n\u003C!-- no author, use three words of title -->\\n\u003C$list filter=\\\"[\u003Cnumber-authors>compare:number:eq[0]]\\\" variable=null>\\n\u003C$text text={{{ [\u003C__tid__>get[bibtex-title]split[ ]!is[blank]first[3]join[ ]] :else[\u003C__tid__>]}}}/>\\n\u003C/$list>\\n\u003C/$let>\\n\\\\end\\n\\n\\n\\\\define parse-fullname()\\n\u003C!-- parse author full name and returns: last_name, first_name middle_name \\n     it handles nobiliary particle like: Lugwig von Beethoven\\n-->\\n\u003C!-- return the same name if it is stored in BibTeX method 2: https://www.bibtex.com/f/author-field/ -->\\n\u003C$list filter=\\\"[\u003Cauthor>!search[,]]\\\" emptyMessage=\u003C\u003Cauthor>> variable=null>\\n\u003C$let \\n   pattern1=\\\"\\\\s+([a-z][a-zA-Z]*?)\\\\s+\\\"\\n   pname={{{\\n            [\u003Cauthor>search-replace:g:regexp\u003Cpattern1>,[ $1°]]\\n           +[splitregexp[\\\\s]trim[]]\\n           +[search-replace:g:regexp[°],[ ]]\\n           +[join[°_°]]\\n  }}}\\n>\u003C$text text={{{ [\u003Cpname>split[°_°]!is[blank]last[]addsuffix[,]] [\u003Cpname>split[°_°]!is[blank]butlast[]] +[join[ ]] }}}/>\\n\u003C/$let>\\n\u003C/$list>\\n\\\\end\\n\\n\\n\u003C!-- Macros for reference list -->\\n\\\\define authorName(format:\\\"\\\")\\n\u003C!-- display a single author name in form of Family, F.N. \\n     it can also send the last name only (surname) used in show-authors-in-citation macro\\n-->\\n\\\\whitespace trim\\n\u003C$wikify name=pname text=\u003C\u003Cparse-fullname>> >\\n\u003C$let last=    {{{ [\u003Cpname>split[,]!is[blank]trim[]first[]]}}}\\n      initials={{{ [\u003Cpname>split[,]!is[blank]trim[]butfirst[]split[ ]!is[blank]] :map[split[]!is[blank]first[]addsuffix[.]] +[join[ ]]}}}\\n      dispname={{{ [\u003Clast>addsuffix[, ]addsuffix\u003Cinitials>] }}}\\n>\\n\u003C$list filter=\\\"[\u003C__format__>!match[LastName]]\\\" variable=null emptyMessage=\u003C\u003Clast>>>\u003C\u003Cdispname>>\u003C/$list>\\n\u003C/$let>\\n\u003C/$wikify>\\n\\\\end\\n\\n\\\\define show-authors-in-references()\\n\u003C!-- used in template -->\\n\u003C$let authorslist=     {{!!bibtex-author}}\\n      number-authors=  {{{ [\u003Cauthorslist>split[ and ]!is[blank]count[]] }}}\\n      >\\t\\t\\n\u003C$set name=authors filter=\\\"[\u003Cauthorslist>split[ and ]trim[]]\\\" >\\t\\n\u003C!-- single author ---------->\\n\u003C$list filter=\\\"[\u003Cnumber-authors>compare:integer:eq[1]]\\\" variable=null>\\n\u003C$vars author={{{ [enlist\u003Cauthors>last[]] }}}>\u003C\u003CauthorName>>\u003C/$vars>\\n\u003C/$list>\\n\u003C!-- multi authors ---------->\\n\u003C$list filter=\\\"[\u003Cnumber-authors>compare:integer:gt[1]]\\\" variable=null>\\n\u003C$list filter=\\\"[enlist\u003Cauthors>butlast[]]\\\" variable=author>\\n\u003C\u003CauthorName>>,\\n\u003C/$list>\\n\u003C$vars author={{{ [enlist\u003Cauthors>last[]] }}}>& \u003C\u003CauthorName>>\u003C/$vars>\\n\u003C/$list>\\n\u003C!-- no author, use three words of title -->\\n\u003C$list filter=\\\"[\u003Cnumber-authors>compare:number:eq[0]]\\\" variable=null>\\n\u003C$text text={{{ [{!!bibtex-title}split[ ]!is[blank]first[3]join[ ]] :else[[Unknown author]]}}}/>\\n\u003C/$list>\\n\u003C/$set>\\n\u003C/$let>\\t\\t\\t\\n\\\\end\\n\\n\\n\"},\"$:/plugins/kookma/refnotes/macros/apa/bibliography\":{\"title\":\"$:/plugins/kookma/refnotes/macros/apa/bibliography\",\"tags\":\"$:/tags/Macro\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define bibliography(citedfilter:\\\"[\u003CcurrentTiddler>]\\\", furtherfilter:\\\"\\\", class:\\\"ref-list\\\")\\n\\\\import $:/plugins/kookma/refnotes/macros/apa/bibliography-helper\\n\u003C!-- populate all citations in given tiddler or list of tiddlers (given scope through citedfilter) -->\\n\u003C$wikify name=\\\"works-cited\\\" text=\u003C\u003Cfind-cited-works>> >\\n\u003C!-- generate the reference list/bibliograpgy -->\\n\u003Col class=\\\"$class$\\\">\\n\u003C$list filter=\\\"[enlist\u003Cworks-cited>][subfilter\u003C__furtherfilter__>]:and[sort[]]\\\" variable=\\\"reference\\\">\\n\u003C\u003Cdisplay-single-reference>>\\n\u003C/$list>\\n\u003C/ol>\\n\u003C/$wikify>\\n\\\\end\\n\\n\u003C!-- see $:/plugins/kookma/refnotes/macros/apa/bibliography-helper for utility macros -->\"},\"$:/plugins/kookma/refnotes/macros/apa/bibliography-helper\":{\"title\":\"$:/plugins/kookma/refnotes/macros/apa/bibliography-helper\",\"code-body\":\"yes\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define find-cited-works()\\n\\\\import $:/plugins/kookma/refnotes/macros/bibtex/find-refs\\n\u003C$list filter=\u003C\u003C__citedfilter__>> >\\n\u003C$macrocall $name=\\\"find-refs\\\" thisTiddler=\u003C\u003CcurrentTiddler>> />\\n\u003C/$list>\\n\\\\end\\n\\n\\\\define display-single-reference()\\n\\\\import $:/plugins/kookma/refnotes/macros/apa/authors\\n\u003C$let currentType={{{[\u003Creference>get[bibtex-entry-type]lowercase[]] ~[[miscellaneous]]}}} >\\n\u003C$set name=\\\"bodyLookup\\\" \\n      filter=\\\"[all[tiddlers+shadows]tag[$:/tags/Refnotes/ReflistTemplate]contains:list\u003CcurrentType>] +[limit[1]get[title]]\\\"\\n      value=\u003C\u003CbodyLookup>> \\n      emptyValue=\\\"$:/plugins/kookma/refnotes/templates/reflist/apa/default\\\">\\n\u003C$transclude tiddler=\u003C\u003CbodyLookup>> field=\\\"text\\\" mode=\\\"inline\\\"/>\\n\u003C/$set>\\n\u003C/$let>\\n\\\\end\"},\"$:/plugins/kookma/refnotes/macros/apa/ref\":{\"title\":\"$:/plugins/kookma/refnotes/macros/apa/ref\",\"tags\":\"$:/tags/Macro\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define ref(tid, type:\\\"p\\\", pages:\\\"\\\")\\n\\\\import $:/plugins/kookma/refnotes/macros/apa/authors\\n\\\\import $:/plugins/kookma/refnotes/macros/apa/ref-helper\\n\\\\whitespace trim\\n\u003C$set name=\\\"ref-tid\\\" tiddler=\u003C\u003C__tid__>> field=\\\"title\\\" emptyValue=\\\"RefNotFound\\\">\\n\u003Cdiv class=\\\"refnotes-tooltip refcls\\\">\\n\u003C$reveal type=\\\"match\\\" default=\u003C\u003Cref-tid>> text=\\\"RefNotFound\\\">\\n\u003C$link overrideClass=\\\"link-refcls\\\">[\u003C$view tiddler=\u003C\u003C__tid__>> field=\\\"title\\\"/>]\u003C/$link>\\n\u003Cdiv class=\\\"refnotes-tooltiptext ref-notfound\\\">\u003Cb>Warning\u003C/b>: Reference Not Found.\u003Cbr>Click to create it:\u003C\u003Ccreate-notexisted-ref \\\"$tid$\\\">>\u003C/div>\\n\u003C/$reveal>\\n\u003C$reveal type=\\\"nomatch\\\" default=\u003C\u003Cref-tid>> text=\\\"RefNotFound\\\">\\n\u003C$list filter=\\\"[[$type$]lowercase[]match[p]]\\\" variable=null>\u003C\u003Cparenthetical>>\u003C/$list>\\n\u003C$list filter=\\\"[[$type$]lowercase[]match[n]]\\\" variable=null>\u003C\u003Cnarrative>>\u003C/$list>\\n\u003C$list filter=\\\"[[$type$]lowercase[]match[m]]\\\" variable=null>\u003C\u003Cmultiwork-parenthetical>>\u003C/$list>\\n\u003Cdiv class=\\\"refnotes-tooltiptext\\\">\\n\u003C$macrocall $name=\\\"displayref-onhover\\\" refTid=\u003C\u003Cref-tid>> />\\n\u003C/div>\\n\u003C/$reveal>\\n\u003C/div>\\n\u003C/$set>\\n\\\\end\\n\\n\u003C!-- cite is a synonym for ref macro -->\\n\\\\define cite(tid, type:\\\"p\\\", pages:\\\"\\\") \u003C$macrocall $name=ref tid=\u003C\u003C__tid__>> type=\u003C\u003C__type__>> pages=\u003C\u003C__pages__>> />\\n\\n\u003C!-- for helper macros see $:/plugins/kookma/refnotes/macros/apa/ref-helper -->\"},\"$:/plugins/kookma/refnotes/macros/apa/ref-helper\":{\"title\":\"$:/plugins/kookma/refnotes/macros/apa/ref-helper\",\"code-body\":\"yes\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C!-- This tiddler contains helper macros used in $:/plugins/kookma/refnotes/macros/apa/ref -->\\n\\n\u003C!-- parenthetical in text citation -->\\n\\\\define parenthetical()\\n\u003C$wikify name=authors text=\u003C\u003Cshow-authors-in-citation>> >\\n(\u003C$text text={{{ [\u003Cauthors>trim[]addsuffix[, ]] }}}/>\u003C$text text={{{ [\u003C__tid__>get[bibtex-year]] :else[[n.d.]] }}}/>\u003C$text text={{{[\u003C__pages__>!is[blank]then\u003C__pages__>addprefix[, ]]}}}/>)\\n\u003C/$wikify>\\n\\\\end\\n\\n\u003C!-- narrative in text citation -->\\n\\\\define narrative()\\n\u003C$wikify name=authors text=\u003C\u003Cshow-authors-in-citation and>> >\\n\u003C$text text={{{ [\u003Cauthors>trim[]addsuffix[ ]] }}}/>(\u003C$text text={{{ [\u003C__tid__>get[bibtex-year]] :else[[n.d.]] }}}/>\u003C$text text={{{[\u003C__pages__>!is[blank]then\u003C__pages__>addprefix[, ]]}}}/>)\\n\u003C/$wikify>\\n\\\\end\\n\\n\u003C!-- multiwork parenthetical in text citation -->\\n\\\\define multiwork-parenthetical()\\n\u003C$wikify name=authors text=\u003C\u003Cshow-authors-in-citation>> >\\n\u003C$text text={{{ [\u003Cauthors>trim[]addsuffix[, ]] }}}/>\u003C$text text={{{ [\u003C__tid__>get[bibtex-year]] :else[[n.d.]] }}}/>\u003C$text text={{{[\u003C__pages__>!is[blank]then\u003C__pages__>addprefix[, ]]}}}/>\\n\u003C/$wikify>\\n\\\\end\"},\"$:/plugins/kookma/refnotes/macros/apa/showrefs\":{\"title\":\"$:/plugins/kookma/refnotes/macros/apa/showrefs\",\"tags\":\"$:/tags/Macro\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define showrefs(filter:[\u003CcurrentTiddler>] title:Empty class:ref-list emptyMessage)\\n\\\\import $:/plugins/kookma/refnotes/macros/apa/authors\\n\\\\import $:/plugins/kookma/refnotes/macros/bibtex/find-refs\\n\u003C$let leftDelimiter1=\\\"\u003C\u003Cref \\\" leftDelimiter2=\\\"\u003C\u003Ccite \\\">\\n\u003C$list filter=\\\"[subfilter\u003C__filter__>search:text:literal\u003CleftDelimiter1>][subfilter\u003C__filter__>search:text:literal\u003CleftDelimiter2>]:and[limit[1]]\\\" emptyMessage=\u003C\u003C__emptyMessage__>>variable=null>\\n\u003C$reveal tag=div type=nomatch text=\u003C\u003C__title__>>default=Empty>\\n\u003Ch2>$title$\u003C/h2>\\n\u003C/$reveal>\\n\u003C!---->\\n\u003C$wikify text=\\\"\\n\u003C$list filter=\u003C\u003C__filter__>>>\\n\u003C$macrocall thisTiddler={{!!title}}$name=find-refs/>\\n\u003C/$list>\\n\\\"name=mylist>\\n\u003C!---->\\n\u003Col class=\\\"$class$\\\">\\n\u003C$list filter=\\\"[enlist\u003Cmylist>trim[]sort[]]\\\"variable=reference>\\n\\n\u003C$let currentType={{{[\u003Creference>get[bibtex-entry-type]lowercase[]]~miscellaneous}}}>\\n\u003C$set filter=\\\"[[$:/tags/Refnotes/ReflistTemplate]tagging[]contains:list\u003CcurrentType>nth[]get[title]]\\\"value=\u003C\u003CbodyLookup>>emptyValue=\\\"$:/plugins/kookma/refnotes/templates/reflist/apa/default\\\"name=bodyLookup>\\n\u003C$transclude tiddler=\u003C\u003CbodyLookup>>field=text mode=inline/>\\n\u003C/$set>\\n\u003C/$let>\\n\\n\u003C/$list>\\n\u003C/ol>\\n\u003C/$wikify>\\n\u003C/$list>\\n\\n\\\\end\"},\"$:/plugins/kookma/refnotes/macros/bibtex/find-refs\":{\"title\":\"$:/plugins/kookma/refnotes/macros/bibtex/find-refs\",\"code-body\":\"yes\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C!-- find-refs looks into thisTiddler text and finds all forms of \u003C\u003Cref .>> and \u003C\u003Ccite .>> -->\\n\\\\define find-refs(thisTiddler)\\n\u003C$vars\\nregexp=\\\"(?g)\u003C\u003Cref .+?>>\\\"  regexpc =\\\"(?g)\u003C\u003Ccite .+?>>\\\"\\nregexp2='\u003C\u003Cref\\\\s+(.*?)>>' regexp2c='\u003C\u003Ccite\\\\s+(.*?)>>'\\nregexp3='^\\\"(.*?)\\\"'\\nregexp4=\\\"^'(.*?)'\\\"\\nregexp5=\\\"\\\\[\\\\[(.*?)\\\\]\\\\]\\\"\\nregexp6=\\\"^(.*?)\\\\s\\\"\\n>\\n\u003C$list filter=\\\"[\u003C__thisTiddler__>regexprefs:text\u003Cregexp>][\u003C__thisTiddler__>regexprefs:text\u003Cregexpc>]\\\">\\n\u003C$list filter=\\\"[all[current]regexprefs\u003Cregexp2>][all[current]regexprefs\u003Cregexp2c>]\\\">\\n\u003C$list filter=\\\"\\\"\\\"\\n     [all[current]regexprefs\u003Cregexp3>] \\n:else[all[current]regexprefs\u003Cregexp4>]\\n:else[all[current]regexprefs\u003Cregexp5>]\\n:else[all[current]regexprefs\u003Cregexp6>]\\n:else[all[current]]\\n:and[format:titlelist[]]\\n\\\"\\\"\\\" variable=p >\\n\u003C$text text=\u003C\u003Cp>> />\\n\u003C/$list>\\n\u003C/$list>\\n\u003C/$list>\\n\u003C/$vars>\\n\\\\end\"},\"$:/plugins/kookma/refnotes/macros/bibtex/process-entries\":{\"title\":\"$:/plugins/kookma/refnotes/macros/bibtex/process-entries\",\"tags\":\"$:/tags/Macro\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define title-slugify()\\n\u003C$vars curTitle=\u003C\u003CcurrentTiddler>> newTitle={{{[\u003CcurrentTiddler>slugify[]]}}}>\\n\u003C$list filter=\\\"[\u003CcurTitle>!match\u003CnewTitle>]\\\" variable=null>\\n\u003C$action-sendmessage $message=\\\"tm-rename-tiddler\\\" from=\u003C\u003CcurrentTiddler>> to=\u003C\u003CnewTitle>> />\\n\u003C/$list>\\n\u003C/$vars>\\n\\\\end\\n\\n\\\\define correct-doi()\\n\u003C$list filter=\\\"[\u003CcurrentTiddler>has[bibtex-doi]get[bibtex-doi]!prefix[https://doi.org]]\\\" variable=null>\\n\u003C$action-setfield $field=\\\"bibtex-doi\\\" $value={{{ [{!!bibtex-doi}addprefix[https://doi.org/]] }}}/>\\n\u003C/$list>\\n\\\\end\\n\\n\\\\define tag-entries()\\n\u003C!-- change entry type to lower case -->\\n\u003C$action-setfield $tiddler=\u003C\u003CcurrentTiddler>> bibtex-entry-type={{{[\u003CcurrentTiddler>get[bibtex-entry-type]lowercase[]]}}} />\\n\u003C!-- add bibtex-entry -->\\n\u003C$fieldmangler>\\n\u003C$action-sendmessage $message=\\\"tm-add-tag\\\" $param=\\\"bibtex-entry\\\" />\\n\u003C/$fieldmangler>\\n\\\\end\\n\\n\\\\define process-entries(title:\\\"Process New Bibtex Entries\\\")\\n\u003C$button>  $title$\\n\u003C$wikify name=chkDuplicates text=\u003C\u003Ccheck-duplicates>> >\\n\u003C$action-confirm $message=\u003C\u003CchkDuplicates>> >\\n\u003C$list filter=\\\"[has[bibtex-title]!tag[bibtex-entry]]\\\">\\n\u003C\u003Ctag-entries>>\\n\u003C\u003Ctitle-slugify>>\\n\u003C\u003Ccorrect-doi>>\\n\u003C/$list>\\n\u003C/$action-confirm>\\n\u003C/$wikify>\\n\u003C/$button>\\n\\\\end\\n\\n\u003C!-- check duplicate reference tiddlers before slugifying -->\\n\\\\define check-duplicates()\\n\u003C$list filter=\\\"[has[bibtex-title]duplicateslugs[]limit[1]]\\\" emptyMessage=\\\"There are no duplicate entries, do you want to process new entries?\\\">\\nThe following tiddlers have duplicate slugs, so they will overwrite eachother, do you want to continue?\\n\\n\u003C$list filter=\\\"[has[bibtex-title]duplicateslugs[]] +[join[, ]]\\\" template=\\\"$:/core/ui/ListItemTemplate\\\"/>\\n\u003C/$list>\\n\\\\end\"},\"$:/plugins/kookma/refnotes/macros/bibtex/regexprefs.js\":{\"title\":\"$:/plugins/kookma/refnotes/macros/bibtex/regexprefs.js\",\"text\":\"/*\\\\\\ntitle: $:/plugins/kookma/macro/bibtex/regexprefs.js\\ntype: application/javascript\\nmodule-type: filteroperator\\n\\nFilter operator for regexp matching and returning result. All results are returned if global flag used. All sub-groups are returned if not global and sub-group hits are found.\\n\\nThis is a hacked version of core macro: $:/core/modules/filters/regexp.js\\n\\n\\\\*/\\n(function(){\\n\\n/*jslint node: true, browser: true */\\n/*global $tw: false */\\n\\\"use strict\\\";\\n\\n/*\\nExport our filter function\\n*/\\nexports.regexprefs = function(source,operator,options) {\\n\\tvar results = [],\\n\\t\\tfieldname = (operator.suffix || \\\"title\\\").toLowerCase(),\\n\\t\\tregexpString, regexp, flags = \\\"\\\", match, global,\\n\\t\\tgetFieldString = function(tiddler,title) {\\n\\t\\t\\tif(tiddler) {\\n\\t\\t\\t\\treturn tiddler.getFieldString(fieldname);\\n\\t\\t\\t} else if(fieldname === \\\"title\\\") {\\n\\t\\t\\t\\treturn title;\\n\\t\\t\\t} else {\\n\\t\\t\\t\\treturn null;\\n\\t\\t\\t}\\n\\t\\t};\\n\\t// Process flags and construct regexp\\n\\tregexpString = operator.operand;\\n\\tmatch = /^\\\\(\\\\?([gim]+)\\\\)/.exec(regexpString);\\n\\tif(match) {\\n\\t\\tflags = match[1];\\n\\t\\tregexpString = regexpString.substr(match[0].length);\\n\\t} else {\\n\\t\\tmatch = /\\\\(\\\\?([gim]+)\\\\)$/.exec(regexpString);\\n\\t\\tif(match) {\\n\\t\\t\\tflags = match[1];\\n\\t\\t\\tregexpString = regexpString.substr(0,regexpString.length - match[0].length);\\n\\t\\t}\\n\\t}\\n\\ttry {\\n\\t\\tregexp = new RegExp(regexpString,flags);\\n\\t} catch(e) {\\n\\t\\treturn [\\\"\\\" + e];\\n\\t}\\n\\n\\tglobal = /g/.test(flags) ;\\n\\n\\t// Process the incoming tiddlers\\n\\tif(operator.prefix === \\\"!\\\") {\\n\\t\\tsource(function(tiddler,title) {\\n\\t\\t\\tvar text = getFieldString(tiddler,title);\\n\\t\\t\\tif(text !== null) {\\n\\t\\t\\t\\tif(!regexp.exec(text)) {\\n\\t\\t\\t\\t\\tresults.push(title);\\n\\t\\t\\t\\t}\\n\\t\\t\\t}\\n\\t\\t});\\n\\t} else {\\n\\t\\tsource(function(tiddler,title) {\\n\\t\\t\\tvar text = getFieldString(tiddler,title), ret=\\\"\\\";\\n\\t\\t\\tif(text !== null) {\\n\\t\\t\\t\\tret = text.match(regexp) ;\\n\\t\\t\\t\\tif(ret !==null) {\\n\\t\\t\\t\\t\\tif(global) {\\n\\t\\t\\t\\t\\t\\tresults.push.apply(results,ret)  ; //DEBUG\\n\\t\\t\\t\\t\\t} else {\\n\\t\\t\\t\\t\\t\\t// if there are  sub groups return sub groups START\\n\\t\\t\\t\\t\\t\\tif(ret.length > 1)  {     // return sub groups\\n\\t\\t\\t\\t\\t\\t\\tresults = results.concat(ret.slice(1)) ;\\n\\t\\t\\t\\t\\t\\t} else { // if no sub-groups\\n\\t\\t\\t\\t\\t\\t\\tresults.push(ret[0]);\\n\\t\\t\\t\\t\\t\\t} \\n\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t}\\n\\t\\t\\t}\\n\\t\\t});\\n\\t}\\n\\treturn results;\\n};\\n\\n})();\",\"type\":\"application/javascript\",\"module-type\":\"filteroperator\"},\"$:/plugins/kookma/refnotes/macros/bibtex/utility\":{\"title\":\"$:/plugins/kookma/refnotes/macros/bibtex/utility\",\"tags\":\"$:/tags/Macro\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define displayref-onhover(refTid)\\n\u003C$set name=\\\"ref-tid\\\" value=\u003C\u003C__refTid__>> >\\n\u003C$link overrideClass=\\\"link-refcls\\\" to=\u003C\u003Cref-tid>> >\\n\u003C$list filter=\\\"[\u003Cref-tid>get[bibtex-entry-type]lowercase[]!match[website]]\\\" variable=null\\nemptyMessage=\\\"\\\"\\\"\u003Cspan class=\\\"ref-author\\\">\u003C$view tiddler=\u003C\u003Cref-tid>> field=\\\"bibtex-url\\\"/>.\u003C/span>\\\"\\\"\\\">\\n\u003Cspan class=\\\"ref-author\\\">\u003C$view tiddler=\u003C\u003Cref-tid>> field=\\\"bibtex-author\\\"/>.\u003C/span>\\n\u003C/$list>\\n\u003C/$link>\\n\u003C$view tiddler=\u003C\u003Cref-tid>> field=\\\"bibtex-title\\\"/>. (\u003C$view tiddler=\u003C\u003Cref-tid>> field=\\\"bibtex-year\\\"/>)\\n\u003C/$set>\\n\\\\end\\n\\n\\\\define create-notexisted-ref(refTid)\\n\u003C$set name=\\\"myTid\\\" value=\u003C\u003C__refTid__>> >\\n\u003C$button class=\\\"tc-btn-invisible tc-tiddlylink\\\">\\n\u003C$action-sendmessage $message=\\\"tm-new-tiddler\\\"\\n    title=\u003C\u003CmyTid>> \\n    bibtex-author=\\\"\\\" bibtex-year=\\\"\\\"\\n    bibtex-title=\\\"\\\"  bibtex-abstract=\\\"\\\"\\n    bibtex-entry-type=\\\"\\\" bibtex-keywords=\\\"\\\"\\n    bibtex-doi=\\\"\\\" bibtex-url=\\\"\\\"\\n    tags=\\\"bibtex-entry\\\"\\n    />\u003C\u003CmyTid>> \\n\u003C/$button>\\n\u003C/$set>    \\n\\\\end\"},\"$:/plugins/kookma/refnotes/macros/find\":{\"title\":\"$:/plugins/kookma/refnotes/macros/find\",\"tags\":\"$:/tags/Macro\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define find(text, begin, end, output:\\\"simple\\\", mode:\\\"all\\\")\\n\u003C$vars \\n  fulltext=\u003C\u003C__text__>>\\n  start=\u003C\u003C__begin__>>\\n  stop=\u003C\u003C__end__>>\\n  output-macro=\u003C\u003C__output__>>\\n>\\n\u003C$list variable=p1 filter=\\\"[\u003Cfulltext>splitbefore\u003Cstart>]\\\">\\n\u003C$list variable=p2 filter=\\\"[\u003Cfulltext>removeprefix\u003Cp1>]\\\">\\n\u003C$list variable=p3 filter=\\\"[\u003Cp2>splitbefore\u003Cstop>removesuffix\u003Cstop>]\\\">\\n\u003C$macrocall $name=\u003C\u003Coutput-macro>> p=\u003C\u003Cp3>> />\\n\u003C$reveal type=\\\"match\\\" text=\\\"all\\\" default=\u003C\u003C__mode__>> >\\n\u003C$macrocall $name=\\\"find\\\"\\n  text={{{[\u003Cp2>removeprefix\u003Cp3>removeprefix\u003Cstop>]}}}\\n  begin=\u003C\u003Cstart>>\\n  end=\u003C\u003Cstop>>\\n  output=\u003C\u003Coutput-macro>>\\n/>\\n\u003C/$reveal>\\n\u003C/$list>\\n\u003C/$list>\\n\u003C/$list>\\n\u003C/$vars>\\n\\\\end\\n\\n\\\\define simple(p)\\n\u003C$text text=\u003C\u003C__p__>> />\\n\\\\end\\n\\n\\\\define simple-list(p)\\n\u003Cli>\u003C$text text=\u003C\u003C__p__>>/>\u003C/li>\\n\\\\end\\n\"},\"$:/plugins/kookma/refnotes/macros/footnote\":{\"title\":\"$:/plugins/kookma/refnotes/macros/footnote\",\"tags\":\"$:/tags/Macro\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define fnote(note)\\n\u003Cdiv class=\\\"refnotes-tooltip refnotes-footnote\\\">\u003Cdiv class=\\\"refnotes-tooltiptext\\\">$note$\u003C/div>\u003C/div>\\n\\\\end\"},\"$:/plugins/kookma/refnotes/macros/numbered/refnum\":{\"title\":\"$:/plugins/kookma/refnotes/macros/numbered/refnum\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define refnum(tid)\\n\u003C$set name=\\\"ref-tid\\\" tiddler=\u003C\u003C__tid__>> field=\\\"title\\\" emptyValue=\\\"RefNotFound\\\">\\n\u003Cdiv class=\\\"refnotes-tooltip refcls\\\">\\n\u003C$reveal type=\\\"match\\\" default=\u003C\u003Cref-tid>> text=\\\"RefNotFound\\\">\\n\u003C$link overrideClass=\\\"link-refcls\\\">\\n[\u003C$view tiddler=\u003C\u003C__tid__>> field=\\\"title\\\"/>]\\n\u003C/$link>\\n\u003Cdiv class=\\\"refnotes-tooltiptext ref-notfound\\\">\u003Cb>Warning\u003C/b>: Reference Not Found.\u003Cbr>Click to create it:\u003C\u003Ccreate-notexisted-ref \\\"$tid$\\\">>\u003C/div>\\n\u003C/$reveal>\\n\u003C$reveal type=\\\"nomatch\\\" default=\u003C\u003Cref-tid>> text=\\\"RefNotFound\\\">\\n[\u003C$view tiddler=\u003C\u003C__tid__>> field=\\\"caption\\\">\u003C$view tiddler=\u003C\u003C__tid__>> field=\\\"title\\\"/>\u003C/$view>]\\n\u003Cdiv class=\\\"refnotes-tooltiptext\\\">\\n\u003C$macrocall $name=\\\"displayref-onhover\\\" refTid=\u003C\u003Cref-tid>> />\\n\u003C/div>\\n\u003C/$reveal>\\n\u003C/div>\\n\u003C/$set>\\n\\\\end\\n\"},\"$:/plugins/kookma/refnotes/macros/search-ui\":{\"title\":\"$:/plugins/kookma/refnotes/macros/search-ui\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define searchTid() $:/temp/refnotes/search\\n\\\\define bibtexFields() [!is[shadow]!is[system]has[bibtex-title]fields[]prefix[bibtex-]sort[]]\\n\\\\define mainFields() bibtex-title bibtex-author bibtex-year\\n\\\\define searchUi()\\n\u003Cdiv class=\\\"tc-search\\\">\\n\u003C$edit-text tiddler=\u003C\u003CsearchTid>> type=\\\"search\\\" tag=\\\"input\\\" placeholder=\\\"search terms\\\" default=\\\"\\\"/> \u003C$select field=\\\"field\\\" tiddler=\u003C\u003CsearchTid>> default=\\\"bibtex-author\\\">\\n\u003C$set name=allfields filter= \\\"[subfilter\u003CbibtexFields>split[ ]join[,]]\\\" >\\n\u003Coption value=\u003C\u003Callfields>> >all fields\u003C/option>\\n\u003C/$set>\\n\u003Coptgroup label=\\\"Main fields\\\">\\n\u003C$list filter=\\\"[enlist\u003CmainFields>removeprefix[bibtex-]]\\\" variable=\\\"field\\\">\\n\u003Coption value={{{[\u003Cfield>addprefix[bibtex-]]}}} >\u003C\u003Cfield>>\u003C/option>\\n\u003C/$list>\\n\u003C/optgroup>\\n\u003Coptgroup label=\\\"Other fields\\\">\\n\u003C$list filter=\\\"[subfilter\u003CbibtexFields>] -[enlist\u003CmainFields>] +[removeprefix[bibtex-]]\\\" variable=\\\"field\\\">\\n\u003Coption value={{{[\u003Cfield>addprefix[bibtex-]]}}} >\u003C\u003Cfield>>\u003C/option>\\n\u003C/$list>\\n\u003C/optgroup>\\n\u003C/$select>\\n\\n\u003C$reveal state=\u003C\u003CsearchTid>> type=\\\"nomatch\\\" text=\\\"\\\">\\n\u003C$button class=\\\"tc-btn-invisible\\\">\\n\u003C$action-setfield $tiddler=\u003C\u003CsearchTid>> text=\\\"\\\"/>\\n{{$:/core/images/close-button}}\\n\u003C/$button>\\n\u003C/$reveal>\\n\u003C/div>\\n\\\\end\"},\"$:/plugins/kookma/refnotes/macros/showabbrs\":{\"title\":\"$:/plugins/kookma/refnotes/macros/showabbrs\",\"tags\":\"$:/tags/Macro\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define showabbrs(filter:\\\"[\u003CcurrentTiddler>]\\\", dtiddler:\\\"Glossary\\\", title:\\\"Empty\\\", emptyMessage:\\\"\\\")\\n\u003C$wikify name=\\\"indexes\\\" text=\u003C\u003Cfind-all-items>> > \\n\u003C$macrocall $name=\\\"abbr-list\\\" indexes=\u003C\u003Cindexes>> dtiddler=\u003C\u003C__dtiddler__>>  title=\u003C\u003C__title__>> emptyMessage=\u003C\u003C__emptyMessage__>> />\\n\u003C/$wikify>\\n\\\\end\\n\\n\\\\define patterndb() \\\\[\\\\[|\\\\]\\\\]\\n\\\\define pattern()  ('.*?'|\\\".*?\\\"|\\\\S+)\\n\\\\define output-item(p)\\n\u003C$list filter=\\\"\\\"\\\"[\u003C__p__>search-replace:g:regexp\u003Cpatterndb>,[\\\"]]\\\"\\\"\\\" variable=pars>\\n\u003C$list filter=\\\"\\\"\\\"[\u003Cpars>trim[]!prefix[dict:]search-replace[term:],[]splitregexp\u003Cpattern>trim[]!is[blank]!prefix[dict:]first[]]\\\"\\\"\\\">\\n\u003C$text text=\u003C\u003CcurrentTiddler>>/>\\n\u003C/$list>\\n\u003C$list filter=\\\"\\\"\\\"[\u003Cpars>trim[]prefix[dict:]search-replace[term:],[]splitregexp\u003Cpattern>trim[]!is[blank]!prefix[dict:]last[]]\\\"\\\"\\\">\\n\u003C$text text=\u003C\u003CcurrentTiddler>>/>\\n\u003C/$list>\\n\u003C/$list>\\n\\\\end\\n\\n\\\\define find-all-items()\\n\u003C$list filter=\u003C\u003C__filter__>> >\\n\u003C$macrocall $name=\\\"find\\\" text={{!!text}} begin=\\\"\u003C\u003Cabbr \\\" end=\\\">>\\\" output=\\\"output-item\\\"/>\\n\u003C/$list>\\n\\\\end\\n\\n\\n\\\\define abbr-list(dtiddler, indexes, title:\\\"Empty\\\", emptyMessage:\\\"\\\")\\n\u003C$list filter=\\\"[\u003Cindexes>limit[1]]\\\" variable=null emptyMessage=\u003C\u003C__emptyMessage__>> >\u003C!-- check to see if there is any abbreviations -->\\n\u003C$reveal tag=\\\"div\\\" type=\\\"nomatch\\\" default=\\\"Empty\\\" text=\u003C\u003C__title__>> >\\n\u003Ch2>\u003C$text text=\u003C\u003C__title__>> />\u003C/h2>\\n\u003C/$reveal>\\n\u003Ctable class=\\\"refnotes-table-borderless\\\">\\n\u003C$list filter=\\\"\\\"\\\"[subfilter\u003C__indexes__>]\\\"\\\"\\\" variable=\\\"item\\\">\\n\u003Ctr>\\n\u003Ctd class=\\\"refnotes-abbr-term\\\">\u003C$text text=\u003C\u003Citem>> />\u003C/td>\\n\u003Ctd>\\n \u003C$set name=\\\"term\\\" tiddler=\u003C\u003C__dtiddler__>>  index=\u003C\u003Citem>>  emptyValue=\u003C\u003Cterm-not-found>> >\\n   \u003C\u003Cterm>>\\n \u003C/$set>\\n\u003C/td>\\n\u003C/tr>\\n\u003C/$list>\\n\u003C/table>\\n\u003C/$list>\\n\\\\end\\n\\n\\n\\\\define term-not-found()\\n\u003Cspan class=\\\"refnotes-abbr-term-not-found\\\">Term not found\u003C/span>\\n\\\\end\\n\\n\\n\"},\"$:/plugins/kookma/refnotes/macros/showfnotes\":{\"title\":\"$:/plugins/kookma/refnotes/macros/showfnotes\",\"tags\":\"$:/tags/Macro\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define showfnotes(filter:\\\"[\u003CcurrentTiddler>]\\\", title:\\\"Empty\\\" class:\\\"fnote-list\\\", emptyMessage:\\\"\\\")\\n\u003C$vars leftDelimiter=\\\"\u003C\u003Cfnote \\\">\\n\u003C$list filter=\\\"[subfilter\u003C__filter__>search:text:literal\u003CleftDelimiter>limit[1]]\\\" variable=null emptyMessage=\u003C\u003C__emptyMessage__>> >\u003C!-- check to see if there is any footnote -->\\n\u003C$reveal tag=\\\"div\\\" type=\\\"nomatch\\\" default=\\\"Empty\\\" text=\u003C\u003C__title__>> >\\n\u003Ch2>$title$\u003C/h2>\\n\u003C/$reveal>\\n\u003Col class=\\\"$class$\\\">\\n\u003C$list filter=\u003C\u003C__filter__>> >\\n\u003C$macrocall $name=\\\"find\\\" \\n   text={{!!text}}\\n   begin=\\\"\u003C\u003Cfnote \\\"\\n   end=\\\">>\\\"\\n   output=\\\"output-fnote\\\"\\n/>\\n\u003C/$list>\\n\u003C/ol>\\n\u003C/$list>\\n\u003C/$vars>\\n\\\\end\\n\\n\\\\define output-fnote(p)\\n\u003C$vars output=$p$>\\n\u003Cli>\u003C\u003Coutput>>\u003C/li>\\n\u003C/$vars>\\n\\\\end\\n\\n\"},\"$:/plugins/kookma/refnotes/macros/stretch-text\":{\"title\":\"$:/plugins/kookma/refnotes/macros/stretch-text\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define tmpTidDetails() $:/temp/refnotes/library/$(currentTiddler)$\\n\\n\\\\define stretchText(text, title:\\\"...\\\")\\n\u003C$button class=\\\"tc-btn-invisible\\\">$title$\\n\u003C$action-listops $tiddler=\u003C\u003CtmpTidDetails>> $field=\\\"text\\\" $subfilter=\\\"+[toggle[show]]\\\" />\\n\u003C/$button>&nbsp;\u003C$reveal type=\\\"match\\\" stateTitle=\u003C\u003CtmpTidDetails>> sateField=text text=\\\"show\\\">$text$\u003C/$reveal>\\n\\\\end\\n\"},\"$:/plugins/kookma/refnotes/readme\":{\"title\":\"$:/plugins/kookma/refnotes/readme\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"; Refnotes\\nRefnotes is a Tiddlywiki plugin to create and manage footnotes, abbreviations, citations, and references. Refnotes can create bibliography, but for the best performance, and to use import bibtex entries, the use of the official ''bibtex importer'' plugin is required. APA7 style is used as default. Refnotes output is very close to APA7 standard.\\n\\n;Code and demo\\nFor learning Refnotes features, syntax, tutorial and examples see the plugin demo and code pages\\n\\n* Demo: https://kookma.github.io/TW-Refnotes/\\n* Code: https://github.com/kookma/TW-Refnotes\\n\"},\"$:/plugins/kookma/refnotes/styles/abbr\":{\"title\":\"$:/plugins/kookma/refnotes/styles/abbr\",\"text\":\"/* Ref: https://developer.mozilla.org/en-US/docs/Web/CSS/CSS3 */ \\n.refnotes-abbr abbr[title] {\\n\\tcolor: inherit;\\n\\tfont-style: normal;\\n\\ttext-decoration: none;\\n\\tborder-bottom: 1px dotted #aaa;\\n\\tcursor: help;\\n}\\n\\n.refnotes-abbr-term-not-found{\\n/*\\tcolor:red;*/\\n\\tfont-style: oblique;\\n}\\n\\n.refnotes-abbr-term{\\n/*\\tcolor:blue;*/\\n}\\n\\n/* Ref:https://aarontgrogg.com/lab/\\nShow the title for small screen\\n*/ \\n/* this works based on the max-width*/\\n@media only screen and (max-width: 960px) {\\n.refnotes-abbr abbr:hover:after  { content: ' ('attr(title)')'; }\\n}\\n\\n@media (hover: none) {\\n/* Push the title attribute into generated content after the abbr. */\\n.refnotes-abbr abbr[title]::after { \\n content: ' ('attr(title)')'; }\\n}\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/refnotes/styles/bibtex\":{\"title\":\"$:/plugins/kookma/refnotes/styles/bibtex\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\".ref-nonumber{\\n/* color:blue;*/\\n font-size:90%;\\n list-style-type:none;\\n}\\n\\n.ref-nonumber li{\\n  padding-bottom:8px;\\n}\\n\\n.ref-list{\\n/* color:blue;*/\\n font-size:90%;\\n}\\n\\n.link-refcls{\\n font-weight:400;\\n/* color:#00008B;*/ /*darkblue*/\\n text-decoration:none;\\n color: \u003C\u003Ccolour tiddler-link-foreground>>; \\t\\n}\\n\\n.refcls{\\n/* color:#00008B;*/\\n color: \u003C\u003Ccolour tiddler-link-foreground>>; \\n/* text-transform: capitalize;*/\\n}\\n\\n.ref-notfound{\\n/*  color: #856404 !important;*/\\n/*  background-color: #fff3cd !important;*/\\n}\\n\\n.ref-author{\\n/*  color:#00008B;*/ /*color for author in tooltip*/\\n}\"},\"$:/plugins/kookma/refnotes/styles/bibtex-details\":{\"title\":\"$:/plugins/kookma/refnotes/styles/bibtex-details\",\"text\":\".refnotes-details > summary{\\n\\tpadding-left:0;\\n\\tpadding-top:15px;\\n\\tpadding-bottom:15px;\\n\\twidth: 160px;\\n\\tcursor: pointer;\\n\\tfont-weight:bold;\\n}\\n\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/refnotes/styles/bibtex-entryview\":{\"title\":\"$:/plugins/kookma/refnotes/styles/bibtex-entryview\",\"text\":\"/* used for viewtemplate displaying the bibtex entry */\\n.refnotes-bibtex-field{\\n\\tdisplay:table-row\\n}\\n.refnotes-bibtex-field > span{\\n\\tdisplay:table-cell\\n}\\n.refnotes-bibtex-field > span:first-of-type{\\n\\tfont-weight:bold;\\n\\tpadding-right:10px;\\n\\twhite-space: nowrap;\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/refnotes/styles/dropzone\":{\"title\":\"$:/plugins/kookma/refnotes/styles/dropzone\",\"text\":\".bibtex-dropzone{\\n\\tmin-height:30px;\\n\\tmax-width:100%;\\n\\tmargin:4px auto;\\n\\tborder:2px dotted green;\\n\\ttext-align:center;\\n}\\n\\n.bibtex-dropzone:focus {\\n\\tbackground: #fffedd;\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/refnotes/styles/footnote-counter\":{\"title\":\"$:/plugins/kookma/refnotes/styles/footnote-counter\",\"text\":\"/*automatic counter for fnote macro. The counter resets at the begining of each tiddler*/\\n.tc-tiddler-frame,\\n.tc-single-tiddler-window { /* to cover tiddler when it is opened in a new window */ \\n  counter-reset: fnote-count;\\n}\\n.refnotes-footnote {\\n  counter-increment: fnote-count;\\n}\\n.refnotes-footnote:after {\\n  content: counter(fnote-count);\\n  font-size:small;\\n  vertical-align: super;\\n  line-height: 1.5;\\n  margin-left: -0.1em;\\n  /* color:#0000ee;*/\\n}\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/refnotes/styles/library\":{\"title\":\"$:/plugins/kookma/refnotes/styles/library\",\"text\":\"/* in folding-editor*/\\n.refnotes-library button svg{\\n\\tfont-size:0.8em;\\n\\tvertical-align: middle;\\n\\tmargin-right:0;\\n\\tmargin-left:0;\\n\\n}\\n\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/refnotes/styles/showfnotes\":{\"title\":\"$:/plugins/kookma/refnotes/styles/showfnotes\",\"text\":\"/* Footnote class*/\\n\\n.fnote-list{\\n/* color:blue;*/\\n font-size:90%;\\n}\\n\\n.fnote-pretty{\\n display: block;\\n  margin: 0.5em;\\n  margin-right: auto;\\n  width: 100% !important;\\n  border-collapse: collapse;\\n  padding: 15px 15px 15px 25px; /*left padding=25px*/\\n  border-width:  0px;\\n  border-style: solid;\\n  border-left-width: 1px;\\n  background-color:  rgb(255,248,220);\\n  color: rgb(91,49,7);\\n  line-height: 1.2em; \\n  font-size:0.9em;\\n}\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/refnotes/styles/table-borderless\":{\"title\":\"$:/plugins/kookma/refnotes/styles/table-borderless\",\"text\":\"/*Borderless table*/\\n.refnotes-table-borderless, \\n.refnotes-table-borderless th, \\n.refnotes-table-borderless tr, \\n.refnotes-table-borderless td{\\n  border:0;\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/refnotes/styles/tooltip\":{\"title\":\"$:/plugins/kookma/refnotes/styles/tooltip\",\"text\":\"/* tooltip class used for ref, fnote and other macros */\\n.refnotes-tooltip {\\n\\tposition: relative;\\n\\tdisplay: inline-block;\\n\\tcursor: pointer; \\n}\\n\\n.refnotes-tooltip .refnotes-tooltiptext{\\n\\tfont-size: 0.90em; /* change if it is too small */\\n}\\n\\n.refnotes-tooltip .refnotes-tooltiptext {\\n\\tvisibility: hidden;\\n\\tbackground-color: #fff;\\n\\tcolor: #222222; \\n\\ttext-align: left;\\n\\tborder-radius: 2px;\\n\\tpadding: 5px 10px;\\n\\tmax-width: 30vw;\\n\\tmax-height:20em;\\n\\toverflow-y: auto;\\n\\tcursor: auto;\\n\\twidth: max-content;\\n\\twidth: -moz-max-content;\\n\\twidth: -webkit-max-content;\\n\\twidth: -o-max-content;\\n\\n\\t/* Position the tooltip */\\n\\tposition: absolute;\\n\\tz-index: 1;\\n\\tbottom: 100%;\\n\\tleft: 50%;\\n\\tmargin-left: -40px;\\n\\tbox-shadow:0 4px 10px 0 rgba(0,0,0,0.2),0 4px 20px 0 rgba(0,0,0,0.19);\\n}\\n\\n.refnotes-tooltip:hover .refnotes-tooltiptext {\\n\\tvisibility: visible;\\n\\t/*opacity: 0.9;*/\\n}\\n\\n/* for small screens */\\n\\n@media screen and (max-width: 960px) {\\n.refnotes-tooltip .refnotes-tooltiptext {\\n    /* Position the tooltip */\\n  \\tposition:fixed;\\n    top:0;\\n    left: 0;\\n    margin-left: 0px;\\n    bottom: unset;\\n    width:100%;\\n    max-width: 100vw;\\n    z-index: 9999;\\n}  \\n\\n.refnotes-tooltip:hover .refnotes-tooltiptext {\\n   opacity: 1;\\n}  \\n  \\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/refnotes/templates/reflist/apa/article\":{\"title\":\"$:/plugins/kookma/refnotes/templates/reflist/apa/article\",\"code-body\":\"yes\",\"list\":\"article\",\"tags\":\"$:/tags/Refnotes/ReflistTemplate\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C$wikify name=bibtexEntryTiddler text=\u003C\u003Creference>> >\\n\u003C$set name=currentTiddler tiddler=\u003C\u003CbibtexEntryTiddler>> field=title emptyValue=\\\"RefNotFound\\\">\\n\u003C$reveal type=\\\"nomatch\\\" default=\\\"RefNotFound\\\" text=\u003C\u003CcurrentTiddler>> >\\n\u003Cli>\u003C$link to=\u003C\u003CbibtexEntryTiddler>>>\u003C\u003Cshow-authors-in-references>>\u003C/$link> (\u003C$text text={{{ [{!!bibtex-year}!is[blank]] :else[[n.d.]] }}}/>). \u003C$text  text={{{ [{!!bibtex-title}lowercase[]sentencecase[]] }}} />. \u003Cspan style=\\\"font-style:italic\\\">\u003C$view field=\\\"bibtex-journal\\\"/>\u003C/span>. \u003C$view field=\\\"bibtex-volume\\\"/>. \u003C$view field=\\\"bibtex-pages\\\"/>. \u003Ca href={{{[\u003CcurrentTiddler>get[bibtex-doi]!prefix[https://doi.org/]addprefix[https://doi.org/]else{!!bibtex-doi}]}}} target=_blank>\u003C$view field=\\\"bibtex-doi\\\"/>\u003C/a>\u003C/li>\\n\u003C/$reveal>\\n\u003C$reveal type=\\\"match\\\" default=\\\"RefNotFound\\\" text=\u003C\u003CcurrentTiddler>> >\\n\u003Cli>Reference \u003Cb>\u003C$text text=\u003C\u003Creference>>/>\u003C/b> NOT FOUND. Check your input.\u003C/li>\\n\u003C/$reveal>\\n\u003C/$set>\u003C/$wikify>\\n\\n\u003C!-- APA 7 \\nAuthor. (Year). Title [Translated Title] [Type of Article] [Reviewed Item]|. Journal|, Volume|(Issue)|, Pages|, Article Number|.| `https://doi.org/`DOI (Reprint Edition) (Original Publication) (Errata)\\n-->\"},\"$:/plugins/kookma/refnotes/templates/reflist/apa/book\":{\"title\":\"$:/plugins/kookma/refnotes/templates/reflist/apa/book\",\"code-body\":\"yes\",\"list\":\"book incollection\",\"tags\":\"$:/tags/Refnotes/ReflistTemplate\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define disp-bibtex-edition()\\n\u003C$list filter=\\\"[\u003CcurrentTiddler>has[bibtex-edition]]\\\" variable=null>(\u003C$view field=\\\"bibtex-edition\\\"/>).\u003C/$list>\\n\\\\end\\n\\n\\n\u003C$wikify name=bibtexEntryTiddler text=\u003C\u003Creference>> >\\n\u003C$set name=currentTiddler tiddler=\u003C\u003CbibtexEntryTiddler>> field=title emptyValue=\\\"RefNotFound\\\">\\n\u003C$reveal type=\\\"nomatch\\\" default=\\\"RefNotFound\\\" text=\u003C\u003CcurrentTiddler>> >\\n\u003Cli>\u003C$link to=\u003C\u003CbibtexEntryTiddler>>>\u003C\u003Cshow-authors-in-references>>\u003C/$link> (\u003C$text text={{{ [{!!bibtex-year}!is[blank]] :else[[n.d.]] }}}/>). \u003Cspan style=\\\"font-style:italic;\\\">\u003C$text text={{{ [{!!bibtex-title}lowercase[]sentencecase[]] }}} />\u003C/span>. \u003C\u003Cdisp-bibtex-edition>> \u003C$view field=\\\"bibtex-publisher\\\"/>.\u003C/li>\\n\u003C/$reveal>\\n\u003C$reveal type=\\\"match\\\" default=\\\"RefNotFound\\\" text=\u003C\u003CcurrentTiddler>> >\\n\u003Cli>Reference \u003Cb>\u003C$text text=\u003C\u003Creference>>/>\u003C/b> NOT FOUND. Check your input.\u003C/li>\\n\u003C/$reveal>\\n\u003C/$set>\u003C/$wikify>\\n\\n\u003C!--\\nAuthor. (Year). Title [Translated Title] (|Translator, Trans.;| Editor, Ed.^Eds.| Edition ed.,| Vol. Volume|)| [Type of Work]|. Publisher|. `https://doi.org/`DOI (Original Publication)\\n-->\"},\"$:/plugins/kookma/refnotes/templates/reflist/apa/default\":{\"title\":\"$:/plugins/kookma/refnotes/templates/reflist/apa/default\",\"code-body\":\"yes\",\"tags\":\"$:/tags/Refnotes/ReflistTemplate\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C$wikify name=bibtexEntryTiddler text=\u003C\u003Creference>> >\\n\u003C$set name=currentTiddler tiddler=\u003C\u003CbibtexEntryTiddler>> field=\\\"title\\\" emptyValue=\\\"RefNotFound\\\">\\n\u003C$reveal type=\\\"nomatch\\\" default=\\\"RefNotFound\\\" text=\u003C\u003CcurrentTiddler>> >\\n\u003Cli>\u003C$link to=\u003C\u003CbibtexEntryTiddler>>>\u003C\u003Cshow-authors-in-references>>\u003C/$link> (\u003C$text text={{{ [{!!bibtex-year}!is[blank]] :else[[n.d.]] }}}/>). \u003C$text  text={{{ [{!!bibtex-title}lowercase[]sentencecase[]] }}} />.\u003C/li>\\n\u003C/$reveal>\\n\u003C$reveal type=\\\"match\\\" default=\\\"RefNotFound\\\" text=\u003C\u003CcurrentTiddler>> >\\n\u003Cli>Reference \u003Cb>\u003C$text text=\u003C\u003Creference>>/>\u003C/b> NOT FOUND. Check your input.\u003C/li>\\n\u003C/$reveal>\\n\u003C/$set>\u003C/$wikify>\"},\"$:/plugins/kookma/re ist filter=\\\"[subfilter\u003CsearchFilter>]\\\">\\n\u003C$action-setfield $tiddler=\u003C\u003CtmpTidDetails>> text=show />\\n\u003C/$list>\\n\u003C/$button>\\n\u003C$button class=\\\"tc-btn-invisible\\\" tooltip=\\\"hide item details\\\">{{$:/core/images/up-arrow}}\\n\u003C$list filter=\\\"[subfilter\u003CsearchFilter>]\\\">\\n\u003C$action-deletetiddler $tiddler=\u003C\u003CtmpTidDetails>> />\\n\u003C/$list>\\n\u003C/$button>\\n\u003C/div>\\n\\n\u003C!-- show the library data -->\\n\u003Col>\\n\u003C$list filter=\\\"[subfilter\u003CsearchFilter>]\\\">\\n\u003Cli>\u003C\u003CdispEntry>>\u003C/li>\\n\u003C/$list>\\n\u003C/ol>\\n\u003C/$vars>\\n\\\\end\\n\\n\u003C!-- interface -->\\n\u003Cdiv style=\\\"margin-bottom:8px;\\\">\\n\u003C\u003Cprocess-entries \\\"Process New Entries\\\">>\\n{{$:/plugins/kookma/refnotes/ui/dropzone}}\\n\u003C/div>\\n\\n\u003C!-- make this optional\\n[[Bibliography Table]]\\n-->\\n\\n\u003C\u003CsearchUi>>\\n\\n\u003C\u003CbibLibrary>>\\n\\n\\n\\n\"},\"$:/plugins/kookma/refnotes/ui/dropzone\":{\"title\":\"$:/plugins/kookma/refnotes/ui/dropzone\",\"caption\":\"Dropzone\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C$dropzone \\n  deserializer=\\\"application/x-bibtex\\\"\\n  filesOnly=no \\n\\timportTitle=\\\"Import Bibtex\\\">\\n\u003Cdiv class=\\\"bibtex-dropzone\\\" tabindex=1>\\nPaste your Bibtex Entry here\\n\u003C/div>\\n\u003C/$dropzone>\"},\"$:/plugins/kookma/refnotes/viewtemplates/article\":{\"title\":\"$:/plugins/kookma/refnotes/viewtemplates/article\",\"list\":\"article\",\"tags\":\"$:/tags/Refnotes/Template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define mainFields() bibtex-title bibtex-author bibtex-journal bibtex-year bibtex-pages bibtex-number bibtex-volume bibtex-doi bibtex-entry-type\\n\\n\u003C!-- display fields -->\\n\u003C$transclude tiddler=\\\"$:/plugins/kookma/refnotes/viewtemplates/helper\\\" mode=block/>\"},\"$:/plugins/kookma/refnotes/viewtemplates/book\":{\"title\":\"$:/plugins/kookma/refnotes/viewtemplates/book\",\"list\":\"book\",\"tags\":\"$:/tags/Refnotes/Template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define mainFields() bibtex-title bibtex-author bibtex-year bibtex-publisher bibtex-entry-type\\n\\n\u003C$transclude tiddler=\\\"$:/plugins/kookma/refnotes/viewtemplates/helper\\\" mode=block/>\"},\"$:/plugins/kookma/refnotes/viewtemplates/default\":{\"title\":\"$:/plugins/kookma/refnotes/viewtemplates/default\",\"tags\":\"$:/tags/Refnotes/Template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define mainFields() bibtex-title bibtex-author bibtex-year bibtex-doi bibtex-entry-type\\n\\n\u003C!-- display fields -->\\n\u003C$transclude tiddler=\\\"$:/plugins/kookma/refnotes/viewtemplates/helper\\\" mode=block/>\"},\"$:/plugins/kookma/refnotes/viewtemplates/helper\":{\"title\":\"$:/plugins/kookma/refnotes/viewtemplates/helper\",\"tags\":\"$:/tags/Refnotes/Template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define citedIn(refname)\\n  \u003C$let pattern-ref =\\\"\\\"\\\"\u003C\u003Cref[\\\\s\\\\['\\\"]*?$refname$['\\\"\\\\s\\\\]]*?.*>>\\\"\\\"\\\" \\n        pattern-cite=\\\"\\\"\\\"\u003C\u003Ccite[\\\\s\\\\['\\\"]*?$refname$['\\\"\\\\s\\\\]]*?.*>>\\\"\\\"\\\" \\t\\n\\t>\\n   \u003C$list filter=\\\"[all[tiddlers]search:text:regexp\u003Cpattern-ref>sort[title]] [all[tiddlers]search:text:regexp\u003Cpattern-cite>sort[title]]\\\" \\n          template=\\\"$:/core/ui/ListItemTemplate\\\" \\n          emptyMessage=\\\"\\\"\\\"//No tiddler has cited this reference//\\\"\\\"\\\" />\\n  \u003C/$let>\\n\\\\end\\n\\n\\\\define display-bibtex-field()\\n\u003Cdiv class=\\\"refnotes-bibtex-field\\\">\\n\u003Cspan>\u003C$text text={{{ [\u003CcurrentField>removeprefix[bibtex-]titlecase[]] }}} />\u003C/span>\\n\u003Cspan>\u003C$transclude tiddler=\u003C\u003CcurrentTiddler>> field=\u003C\u003CcurrentField>> mode=inline />\u003C/span>\\n\u003C/div>\\n\\\\end\\n\\n\u003C$let tv-wikilinks=\\\"no\\\">\\n\u003C!-- display main bibtex fields -->\\n\u003C$list filter=\\\"[enlist\u003CmainFields>]\\\" variable=currentField>\\n\u003C\u003Cdisplay-bibtex-field>>\\n\u003C/$list>\\n\\n\u003C!-- display other bibtex fields -->\\n\u003Cdetails class=\\\"refnotes-details\\\">\\n  \u003Csummary>More details\u003C/summary>\\n\u003C$list filter=\\\"[\u003CcurrentTiddler>fields[]prefix[bibtex]sort[]] -[enlist\u003CmainFields>]\\\" variable=currentField>\\n\u003C\u003Cdisplay-bibtex-field>>\\n\u003C/$list>\\n\u003C/details>\\n\u003C/$let>\\n\\n\u003C!-- show the list of tiddlers cited this reference -->\\n; Cited in\\n: \u003C$macrocall $name=citedIn refname=\u003C\u003CcurrentTiddler>> /> \"},\"$:/plugins/kookma/refnotes/viewtemplates/incollection\":{\"title\":\"$:/plugins/kookma/refnotes/viewtemplates/incollection\",\"list\":\"incollection\",\"tags\":\"$:/tags/Refnotes/Template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define mainFields() bibtex-title bibtex-author bibtex-year bibtex-booktitle bibtex-editor bibtex-publisher bibtex-doi bibtex-entry-type\\n\\n\u003C$transclude tiddler=\\\"$:/plugins/kookma/refnotes/viewtemplates/helper\\\" mode=block/>\"},\"$:/plugins/kookma/refnotes/viewtemplates/inproceedings\":{\"title\":\"$:/plugins/kookma/refnotes/viewtemplates/inproceedings\",\"list\":\"inproceedings\",\"tags\":\"$:/tags/Refnotes/Template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define mainFields() bibtex-title bibtex-author bibtex-year bibtex-booktitle bibtex-editor bibtex-doi bibtex-entry-type\\n\\n\u003C$transclude tiddler=\\\"$:/plugins/kookma/refnotes/viewtemplates/helper\\\" mode=block/>\"},\"$:/plugins/kookma/refnotes/viewtemplates/main\":{\"title\":\"$:/plugins/kookma/refnotes/viewtemplates/main\",\"tags\":\"$:/tags/ViewTemplate\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C$list filter=\\\"[all[current]has[bibtex-title]]\\\">\\n\u003C$vars currentType={{{[\u003CcurrentTiddler>get[bibtex-entry-type]lowercase[]] ~[[miscellaneous]]}}} >\\n\u003C$set name=\\\"bodyLookup\\\" \\n      filter=\\\"[all[tiddlers+shadows]tag[$:/tags/Refnotes/Template]contains:list\u003CcurrentType>] +[limit[1]get[title]]\\\"\\n\\t\\t\\tvalue=\u003C\u003CbodyLookup>> \\n      emptyValue=\\\"$:/plugins/kookma/refnotes/viewtemplates/default\\\">\\t\\t\\n\u003C$transclude tiddler=\u003C\u003CbodyLookup>> field=\\\"text\\\" mode=\\\"inline\\\"/>\\n\u003C/$set>\\n\u003C/$vars>\\n\u003C/$list>\"},\"$:/plugins/kookma/refnotes/viewtemplates/thesis\":{\"title\":\"$:/plugins/kookma/refnotes/viewtemplates/thesis\",\"list\":\"phdthesis mastersthesis thesis\",\"tags\":\"$:/tags/Refnotes/Template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define mainFields() bibtex-title bibtex-author bibtex-year bibtex-school bibtex-entry-type\\n\\n\u003C$transclude tiddler=\\\"$:/plugins/kookma/refnotes/viewtemplates/helper\\\" mode=block/>\"},\"$:/plugins/kookma/refnotes/viewtemplates/unpublished\":{\"title\":\"$:/plugins/kookma/refnotes/viewtemplates/unpublished\",\"list\":\"unpublished\",\"tags\":\"$:/tags/Refnotes/Template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define mainFields() bibtex-title bibtex-author bibtex-year bibtex-note bibtex-entry-type\\n\\n\u003C$transclude tiddler=\\\"$:/plugins/kookma/refnotes/viewtemplates/helper\\\" mode=block/>\"},\"$:/plugins/kookma/refnotes/viewtemplates/website\":{\"title\":\"$:/plugins/kookma/refnotes/viewtemplates/website\",\"list\":\"website\",\"tags\":\"$:/tags/Refnotes/Template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define mainFields() bibtex-title bibtex-url bibtex-urldate bibtex-note  bibtex-entry-type\\n\\n\u003C!-- display fields -->\\n\u003C$transclude tiddler=\\\"$:/plugins/kookma/refnotes/viewtemplates/helper\\\" mode=block/>\"}}}"},
{"created":"20251230091547282","text":"/* Footnote class*/\n\n.fnote-list{\n/* color:blue;*/\n font-size:90%;\n}\n\n.fnote-pretty{\n display: block;\n  margin: 0.5em;\n  margin-right: auto;\n  width: 100% !important;\n  border-collapse: collapse;\n  padding: 15px 15px 15px 25px; /*left padding=25px*/\n  border-width:  0px;\n  border-style: solid;\n  border-left-width: 1px;\n  background-color:  rgb(255,248,220);\n  color: rgb(91,49,7);\n  line-height: 1.2em; \n  font-size:0.9em;\n}\n","title":"$:/plugins/kookma/refnotes/styles/showfnotes","tags":"$:/tags/Stylesheet","type":"text/css","modified":"20251230141323477"},
{"created":"20251229203721996","text":"\u003C$wikify name=bibtexEntryTiddler text=\u003C\u003Creference>> >\n\u003C$set name=currentTiddler tiddler=\u003C\u003CbibtexEntryTiddler>> field=title emptyValue=\"RefNotFound\">\n\u003C$reveal type=\"nomatch\" default=\"RefNotFound\" text=\u003C\u003CcurrentTiddler>> >\n\u003Cli>\u003C$link to=\u003C\u003CbibtexEntryTiddler>>>\u003C\u003Cshow-authors-in-references>>\u003C/$link> (\u003C$text text={{{ [{!!bibtex-year}!is[blank]] :else[[n.d.]] }}}/>). \u003C$text  text={{{ [{!!bibtex-title}] }}} />. \u003Cspan style=\"font-style:italic\">\u003C$view field=\"bibtex-journal\"/>\u003C/span>. \u003C$view field=\"bibtex-volume\"/>. \u003C$view field=\"bibtex-pages\"/>. \u003Ca href={{{[\u003CcurrentTiddler>get[bibtex-doi]!prefix[https://doi.org/]addprefix[https://doi.org/]else{!!bibtex-doi}]}}} target=_blank>\u003C$view field=\"bibtex-doi\"/>\u003C/a>\u003C/li>\n\u003C/$reveal>\n\u003C$reveal type=\"match\" default=\"RefNotFound\" text=\u003C\u003CcurrentTiddler>> >\n\u003Cli>Reference \u003Cb>\u003C$text text=\u003C\u003Creference>>/>\u003C/b> NOT FOUND. Check your input.\u003C/li>\n\u003C/$reveal>\n\u003C/$set>\u003C/$wikify>\n\n\u003C!-- APA 7 \nAuthor. (Year). Title [Translated Title] [Type of Article] [Reviewed Item]|. Journal|, Volume|(Issue)|, Pages|, Article Number|.| `https://doi.org/`DOI (Reprint Edition) (Original Publication) (Errata)\n-->","title":"$:/plugins/kookma/refnotes/templates/reflist/apa/article","code-body":"yes","list":"article","tags":"$:/tags/Refnotes/ReflistTemplate","type":"text/vnd.tiddlywiki","modified":"20251229205246722"},
{"created":"20251229202923059","text":"\u003C$wikify name=bibtexEntryTiddler text=\u003C\u003Creference>> >\n\u003C$set name=currentTiddler tiddler=\u003C\u003CbibtexEntryTiddler>> field=\"title\" emptyValue=\"RefNotFound\">\n\u003C$reveal type=\"nomatch\" default=\"RefNotFound\" text=\u003C\u003CcurrentTiddler>> >\n\u003Cli>\u003C$link to=\u003C\u003CbibtexEntryTiddler>>>\u003C\u003Cshow-authors-in-references>>\u003C/$link> (\u003C$text text={{{ [{!!bibtex-year}!is[blank]] :else[[n.d.]] }}}/>). \u003C$text  text={{{ [{!!bibtex-title}lowercase[]sentencecase[]] }}} />.\u003C/li>\n\u003C/$reveal>\n\u003C$reveal type=\"match\" default=\"RefNotFound\" text=\u003C\u003CcurrentTiddler>> >\n\u003Cli>Reference \u003Cb>\u003C$text text=\u003C\u003Creference>>/>\u003C/b> NOT FOUND. Check your input.\u003C/li>\n\u003C/$reveal>\n\u003C/$set>\u003C/$wikify>","title":"$:/plugins/kookma/refnotes/templates/reflist/apa/default","code-body":"yes","tags":"$:/tags/Refnotes/ReflistTemplate","type":"text/vnd.tiddlywiki","modified":"20251229203144362"},
{"created":"20260126120423614","text":"\\import [[$:/plugins/kookma/refnotes/macros/search-ui]]\n\n\\define dispEntry()\n\u003C$link/>\n\u003C$macrocall $name=stretchText text=\"\"\"\n\u003C$view field=\"bibtex-author\"/>. (\u003C$view field=\"bibtex-year\"/>). \u003C$view field=\"bibtex-title\"/>.\"\"\" />\n\\end\n\n\n\\define searchFilter() [has[bibtex-title]search:$(sField)$[$(sTerm)$]]\n\n\\define bibLibrary()\n\\import [[$:/plugins/kookma/refnotes/macros/stretch-text]]\n\u003C$vars sField={{{[\u003CsearchTid>get[field]] ~[[bibtex-author]]}}} sTerm={{{[\u003CsearchTid>get[text]]}}}>\n\n\u003C!-- show hide entry details -->\n\u003Cdiv class=\"tc-search refnotes-library\" style=\"margin:10px 0 0 20px;\">\nShow and Hide Details: &nbsp;\n\u003C$button class=\"tc-btn-invisible\" tooltip=\"show item details\">{{$:/core/images/down-arrow}}\n\u003C$list filter=\"[subfilter\u003CsearchFilter>]\">\n\u003C$action-setfield $tiddler=\u003C\u003CtmpTidDetails>> text=show />\n\u003C/$list>\n\u003C/$button>\n\u003C$button class=\"tc-btn-invisible\" tooltip=\"hide item details\">{{$:/core/images/up-arrow}}\n\u003C$list filter=\"[subfilter\u003CsearchFilter>]\">\n\u003C$action-deletetiddler $tiddler=\u003C\u003CtmpTidDetails>> />\n\u003C/$list>\n\u003C/$button>\n\u003C/div>\n\n\u003C!-- show the library data -->\n\u003Col>\n\u003C$list filter=\"[subfilter\u003CsearchFilter>]\">\n\u003Cli>\u003C\u003CdispEntry>>\u003C/li>\n\u003C/$list>\n\u003C/ol>\n\u003C/$vars>\n\\end\n\n\u003C!-- interface -->\n\u003Cdiv style=\"margin-bottom:8px;\">\n\u003C\u003Cprocess-entries \"Process New Entries\">>\n{{$:/plugins/kookma/refnotes/ui/dropzone}}\n\u003C/div>\n\n\u003C!-- make this optional\n[[Bibliography Table]]\n-->\n\n\u003C\u003CsearchUi>>\n\n\u003C\u003CbibLibrary>>\n\n\n\n","title":"$:/plugins/kookma/refnotes/ui/bibtexlibrary","caption":"Bibliography","tags":"","type":"text/vnd.tiddlywiki","modified":"20260126120426017"},
{"title":"$:/plugins/kookma/shiraz","version":"3.0.8","stability":"STABILITY_1_EXPERIMENTAL","name":"Shiraz","description":"Extended markups, tables, images, styles, and procedures","author":"Mohammad Rahmani","source":"https://github.com/kookma/TW-Shiraz","list":"readme license history","plugin-priority":"","parent-plugin":"","dependents":"","plugin-type":"plugin","core-version":">=5.3.5","packaged-by":"Gatha on 9th May 2025, 18:32:36","type":"application/json","text":"{\"tiddlers\":{\"$:/plugins/kookma/shiraz/breadcrumbs/historylist\":{\"title\":\"$:/plugins/kookma/shiraz/breadcrumbs/historylist\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003Cnav aria-label=\\\"breadcrumb\\\" style=\\\"font-size:smaller;\\\">\\n  \u003Col class=\\\"breadcrumb\\\">\\n\u003C$list filter=\\\"[{$:/HistoryList}jsonindexes[]] :map[{$:/HistoryList}jsonget\u003CcurrentTiddler>,[title]] :and[unique[]is[tiddler]]\\\" variable=item>\\n\u003C$list filter=\\\"[\u003CcurrentTiddler>match\u003Citem>]\\\" emptyMessage='\u003Cli class=\\\"breadcrumb-item\\\">\u003C$link to=\u003C\u003Citem>>/>\u003C/li>'>\\n\u003Cli class=\\\"breadcrumb-item active\\\" aria-current=\\\"page\\\">\u003C$text text=\u003C\u003CcurrentTiddler>>/>\u003C/li>\\n\u003C/$list>\\n\u003C/$list>\\n  \u003C/ol>\\n\u003C/nav>\"},\"$:/plugins/kookma/shiraz/breadcrumbs/storylist\":{\"title\":\"$:/plugins/kookma/shiraz/breadcrumbs/storylist\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003Cnav aria-label=\\\"breadcrumb\\\" style=\\\"font-size:smaller;\\\">\\n\u003Col class=\\\"breadcrumb\\\">\\n\u003C$list filter=\\\"[list[$:/StoryList]]\\\" variable=item>\\n\u003C$list filter=\\\"[\u003CcurrentTiddler>match\u003Citem>]\\\" emptyMessage='\u003Cli class=\\\"breadcrumb-item\\\">\u003C$link to=\u003C\u003Citem>>/>\u003C/li>'>\\n\u003Cli class=\\\"breadcrumb-item active\\\" aria-current=\\\"page\\\">\u003C$text text=\u003C\u003CcurrentTiddler>>/>\u003C/li>\\n\u003C/$list>\\n\u003C/$list>\\n\u003C/ol>\\n\u003C/nav>\"},\"$:/plugins/kookma/shiraz/breadcrumbs/viewtemplate\":{\"title\":\"$:/plugins/kookma/shiraz/breadcrumbs/viewtemplate\",\"list-after\":\"\",\"tags\":\"$:/tags/ViewTemplate\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003C%if [[$:/config/Shiraz]getindex[breadcrumbs-enabled]match[yes]] %>\\n\u003Cdiv data-bs-theme=\u003C\u003Ccolor-scheme>>  class=\\\"px-2 text-light-emphasis bg-light-subtle border border-light-subtle rounded-1\\\">\\n\u003C$transclude $tiddler={{{ [[$:/config/Shiraz]getindex[breadcrumbs-type]else[$:/plugins/kookma/shiraz/breadcrumbs/historylist]] }}} $mode=block/>\\n\u003Cdiv class=\\\"tc-page-controls\\\" style=\\\"font-size:small;\\\">\\n{{$:/core/ui/Buttons/home}}{{$:/core/ui/Buttons/close-others}}{{$:/core/ui/Buttons/close-all}}\\n\u003C/div>\\n\u003C/div>\\n\u003C%endif%>\"},\"$:/language/Buttons/Shiraz/SwitchPalette/Caption\":{\"title\":\"$:/language/Buttons/Shiraz/SwitchPalette/Caption\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"Switch light/warm/dark color palette\"},\"$:/language/Buttons/Shiraz/SwitchPalette/Hint\":{\"title\":\"$:/language/Buttons/Shiraz/SwitchPalette/Hint\",\"tags\":\"\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"switch light/warm/dark color palette\"},\"$:/plugins/kookma/shiraz/history\":{\"title\":\"$:/plugins/kookma/shiraz/history\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"Full change log:  [[https://kookma.github.io/TW-Shiraz/#ChangeLog]]\\n\\n* ''3.0.0'' -- 2024.07.12 -- new Shiraz based on TiddlyWiki 5.3.5 and Bootstrap 5.33\\n\\n---\\n''NOTE'': Shiraz 3.0.0 is a significant breakthrough and is not totally backward compatible. It uses Bootstrap 5.3.3, and TiddlyWiki 5.3.5 new features which is not found in earlier TiddlyWiki. It also uses new procedures with modified header.\\n\\n---\\n\\n* ''2.9.5'' -- 2024.06.05 -- minor bug fixes. Reverted to work with TW 5.2.7+\\n* ''2.9.4'' -- 2024.05.31 -- update to use some new features of 5.3.3\\n* ''2.7.1'' -- 2022.12.17 -- update to Tiddlywiki 5.2.4, few bug fixes\\n* ''2.6.9'' -- 2022.10.17 -- improved Node Explorer, and task Explorer\\n* ''2.6.1'' -- 2022.09.27 -- new subplug Formatter, better task manager\\n* ''2.5.0'' -- 2022.08.02 -- new data block, updated to Tiddlywiki 5.2.3\\n* ''2.4.4'' -- 2021.09.19 -- added css class for tbl-expand customization\\n* ''2.4.2'' -- 2021.09.10 -- quick table with bunch of column formatting\\n* ''2.3.3'' -- 2021.05.20 -- small bug fixes in switch palette\\n* ''2.3.1'' -- 2021.05.19 -- tbl-linktype template to be used for generating node-explorer\\n* ''2.3.0'' -- 2021.05.10 -- switch palette for dim/dark and light palette selection\\n* ''2.2.2'' -- 2021.04.22 -- several issues fixed for pagination, notebook and image classes\\n* ''2.2.0'' -- 2021.02.26 -- updated to TW 5.1.23 and pagination added to dynamic tables\\n* ''2.1.1'' -- 2020.03.25 -- slider macro with initial status\\n* ''2.1.0'' -- 2020.03.23 -- stable release on TW-5.1.22pre\\n* ''1.0.0'' -- 2018.10.05 -- first public release\\n\"},\"$:/plugins/kookma/shiraz/icon\":{\"title\":\"$:/plugins/kookma/shiraz/icon\",\"text\":\"\u003Csvg xmlns=\\\"http://www.w3.org/2000/svg\\\" xml:space=\\\"preserve\\\" style=\\\"enable-background:new 0 0 128 128\\\" viewBox=\\\"0 0 128 128\\\" width=\\\"32px\\\" height=\\\"32px\\\">\u003Cpath d=\\\"M111.81 64.6s11.48-1.47 11.83-.66c.56 1.31-7.79 10.14-7.79 10.14l-4.04-9.48z\\\" style=\\\"fill:#5c6063\\\"/>\u003Cpath d=\\\"M70.05 68.08s6.01-7.13 17.18-9.57S112 60.57 115 68.17c3.24 8.21 2.07 17.42-3.38 24.03-5.73 6.95-14.55 14.36-29.38 13.23-11.77-.89-15.49-5.82-15.49-5.82l3.3-31.53z\\\" style=\\\"fill:#fcd41e\\\"/>\u003Cpath d=\\\"M99.05 76.34c2.94 7.73 3.57 15.39 3.47 19.24-.09 3.85-.38 5.16-.38 5.16s3.94-2.53 6.38-4.88c2.11-2.03 3.66-4.22 3.66-4.22s1.03-11.17-3-20.55-12.38-13.1-12.38-13.1-2.86-.61-6.1-.23c-3.2.37-7.13 1.78-7.13 1.78s10.69 4.22 15.48 16.8zM74.83 63.85s6.85 3.66 11.26 14.08c4.69 11.07 3.75 27.41 3.75 27.41s-2.91.45-6.1.38c-2.06-.05-5.73-.8-5.73-.8S79.06

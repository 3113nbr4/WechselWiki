{"created":"20260201111648545","text":"\u003C\u003Calert primary \"Dieser Eintrag betrifft die Hormonersatztherapie mit [[synthetischen Hormonen|Synthetische Hormone]]\" class:\"leftbar border-primary\">>\n\nNicht immer ist eine Messung des Östradiolspiegels bei der Hormonersatztherapie notwendig. Empfohlen wird eine Messung z.B.\n\n* bei Verdacht auf Über- oder Unterdosierungen (diese sind ohne Hormonbestimmung manchmal nicht eindeutig voneinander zu unterscheiden)\n* zur Beruhigung einer Patientin, die sich unterdosiert (oder seltener überdosiert) fühlt.\n\n!!!! Anhaltspunkte zur Beurteilung des Östradiolspiegel bei der Hormonersatzbehandlung:\n\n* Als Richtwert für eine passende Dosierung gilt eine Östradiolkonzentration von 40-100 ng/l (= 147-367 pmol/l) bei Östrogeneinnahme am Abend vor dem (morgendlichen) Ambulanzbesuch.\n* Auf Grund der unterschiedlichen Ergebnisse verschiedener Labortests für Östradiol wird empfohlen, die Bestimmung immer im selben Labor durchführen zu lassen\u003Cbr>(Speroff, Clinical Gynecologic endocrinology and infertility, 2005).\n* Sind Beschwerdebilder unter Hormonersatztherapie nicht zuzuordnen, spricht ein Östradiolspiegel unter 35 ng/l (= 128 pmol/l) für Folgen eines Östrogenmangels, während Spiegel über 100 ng/l (= 367 pmol/l) für Überdosierungserscheinungen sprechen\u003Cbr>(Ortmann, in: Klinische Endokrinologie für Frauenärzte, 2005)\n* Sind die Östradiolspiegel 2-3h nach der Tabletten-Einnahme unter 50 ng/l (= 184 pmol/l), spricht dies für eine ungenügende Aufnahme über den Darm.\u003Cbr>(Ortmann, in: Klinische Endokrinologie für Frauenärzte, 2005)\n\n\nDie Beurteilung des gemessenen Östradiol-Wertes ist aber gar nicht einfach. Man muss dabei berücksichtigen:\n\n!!!! Welches Präparat wurde verwendet und mit welcher Methode hat man es gemessen?\n\nManche Tests messen ausschließlich Östradiol, andere erfassen auch ähnliche Östrogene. Bei Einnahme von Pferde-Östrogenen wird eine Messmethode, die nur Östradiol bestimmt, die Wirkung der eingenommenen Östrogene unterschätzen (gewissermaßen einen zu geringen Spiegel anzeigen). Nimmt eine Frau nicht Östradiol sondern Östriol ist ein Östradiolmessung völlig sinnlos.\n\n!!!! Wie wurde das Östradiol verabreicht und wann war die letzte Verabreichung?\nSchluckt man das Östradiol-Tabletten dann kann man den höchsten Östradiolspiegel nach ca. 2-3h beobachten. Nachher sinkt der Spiegel wieder ab.\u003Cspan style=\"display:none\">\u003C\u003Cfnote \"Hübl, Wolfgang Prof. Dr. med.: Östradiol. Online unter: https://med4you.at/laborbefunde/lbef3/lbef_oestrogene_oestradiol_estradiol.htm#Kontrolle_Hormonersatz.\n\">>\u003C/span>\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"[[Tests + Labor]]","title":"Östradiolbestimmung zur Kontrolle der Hormonersatztherapie","modified":"20260215100552681","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20251225133738276","text":"Östrogen meint eigentlich eine Gruppe von Hormonen, die Östrogene. Sie sind die wichtigsten weiblichen Sexualhormone. Sie werden hauptsächlich in den Eierstöcken (Ovarien), in Follikeln und im Gelbkörper, zu einem geringeren Teil auch in der Nebennierenrinde, produziert. Zudem wird ein gewisser Teil des Testosterons im Fettgewebe durch ein Enzym, die sogenannte Aromatase, in Östrogene umgewandelt. Die Konzentration der Estrogene ändert sich erheblich im Verlauf des weiblichen Zyklus. Gesteuert wird die Produktion von der Hypophyse über die Steuerungshormone (&rarr; siehe [[FSH|Follikelstimulierendes Hormon (FSH)]], [[LH|Luteinisierendes Hormon (LH)]]). Nach der Menopause fällt die Östrogensynthese im weiblichen Körper stark ab. \n\nEine Verminderung des Östrogenspiegels im Blut (z.B. nach der Menopause) kann zu Osteoporose (Knochenschwund) führen. Zudem erhöhen Östrogene im Hirn die Sensibilität für das Hören; ein verminderter Östrogenspiegel verschlechtert dagegen das Hörvermögen. Das Hormon ist essentiell für das Speichern von Gedächtnisinhalten, von Geräuschen und Sprache. Östrogene haben auch eine stimulierende Wirkung auf das Immunsystem, weswegen Östrogentherapien gelegentlich als Nebenwirkung die Aktivierung latenter Autoimmunerkrankungen haben. \u003Cspan style=\"display:none\">\u003C\u003Cfnote \"Wikipedia-Autoren (2025): Estrogene – Wikipedia. In: Wikipedia. Online unter: https://de.wikipedia.org/wiki/Estrogene. (Abgerufen: 30. Dezember 2025, 11:08 UTC)\"\n>>\u003C\u003Cfnote \"Altmeyer, Peter Prof Dr. med. (2020): Östrogene - Altmeyers Enzyklopädie - Fachbereich Pharmakologie/Toxikologie. Online unter: https://www.altmeyers.org/de/pharmakologie-toxikologie/ostrogene-117922.\n\">>\u003C\u003Cfnote \"Hübl, Wolfgang Prof. Dr. med.: Östradiol. Online unter: https://med4you.at/laborbefunde/lbef3/lbef_oestrogene_oestradiol_estradiol.htm#Kontrolle_Hormonersatz.\n\">>\u003C/span>\n\n{{{ [tag[Östrogen]sort[title]] }}}\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>\n\n\u003C!-- \n!!!! Quellen\n\n\u003C\u003Cshowfnotes>> -->","tags":"Hormone","title":"Östrogen","modified":"20260202162157374","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260103164159328","text":"Die «Östrogendominanz» beschreibt den Zustand, in dem Östrogen im Vergleich zum Progesteron im Überfluss vorhanden ist. Dazu kommt es entweder \n\n* durch eine übermässige Produktion von [[Östrogen]] oder \n* durch eine unzureichende Bildung von [[Progesteron]]\n \n\u003C!-- Es handelt sich also nicht zwingend um eine absolute Erhöhung der Östrogenkonzentration. Möglich ist auch ein Missverhältnis zwischen den beiden Hormonen.\n-->\nWenn in den Wechseljahren zuerst das Progesteron sinkt, bei noch länger relativ stabil bleibenden Östrogenspiegel, kommt es daher zu einer relativen Östrogendominanz. Es entsteht ein Ungleichgewicht zwischen den Hormonen, das zu zahlreichen Symptomen führen kann:\n\n* gestörter Menstruationszyklus\n* verstärktes PMS\n* Müdigkeit\n* Stimmungsschwankungen, Depressionen\n* Gereiztheit, Ungeduld\n* Schlaflosigkeit\n* verringerte Libido\n* gutartige Brustveränderungen\n* Haarausfall\n* “Brain Fog” und Gedächtnisprobleme\n* Wassereinlagerungen und Blähungen\n\n\u003C!-- \nZyklus & Schmerzen\n\n* Deine Periode ist stärker, schmerzhafter oder dauert länger als früher\n* PMS wird zunehmend belastend\n* Deine Brüste spannen oder sind empfindlicher\n* Du hast häufiger Unterleibsschmerzen\n* Bei dir wurden Zysten oder Myome festgestellt\n\nStimmung & Energie\n\n* Du bist oft gereizt oder empfindlich\n* Deine Stimmung schwankt ohne erkennbaren Auslöser\n* Du fühlst dich dauerhaft müde oder erschöpft\n* Dir ist häufiger schwindelig\n* Du bist vergesslicher als früher\n* Du leidest unter depressiven Verstimmungen\n* Gewicht, Haut & Verdauung\n\n* Du nimmst zu, obwohl du dich nicht anders ernährst\n* Du hast Wassereinlagerungen oder fühlst dich aufgequollen\n* Deine Haut wird unreiner oder neigt zu Akne\n* Nach dem Essen hast du ein Völlegefühl oder Blähungen\n* Deine Arme oder Beine kribbeln oder fühlen sich taub an\n* Deine Lust auf Sex nimmt spürbar ab\n\n-->\n\n{{Test auf Östrogendominanz}}","tags":"Östrogen","title":"Östrogendominanz","modified":"20260203070530036","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260126135905096","text":"//Unregelmäßige Menstruation//\n\nVerstärkter Hormonrückgang \n(Progesteron sinkt weiter, Östrogen\nnimmt nun auch ab)\u003Cbr>\nSymptome nehmen zu und neue können\nhinzukommen, wie:\n\n* Hitzewallungen\n* Gelenkschmerzen\n* Gewichtszunahme\n* Haaraustall\n* Haut- und Schleimhautveränderungen\n* Psychische Leiden\n* Scheidentrockenheit und Libidoverlust\n* Schlafstörungen, Nachtschweiss\n* Schwindel\n* Antriebslosigkeit, Müdigkeit","tags":"Phasen","title":"Perimenopause","modified":"20260215095419895","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260126135927887","text":"//Keine Menstruation mehr//\n\nGewöhnlich zwischen dem 60. und 65. Lebensjahr\u003Cbr>\nÖstrogen- und Progesteronproduktion haben ihren Tiefpunkt erreicht, der Hormonspiegel pendelt sich\nauf niedrigem Niveau ein. \u003Cbr>\nDie Konzentration des Follikelstimulierenden Hormons ([[FSH|Follikelstimulierendes Hormon (FSH)]]) befindet sich dagegen auf konstant hohem Niveau.\n\nViele Beschwerden nehmen ab, neue können hinzukommen, wie:\n\n* trockene Haut und Schleimhäute\n* Erschlaffen von Vulva und Vagina\n* Absenkung des Beckenbodens\n* Abnahme der Muskulatur\n* Osteoporose\n* Haarwuchs im Gesicht\n","tags":"Phasen","title":"Postmenopause","modified":"20260215095355620","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260126135820316","text":"//Erste Phase der Wechseljahre//\n\nGewöhnlich um das 40. Lebensjahr\u003Cbr>\nErste Veränderungen im Hormonspiegel\n(Progesteron sinkt, Östrogen bleibt hoch)\u003Cbr>\nErste Symptome treten auf, wie:\n\n* Veränderungen in der Zykluslänge (Unregelmässigkeit) und Stärke der Blutungen\n* Zwischen- und Schmierblutungen\n* Brustspannen\n* Stimmungsschwankungen und Reizbarkeit\n* Kopfschmerzen oder Migräne\n* Wassereinlagerungen\n* Verdauungsprobleme","tags":"Phasen","title":"Prämenopause","modified":"20260215095301167","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20251225133916726","text":"Progesteron ist neben Östrogen das zweitwichtigste Geschlechtshormon im weiblichen Körper. Weil Progesteron vor allem im sogenannten [[Gelbkörper (Corpus luteum)|Der Gelbkörper]]  gebildet wird, nennt man es auch Gelbkörperhormon. Bei schwangeren Frauen wird Progesteron auch im Mutterkuchen (Plazenta) produziert, sowie zu kleinen Teilen in der Nebennierenrinde. \nAuch Männer produzieren geringe Mengen Progesteron - vor allem in den Hoden und der Nebennierenrinde. Dort ist es der Antagonist zum Testosteron, während es bei Frauen der Gegenspieler zum Östrogen ist.\n\n\n{{{ [tag[Progesteron]sort[title]] }}}\n","tags":"Hormone","title":"Progesteron","modified":"20260215095844177","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260103143853311","text":"Bis 10 Jahre vor der Menopause (letzte Blutung und die Zeit danach) können bereits Wechseljahressymptome auftreten, weil die Hormonspiegel langsam sinken. Die Spiegel von Östrogen und Progesteron sinken nicht gleichzeitig. Zuerst beginnt der Progesteronspiegel zu sinken, später auch der Östrogenspiegel.\n\nDurch den niedrigeren Progesteronspiegel bleibt zunächst nur manchmal ein Eisprung aus. Das verhindert noch nicht dauerhaft die Möglichkeit der Empfängnis. Kritisch ist nur, dass der Eisprung der Auslöser für die körpereigene Progesteronproduktion ist. Setzt er aus, wird also kurzfristig kein Hormon (=Progesteron) mehr produziert. Häuft sich das mit Fortschritt der Wechseljahre, entsteht ein Progesteronmangel. Da Progesteron der ausgleichende Gegenpart zum Östrogen ist, kommt es in der Perimenopause zu einem Ungleichgewicht (einer [[Östrogendominanz]]) mit entsprechenden Symptomen.\n\n[[Symptome bei Progesteronmangel]]","tags":"Progesteron","title":"Progesteron in den Wechseljahren","modified":"20260215094809715","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20251230085216751","text":"Progesteron hat eine atmungssteigernde Wirkung, die sich durch leichte Hyperventilation äussern kann. Durch die erhöhten Hormonwerte kann das ein Begleitsymptom bei Schwangerschaft sein und in den Wechseljahren bei Progesterongabe im Rahmen einer [[Hormonersatztherapie (HRT)]].\u003C\u003Cfnote \"Döring, G.K., Loeschcke, H.H. & Ochwadt, B. Weitere Untersuchungen über die Wirkung der Sexualhormone auf die Atmung. Pflügers Archiv 252, 216–230 (1950). https://doi.org/10.1007/BF00361677\">>\n\n\u003Ciframe width=\"560\" height=\"315\" src=\"https://www.youtube.com/embed/l7XwAs2R2Os?si=ng_D59pEmEz7u4f_\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen>\u003C/iframe>\u003Cbr>Dr. Christian Gersch: Weiblicher Zyklus und Atmung, drgersch.de\u003C\u003Cfnote \"Gersch, Dr. Christian: Weiblicher Zyklus und Atmung (Östrogen und Progesteron haben einen Einfluss auf CO2). Online unter: https://www.drgersch.de/wissensarchiv/hyperventilation/weiblicher-zyklus-atmung-hat-einen-einfluss-co2-atmung.\n\">>\n\n[[Erfahrung: Hyperventilation durch Progesteron]]\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>\n\n\n\n\n","tags":"Progesteron","title":"Progesteron und Hyperventilation","modified":"20260217140312257","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20251220140943645","text":"PubMed ist eine englischsprachige textbasierte Meta-Datenbank mit Referenzen auf medizinische Artikel bezogen auf den gesamten Bereich der Biomedizin der nationalen medizinischen Bibliothek der Vereinigten Staaten (National Library of Medicine, NLM). Jedem Eintrag in der PubMed ist eine PubMed-ID (PMID, englisch PubMed identifier) zugeordnet. PubMed bietet einen kostenfreien Zugang zu den Datenbanken MEDLINE, OLDMEDLINE (vor 1966) und PubMed Central (Volltexte).\n\nAls bibliografische Referenzdatenbank dokumentiert PubMed medizinische Artikel in Fachzeitschriften und enthält elektronische Verweise auf Volltextzeitschriften. Das Sachgebiet umfasst Medizin, Zahnmedizin, Veterinärmedizin, Pharmazie, öffentliches Gesundheitswesen, Psychologie, Biologie, Genetik, Biochemie, Zellbiologie, Biotechnologie, Biomedizin usw. Verzeichnet sind 5633 (Dezember 2016) biomedizinische Zeitschriften. Jährlich wächst PubMed um rund 500.000 Dokumente. Verschlagwortet wird nach Medical Subject Headings (MeSH). Der Nachweis biomedizinischer Literatur aus MEDLINE, wissenschaftlichen Zeitschriftenartikeln und Onlineliteratur umfasst mehr als 32 Millionen „Zitate“ (Stand 2021). \u003Cspan style=\"display:none\">\u003C\u003Cfnote \"Wikipedia-Autoren (2025): PubMed. In: Wikipedia. Online unter: https://de.wikipedia.org/w/index.php?title=PubMed&oldid=259792087.\n\">>, \u003C\u003Cfnote \"NIH National Institutes of Health: PubMed. In: PubMed. Online unter: https://pubmed.ncbi.nlm.nih.gov/ (kurz: https://pubmed.gov).\n\">>\u003C/span>\n\nPubMed ist Teil der [[National Library of Medicine|https://www.ncbi.nlm.nih.gov/search/]] die auch Bücher und Magazine enthält. \n\n{{{ [tag[PubMed]sort[title]] }}}\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>\n\n\n\n\u003C!-- \n\u003C\u003Cbibliography citedfilter:\"_\" furtherfilter:\"[tag[pubmed]]\">> -->\n","tags":"Publikationen","title":"PubMed","modified":"20260215102635973","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20251220213143927","text":"Viele Frauen erleben während der Wechseljahre eine tiefe, anhaltende Erschöpfung, die sich schwer in Worte fassen lässt. Die Müdigkeit in den Wechseljahren ist mehr als «nur ein bisschen müde sein». Viele Frauen beschreiben sie als bleierne Erschöpfung, die plötzlich da ist und einfach nicht mehr weggeht. Selbst nach acht Stunden Schlaf fühlen sie sich morgens, als hätte sie ein Bus überfahren.\n\nDiese Erschöpfung kann sich auf unterschiedliche Weise äußern:\n\n* morgens schwer aus dem Bett kommen\n* schon nach dem Duschen fühlen sie sich ausgelaugt – als hätten Sie einen Marathon hinter sich\n* Schlappheit und Antriebslosigkeit im Alltag\n* mangelndes Konzentrationsvermögen, der Kopf ist wie leer\n* alles nervt oder ist zuviel, sie sind gereizt, antriebslos, einfach nicht mehr sie selbst\n\n In erster Linie ist dafür die hormonelle Umstellung verantwortlich. Zusätzlich können weitere Faktoren diesen Zustand noch verschlimmern:\n\n* Schlafstörungen durch nächtliches Schwitzen, innere Unruhe, Grübeln \n* Schilddrüsenunterfunktion (häufig übersehen, aber typisch für Frauen 40+): Sie verlangsamt den Stoffwechsel und verursacht Antriebslosigkeit, Gewichtszunahme, Frieren. Zusätzlich kann die Umwandlungsfunktion von inaktivem T4 zu aktivem T3 in der Leber eingeschränkt sein. Damit steht dem Körper zu wenig aktives T3 zur Verfügung, was sich wie eine Schilddrüsenunterfunktion anfühlen kann.\n* Eisenmangel: Kommt oft nach starken Blutungen vor, oder bei wenig Fleisch und Hülsenfrüchten in der Ernährung\n* Vitamin-D-Mangel: Besonders im Winter oder bei wenig Sonnenlicht – geht oft mit Muskelschwäche einher\n* B-Vitamin-Mangel (bes. B12): Betroffen sind oft Veganerinnen oder Frauen mit Magen-Darm-Problemen\n* Stress und mentale Überlastung\n* Bewegungsmangel der die Durchblutung, die Sauerstoffzufuhr und damit das Energielevel senkt\n* Ungleichgewicht im Blutzucker: Zu viele schnelle Kohlenhydrate führen zu Heisshungerattacken, Energietiefs und Reizbarkeit \n\n[[Hormonersatztherapie (HRT)|Hormonersatztherapie (HRT)]]","tags":"Symptome","title":"Symptom: Müdigkeit","modified":"20260303092541935","caption":"Müdigkeit","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260103185236996","text":"Ein niedriger Progesteronspiegel verursacht unter anderem folgende Symptome:\n\n* Reizbarkeit\n* Ungeduld\n* Angstgefühle, Panikattacken\n* Stimmungsschwankungen\n* Kopfschmerzen\n* Leichte Hitzewallungen\n* Müdigkeit\n* Schweißausbrüche\n* Geschwollene Brüste\n* Dicker Bauch\n* Haarausfall\n* Atemnot, Kurzatmigkeit\n* Gewichtszunahme\n* Schmerzen bei der Periode\n* Kürzere Menstruationszyklen\n* Stärkere oder schwächere Menstruation\n* Teilweise lange Blutungsdauer\n* Zwischenblutungen\n* Schmierblutungen","tags":"Progesteron","title":"Symptome bei Progesteronmangel","modified":"20260215100153329","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260203070518618","text":"Auf eine Östrogendominanz kann man mittels Blutentnahme testen. Die Werte sollten immer in der zweiten Zyklushälfte gemessen werden, idealerweise 7 Tage nach dem Eisprung bzw. 7 Tage vor der nächsten Periode. Das Verhältnis zwischen Östradiol + Östron (=Gesamt-Östrogenspiegel)und Progesteron kann Aufschluss darüber geben, ob eine Östrogendominanz vorliegt oder nicht. Dabei werden die gemessenen Blutwerte auf eine Einheit gebracht, und dann der Östradiolwert durch den Progesteronwert geteilt. Ist das Ergebnis größer als 1, liegt eine Östrogendominanz vor und das Verhältnis wird in x:1 angegeben wobei x das Ergebnis der Division wäre. Ist das Ergebnis kleiner als 1, liegt keine Östrogendominanz vor und das Verhältnis wird in 1:x angegeben, wobei x das Ergebnis aus einer Division von 1 durch das Ergebnis der ersten Division ist.\u003Cspan style=\"display:none\">\n\u003C\u003Cfnote \"von Kunhardt, Lukas (2023): Östrogendominanz: Definition & Diagnose. In: netDoktor. Online unter: https://www.netdoktor.de/laborwerte/oestrogen/oestrogendominanz/. \">>, \u003C\u003Cfnote \"Weirich, Brit (2025): Östrogendominanz: Überschuss weiblicher Geschlechtshormone. In: Onmeda. Online unter: https://www.onmeda.de/krankheiten/oestrogendominanz-id217367/.\">>\u003C/span>\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","modified":"20260203132913684","title":"Test auf Östrogendominanz","tags":"[[Tests + Labor]]","type":"","caption":"Östrogendominanz testen","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20251225135812899","text":"Das Hormon Testosteron beeinflusst im weiblichen Körper  Libido, Energie, Stoffwechsel, Knochen- und Muskelgesundheit und kann bei Ungleichgewicht bzw. Mangel (Menopause) sowohl körperliche als auch psychische Symptome hervorrufen.\n\n{{{ [tag[Testosteron]sort[title]] }}}","tags":"Hormone","title":"Testosteron","modified":"20260215100443040","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260123155244675","text":"Die Gabe von Testosteron kann das sexuelle Wohlbefinden postmenopausaler Frauen signifikant verbessern. Besonders effektiv scheinen dabei nicht-orale Applikationsformen wie transdermale Gele oder Pflaster zu sein, da sie den Hormonspiegel physiologischer regulieren. \n\nInternationale Leitlinien empfehlen eine Testosterontherapie nur für Personen mit hypoaktivem sexuellem Verlangen (HSDD), sofern die Werte im physiologischen Bereich liegen. Idealerweise erfolgt die Gabe als Ergänzung zu einer bestehenden Hormonersatztherapie (HRT), wobei die transdermale Verabreichung bevorzugt wird.\n\nDie Wirkung tritt in der Regel nach etwa 8 bis 12 Wochen ein, spätestens aber bis zur 16. Woche. Sollte sich innerhalb von sechs Monaten keine spürbare Besserung einstellen, wird ein Abbruch der Therapie empfohlen. \n\nHinsichtlich der langfristigen Sicherheit bestehen derzeit noch Wissenslücken. Zu den potenziellen Risiken zählen kardiovaskuläre Komplikationen, ein erhöhtes Brustkrebsrisiko sowie unerwünschte virilisierende Effekte wie tiefer werdende Stimme oder vermehrter Haarwuchs. Da bislang keine zugelassenen Präparate speziell für Frauen existieren, erfolgt die Anwendung in der Regel off-label – also außerhalb der regulären Zulassung.\u003Cspan style=\"display:none\">\u003C\u003Cfnote \"Avoxa-Mediengruppe Deutscher Apotheker GmbH: Nach den Wechseljahren: Testosteron für Frauen empfehlenswert. In: Pharmazeutische Zeitung online. Online unter: https://www.pharmazeutische-zeitung.de/testosteron-fuer-frauen-empfehlenswert/.\">>, \u003C\u003Cfnote \"Testosterontherapie bei Frauen in den Wechseljahren – GPnotebook. Online unter: https://gpnotebook.com/de/pages/gynakologie/testosterontherapie-bei-frauen-in-den-wechseljahren.\">>\u003C/span>\n\n!!!! Quellen\n\n\u003C\u003Cshowfnotes>>\n","tags":"Testosteron","title":"Therapie von Testosteronmangel","modified":"20260124194144157"},

{"created":"20260216090847035","text":"Je nach Leidensdruck, Risikofaktoren, Stärke und Ausprägung der Wechseljahresbeschwerden kann der Einsatz einer Hormonersatztherapie (HRT) sinnvoll sein. Diese wirkt sich unter anderem positiv auf vasomotorische Beschwerden wie nächtliche Hitzewallungen und häufiges Erwachen aus. Eingesetzt wird in der Regel eine Kombination aus Östrogen und Gestagen. Bei der [[HRT|Hormonersatztherapie (HRT)]] mit [[bioidentischen Hormonen|Bioidentische Hormone]] hat das Progesteron (=Gestagen)  einen ausgeprägt sedativen und schlaffördernden Effekt und kann oral wie vaginal angewendet werden.\n\n[[Progesteron]]","tags":"Schlafstörungen","title":"Therapie: Progesteron","modified":"20260216092159504","caption":"Progesteron","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260227103216878","text":"Tibolon ist ein Abkömmling des Hormons Testosteron und wird innerhalb einer Hormonersatztherapie zur Behandlung von Estrogenmangelsymptomen bei Frauen in der Menopause angewendet. ''Tibolon behandelt postmenopausale Symptome, ohne jedoch das Endometriumgewebe zu stimulieren.''\u003C\u003Cfnote \"Online, Gelbe Liste: Tibolon - Anwendung, Wirkung, Nebenwirkungen | Gelbe Liste. In: Gelbe Liste Online. Online unter: https://www.gelbe-liste.de/wirkstoffe/Tibolon_28427.\">>\n\u003C\u003Cfnote \"Müller, Katharina/Römer, Thomas (2025): Hormonersatztherapie nach Endometriose. In: Journal für Gynäkologische Endokrinologie/Schweiz 28, S. 14–20.\n\">>\n\n[[Hormonersatztherapie nach Endometriose]]\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"Medikamente","title":"Tibolon","modified":"20260227104110150","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20251220204401421","text":"Nach meiner eigenen Erfahrung mit Progesteron Leman und weiteren Recherchen ist in der Hülle von Progesteron-Kapseln oft Titandioxid (E171) enthalten. \n\nTitandioxid ist das Oxid des Metalls Titan, das meist als weisses Pulver vorliegt, das in Wasser praktisch unlöslich ist. Es zeichnet sich durch seine hohe Leuchtkraft aus und wird hauptsächlich im Bereich Beschichtungen/Lacke/Anstriche, gefolgt von Kunststoffeinfärbungen und Laminatpapieren verwendet, ist aber auch in Kosmetika (z.B. Zahnpasta) und vielen Sonnenschutzmitteln als mineralischer UV-Filter enthalten und wird als pharmazeutischer Hilfsstoff für Tabletten und Kapseln genutzt. \n\nBezüglich der Einnahme als Lebensmittelzusatzstoff gibt es Bedenken, da Gesundheitsrisiken nicht ausgeschlossen werden können. Im Raum stehen chronische Entzündungen, Krebserkrankungen und eine mögliche negative Wirkung auf das menschliche Erbgut. Im Jahr 2021 gelangte die Europäische Behörde für Lebensmittelsicherheit (EFSA) zum Schluss, dass Titandioxid deshalb nicht mehr als Lebensmittelzusatzstoff geeignet ist.\u003C\u003Cfnote \"Europäische Behörde für Lebensmittelsicherheit (2021): Titandioxid: E171 gilt bei Verwendung als Lebensmittelzusatzstoff nicht mehr als sicher | EFSA. Online unter: https://www.efsa.europa.eu/de/news/titanium-dioxide-e171-no-longer-considered-safe-when-used-food-additive.\n\">> Seit dem Herbst 2022 gilt dies auch für die Schweiz.\n\nDie Europäische Arzneimittelagentur (EMA) beziffert die Anzahl an titandioxidhaltigen Arzneimitteln in Europa auf 91.000. Für Patienten, vor allem chronisch Kranke die (mehrmals) täglich betroffene Präparate anwenden müssen, kann das beunruhigend sein. Zur Sorge trägt ausserdem bei, dass die EFSA 2021 in ihrem Gutachten darauf hinwies, dass sich TiO2-Partikel im Körper anreichern können. Es lasse sich keine sichere Menge für die tägliche Aufnahme definieren, hieß es dort.\u003C\u003Cfnote \"Avoxa-Mediengruppe Deutscher Apotheker GmbH: Titandioxid: In Arzneimitteln schwer zu ersetzen. In: Pharmazeutische Zeitung online. Online unter: https://www.pharmazeutische-zeitung.de/in-arzneimitteln-schwer-zu-ersetzen-137447/.\"\n>>\n\n\nWer das nicht auf sich nehmen möchte und nach Alternativen sucht, findet im Internet Apotheken, die Progesteron und andere Medikamente individuell in Kapseln abfüllen, deren Zusammensetzung frei von Titandioxid ist. \n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>\n","tags":"[[Eigene Erfahrung]] [[Bioidentische Hormone]]","title":"Titandioxid (E171) in Progesteron-Kapseln","modified":"20260216194701977","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20251220151320223","text":"Die Traubensilberkerze ist eine in Nordamerika und Kanada beheimatete Pflanze. Ihr wissenschaftlicher Name lautet //Cimicifuga racemosa.//\n\nBei der Traubensilberkerze geht es medizinisch vor allem um die Wurzel. Sie enthält sogenannte Triterpenglykoside, die ähnliche Wirkungen wie Östrogene entfalten. Der Effekt ist nachgewiesen, tritt aber erst nach zwei bis vier Wochen ein und setzt eine regelmässige Einnahme voraus. Das gilt übrigens für fast alle pflanzlichen Arzneistoffe. Sie brauchen Zeit, um zu wirken, dann aber ist der Effekt umso nachhaltiger.\n\nWirkweise\n\nMan geht davon aus, dass der Extrakt aus dem Wurzelstock der Traubensilberkerze (Cimicifuga racemosa) ein sog. Selektiver-Östrogen-Rezeptor-Modulator (SERM) ist. Das bedeutet, dass die Inhaltsstoffe der Pflanze ihre östrogenähnlichen Effekte zwar wie gewünscht auf Knochen, Herz, Psyche, Scheide und Harnblase haben, jedoch nicht auf das Gewebe der Brust und der Gebärmutter. Denn an letzteren beiden können Östrogene möglicherweise das Risiko für die Entwicklung bösartiger Geschwulste (Krebserkrankungen) erhöhen.\n\nBei Frauen in den Wechseljahren kann das Phytotherapeutikum zudem die Hitzewallungen lindern. Insbesondere die Wirkung auf Hitzewallungen ist unter Experten aber umstritten, weil einige Studien keinen derartigen Effekt zeigen konnten.\n\nDie Traubensilberkerze scheint auch dem androgenetischen Haarausfall bei Frauen entgegenzuwirken. Dies zumindest hat eine Studie an der Universitätsklinik Bochum ergeben. Nach sechsmonatiger Behandlung mit dem Pflanzenwirkstoff nahmen sowohl Haarwachstum als auch Haardicke zu. Zurückgeführt wird dieser Effekt auf die Östrogen-ähnliche Wirkung der Traubensilberkerze. Zum Hintergrund: Das schüttere Haar nach den Wechseljahren wird auf einen Mangel am weiblichen Geschlechtshormon Östrogen zurückgeführt.\n\nEinnahme\n\nEmpfohlen wird eine Tagesdosis von 40–80 mg. Wie bei den meisten pflanzlichen Arzneimitteln setzt die Wirkung nicht sofort ein, die positiven Effekte zeigen sich in der Regel vier bis sechs Wochen nach der ersten Einnahme. __Trauben­silberkerze soll nicht zusammen mit Östrogenen eingenommen werden.__\n\n\nWechselwirkungen und Gegenanzeigen\n\nProdukte mit Traubensilberkerze können den Blutgerinnungswert (INR-Wert) im Rahmen einer gerinnungshemmenden Behandlung (z.B. mit Marcumar oder ähnlichen Medikamenten) beeinflussen. Frauen, die dennoch ein Präparat mit diesem Wirkstoff einnehmen möchten, sollten den INR-Wert zur Sicherheit mindestens einmal wöchentlich kontrollieren, um die Dosis des Gerinnungshemmers gegebenenfalls anzupassen.\n\nFrauen mit hormonempfindlichem Brustkrebs (=Hormonrezeptor-positives Mammakarzinom) dürfen Cimicifuga-Präparate nicht einnehmen.\n\nFrauen mit Leberfunktionsstörungen sollen Silbertraubenkerze mit Bedacht einnehmen und die Einnahme beenden, sobald Symptome einer Leberstörung auftreten (Müdigkeit, Appetitlosigkeit, Gerbfärbung der Haut/Augen oder massive Ober­bauchbeschwerden mit Übelkeit und Erbrechen und dunkel gefärbtem Urin). Dann ist sofort ärztlicher Rat einzuholen, ebenso wenn Vaginalblutungen auftreten.\n\nNebenwirkungen\n\nEs wurden lebertoxische Reaktionen (Hepatitis, Gelbsucht, Störungen des Leber­funktionstests) beobachtet (Häufigkeit nicht bekannt). Auch traten vereinzelt Haut­reaktionen, Gesichtsschwellungen und gastro­intestinale Beschwerden wie dyspep­tische Beschwerden und Durchfall auf.\u003C\u003Cfnote \"Zorn, Jörg: Traubensilberkerze: Wirkung - Navigator Medizin - Medikamente. Online unter: https://www.navigator-medizin.de/medikamente/traubensilberkerze.html#haarausfall.\n\">>\u003C\u003Cfnote \"PharmaWiki - Cimicifuga. Online unter: https://www.pharmawiki.ch/wiki/index.php?wiki=Cimicifuga.\n\">>\u003C\u003Cfnote \"[Syn. Cimicifuga racemosa (L.) Nutt.] - Arzneipflanzen-Lexikon. Online unter: https://arzneipflanzenlexikon.info/traubensilberkerze.php.\n\">>\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"[[Pflanzliche Präparate]] rev","title":"Traubensilberkerze (Cimicifuga)","modified":"20260216194044743","sticky-footer":"\u003C\u003C.foot>>","caption":"Traubensilberkerze"},

{"created":"20251221092246786","text":"Wenn Du das WechselWiki gern unterstützen möchtest, gibt es folgende Wege, etwas beizutragen:\n\n!!!! Melde Verbesserungen\n\n*Hast Du Informationen, die das Wiki bereichern würden oder entdeckst Du einen Eintrag, der aus Deiner Sicht verbessert werden könnte, z.B. aktualisiert, berichtigt oder ergänzt, [[öffne ein Ticket auf Github|https://github.com/3113nbr4/wechselwiki/issues/new]] oder [[sende mir ein E-Mail.|mailto:wechselwiki@proton.me]] Quellenangaben bitte nicht vergessen! Einen Beispielartikel findest Du [[hier.|Titandioxid (E171) in Progesteron-Kapseln]] Anregungen zu Aufbau und Design des Wikis sind ebenfalls willkommen.\n\n!!!! Schreibe einen Artikel\n\n* Hättest Du aus professioneller Sicht und altruistischen Motiven etwas zum Wiki beizutragen, setze Dich gern mit mir in Verbindung und [[sende ein E-Mail.|mailto:wechselwiki@proton.me]] \n\n!!!! Teile die Info\n\n* Erzähle gern ausgewählten Leuten vom WechselWiki und sende Ihnen den Link zum Wiki `http://wechsel.wiki`. Den Link zu einzelnen Artikeln kannst Du über die Funktion //Permalink// im Dropdown-Menü //Weitere Aktionen// (oben rechts im Eintrag) kopieren. \n\n!!!! Unterstütze das Wiki finanziell\n\n*Das WechselWiki braucht Ressourcen in Hosting, Recherche-/Schreibarbeit,  struktureller Planung und Programmierung. Wenn Du es nützlich findest, kannst Du auch Gutes tun und das Projekt mit einer Spende unterstützen: \u003Ca class=\"btn btn-primary btn-sm\" style=\"margin-top: 5px\" href=\"https://donate.stripe.com/7sY3cu5b88JV77Pb1pb7y00\" target=\"_blank\"> \u003Cspan class=\"\">Jetzt einmalig spenden\u003C/span>\u003C/a>\n\n","tags":"[[Über dieses Wiki]]","title":"Unterstützung ♡","modified":"20260215104750835","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260217131615876","text":"Die Wechseljahre können vorzeitig einsetzen, wenn \n\n* der Vorrat an Eizellen im weiblichen Körper aufgebraucht ist, dann nimmt auch die Produktion der Geschlechtshormone ab\n* wenn beide Eierstöcke operativ entfernt wurden oder die Eierstöcke durch Bestrahlungen oder eine Chemotherapie im Rahmen einer Krebstherapie geschädigt worden sind\n\nNeben diesen offensichtlichen Ursachen kommen weitere Auslöser in Betracht:\n\n* genetische Veranlagung, besonders wenn es in Familien gehäuft zu vorzeitigen Wechseljahren kommt\n* Autoimmunerkrankungen (etwa rheumatoide Arthritis oder eine autoimmun bedingte Schilddrüsenentzündung)\n* Stoffwechselerkrankungen (z.B. Diabetes mellitus)\n* Infektionen (z.B. eine bakteriell bedingte Entzündung der Eierstöcke)\n* Rauchen (führt jedoch eher zu leichter Unterfunktion der Eierstöcke als zu vorzeitigem Ausfall der Eierstockfunktion)\n* operative Eingriffe nahe an den Eierstöcken (z.B. eine Gebärmutterentfernung oder eine Sterilisation oder eine Myom-Embolisation)\n* Fehlernährung, Magersucht, vegetarische Ernährung (letzteres in seltenen Fällen)\u003C\u003Cfnote \"Vorzeitige Wechseljahre – Navigator Medizin - Gesundheitsthemen. Online unter: https://www.navigator-medizin.de/gesundheitsthemen/wechseljahre/vorzeitige-wechseljahre.html.\n\">>\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"[[Vorzeitige Menopause]]","title":"Ursachen für vorzeitige Wechseljahre","modified":"20260217133303583","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260129102353386","text":"Tritt die Menopause vor dem 40. oder selten sogar vor dem 30. Lebensjahr auf, spricht man von «vorzeitiger Menopause» oder auch «prämaturer Ovarialinsuffizienz». Vor dem 45. Lebensjahr ist die Rede von einer «frühen Menopause». Letzteres ist bei rund zehn Prozent der Frauen der Fall.\u003Cspan style=\"display: none\">\u003C\u003Cfnote \"Feichter, Martina/Felchner, Carola (2023): Die 4 Phasen der Wechseljahre. In: netDoktor. Online unter: https://www.netdoktor.de/wechseljahre/phasen/.\n\">>\u003C/span>\n\n[[Ursachen für vorzeitige Wechseljahre]]\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>\n","tags":"Phasen","title":"Vorzeitige Menopause","modified":"20260217133518890","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260201103244932","text":"!!!! Die Blutabnahme muss in früher Zyklusphase erfolgen\n\nDie [[FSH-|Follikelstimulierendes Hormon (FSH)]] und [[LH-|Luteinisierendes Hormon (LH)]]Spiegel schwanken während eines Zyklus beträchtlich. Um vergleichbare, beurteilbare Resultate zu erhalten sollte man daher in einer bestimmten Zyklusphase Blut abnehmen. In den meisten Fällen zwischen 1. und 5. Zyklustag.\nIst der Zyklustag wegen fehlender oder sehr unregelmäßiger Blutungen nicht ermittelbar, kann die gleichzeitige Bestimmung des [[Östradiols|Östrogen]] und [[Progesterons|Progesteron]] helfen (höhere Spiegel lassen darauf schließen, dass die Blutabnahme nicht in der frühen Zyklusphase Blut stattgefunden hat). Ev. kann auch eine Ultraschalluntersuchung der Eierstöcke helfen.\n\n!!!! Verschiedene Tests liefern etwas unterschiedliche Resultate\n\nResultate verschiedener Tests können voneinander abweichen. Man muss daher in jedem Fall den angegebenen Referenzbereich (\"Normalbereich\") des Tests beachten. Verlaufsuntersuchungen sollte man immer mit dem gleichen Testsystem durchführen. Von Änderungen der Bestimmungsmethode muss das Labor die zuweisenden Ärzte informieren. (Testmethoden: Amerlex-M (RIA, DC), Immulite (CLIA, mc), Cobas Core (EIA, mc))\n\n!!!! ''''Genetische Variante des LH verursacht falsch niedrige Werte''''\nVor ein paar Jahren entdeckte man, dass es eine relativ häufige Variante des LH gibt: Etwa 15% aller Mitteleuropäer haben dieses, durch eine Mutation (=Veränderung des Erbmaterials) leicht veränderte LH. Im Norden Europas ist die Mutation noch häufiger.\nManche Tests können diese LH-Variante nur schlecht nachweisen und liefern fälschlicherweise zu niedrige LH-Werte. Bei unerklärlich niedrigen LH-Werten kann man an diese Mutation denken und eine Bestimmung mit einem anderen Test veranlassen.\n(Für Spezialisten: es liegt eine 2-Punkt-Mutation Trp8Arg und Ile15Thr vor)\n\n\n!!!! ''''Schlussfolgerung'''' \nEs reicht nicht, dass ein Labor ein Gerät hat, welches FSH oder LH bestimmen kann, es sollte auch einen Spezialisten haben, der um die Problematik der FSH- und LH-Bestimmungen Bescheid weiß und bei dem der zuweisende Arzt im Zweifel rückfragen kann.\u003Cspan style=\"display: none\">\u003C\u003Cfnote \"Hübl, Wolfgang Prof. Dr. med.: FSH und LH bei der Frau. Online unter: https://med4you.at/laborbefunde/lbef3/lbef_fsh_lh.htm.\n\">>\u003C/span>\n\n\n\u003C\u003Cdetails label:\"Quellen\" src:\"\u003C\u003Cshowfnotes>>\">>","tags":"[[Tests + Labor]]","title":"Was muss man bei der Messung von FSH und LH beachten?","modified":"20260215100707730","sticky-footer":"\u003C\u003C.foot>>"},
{"created":"20260208113348359","text":"Das WechselWiki ist ein wachsender Wissensspeicher zum Thema Wechseljahre/ Menopause, der bereits verfügbare Informationen aus verschiedenen Quellen (Bücher, Zeitschriften, Webseiten, Foren, SocialMedia Posts, TV-Beiträge) sammelt, zusammenfasst, miteinander verknüpft und um eigene Beiträge ergänzt. Diese Übersicht listet alle aktuell im Wiki enthaltenen Einträge auf. Sie wird monatlich aktualisiert.\n\n\u003Cdiv class=\"tc-table-of-contents\">\n\u003C\u003Ctoc \"Inhalt\" exclude:\"[tag[todo]]\">>\n\u003C/div>","tags":"[[Über dieses Wiki]]","title":"WechselWiki-Index","modified":"20260215120307937","caption":"Index","sticky-footer":"\u003C\u003C.foot>>"},

{"created":"20260129103208082","text":"\u003C!-- @@! Vorsicht, Quelle der auf netDoktor.de zitierten Studie konnte noch nicht verifiziert werden.@@ -->\n\n\u003C\u003Calert warning \"Vorsicht, die Quelle der auf netDoktor.de zitierten Studie konnte noch nicht verifiziert werden.\" width:100% class:\"leftbar border-warning\">>\n\n\nEine japanische Studie mit rund 2.300 Probandinnen zwischen 40 und 65 Jahren untersuchte, in welchem Alter im Schnitt welche Symptome besonders ausgeprägt sind:\n\n* Kopfschmerzen: 50,4 Jahre\n* Schwindel: 50,6 Jahre\n* Müdigkeit: 50,8 Jahre\n* Depressive Verstimmung: 50,9 Jahre\n* Reizbarkeit: 51,0 Jahre\n* Hitzewallungen: 51,4 Jahre\n* Schlaflosigkeit: 51,7 Jahre\n* Schmerzen im unteren Rücken: 51,9 Jahre\n* Schwitzen: 52,0 Jahre\n* vaginale Trockenheit: 52,1 Jahre\n* Mit 46 und 47 Jahren hatten 30 Prozent und mit 48 und 49 Jahren mehr als 40 Prozent der Probandinnen bereits eine unregelmäßige Periode.\n\n\u003Cspan style=\"display: none\">\u003C\u003Cfnote \"Feichter, Martina/Felchner, Carola (2023): Die 4 Phasen der Wechseljahre. In: netDoktor. Online unter: https://www.netdoktor.de/wechseljahre/phasen/.\n\">>\u003C/span>\n\nQuellen\n\n\u003C\u003Cshowfnotes>>\n","tags":"Symptome rev","title":"Welche Symptome treten wann auf?","modified":"20260130151113904"},

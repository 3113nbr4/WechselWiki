\procedure badge(type:\\\"primary\\\" src:\\\"\\\")\\n\u003Cspan data-bs-theme=\u003C\u003Ccolor-scheme>> class=`badge text-bg-$(type)$`>\u003C$transclude $variable=\\\"src\\\" />\u003C/span>\\n\\\\end\\n\\n\\\\procedure badge-pill(type:\\\"primary\\\" src:\\\"\\\")\\n\u003Cspan data-bs-theme=\u003C\u003Ccolor-scheme>> class=`badge badge-pill text-bg-$(type)$`>\u003C$transclude $variable=\\\"src\\\" />\u003C/span>\\n\\\\end\\n\"},\"$:/plugins/kookma/shiraz/procedures/card\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/card\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure card(header:\\\"\\\", title:\\\"\\\", subtitle:\\\"\\\", text:\\\"\\\", footer:\\\"\\\", width:\\\"100%\\\", class:\\\"\\\")\\n\u003Cdiv data-bs-theme=\u003C\u003Ccolor-scheme>> class=`card mb-3 $(class)$` style=`width:$(width)$;`>\\n\\t\u003C%if [\u003Cheader>!is[blank]] %>\\n\\t\\t\\t\u003Cdiv class=\\\"card-header\\\">\u003C\u003Cheader>>\u003C/div>\\n\\t\u003C%endif%>\\n\\t\u003Cdiv class=\\\"card-body\\\">\\n\\t\\t\u003C%if [\u003Ctitle>!is[blank]] %>\\n\\t\\t\\t\\t\u003Cdiv class=\\\"h5 card-title\\\">\u003C\u003Ctitle>>\u003C/div>\\n\\t\\t\u003C%endif%>\\n\\t\\t\u003C%if [\u003Csubtitle>!is[blank]] %>\\n\\t\\t\\t\\t\u003Cdiv class=\\\"h6 card-subtitle mb-2 text-muted\\\">\u003C\u003Csubtitle>>\u003C/div>\\n\\t\\t\u003C%endif%>\\n\\t\\t\u003C%if [\u003Ctext>!is[blank]] %>\\n\\t\\t\\t\\t\u003Cdiv class=\\\"card-text\\\">\u003C\u003Ctext>>\u003C/div>\\n\\t\\t\u003C%endif%>\\n\\t\u003C/div>\\n\\t\u003C%if [\u003Cfooter>!is[blank]] %>\\n\\t\\t\\t\u003Cdiv class=\\\"card-footer text-muted\\\">\u003C\u003Cfooter>>\u003C/div>\\n\\t\u003C%endif%>\\n\u003C/div>\\n\\\\end card\"},\"$:/plugins/kookma/shiraz/procedures/dbadge\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/dbadge\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure dbadge(subject, status, type:\\\"primary\\\")\\n\u003Cdiv data-bs-theme=\u003C\u003Ccolor-scheme>> class=\\\"dbadge\\\">\u003Cspan class=\\\"dbadge-subject\\\">\u003C$transclude $variable=\\\"subject\\\"/>\u003C/span>\u003Cspan class=`dbadge-status dbadge-$(type)$`>\u003C$transclude $variable=\\\"status\\\"/>\u003C/span>\u003C/div>\\n\\\\end\\n\"},\"$:/plugins/kookma/shiraz/procedures/details\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/details\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\define details(label:\\\"\\\", src:\\\"\\\", status:\\\"\\\", labelClass:\\\"\\\", srcClass:\\\"\\\")\\n\u003Cdetails class=\\\"kk-shiraz-details\\\" $status$>\\n\\t\u003C$let tv-wikilinks=\\\"no\\\">\\n\\t\\t\u003Csummary data-bs-theme=\u003C\u003Ccolor-scheme>> class=\u003C\u003C__labelClass__>> >\u003C\u003C__label__>>\u003C/summary>\\n\\t\u003C/$let>\\n\\t\u003C$let  source = {{{ [\u003C__src__>get[text]else\u003C__src__>] }}} >\\n\\t\\t\u003Cdiv data-bs-theme=\u003C\u003Ccolor-scheme>> class=\u003C\u003C__srcClass__>>>\u003C$transclude $variable=\\\"source\\\" $mode=\\\"block\\\"/>\u003C/div>\\n\\t\u003C/$let>\\n\u003C/details>\\n\\\\end\\n\\n\u003C!---- FAQS using details ---->\\n\\n\\\\procedure faqs-details(filter, status:\\\"closed\\\", labelClass:\\\"alert alert-secondary py-1 my-2\\\", srcClass:\\\"alert border-secondary py-0\\\")\\n\\\\function tmpSearchTid()   [[$:/temp/shiraz/qa/search-details]] [\u003CcurrentTiddler>] +[join[/]]\\n\\\\function searchTerm()     [\u003CtmpSearchTid>get[text]]\\n\\n\u003C$keyboard key=\\\"escape\\\" actions='\u003C$action-setfield $tiddler=\u003C\u003CtmpSearchTid>> $field=\\\"text\\\" $value=\\\"\\\"/>'>\\n\u003C$edit-text tiddler=\u003C\u003CtmpSearchTid>> field=text tag=input default=\\\"\\\" placeholder=\\\"Search in titles\\\" class=\\\"alert alert-info w-100\\\"/>\\n\u003C/$keyboard>\\n\\n\u003C$list filter=\\\"[subfilter\u003Cfilter>search:title\u003CsearchTerm>]\\\">\\n\u003C$transclude $variable=details label=\u003C\u003CcurrentTiddler>>  src=\u003C\u003CcurrentTiddler>>\\n             status=\u003C\u003Cstatus>> labelClass=\u003C\u003ClabelClass>> srcClass=\u003C\u003CsrcClass>> />\\n\u003C/$list>\\n\\\\end faqs-details\\n\\n\"},\"$:/plugins/kookma/shiraz/procedures/helper\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/helper\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\function color-scheme() [{$:/palette}get[color-scheme]]\"},\"$:/plugins/kookma/shiraz/procedures/image-basic\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/image-basic\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure image-basic(img, width:\\\"30%\\\", align:\\\"none\\\", caption:\\\"\\\", tooltip:\\\"\\\", alt:\\\"\\\")\\n\u003Cfigure class=`image-basic image-align-$(align)$` style=`width:$(width)$;`>\\n  \u003C$image source=\u003C\u003Cimg>> tooltip=\u003C\u003Ctooltip>> alt=\u003C\u003Calt>> /> \\n  \u003Cfigcaption>\u003C\u003Ccaption>>\u003C/figcaption>\\n\u003C/figure> \\n\\\\end\"},\"$:/plugins/kookma/shiraz/procedures/image-card\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/image-card\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure image-card(img, width:\\\"30%\\\", align:\\\"none\\\", title:\\\"\\\", text:\\\"\\\", footer:\\\"\\\", pos:\\\"top\\\", alt:\\\"\\\")\\n\u003Cdiv class=`card image-align-$(align)$` style=`width:$(width)$;`>\\n\\t\u003C%if [\u003Cpos>match[top]] %>\\n\\t\\t\\t\u003C$image class=\\\"card-img-top\\\" source=\u003C\u003Cimg>> alt=\u003C\u003Calt>> />\\n\\t\u003C%endif%>\\n\\t\u003Cdiv class=\\\"card-body\\\">\\n\\t\\t\u003C%if [\u003Ctitle>!is[blank]] %>\\n\\t\\t\\t\\t\u003Cdiv class=\\\"h5 card-title\\\">\u003C\u003Ctitle>>\u003C/div>\\n\\t\\t\u003C%endif%>\\n\\t\\t\u003C%if [\u003Ctext>!is[blank]] %>\\n\\t\\t\\t\\t\u003Cdiv class=\\\"card-text\\\">\u003C\u003Ctext>>\u003C/div>\\n\\t\\t\u003C%endif%>\\t\\t\\t\\n\\t\\t\u003C%if [\u003Cfooter>!is[blank]] %>\\n\\t\\t\\t\\t\u003Cp class=\\\"card-text\\\">\u003Csmall class=\\\"text-muted\\\">\u003C\u003Cfooter>>\u003C/small>\u003C/p>\\n\\t\\t\u003C%endif%>\\t\\t\\n\\t\u003C/div>  \\n\\t\u003C%if [\u003Cpos>!match[top]] %>\\n\\t\\t\\t\u003C$image class=\\\"card-img-bottom\\\" source=\u003C\u003Cimg>> alt=\u003C\u003Calt>> />\\n\\t\u003C%endif%>\\n\u003C/div>\\n\\\\end image-card\\n\\n\"},\"$:/plugins/kookma/shiraz/procedures/image-overlay\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/image-overlay\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure image-overlay(img, width:\\\"30%\\\", align:\\\"none\\\", caption:\\\"\\\", title:\\\"\\\", text:\\\"\\\", fadein:\\\"left\\\", alt:\\\"\\\")\\n\u003Cdiv class=`image-overlay-container image-align-$(align)$` style=`width:$(width)$;`>\\n    \u003Ch3 class=\\\"image-overlay-title\\\">\u003C\u003Ccaption>>\u003C/h3>\\n    \u003Cdiv class=\\\"image-overlay-content\\\">\\n      \u003Cdiv class=\\\"image-overlay-content-overlay\\\">\u003C/div>\\n      \u003C$image class=\\\"image-overlay-content-image\\\" source=\u003C\u003Cimg>> alt=\u003C\u003Calt>>/>\\n      \u003C$set name=\\\"fdcls\\\" filter=`$(fadein)$ +[splitbefore[ ]] +[addprefix[image-overlay-fadeIn-]]`>\\n      \u003Cdiv class=`image-overlay-content-details $(fdcls)$` >\\n        \u003Ch3 class=\\\"image-overlay-content-title\\\">\u003C\u003Ctitle>>\u003C/h3>\\n        \u003Cp class=\\\"image-overlay-content-text\\\">\u003C\u003Ctext>>\u003C/p>\\n      \u003C/div>\\n      \u003C/$set>\\n  \u003C/div>\\n\u003C/div>\\n\\\\end\"},\"$:/plugins/kookma/shiraz/procedures/image-polaroid\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/image-polaroid\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure image-polaroid(img, width:\\\"30%\\\", align:\\\"none\\\", caption:\\\"\\\", tooltip:\\\"\\\", alt:\\\"\\\")\\n\u003Cfigure class=`image-polaroid image-align-$(align)$` style=`width:$(width)$;` >\\n  \u003C$image source=\u003C\u003Cimg>> tooltip=\u003C\u003Ctooltip>> />\\n  \u003Cfigcaption class=\\\"image-polaroid-caption\\\">\u003C\u003Ccaption>>\u003C/figcaption>\\n\u003C/figure>\\n\\\\end\"},\"$:/plugins/kookma/shiraz/procedures/image-pretty\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/image-pretty\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure image-pretty(img, width:\\\"30%\\\", align:\\\"none\\\", caption:\\\"\\\", tooltip:\\\"\\\", alt:\\\"\\\")\\n\u003Cfigure class=`image-pretty image-align-$(align)$` style=`width:$(width)$;`>\\n  \u003C$image source=\u003C\u003Cimg>> tooltip=\u003C\u003Ctooltip>> alt=\u003C\u003Calt>> /> \\n  \u003Cfigcaption class=\\\"image-pretty-caption\\\">\u003C\u003Ccaption>>\u003C/figcaption>\\n\u003C/figure> \\n\\\\end\"},\"$:/plugins/kookma/shiraz/procedures/image-slidein\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/image-slidein\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure image-slidein(img, width:\\\"30%\\\", align:\\\"none\\\", caption:\\\"\\\", tooltip:\\\"\\\", slidein:\\\"left\\\", alt:\\\"\\\")\\n\u003Cfigure class=`image-slidein mr-cap-$(slidein)$ image-align-$(align)$` style=`width:$(width)$;`>\\n  \u003C$image source=\u003C\u003Cimg>> tooltip=\u003C\u003Ctooltip>> alt=\u003C\u003Calt>>/>\\n  \u003Cfigcaption>\u003C\u003Ccaption>>\u003C/figcaption>\\n\u003C/figure> \\n\\\\end\"},\"$:/plugins/kookma/shiraz/procedures/list-search\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/list-search\",\"author\":\"Jeremy Ruston\",\"description\":\"creates few paragraphs of dumy text\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure list-search( filter:\\\"[!is[system]]\\\", search:\\\"[search:title\u003Cterm>]\\\",\\n                        template:\\\"$:/core/ui/ListItemTemplate\\\", class:\\\"\\\", stateTiddler:\\\"\\\",\\n                        placeholder:\\\"keywords\\\", searchMinlength:\\\"1\\\")\\n\u003C$let state={{{ [[$:/state/list-search]][\u003CcurrentTiddler>][\u003CstateTiddler>!is[blank]] +[join[/]] }}} >\\n\\n\\t\u003Cdiv data-bs-theme=\u003C\u003Ccolor-scheme>> class=\u003C\u003Cclass>> >\\n\\t\\t\u003C$keyboard key=\\\"escape\\\" actions='\u003C$action-deletetiddler $tiddler=\u003C\u003Cstate>>/>' >\\n\\t\\t\\t\u003C$edit-text tiddler=\u003C\u003Cstate>> type=\\\"search\\\" tag=\\\"input\\\" default=\\\"\\\" placeholder=\u003C\u003Cplaceholder>> class=\\\"tc-max-width\\\"/>\\n\\t\\t\u003C/$keyboard>\\n\\t\u003C/div>\\n\\n\\t\u003Cdiv data-bs-theme=\u003C\u003Ccolor-scheme>> class=\u003C\u003Cclass>> >\\n\\t\\t\u003C$let term= {{{ [\u003Cstate>get[text]] }}} >\\n\\t\\t\\t\u003C$list filter=\\\"[\u003Cterm>minlength\u003CsearchMinlength>]  :then[subfilter\u003Cfilter>subfilter\u003Csearch>] :else[subfilter\u003Cfilter>] :and[!is[missing]]\\\" template=\u003C\u003Ctemplate>>/>\\n\\t\\t\u003C/$let>\\n\\t\u003C/div>\\n\\t\\n\u003C/$let>\\n\\\\end list-search\\n\\n\u003C!-- from Tobias Beer list-search with modification\\nThe old style dynamic filters are:\\n1. \u003C$list filter=\\\"$filter$+[$search$\u003Cterm>]\\\" template=\u003C\u003C__template__>>/>\\n2. \u003C$list filter=\\\"$filter$\\\" template=\u003C\u003C__template__>>/>\\nThe new style is:\\n1. not to use text substitution\\n2. uses TW 5.3.4 new features for conditional decision\\n-->\"},\"$:/plugins/kookma/shiraz/procedures/multicol\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/multicol\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure multicol(src, ncol:\\\"\\\", class:\\\"\\\")\\n\u003Cdiv class=`shiraz-multicol$(ncol)$ $(class)$`>\\n\u003C$transclude $variable=\\\"src\\\" $mode=block/>\\n\u003C/div>\\n\\\\end\\n\"},\"$:/plugins/kookma/shiraz/procedures/searchbox\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/searchbox\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure search-box(label, tempTiddler, placeholder)\\n\u003C%if [\u003Clabel>!is[blank]] %>\\n\u003Clabel class=\\\"shiraz-searchbox-label\\\">\u003C\u003Clabel>>\u003C/label>\\n\u003C%endif%>\\n\u003C$keyboard key=\\\"escape\\\" actions=\\\"\\\"\\\"\u003C$action-deletetiddler $tiddler=\u003C\u003CtempTiddler>> />\\\"\\\"\\\" >\\n\u003C$edit-text tiddler=\u003C\u003CtempTiddler>>\\n  field=text \\ttag=input \\ttype=search\\n\\tdefault=\\\"\\\"  placeholder=\u003C\u003Cplaceholder>>\\n\\tclass=\\\"shiraz-searchbox\\\" />\\n\u003C/$keyboard>\\n\\\\end\"},\"$:/plugins/kookma/shiraz/procedures/slider\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/slider\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure slider(label, src, status:\\\"closed\\\", labelClass, srcClass)\\n\u003C$let stateTiddler = {{{ [[$:/state/shiraz/slider]][\u003CcurrentTiddler>][\u003Clabel>] +[join[/]] }}}\\n       source     = {{{ [\u003Csrc>get[text]else\u003Csrc>] }}} \\n       condition  = {{{ [\u003CstateTiddler>!is[missing]] :then[\u003CstateTiddler>get[text]] :else[\u003Cstatus>] }}}  > \\n\u003Ch3 data-bs-theme=\u003C\u003Ccolor-scheme>> class=\u003C\u003ClabelClass>> >\\n\u003C%if  [\u003Ccondition>match[open]] %>\\n\\t\u003C$button class=\\\"tc-btn-invisible tc-tiddlylink\\\" actions='\u003C$action-setfield $tiddler=\u003C\u003CstateTiddler>> text=\\\"closed\\\"/>' >\\n      \u003Cspan class=\\\"shiraz-slider\\\">\u003C$transclude tiddler=\\\"$:/core/images/down-arrow\\\" />\u003C/span>\\n    \u003C/$button>\\n\u003C%else%>\\n\\t\u003C$button class=\\\"tc-btn-invisible tc-tiddlylink\\\" actions='\u003C$action-setfield $tiddler=\u003C\u003CstateTiddler>> text=\\\"open\\\"/>' >\\n\\t\\t\u003Cspan class=\\\"shiraz-slider\\\">\u003C$transclude tiddler=\\\"$:/core/images/right-arrow\\\" />\u003C/span>\\n\\t\u003C/$button>\\n\u003C%endif%>\\n\u003C$let tv-wikilinks=\\\"no\\\">\u003C\u003Clabel>>\u003C/$let>\\n\u003C/h3>\\n\u003C%if  [\u003Ccondition>match[open]] %>\\n\\t\u003Cdiv data-bs-theme=\u003C\u003Ccolor-scheme>> class=\u003C\u003CsrcClass>> >\\n\\t\\t\u003C$transclude $variable=\\\"source\\\" $mode=\\\"block\\\"/>\\n\\t\u003C/div>\\n\u003C%endif%>\\n\u003C/$let>\\n\\\\end slider\\n\\n\u003C!---- FAQS using Slider ---->\\n\\n\\\\procedure faqs-slider(filter, status:\\\"closed\\\", labelClass:\\\"alert alert-info\\\", srcClass:\\\"alert border-secondary\\\")\\n\\n\\\\procedure expand-all()\\n\u003C$list filter=\u003C\u003Cfilter>> >\\n  \u003C$action-setfield $tiddler=\u003C\u003CrevealStateTid>> text=\\\"open\\\"/>\\n\u003C/$list>\\n\\\\end expand-all\\n\\n\\\\procedure close-all() \\n\u003C$list filter=\u003C\u003Cfilter>> >\\n  \u003C$action-deletetiddler $tiddler=\u003C\u003CrevealStateTid>> />\\n\u003C/$list>\\n\\\\end close-all\\n\\n\\\\function tmpSearchTid()   [[$:/temp/shiraz/qa/search-slider]] [\u003CcurrentTiddler>] +[join[/]]\\n\\\\function revealStateTid() [[$:/state/shiraz/slider]] [\u003CcurrentTiddler>] +[join[/]]\\n\\\\function searchTerm()     [\u003CtmpSearchTid>get[text]]\\n\\n\u003C$keyboard key=\\\"escape\\\" actions='\u003C$action-setfield $tiddler=\u003C\u003CtmpSearchTid>> text=\\\"\\\"/>' >\\n\\t\u003C$edit-text tiddler=\u003C\u003CtmpSearchTid>> field=\\\"text\\\" tag=input default=\\\"\\\" placeholder=\\\"Search\\\" class=\\\"alert alert-info tc-max-width\\\"/>\\n\u003C/$keyboard>\\n\\n\u003C$button actions=\u003C\u003Cexpand-all>> class=\\\"btn btn-secondary btn-sm\\\">Expand all\u003C/$button>\\n\u003C$button actions=\u003C\u003Cclose-all>>  class=\\\"btn btn-secondary btn-sm\\\">Close all\u003C/$button>\\n\\n\u003C$list filter=\\\"[subfilter\u003Cfilter>search:title\u003CsearchTerm>]\\\" >\\n\\t\u003C$transclude $variable=\\\"slider\\\" label=\u003C\u003CcurrentTiddler>> src=\u003C\u003CcurrentTiddler>>\\n\\t\\t\\t\\t\\t\\t\\t  status=\u003C\u003Cstatus>> labelClass=\u003C\u003ClabelClass>> srcClass=\u003C\u003CsrcClass>> />\\n\u003C/$list>\\n\\n\\\\end faqs-slider\"},\"$:/plugins/kookma/shiraz/procedures/spaces\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/spaces\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure vspace(height:\\\"25px\\\")\\n\u003Cp style=`margin-bottom: $(height)$;`>\u003C/p>\\n\\\\end\\n\\n\\\\procedure hspace(width:\\\"25px\\\")\\n\u003Cspan style=`margin-left: $(width)$;`>\u003C/span>\\n\\\\end\\n\"},\"$:/plugins/kookma/shiraz/procedures/text-utility\":{\"title\":\"$:/plugins/kookma/shiraz/procedures/text-utility\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure tc(src:\\\"\\\", color:\\\"red\\\") \u003Cspan style=`color:$(color)$;`>\u003C\u003Csrc>>\u003C/span>\\n\\\\procedure bc(src:\\\"\\\", color:\\\"yellow\\\") \u003Cspan style=`background-color:$(color)$;`>\u003C\u003Csrc>>\u003C/span>\\n\\\\procedure mono(src:\\\"\\\", class:\\\"\\\") \u003Ccode class=`shiraz-mono $(class)$`>\u003C\u003Csrc>>\u003C/code>\\n\\\\procedure transform(case:\\\"\\\", src:\\\"\\\", class:\\\"\\\") \u003Cspan class=`text-$(case)$ $(class)$`>\u003C\u003Csrc>>\u003C/span>\\n\\n\u003C!-- simple highlight -->\\n\\\\procedure hl(src:\\\"\\\", color:\\\"yellow\\\")\\n\u003Cmark class=\\\"shiraz-highlight\\\" style=`background-color:$(color)$;`>\\n\u003C\u003Csrc>>\\n\u003C/mark>\\n\\\\end hl\\n\\n\u003C!-- drop shadow highlight -->\\n\\\\procedure hls(src:\\\"\\\", color:\\\"yellow\\\")\\n\u003Cmark class=\\\"shiraz-highlight\\\" style=`filter: drop-shadow(0 0 0.4rem $(color)$);`>\\n\u003C\u003Csrc>>\\n\u003C/mark>\\n\\\\end hls\\n\\n\u003C!-- pen highlight -->\\n\\\\procedure hlp(src:\\\"\\\", color:\\\"yellow\\\")\\n\u003Cmark class=\\\"shiraz-highlight-pen\\\" style=`background-image: linear-gradient(to top, $(color)$ 50%, transparent 0);`>\\n\u003C\u003Csrc>>\\n\u003C/mark>\\n\\\\end hlp\\n\"},\"$:/plugins/kookma/shiraz/readme\":{\"title\":\"$:/plugins/kookma/shiraz/readme\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"; Shiraz\\nShiraz is a small framework of stylesheets, templates and macros to create stylish contents in Tiddlywiki.  Shiraz has customized elements like alerts, cards, panels, images, static tables, dynamic tables, quick table, badges, texts, etc. Shiraz uses some modified CSS classes from [[Bootstrap|https://getbootstrap.com/]] 5.3.3.\\n\\nThis version is based on TiddlyWiki 5.3.5 and is not totally backward compatible. For backward compatibility use Shiraz 2.x.x like (2.9.5) and earlier.\\n\\n;Code and demo\\nFor learning plugin features, syntax, tutorial and examples see the plugin demo and code pages\\n\\n* Demo: https://kookma.github.io/TW-Shiraz/\\n* Code: https://github.com/kookma/TW-Shiraz\\n\"},\"$:/plugins/kookma/shiraz/styles/accordion\":{\"title\":\"$:/plugins/kookma/shiraz/styles/accordion\",\"text\":\"/* The .kk-shiraz-accordion is actually a CSS class to customize\\nthe summary element of the standard html details widget. It replace the marker\\nwith an animating svg down/up arrow.\\n*/\\n\\n.kk-shiraz-accordion {\\n\\tdisplay: flex;\\n\\tjustify-content: space-between;\\n\\talign-items: center;\\n\\tcursor: pointer;\\n\\tfont-size:1.1em;\\n}\\n\\n.kk-shiraz-accordion::-webkit-details-marker {\\n\\tdisplay: none;\\n}\\n\\n.kk-shiraz-accordion::after {\\n\\tcontent: '';\\n\\twidth: 24px;\\n\\theight: 24px;\\n\\ttransition: 0.4s;\\n\\tbackground-image: url(\\\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZD0iTTI0IDI0SDBWMGgyNHoiIG9wYWNpdHk9Ii44NyIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNBOUFDQUYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTE1Ljg4IDE1LjI5TDEyIDExLjQxbC0zLjg4IDMuODhhLjk5Ni45OTYgMCAxIDEtMS40MS0xLjQxbDQuNTktNC41OWEuOTk2Ljk5NiAwIDAgMSAxLjQxIDBsNC41OSA0LjU5Yy4zOS4zOS4zOSAxLjAyIDAgMS40MS0uMzkuMzgtMS4wMy4zOS0xLjQyIDB6Ii8+CiAgICA8L2c+Cjwvc3ZnPgo=\\\");\\n\\tbackground-repeat: no-repeat;\\n\\tbackground-position: center;\\n\\tbackground-size: cover;\\n}\\n\\ndetails[open] > .kk-shiraz-accordion::after {\\n\\ttransform: rotate(180deg);\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/alerts-leftbar\":{\"title\":\"$:/plugins/kookma/shiraz/styles/alerts-leftbar\",\"text\":\".leftbar{\\n  border-width:0px !important;\\n  border-radius:0px !important;\\n  border-left-width: 0.25rem !important;\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/alerts-link-color\":{\"title\":\"$:/plugins/kookma/shiraz/styles/alerts-link-color\",\"text\":\"/* This extra rules makes link color in alert consistent with alert color. It uses CSS variable\\nYou may add other components \\n*/\\n.alert > a.tc-tiddlylink,\\n.alert > a.tc-tiddlylink-external,\\n.alert > a.tc-tiddlylink-missing,\\n.alert > a.tc-tiddlylink-shadow {\\n\\tcolor: var(--bs-alert-link-color);\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/bglowtone-colors\":{\"title\":\"$:/plugins/kookma/shiraz/styles/bglowtone-colors\",\"text\":\"/* Colors taked from [1] https://www.bg-w3schools.bg-com/colors/colors_names.bg-asp \\n[2] http://www.bg-workwithcolor.bg-com/color-chart-full-01.bg-htm*/\\n/*Low tone background colors*/\\n.bg-mistyrose{background-color:#ffe4e1;}\\n.bg-lemonchiffon{background-color:#fffacd;}\\n.bg-lavenderblush{background-color:#fff0f5;}\\n.bg-lavender{background-color:#e6e6fa;}\\n.bg-honeydew{background-color:#f0fff0;}\\n.bg-lightcyan{background-color:#e0ffff;}\\n.bg-aliceblue{background-color:#f0f8ff;}\\n.bg-cornsilk{background-color:#fff8dc;}\\n.bg-gainsboro{background-color:#dcdcdc;}\\n.bg-bisque{background-color:#ffe4c4;}\\n.bg-snow{background-color:#fffafa;}\",\"list\":\"mistyrose lemonchiffon lavenderblush lavender honeydew lightcyan aliceblue cornsilk gainsboro bisque snow\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/bs/alert\":{\"title\":\"$:/plugins/kookma/shiraz/styles/bs/alert\",\"text\":\"/* bootstrap-5.3.3-dist\\\\css\\\\bootstrap.css line 4858*/\\n.alert {\\n  --bs-alert-bg: transparent;\\n  --bs-alert-padding-x: 1rem;\\n  --bs-alert-padding-y: 1rem;\\n  --bs-alert-margin-bottom: 1rem;\\n  --bs-alert-color: inherit;\\n  --bs-alert-border-color: transparent;\\n  --bs-alert-border: var(--bs-border-width) solid var(--bs-alert-border-color);\\n  --bs-alert-border-radius: var(--bs-border-radius);\\n  --bs-alert-link-color: inherit;\\n  position: relative;\\n  padding: var(--bs-alert-padding-y) var(--bs-alert-padding-x);\\n  margin-bottom: var(--bs-alert-margin-bottom);\\n  color: var(--bs-alert-color);\\n  background-color: var(--bs-alert-bg);\\n  border: var(--bs-alert-border);\\n  border-radius: var(--bs-alert-border-radius);\\n}\\n\\n.alert-heading {\\n  color: inherit;\\n}\\n\\n.alert-link {\\n  font-weight: 700;\\n  color: var(--bs-alert-link-color);\\n}\\n\\n.alert-dismissible {\\n  padding-right: 3rem;\\n}\\n.alert-dismissible .btn-close {\\n  position: absolute;\\n  top: 0;\\n  right: 0;\\n  z-index: 2;\\n  padding: 1.25rem 1rem;\\n}\\n\\n.alert-primary {\\n  --bs-alert-color: var(--bs-primary-text-emphasis);\\n  --bs-alert-bg: var(--bs-primary-bg-subtle);\\n  --bs-alert-border-color: var(--bs-primary-border-subtle);\\n  --bs-alert-link-color: var(--bs-primary-text-emphasis);\\n}\\n\\n.alert-secondary {\\n  --bs-alert-color: var(--bs-secondary-text-emphasis);\\n  --bs-alert-bg: var(--bs-secondary-bg-subtle);\\n  --bs-alert-border-color: var(--bs-secondary-border-subtle);\\n  --bs-alert-link-color: var(--bs-secondary-text-emphasis);\\n}\\n\\n.alert-success {\\n  --bs-alert-color: var(--bs-success-text-emphasis);\\n  --bs-alert-bg: var(--bs-success-bg-subtle);\\n  --bs-alert-border-color: var(--bs-success-border-subtle);\\n  --bs-alert-link-color: var(--bs-success-text-emphasis);\\n}\\n\\n.alert-info {\\n  --bs-alert-color: var(--bs-info-text-emphasis);\\n  --bs-alert-bg: var(--bs-info-bg-subtle);\\n  --bs-alert-border-color: var(--bs-info-border-subtle);\\n  --bs-alert-link-color: var(--bs-info-text-emphasis);\\n}\\n\\n info-rgb), var(--bs-bg-opacity, 1)) !important;\\n}\\n\\n.text-bg-warning {\\n  color: #000 !important;\\n  background-color: RGBA(var(--bs-warning-rgb), var(--bs-bg-opacity, 1)) !important;\\n}\\n\\n.text-bg-danger {\\n  color: #fff !important;\\n  background-color: RGBA(var(--bs-danger-rgb), var(--bs-bg-opacity, 1)) !important;\\n}\\n\\n.text-bg-light {\\n  color: #000 !important;\\n  background-color: RGBA(var(--bs-light-rgb), var(--bs-bg-opacity, 1)) !important;\\n}\\n\\n.text-bg-dark {\\n  color: #fff !important;\\n  background-color: RGBA(var(--bs-dark-rgb), var(--bs-bg-opacity, 1)) !important;\\n}\\n\",\"tags\":\"$:/tags/Stylesheet revise-and-remove bs-5.3.3\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/bs/text-color\":{\"title\":\"$:/plugins/kookma/shiraz/styles/bs/text-color\",\"text\":\"/* bootstrap.css line 8502*/\\n.text-primary {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-primary-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-secondary {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-secondary-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-success {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-success-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-info {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-info-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-warning {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-warning-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-danger {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-danger-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-light {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-light-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-dark {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-dark-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-black {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-black-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-white {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-white-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-body {\\n  --bs-text-opacity: 1;\\n  color: rgba(var(--bs-body-color-rgb), var(--bs-text-opacity)) !important;\\n}\\n\\n.text-muted {\\n  --bs-text-opacity: 1;\\n  color: var(--bs-secondary-color) !important;\\n}\\n\\n.text-black-50 {\\n  --bs-text-opacity: 1;\\n  color: rgba(0, 0, 0, 0.5) !important;\\n}\\n\\n.text-white-50 {\\n  --bs-text-opacity: 1;\\n  color: rgba(255, 255, 255, 0.5) !important;\\n}\\n\\n.text-body-secondary {\\n  --bs-text-opacity: 1;\\n  color: var(--bs-secondary-color) !important;\\n}\\n\\n.text-body-tertiary {\\n  --bs-text-opacity: 1;\\n  color: var(--bs-tertiary-color) !important;\\n}\\n\\n.text-body-emphasis {\\n  --bs-text-opacity: 1;\\n  color: var(--bs-emphasis-color) !important;\\n}\\n\\n.text-reset {\\n  --bs-text-opacity: 1;\\n  color: inherit !important;\\n}\\n\\n.text-opacity-25 {\\n  --bs-text-opacity: 0.25;\\n}\\n\\n.text-opacity-50 {\\n  --bs-text-opacity: 0.5;\\n}\\n\\n.text-opacity-75 {\\n  --bs-text-opacity: 0.75;\\n}\\n\\n.text-opacity-100 {\\n  --bs-text-opacity: 1;\\n}\\n\\n\\n.text-primary-emphasis {\\n  color: var(--bs-primary-text-emphasis) !important;\\n}\\n\\n.text-secondary-emphasis {\\n  color: var(--bs-secondary-text-emphasis) !important;\\n}\\n\\n.text-success-emphasis {\\n  color: var(--bs-success-text-emphasis) !important;\\n}\\n\\n.text-info-emphasis {\\n  color: var(--bs-info-text-emphasis) !important;\\n}\\n\\n.text-warning-emphasis {\\n  color: var(--bs-warning-text-emphasis) !important;\\n}\\n\\n.text-danger-emphasis {\\n  color: var(--bs-danger-text-emphasis) !important;\\n}\\n\\n.text-light-emphasis {\\n  color: var(--bs-light-text-emphasis) !important;\\n}\\n\\n.text-dark-emphasis {\\n  color: var(--bs-dark-text-emphasis) !important;\\n}\\n\",\"tags\":\"$:/tags/Stylesheet revise-and-remove bs-5.3.3\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/bs/text-effect\":{\"title\":\"$:/plugins/kookma/shiraz/styles/bs/text-effect\",\"text\":\"/* bootstrap.css line 8463*/\\n\\n.text-decoration-none {\\n  text-decoration: none !important;\\n}\\n\\n.text-decoration-underline {\\n  text-decoration: underline !important;\\n}\\n\\n.text-decoration-line-through {\\n  text-decoration: line-through !important;\\n}\\n\\n.text-lowercase {\\n  text-transform: lowercase !important;\\n}\\n\\n.text-uppercase {\\n  text-transform: uppercase !important;\\n}\\n\\n.text-capitalize {\\n  text-transform: capitalize !important;\\n}\\n\",\"tags\":\"$:/tags/Stylesheet revise-and-remove bs-5.3.3\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/bs/text-heading\":{\"title\":\"$:/plugins/kookma/shiraz/styles/bs/text-heading\",\"text\":\"/* bootstrap.css line 217*/\\n.h6, .h5, .h4, .h3, .h2, .h1 {\\n  margin-top: 0;\\n  margin-bottom: 0.5rem;\\n  font-weight: 500;\\n  line-height: 1.2;\\n  color: var(--bs-heading-color);\\n}\\n\\n.h1 {\\n  font-size: calc(1.375rem + 1.5vw);\\n}\\n@media (min-width: 1200px) {\\n  .h1 {\\n    font-size: 2.5rem;\\n  }\\n}\\n\\n.h2 {\\n  font-size: calc(1.325rem + 0.9vw);\\n}\\n@media (min-width: 1200px) {\\n  .h2 {\\n    font-size: 2rem;\\n  }\\n}\\n\\n.h3 {\\n  font-size: calc(1.3rem + 0.6vw);\\n}\\n@media (min-width: 1200px) {\\n  .h3 {\\n    font-size: 1.75rem;\\n  }\\n}\\n\\n .h4 {\\n  font-size: calc(1.275rem + 0.3vw);\\n}\\n@media (min-width: 1200px) {\\n   .h4 {\\n    font-size: 1.5rem;\\n  }\\n}\\n\\n .h5 {\\n  font-size: 1.25rem;\\n}\\n\\n .h6 {\\n  font-size: 1rem;\\n}\\n\\n/* bootstrap.css line  598 */\\n.lead {\\n  font-size: 1.25rem;\\n  font-weight: 300;\\n}\\n\\n.display-1 {\\n  font-size: calc(1.625rem + 4.5vw);\\n  font-weight: 300;\\n  line-height: 1.2;\\n}\\n@media (min-width: 1200px) {\\n  .display-1 {\\n    font-size: 5rem;\\n  }\\n}\\n\\n.display-2 {\\n  font-size: calc(1.575rem + 3.9vw);\\n  font-weight: 300;\\n  line-height: 1.2;\\n}\\n@media (min-width: 1200px) {\\n  .display-2 {\\n    font-size: 4.5rem;\\n  }\\n}\\n\\n.display-3 {\\n  font-size: calc(1.525rem + 3.3vw);\\n  font-weight: 300;\\n  line-height: 1.2;\\n}\\n@media (min-width: 1200px) {\\n  .display-3 {\\n    font-size: 4rem;\\n  }\\n}\\n\\n.display-4 {\\n  font-size: calc(1.475rem + 2.7vw);\\n  font-weight: 300;\\n  line-height: 1.2;\\n}\\n@media (min-width: 1200px) {\\n  .display-4 {\\n    font-size: 3.5rem;\\n  }\\n}\\n\\n.display-5 {\\n  font-size: calc(1.425rem + 2.1vw);\\n  font-weight: 300;\\n  line-height: 1.2;\\n}\\n@media (min-width: 1200px) {\\n  .display-5 {\\n    font-size: 3rem;\\n  }\\n}\\n\\n.display-6 {\\n  font-size: calc(1.375rem + 1.5vw);\\n  font-weight: 300;\\n  line-height: 1.2;\\n}\\n@media (min-width: 1200px) {\\n  .display-6 {\\n    font-size: 2.5rem;\\n  }\\n}\",\"tags\":\"$:/tags/Stylesheet revise-and-remove bs-5.3.3\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/bs/text-position\":{\"title\":\"$:/plugins/kookma/shiraz/styles/bs/text-position\",\"text\":\"/* bootstrap.css line 8451*/\\n\\n.text-start {\\n  text-align: left !important;\\n}\\n\\n.text-end {\\n  text-align: right !important;\\n}\\n\\n.text-center {\\n  text-align: center !important;\\n}\\n\\n\",\"tags\":\"$:/tags/Stylesheet revise-and-remove bs-5.3.3\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/bs/text-wrap-truncate\":{\"title\":\"$:/plugins/kookma/shiraz/styles/bs/text-wrap-truncate\",\"text\":\"/* bootstrap.css line 7188*/\\n.text-truncate {\\n  overflow: hidden;\\n  text-overflow: ellipsis;\\n  white-space: nowrap;\\n}\\n\\n/* bootstrap.css line 8487*/\\n.text-wrap {\\n  white-space: normal !important;\\n}\\n\\n.text-nowrap {\\n  white-space: nowrap !important;\\n}\\n\",\"tags\":\"$:/tags/Stylesheet revise-and-remove bs-5.3.3\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/clear-float\":{\"title\":\"$:/plugins/kookma/shiraz/styles/clear-float\",\"text\":\"/* Resolve issue for floating objects which cross the tiddler frame!\\nThe below code should force the tiddler to always wrap around floating elements, so that they are always inside\\nRef: https://groups.google.com/d/msg/tiddlywiki/5bZwwj6cyac/2LzFeA7AAwAJ\\n*/\\n\\n/*\\n.tc-tiddler-body:before, .tc-tiddler-body:after {\\n    content: \\\"\\\";\\n    display: table;\\n}\\n\\n.tc-tiddler-body:after {\\n    clear: both;\\n}\\n\\n.tc-tiddler-body {\\n    zoom: 1;\\n}\\n*/\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/colorify-sidebar-active-tab\":{\"title\":\"$:/plugins/kookma/shiraz/styles/colorify-sidebar-active-tab\",\"code-body\":\"yes\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\rules only conditional macrocallinline\\n\u003C%if [[$:/config/Shiraz]getindex[colorify-sidebar-active-tab]match[yes]] %>\\n\\n.tc-sidebar-lists .tc-tab-buttons button.tc-tab-selected {\\n    background: none;\\n    border: none;\\n    border-bottom: solid 1px \u003C\u003Ccolour primary>>; /*#737373*/\\n    font-weight: bold;\\n    color: \u003C\u003Ccolour primary>>; /*#DB4C3F;*/\\n}\\n\\n\u003C%endif%>\"},\"$:/plugins/kookma/shiraz/styles/colorify-ui-buttons\":{\"title\":\"$:/plugins/kookma/shiraz/styles/colorify-ui-buttons\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\rules only conditional\\n\u003C%if [[$:/config/Shiraz]getindex[colorify-ui-buttons]match[yes]] %>\\n\\n/*Tiddler edit toolbar buttons as traffic lights*/\\n.tc-tiddler-controls .tc-image-done-button {fill:#BBEEBB;}\\n.tc-tiddler-controls .tc-image-cancel-button {fill:#EEDD99;}\\n.tc-tiddler-edit-title .tc-tiddler-controls .tc-image-delete-button,\\n.tc-tiddler-edit-frame .tc-tiddler-controls .tc-image-fa-trash-alt {fill:#EEBBBB;} /* for trashbin plugin: move to trashbin button/*\\n/* These css rules makes page control buttons in beatiful color */\\n/*page control buttons*/\\n.tc-page-controls .tc-image-new-button     { fill: #5EB95E; } /*New tiddler button*/\\n.tc-page-controls .tc-image-options-button { fill:#8058A5; } /*Open control pannel*/\\n/* These css rules makes tiddler viewtoolbar buttons in beatiful color */\\n.tc-tiddler-controls .tc-image-edit-button{fill:#F37B1D}\\n.tc-tiddler-controls .tc-image-info-button{fill:#0E90D2}\\n\\n\u003C%endif%>\"},\"$:/plugins/kookma/shiraz/styles/dbadge\":{\"title\":\"$:/plugins/kookma/shiraz/styles/dbadge\",\"text\":\"/*Credits: \\nNishant Srivastava https://codepen.io/nisrulz/pen/bpQWLW\\nMohammad Rahmani: https://github.com/kookma\\n*/\\n.dbadge {\\n display: inline-block;\\n margin: 0.0em;\\n}\\n.dbadge > span {\\n  color: #ffffff;\\n  font-size: 0.8em;\\n  font-weight: 400;\\n  line-height: 1;\\n  padding: .2em .6em;\\n  text-align: center;\\n  vertical-align: baseline;\\n  white-space: nowrap;}\\n\\n.dbadge-subject{\\n  background-color: #656565;\\n  border-bottom-left-radius: 0.25em;\\n  border-top-left-radius: 0.25em;}\\n.dbadge-status {\\n  border-bottom-right-radius: 0.25em;\\n  border-top-right-radius: 0.25em;}\\n\\n.dbadge-primary {\\n    background-color: #337ab7;}\\n.dbadge-success {\\n    background-color: #5cb85c;}\\n.dbadge-info {\\n    background-color: #5bc0de;}\\n.dbadge-warning {\\n    background-color: #f0ad4e;}\\n.dbadge-danger {\\n    background-color: #d9534f;}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/details-slider\":{\"title\":\"$:/plugins/kookma/shiraz/styles/details-slider\",\"text\":\"/*details html5 macro*/\\ndetails.kk-shiraz-details > summary {\\n  padding: 2px 6px;\\n  outline:none;\\n}\\ndetails.kk-shiraz-details > div {\\n  padding: 2px 6px;\\n  margin: 0;\\n}\\n\\n\\n/* Styles for summary cursor\\nurl: https://css-tricks.com/two-issues-styling-the-details-element-and-how-to-solve-them/\\n*/\\n\\ndetails.kk-shiraz-details summary {\\n  cursor: pointer;\\n}\\n\\ndetails.kk-shiraz-details summary > * {\\n  display: inline;\\n}\\n\\n\\nbutton .kk-sh-slider svg{\\nwidth: 0.8em;\\nheight: 0.8em;\\nvertical-align: middle;\\n}\\n\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/highlight\":{\"title\":\"$:/plugins/kookma/shiraz/styles/highlight\",\"text\":\"mark.shiraz-highlight {\\n\\tbackground-color: unset;\\n\\tborder-radius:0.4em;\\n\\tpadding:0 0.25em 0.1em;\\n}\\n\\nmark.shiraz-highlight-pen {\\n\\tbackground-color: unset;\\n\\tbackground-position: top left;\\n\\tbackground-repeat: no-repeat;\\n\\tbackground-size: 100% auto;\\n}\\n\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/image-alignment\":{\"title\":\"$:/plugins/kookma/shiraz/styles/image-alignment\",\"text\":\"/*Image aligning classes*/\\n.image-align-end{\\n    float:right;\\n    margin:0.5em 0 1.3em 1.4em;\\n}\\n.image-align-start{\\n    float:left;\\n    margin: 0.5em 1.4em 1.3em 0;\\n}\\n.image-align-center{\\n  display:block;\\n  margin: 0.5em auto 1.3em; \\n}\\n\\n.image-float-none {\\n  float: none !important;\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/image-basic\":{\"title\":\"$:/plugins/kookma/shiraz/styles/image-basic\",\"text\":\".image-basic {\\n  text-align: center;\\n  font-style: italic;\\n  font-size: smaller;\\n  text-indent: 0;\\n  padding: 0.5em;\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/image-overlay\":{\"title\":\"$:/plugins/kookma/shiraz/styles/image-overlay\",\"text\":\".image-overlay-container{\\n  width: 50%; \\n  box-sizing: border-box;\\n}\\n\\n@media screen and (max-width: 640px){\\n  .image-overlay-container{\\n    display: block;\\n    width: 100%;\\n  }\\n}\\n\\n@media screen and (min-width: 900px){\\n  .image-overlay-container{\\n    width: 33.33%;\\n  }\\n}\\n\\n.image-overlay-container .image-overlay-title{\\n  color: #1a1a1a;\\n  text-align: center;\\n  margin-bottom:10px;\\n}\\n\\n.image-overlay-content {\\n  position: relative;\\n  width: 90%;\\n  max-width: 400px;\\n  margin: auto;\\n  overflow: hidden;\\n}\\n\\n.image-overlay-content .image-overlay-content-overlay {\\n  background: rgba(0,0,0,0.7);\\n  position: absolute;\\n  height: 99%;\\n  width: 100%;\\n  left: 0;\\n  top: 0;\\n  bottom: 0;\\n  right: 0;\\n  opacity: 0;\\n  -webkit-transition: all 0.4s ease-in-out 0s;\\n  -moz-transition: all 0.4s ease-in-out 0s;\\n  transition: all 0.4s ease-in-out 0s;\\n}\\n\\n.image-overlay-content:hover .image-overlay-content-overlay{\\n  opacity: 1;\\n}\\n\\n.image-overlay-content-image{\\n  width: 100%;\\n}\\n\\n.image-overlay-content-details {\\n  position: absolute;\\n  text-align: center;\\n  padding-left: 1em;\\n  padding-right: 1em;\\n  width: 100%;\\n  top: 50%;\\n  left: 50%;\\n  opacity: 0;\\n  -webkit-transform: translate(-50%, -50%);\\n  -moz-transform: translate(-50%, -50%);\\n  transform: translate(-50%, -50%);\\n  -webkit-transition: all 0.3s ease-in-out 0s;\\n  -moz-transition: all 0.3s ease-in-out 0s;\\n  transition: all 0.3s ease-in-out 0s;\\n}\\n\\n.image-overlay-content:hover .image-overlay-content-details{\\n  top: 50%;\\n  left: 50%;\\n  opacity: 1;\\n}\\n\\n.image-overlay-content-details h3{\\n  color: #fff;\\n  font-weight: 500;\\n  letter-spacing: 0.15em;\\n  margin-bottom: 0.5em;\\n  text-transform: uppercase;\\n}\\n\\n.image-overlay-content-details p{\\n  color: #fff;\\n  font-size: 0.8em;\\n}\\n\\n.image-overlay-fadeIn-bottom{\\n  top: 80%;\\n}\\n\\n.image-overlay-fadeIn-top{\\n  top: 20%;\\n}\\n\\n.image-overlay-fadeIn-left{\\n  left: 20%;\\n}\\n\\n.image-overlay-fadeIn-right{\\n  left: 80%;\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/image-polaroid\":{\"title\":\"$:/plugins/kookma/shiraz/styles/image-polaroid\",\"text\":\".image-polaroid {\\n  min-width:64px;\\n /* background-color: #f8f9fa; */\\n  box-shadow: \\n\\t\\t0 4px 8px 0 rgba(0, 0, 0, 0.2),\\n\\t\\t0 6px 20px 0 rgba(0, 0, 0, 0.19);\\n}\\n.image-polaroid img {\\n    width: 100%;\\n    padding:10px;\\n    height: auto;\\n}\\n.image-polaroid .image-polaroid-caption {\\n    padding:10px 15px 10px;\\n    text-align: center; \\n    line-height: 1.4em;\\n    font-weight:300;\\n    font-size: 0.9em; \\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/image-pretty\":{\"title\":\"$:/plugins/kookma/shiraz/styles/image-pretty\",\"text\":\".image-pretty {\\n    min-width:64px;\\n    border: 1px solid;\\n}\\n\\n.image-pretty:hover {\\n    border: 1px solid #777;\\n}\\n\\n.image-pretty img {\\n    padding:2px;\\n    width: 100%;\\n    height: auto;\\n}\\n\\n.image-pretty .image-pretty-caption {\\n    padding:10px 15px 10px;\\n    text-align: center; \\n    line-height: 1.4em;\\n    font-weight:300;\\n    font-size: 0.9em; \\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/image-slidein\":{\"title\":\"$:/plugins/kookma/shiraz/styles/image-slidein\",\"text\":\".image-slidein { \\n  display: block; \\n  position: relative; \\n  /*float: left;*/\\n  overflow: hidden; \\n /* margin: 0 20px 20px 0;*/\\n}\\n\\n.image-slidein img {\\n    width: 100%;\\n    height: auto;\\n}\\n\\n.image-slidein figcaption { \\n  position: absolute; \\n  background: rgba(0,0,0,0.75); \\n  color: white; \\n  padding: 10px 20px; \\n  opacity: 0;\\n  -webkit-transition: all 0.6s ease;\\n  -moz-transition:    all 0.6s ease;\\n  -o-transition:      all 0.6s ease;\\n}\\n.image-slidein:hover figcaption {\\n  opacity: 1;\\n}\\n.image-slidein:before { \\n  content: \\\"?\\\"; \\n  position: absolute; \\n  font-weight: 800; \\n  background: rgba(255,255,255,0.75); \\n  text-shadow: 0 0 5px white;\\n  color: black;\\n  width: 24px;\\n  height: 24px;\\n  -webkit-border-radius: 12px;\\n  -moz-border-radius:    12px;\\n  border-radius:         12px;\\n  text-align: center;\\n  font-size: 14px;\\n  line-height: 24px;\\n  -moz-transition: all 0.6s ease;\\n  opacity: 0.75;\\t\\n}\\n.image-slidein:hover:before {\\n  opacity: 0;\\n}\\n\\n.mr-cap-left:before {  bottom: 10px; left: 10px; }\\n.mr-cap-left figcaption { bottom: 0; left: -30%; }\\n.mr-cap-left:hover figcaption { left: 0; }\\n\\n.mr-cap-right:before { bottom: 10px; right: 10px; }\\n.mr-cap-right figcaption { bottom: 0; right: -30%; }\\n.mr-cap-right:hover figcaption { right: 0; }\\n\\n.mr-cap-top:before { top: 10px; left: 10px; }\\n.mr-cap-top figcaption { left: 0; top: -30%; }\\n.mr-cap-top:hover figcaption { top: 0; }\\n\\n.mr-cap-bottom:before { bottom: 10px; left: 10px; }\\n.mr-cap-bottom figcaption { left: 0; bottom: -30%;}\\n.mr-cap-bottom:hover figcaption { bottom: 0; }\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/mono\":{\"title\":\"$:/plugins/kookma/shiraz/styles/mono\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\".shiraz-mono {\\n\\tcolor:unset;\\n\\tbackground-color: \u003C\u003Ccolour \\\"code-background\\\">>;\\n\\tborder: 1px solid #e1e1e8;\\n\\twhite-space: pre-wrap;\\n\\tpadding: 0 3px 2px;\\n\\tborder-radius: 3px;\\n\\tfont-family: {{$:/themes/tiddlywiki/vanilla/settings/codefontfamily}}\\n}\"},\"$:/plugins/kookma/shiraz/styles/multicols/column\":{\"title\":\"$:/plugins/kookma/shiraz/styles/multicols/column\",\"text\":\"/* multicolumn layouts with fixed column number works on the whole tiddler */\\n.multicol .tc-tiddler-body {\\n  column-width: 14em;\\n  column-rule: 1px solid #ccc;\\n}\\n/* two columns responsive*/\\n.multicol2 .tc-tiddler-body {\\n\\tcolumn-count:2; \\n\\tcolumn-width:15em;\\n}\\n/* three columns responsive*/\\n.multicol3 .tc-tiddler-body {\\n\\tcolumn-count:3; \\n\\tcolumn-width:10em;\\n}\\n\\n\\n/* remove the extra space from first paragraph */\\n.multicol .tc-tiddler-body > :first-child, \\n.multicol2 .tc-tiddler-body > :first-child, \\n.multicol3 .tc-tiddler-body > :first-child { margin-top: 0;}\\n\\n/*-------------------------------------------------------------------------------*/\\n/* Classes for using with macro and div elements */\\n.shiraz-multicol {\\n  column-width: 14em;\\n  column-rule: 1px solid #ccc;\\n}\\n/* two columns responsive*/\\n.shiraz-multicol2 {\\n\\tcolumn-count:2; \\n\\tcolumn-width:15em;\\n}\\n/* three columns responsive*/\\n.shiraz-multicol3 {\\n\\tcolumn-count:3; \\n\\tcolumn-width:10em;\\n}\\n\\n/* remove the extra space from first paragraph */\\n.shiraz-multicol  > :first-child,\\n.shiraz-multicol2 > :first-child,\\n.shiraz-multicol3 > :first-child { margin-top: 0;}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/multicols/flex\":{\"title\":\"$:/plugins/kookma/shiraz/styles/multicols/flex\",\"text\":\"/* multicolumn layout using flexbox courtesy from Bootstrap 4.3.1*/\\n.flex-row {\\n   display: flex;\\n   flex-direction: row;\\n   flex-wrap: wrap;\\n/*   margin-right: -15px;\\n   margin-left: -15px;*/\\n}\\n\\n.flex-col,\\n.flex-col-1, \\n.flex-col-2, \\n.flex-col-3,\\n.flex-col-4 {\\n  position: relative;\\n  width: 100%;\\n  padding-right: 15px;\\n  padding-left: 15px;\\n}\\n\\n/* for small screen width>=576px\\nhttps://getbootstrap.com/docs/4.3/layout/grid/\\n*/\\n@media (min-width: 576px) {\\n.flex-col   {flex: 1 1 0; max-width: 100%;}\\n.flex-col-1 {flex: 0 0 25%; max-width:25%}\\n.flex-col-2 {flex: 0 0 50%; max-width:50%}\\n.flex-col-3 {flex: 0 0 75%; max-width:75%}\\n.flex-col-4 {flex: 0 0 100%; max-width:100%}\\n}\\n\\n.flex-col   > :first-child,\\n.flex-col-1 > :first-child,\\n.flex-col-2 > :first-child,\\n.flex-col-3 > :first-child,\\n.flex-col-4 > :first-child {\\n  margin-top: 0;}\\n\\n\\n/* Alignment */\\n.flex-align-items-center {\\n  align-items: center !important;\\n}\\n.flex-justify-content-center {\\n  justify-content: center !important;\\n}\\n\\n.flex-no-gutters {\\n  margin-right: 0;\\n  margin-left: 0;\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/searchbox\":{\"title\":\"$:/plugins/kookma/shiraz/styles/searchbox\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\".shiraz-searchbox {\\n\\tborder:none;\\n\\tborder-bottom:1px solid \u003C\u003Ccolor foreground>>22;\\n\\twidth:20em\\n}\\n.shiraz-searchbox:focus{\\n\\toutline:none;\\n}\\n.shiraz-searchbox::placeholder {\\n\\tfont-size: 0.9em;\\n\\tcolor: \u003C\u003Ccolor muted-foreground>>;\\n}\\n.shiraz-searchbox-label{display:block;}\"},\"$:/plugins/kookma/shiraz/styles/sticky-footer\":{\"title\":\"$:/plugins/kookma/shiraz/styles/sticky-footer\",\"text\":\".sticky-footer {\\n  position: absolute;\\n  right: 0;\\n  bottom: 0;\\n  left: 0;\\n  padding: 0.5rem;\\n  background-color: #efefef;\\n  text-align: center;\\n  margin-top: 5px;\\n  box-sizing: border-box;\\n  width: 100%;\\n}\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/switch-palette\":{\"title\":\"$:/plugins/kookma/shiraz/styles/switch-palette\",\"text\":\"\u003Cstyle>\\n.shiraz-switch-palette{\\n\\tmargin-left:40px;\\n}\\n.shiraz-switch-label{\\n\\twidth:105px;\\n\\tdisplay: inline-block;\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/tables\":{\"title\":\"$:/plugins/kookma/shiraz/styles/tables\",\"text\":\".table-tight{\\n\\tfont-size:0.8em;\\n}\\n\\n\\n/*\\nThis tiddler defines the custom stylesheet for tables \\nApril 13, 2018\\n*/\\n\\n/*center aligned table*/\\n.table-center {\\n margin:0 auto;\\n}\\n\\n/* Table caption at top */\\n.table-caption-top caption {\\n caption-side:top;\\n margin-bottom:0.2rem;\\n}\\n\\n/* Striped row table */\\n.table-striped-row tr:nth-child(even) td{\\n  background-color:#F3F6F6; \\n}\\n\\n/* Striped column table */\\n.table-striped-col tbody tr td:nth-child(odd) {\\n\\tbackground-color: #F3F6F6;\\n}\\n\\n/*Borderless table*/\\n.table-borderless, \\n.table-borderless thead td, \\n.table-borderless th, \\n.table-borderless tr, \\n.table-borderless td{\\n  border:0;\\n}\\n\\n/* Table lines should be used with table-borderless for abbreviations and two column layout */\\n\\n.table-lines thead td, .table-lines th{\\n   border-bottom: 2px solid #dddddd;\\n\\t background-color:unset;\\n   }\\n.table-lines td{\\n   border-bottom: 1px solid #dddddd;\\n   background-color:unset;\\n   }\\n\\n/* Table hover (yellow background on mouse over) */\\n.table-hover tbody tr:hover{\\n  color: #212529;\\n  background-color: #e6e6e6;\\n}\\n.table-hover-yellow tbody tr:hover{background-color: #ffffcc;}\\n.table-hover-cyan tbody tr:hover{background-color: #e6ffff;}\\n\\n/* Table with colored header */\\n.thead-primary thead td, .thead-primary th{background-color: #007bff; color: #fff;}\\n.thead-secondary thead td, .thead-secondary th{background-color: #6c757d; color: #fff;}\\n.thead-success thead td, .thead-success th{background-color: #28a745; color: #fff;}\\n.thead-warning thead td, .thead-warning th{background-color: #ffc107; color: #fff;}\\n.thead-danger thead td, .thead-danger th{background-color: #dc3545; color: #fff;}\\n.thead-info thead td, .thead-info th{background-color: #17a2b8; color: #fff;}\\n.thead-dark thead td, .thead-dark th{background-color: #343a40; color: #fff;}\\n.thead-light thead td, .thead-light th{background-color: #f8f9fa; color: #212529;}\\n\\n/* Table with colored header correct to fill svgs with white color */\\n.thead-primary > thead> tr > td svg, .thead-primary > thead> tr > th svg,\\n.thead-secondary > thead> tr > td svg, .thead-secondary > thead> tr > th svg,\\n.thead-success > thead> tr > td svg, .thead-success > thead> tr > th svg,\\n.thead-warning > thead> tr > td svg, .thead-warning > thead> tr > th svg,\\n.thead-danger > thead> tr > td svg, .thead-danger > thead> tr > th svg,\\n.thead-info > thead> tr > td svg, .thead-info > thead> tr > th svg,\\n.thead-dark > thead> tr > td svg, .thead-dark > thead> tr > th svg\\n {fill:#ffffff; padding:0 0 3px 0; }\\n\\n\\n.thead-primary th .tc-tiddlylink, .thead-primary th a,\\n.thead-secondary th .tc-tiddlylink, .thead-primary th a,\\n.thead-success th .tc-tiddlylink, .thead-primary th a,\\n.thead-warning th .tc-tiddlylink, .thead-primary th a,\\n.thead-danger th .tc-tiddlylink, .thead-primary th a,\\n.thead-info th .tc-tiddlylink, .thead-primary th a,\\n.thead-dark th .tc-tiddlylink, .thead-primary th a{color:#ffffff}\\n\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/task-complete\":{\"title\":\"$:/plugins/kookma/shiraz/styles/task-complete\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\rules only filteredtranscludeinline transcludeinline macrodef macrocallinline conditional\\n/* \\nhsl(120, 60%, 30%);  /* A paler green\\n#2ecc71;   /* Emerlad Green\\n#e6e6fa;   /* Lavender Mist\\n#ffca28;   /* Amber Glow\\n#121212    /* Dark Grey\\n#3498db;   /* Moonstone Blue \\n*/\\n.tbl-record-complete,\\n.tbl-record-complete svg,\\n.tbl-record-complete a.tc-tiddlylink {\\n  \u003C%if [\u003Ccolor-scheme>match[light]]    %> color: #F2F2F7FF; fill:currentColor; \\n\\t\u003C%elseif [\u003Ccolor-scheme>match[dark]] %> color: rgba(139, 195, 74, 1); fill: currentColor;\\n\\t\u003C%endif%> }\\n.tbl-record-complete {\\n\u003C%if [\u003Ccolor-scheme>match[light]] %>    background-color: #7f8c8d; /* Slate Gray*/\\n\u003C%elseif [\u003Ccolor-scheme>match[dark]] %> background-color: #2a2a2a;\\n\u003C%endif%> }\"},\"$:/plugins/kookma/shiraz/styles/tiddler-title-class\":{\"title\":\"$:/plugins/kookma/shiraz/styles/tiddler-title-class\",\"text\":\".title-primary .tc-title {\\n  color: #007bff;\\n}\\n.title-secondary .tc-title {\\n  color: #6c757d;\\n}\\n.title-success .tc-title {\\n  color: #28a745;\\n}\\n.title-info .tc-title {\\n  color: #17a2b8;\\n}\\n.title-warning .tc-title {\\n  color: #ffc107;\\n}\\n.title-danger .tc-title {\\n  color: #dc3545;\\n}\\n.title-light .tc-title {\\n  color: #f8f9fa;\\n}\\n.title-dark .tc-title {\\n  color: #343a40;\\n}\\n.title-white .tc-title {\\n  color: #fff;\\n}\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/css\"},\"$:/plugins/kookma/shiraz/styles/view-toolbar-button-visibility\":{\"title\":\"$:/plugins/kookma/shiraz/styles/view-toolbar-button-visibility\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\rules only conditional\\n\u003C%if [[$:/config/Shiraz]getindex[view-toolbar-buttons-visibility]match[yes]] %>\\n/* Mouseover toolbar visibility: courtesy from Tobias Beer*/\\n.tc-tiddler-frame .tc-titlebar button {\\n  opacity: 0;\\n  transition: opacity .5s ease-in-out;\\n}\\n.tc-tiddler-frame:hover .tc-titlebar button {\\n  zoom: 1;\\n  filter: alpha(opacity=100);\\n  opacity: 1;\\n}\\n\u003C%endif%>\"},\"$:/plugins/kookma/shiraz/tables/procs/ct-apps\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/ct-apps\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure nomenclature(id:\\\"nomenclature\\\", delimiter:\\\",\\\")\\n\u003C$transclude $variable=table-csv id=\u003C\u003Cid>> format=\\\"katex-inline transclude pu\\\" class=\\\"table-borderless\\\" header=\\\"no\\\" delimiter=\u003C\u003Cdelimiter>> />\\n\\\\end\\n\\n\\\\procedure mathbox(id:\\\"\\\", format:\\\"\\\", delimiter:\\\",\\\")\\n\u003C$transclude $variable=table-csv id=\u003C\u003Cid>> format=`transclude katex $(format)$` class=\\\"table-borderless table-mathbox\\\" header=\\\"no\\\" delimiter=\u003C\u003Cdelimiter>> />\\n\\\\end\\n\\n\\\\procedure subscripts(id:\\\"subscripts\\\", delimiter:\\\",\\\")\\n\u003C$transclude $variable=table-csv id=\u003C\u003Cid>> format=\\\"katex-inline transclude pu\\\" class=\\\"table-borderless\\\" header=\\\"no\\\" delimiter=\u003C\u003Cdelimiter>> />\\n\\\\end\\n\\n\\\\procedure superscripts(id:\\\"superscripts\\\", delimiter:\\\",\\\")\\n\u003C$transclude $variable=table-csv id=\u003C\u003Cid>> format=\\\"katex-inline transclude\\\" class=\\\"table-borderless\\\" header=\\\"no\\\" delimiter=\u003C\u003Cdelimiter>> />\\n\\\\end\\n\\n\u003C!-- \\n- These procedures use the table-csv to display nice looking outputs\\n- apps means application\\n-->\"},\"$:/plugins/kookma/shiraz/tables/procs/ct-formats-basic\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/ct-formats-basic\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure text()  \u003C$text text=\u003C\u003Centry>> />\\n\\\\procedure code()  \u003Ccode>\u003C\u003Ctext>>\u003C/code>\\n\\\\procedure transclude() \u003C$transclude tiddler=\u003C\u003Centry>> field=\\\"title\\\"/>\\n\\n\\n\u003C!-- these procedures are used by table-csv to display entries -->\"},\"$:/plugins/kookma/shiraz/tables/procs/ct-formats-date\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/ct-formats-date\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure date()       \u003C$view field=title tiddler={{{[\u003Centry>splitregexp[\\\\D+]!is[blank]join[]]}}} format=date template=\\\"YYYY-0MM-0DD\\\"/>\\n\\\\procedure shortdate()  \u003C$view field=title tiddler={{{[\u003Centry>splitregexp[\\\\D+]!is[blank]join[]]}}} format=date template=\\\"mmm DDth, YYYY\\\"/>\\n\\\\procedure longdate()   \u003C$view field=title tiddler={{{[\u003Centry>splitregexp[\\\\D+]!is[blank]join[]]}}} format=date template=\\\"DDD, MMM 0DD, YYYY\\\"/>\\n\\n\u003C!-- these procedures are used by table-csv to display entries -->\"},\"$:/plugins/kookma/shiraz/tables/procs/ct-formats-math\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/ct-formats-math\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure katex()  \u003Cspan class=\\\"falign\\\">\u003C$latex text=\u003C\u003Centry>> displayMode=\\\"true\\\">\u003C/$latex>\u003C/span>\\n\\\\procedure katex-inline() \u003C$latex text=\u003C\u003Centry>> displayMode=\\\"false\\\">\u003C/$latex>\\n\\\\procedure pu() \u003C$latex text=`\\\\pu{$(entry)$}` displayMode=\\\"false\\\">\u003C/$latex>\\n\\\\procedure equation() \u003C$latex text=`\\\\begin{equation}$(entry)$\\\\end{equation}` displayMode=\\\"true\\\">\u003C/$latex>\\n\\n\u003C!-- \\n- these procedures are used by table-csv to display entries KaTeX\\n- pu stands for physical uints\\n- the math formating require the official KaTeX plugin is installed!\\n- see $:/plugins/kookma/shiraz/tables/styles/csvtable-katex\\n-->\"},\"$:/plugins/kookma/shiraz/tables/procs/ct-formats-misc\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/ct-formats-misc\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure email() \u003Ca class=\\\"tc-tiddlylink-external\\\" href=`mailto:$(entry)$` rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\">\u003C\u003Ctext>>\u003C/a>\\n\\n\\\\procedure rate()\\n\u003C$list filter=\\\"[\u003Centry>split[]match[*]]\\\" variable=ignore>\\n\u003Cspan class=\\\"shiraz-star\\\">\u003C$transclude $tiddler=\\\"$:/core/images/star-filled\\\" />\u003C/span>\\n\u003C/$list>\\n\\\\end\\n\\n\u003C!-- these procedures are used by table-csv to display entries -->\"},\"$:/plugins/kookma/shiraz/tables/procs/ct-formats-task\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/ct-formats-task\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure checkbox()\\n\u003C%if [\u003Centry>trim[]match[-]] %>\u003C!-- show task item -->\\n\\t\u003Cinput type=checkbox disabled/>\\n\u003C%elseif [\u003Centry>trim[]match[x]] %>\u003C!-- show done item -->\\n\\t\u003Cinput type=checkbox checked disabled/>\\n\u003C%endif%>\\n\\\\end checkbox\\n\\n\\\\procedure todo-action(param)\\n\u003C!-- toggle a line done (x) / undone (-) . the lbr is used to prevent replace \\\"x, Hi\\\" with \\\"x, Hi Jeremy\\\"-->\\n\u003C$let lbr=\\\"\\n\\\" \\nin=  {{{ [\u003Crow>addsuffix\u003Clbr>] }}}\\nout= {{{ [\u003Crow>splitregexp\u003Cdelimiter>rest[]join\u003Cdelimiter>addprefix\u003Cdelimiter>addprefix\u003Cparam>addsuffix\u003Clbr>]}}} >\\n    \u003C$action-setfield $tiddler=\u003C\u003Csrc>> text={{{ [\u003Csrc>get[text]search-replace:g:\u003Cin>,\u003Cout>] }}}/>\\n\u003C/$let>\\t\\n\\\\end\\n\\n\\\\procedure todo()\\n\u003C%if [\u003Centry>trim[]match[-]] %>\u003C!-- show task item -->\\n\\t\u003C$button class=\\\"tc-btn-invisible\\\" actions=\\\"\\\"\\\"\u003C\u003Ctodo-action \\\"x\\\">>\\\"\\\"\\\">\u003Cinput type=checkbox/>\u003C/$button>\\n\u003C%elseif [\u003Centry>trim[]match[x]] %>\u003C!-- show done item -->\\n\\t\u003C$button class=\\\"tc-btn-invisible\\\" actions=\\\"\\\"\\\"\u003C\u003Ctodo-action \\\"-\\\">>\\\"\\\"\\\">\u003Cinput type=checkbox checked/>\u003C/$button>\\n\u003C%endif%>\\n\\\\end todo\\n\\n\u003C!-- these procedures are used by table-csv to display entries \\nPay attention to the triple quotes around \\\"\\\"\\\"\u003C\u003Ctodo-action \\\"x\\\">>\\\"\\\"\\\".\\nThese quotes are mandatory; if they are removed, the attribute won’t be passed correctly.”\\n-->\"},\"$:/plugins/kookma/shiraz/tables/procs/ct-header-template\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/ct-header-template\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\u003Cth>\\n\u003C%if [\u003CtempTableSort>getindex[sortIndex]match\u003CcurrentColumn>] %>\u003C!--if table is sorted based on current column -->\\n\\t\u003C%if [\u003CtempTableSort>getindex[hasnegate]match[false]] %>\u003C!--set negate for sort-->\\n\\t\\t\u003C$button setTitle=\u003C\u003CtempTableSort>> setIndex=\\\"hasnegate\\\" setTo=\\\"true\\\" class=\\\"tbl-sort-svg tc-btn-invisible tc-tiddlylink\\\" >\\n\\t\\t\\t\u003C$action-setfield $tiddler=\u003C\u003CtempTableSort>> $index=\\\"negate\\\" $value=\\\"reverse\\\"/>\\n\\t\\t\\t\u003C$transclude $tiddler=\u003C\u003CcurrentColumn>> $field=title $mode=inline/>&nbsp;{{$:/core/images/down-arrow}}\\n\\t\\t\u003C/$button>\\n\\t\u003C%elseif [\u003CtempTableSort>getindex[hasnegate]match[true]] %>\u003C!--remove negate for sort-->\\n\\t\\t\u003C$button setTitle=\u003C\u003CtempTableSort>> setIndex=\\\"hasnegate\\\" setTo=\\\"false\\\" class=\\\"tbl-sort-svg tc-btn-invisible tc-tiddlylink\\\" >\\n\\t\\t\\t\u003C$action-setfield $tiddler=\u003C\u003CtempTableSort>> $index=\\\"negate\\\" $value=\\\"\\\"/>\\n\\t\\t\\t\u003C$transclude $tiddler=\u003C\u003CcurrentColumn>> $field=title $mode=inline/>&nbsp;{{$:/core/images/up-arrow}}\\n\\t\\t\u003C/$button>\\n\\t\u003C%endif%>\u003C!-- end of nested if: set negate -->\\n\u003C%else%>\u003C!--if table is not sorted based on current column -->\\n\\t\u003C$button setTitle=\u003C\u003CtempTableSort>> setIndex=\\\"sortIndex\\\" setTo=\u003C\u003CcurrentColumn>> class=\\\"tc-btn-invisible tc-tiddlylink\\\" >\\n\\t\\t\u003C$action-setfield $tiddler=\u003C\u003CtempTableSort>> $index=\\\"hasnegate\\\" $value=\\\"false\\\"/>\\n\\t\\t\u003C$action-setfield $tiddler=\u003C\u003CtempTableSort>> $index=\\\"negate\\\" $value=\\\"\\\"/>\\n\\t\\t\u003C$transclude $tiddler=\u003C\u003CcurrentColumn>> $field=title $mode=inline/>\\n\\t\u003C/$button>\\n\u003C%endif%>\\n\u003C/th>\"},\"$:/plugins/kookma/shiraz/tables/procs/ct-table-csv\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/ct-table-csv\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure table-csv(tiddler:\\\"\\\", delimiter:\\\",\\\", sortType:\\\"alphanumeric\\\", format:\\\"\\\", caption:\\\"\\\", class:\\\"\\\", header:\\\"yes\\\", stateTiddler:\\\"\\\", id:\\\"\\\", dclass:\\\"dblock\\\" )\\n\\\\whitespace trim\\n\\\\import [all[tiddlers+shadows]prefix[$:/plugins/kookma/shiraz/tables/procs/ct-formats]!is[draft]]\\n\\n\u003C$let  src          = {{{ [\u003Ctiddler>is[tiddler]else\u003CcurrentTiddler>] }}} \\n       stateTiddler = {{{ [\u003CstateTiddler>!is[blank]else[01]]    }}} \\n       tempTableSort= {{{ \\\"$:/state/tablecsv/$(currentTiddler)$/$(stateTiddler)$\\\" :and[substitute[]] }}}\\n\\t\\t\\t \\n       sortCol      = {{{ [\u003CtempTableSort>getindex[sortIndex]] }}} \\n       sortNegate   = {{{ [\u003CtempTableSort>getindex[negate]] }}}  \\n       delimiter    = {{{ [\u003Cdelimiter>prefix[\\\\]]:filter[length[]match[2]] :else[\u003Cdelimiter>escaperegexp[]] }}}\\n       dataBlockStartDelimiter =`${[\u003Cid>is[blank]then[@@.$(dclass)$]] :else[[@@.$(dclass)$.]addsuffix\u003Cid>]}$`\\n       dataBlockEndDelimiter   = \\\"@@\\\"  >\\n\\n\u003C!-- extract the data block and set rows filter-->\\n\u003C$let dblock0 = {{{ [\u003Csrc>get[text]splitregexp\u003CdataBlockStartDelimiter>butfirst[1]] }}}\\n      dblock = {{{ [\u003Cdblock0>splitregexp\u003CdataBlockEndDelimiter>butlast[1]] }}}\\n      allRows = \\\"[\u003Cdblock>splitregexp[\\\\n]!is[blank]]\\\"\\n      header_row ={{{ [\u003Cheader>match[yes]then[1]else[0]] }}} >\\n\\t\\t\\t\\n\\t\\t\\t\u003C!-- create table -->\\n\\t\\t\\t\u003Ctable class=\u003C\u003Cclass>> >\\n\\t\\t\\t\\t\u003C!--check if there is a caption-->\\n\\t\\t\\t\\t\u003C%if [\u003Ccaption>!is[blank]] %>\\n\\t\\t\\t\\t\\t\u003Ccaption>\\n\\t\\t\\t\\t\\t\\t\u003C$transclude $variable=\u003C\u003Ccaption>>/>\\n\\t\\t\\t\\t\\t\u003C/caption>\\n\\t\\t\\t\\t\u003C%endif%>\\t\\n\\t\\t\\t\\t\u003C!--check if there is a header row-->\\n\\t\\t\\t\\t\u003C%if [\u003Cheader>match[yes]] %>\\n\\t\\t\\t\\t\\t\u003C!--create table header-->\\n\\t\\t\\t\\t\\t\u003Cthead>\\n\\t\\t\\t\\t\\t\\t\u003C$list filter=\\\"[subfilter\u003CallRows>first[]]\\\" variable=row >\\n\\t\\t\\t\\t\\t\\t\\t\u003Ctr class=\\\"shiraz-csvtable-header\\\">\\n\\t\\t\\t\\t\\t\\t\\t\\t\u003C$list filter=\\\"[\u003Crow>splitregexp\u003Cdelimiter>!is[blank]trim[]]\\\" variable=currentColumn>\\n\\t\\t\\t\\t\\t\\t\\t\\t\\t\u003C$transclude $tiddler=\\\"$:/plugins/kookma/shiraz/tables/procs/ct-header-template\\\" />\\n\\t\\t\\t\\t\\t\\t\\t\\t\u003C/$list>\\n\\t\\t\\t\\t\\t\\t\u003C/tr>\\n\\t\\t\\t\\t\\t\\t\u003C/$list>\\n\\t\\t\\t\\t\\t\u003C/thead>\\n\\t\\t\\t\\t\u003C%endif%>\\n\\t\\t\\t\\t\u003C!--create table body-->\\n\\t\\t\\t\\t\u003Ctbody>\\n\\t\\t\\t\\t\u003C$let\\n\\t\\t\\t\\t\\tsortPos    = {{{ [subfilter\u003CallRows>first\u003Cheader_row>splitregexp\u003Cdelimiter>!is[blank]trim[]]  +[allbefore:include\u003CsortCol>count[]]   }}}\\n\\t\\t\\t\\t\\tsortType   = {{{ [enlist:raw\u003CsortType>nth\u003CsortPos>else[alphanumeric]] }}}\\n\\t\\t\\t\\t\\tmainFilter = {{{ \\\"[subfilter\u003CallRows>butfirst\u003Cheader_row>] :sort:$(sortType)$:$(sortNegate)$[split\u003Cdelimiter>!is[blank]trim[]nth\u003CsortPos>]\\\" :and[substitute[]] }}} >\\n\\t\\t\\t\\t\\t\\t\u003C$list filter=\u003C\u003CmainFilter>> variable=row>\u003C!-- parse all other rows -->\\n\\t\\t\\t\\t\\t\\t\\t\u003Ctr>\\n\\t\\t\\t\\t\\t\\t\\t\u003C$list filter=\\\"[\u003Crow>splitregexp\u003Cdelimiter>!is[blank]trim[]]\\\" variable=entry counter=pos>\\n\\t\\t\\t\\t\\t\\t\\t\\t\u003Ctd>\u003C$transclude $variable={{{ [enlist:raw\u003Cformat>nth\u003Cpos>else[text]] }}} />\u003C/td>\u003C!-- get the right format procedure name to format output -->\\n\\t\\t\\t\\t\\t\\t\\t\u003C/$list>\\n\\t\\t\\t\\t\\t\\t\\t\u003C/tr>\\n\\t\\t\\t\\t\\t\\t\u003C/$list>\u003C!-- end of parse all other rows -->\\n\\t\\t\\t\\t\u003C/$let> \u003C!-- sorPs-->\\n\\t\\t\\t\\t\u003C/tbody>\\n\\t\\t\\t\u003C/table>\\n\\n\u003C/$let>\u003C!-- dblock0-->\\n\u003C/$let>\u003C!--     src-->\\n\\\\end table-csv\\n\\n\u003C!--\\n- the default format is text, if format is not found or not set\\n- the default sort type is alphanumeric \\n- tab delimited data can be processes using `\\\\t` as delimiter,\\n- leading and trailing blanks (spaces) are always trimmed\\n- when use column header, you cannot have two column with the same header, this causes problem with sort routine\\n-->\"},\"$:/plugins/kookma/shiraz/tables/procs/dt-confirm-delete\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/dt-confirm-delete\",\"tags\":\"$:/tags/Table/Procedure\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure confirm-delete()\\n\u003C%if [[$:/temp/dynamictables/delete-all-records]has:index\u003CcurrentTable>] %>\u003C!-- reveals deletion confirmation -->\\n\u003Ctr class=\\\"tbl-delete-confirm\\\">\\n\u003Cth colspan=\u003C\u003CcolumnsCount>> >\\n\u003C$list filter=\\\"[[$:/temp/dynamictables/delete-all-records]getindex\u003CcurrentTable>match[delete-confirmed]]\\\" \\n  variable=ignore emptyMessage=\u003C\u003Cask-for-delete>> >\\n  \u003C\u003Cperform-delete>>\\n\u003C/$list>\\n\u003C/th>\\n\u003C/tr>\\n\u003C%endif%>\\n\\\\end\\n\\n\\\\procedure ask-for-delete()\\n\\t\\\\whitespace notrim\\n\\tDelete all \u003C$count filter=\\\"[subfilter\u003CinputFilter>]\\\"/> records?\\n\\t\u003C$button class=\\\"tc-btn-invisible\\\" tooltip=\\\"mark for delete\\\" actions='\u003C$action-setfield $tiddler=\\\"$:/temp/dynamictables/delete-all-records\\\" $index=\u003C\u003CcurrentTable>> $value=\\\"delete-confirmed\\\"/>'>\\n\\t\\t{{$:/core/images/delete-button}} yes\\n\\t\u003C/$button> or \\n\\t\u003C$button class=\\\"tc-btn-invisible\\\" tooltip=\\\"cancel delete\\\" actions='\u003C$action-setfield $tiddler=\\\"$:/temp/dynamictables/delete-all-records\\\" $index=\u003C\u003CcurrentTable>>/>'>\\n\\t\\t{{$:/core/images/close-button}} no\\n\\t\u003C/$button>\\n\\\\end\\n\\n\u003C!--actions for perform-delete button-->\\n\\\\procedure delete-all-records-action() \\n\\t\\\\import $:/plugins/kookma/trashbin/macros/move-to-trashbin\\n\\t\u003C$action-setfield $tiddler=\\\"$:/temp/dynamictables/delete-all-records\\\" $index=\u003C\u003CcurrentTable>>/>\\n\\t\u003C$action-deletetiddler $filter=\\\"[prefix\u003CtempTable>]\\\"/>\u003C!-- delete all states related to current table-->\\n\\t\u003C%if [[$:/plugins/kookma/trashbin]is[missing]] %>\\n\\t\\t\u003C$action-deletetiddler $filter=\u003C\u003CinputFilter>> />\u003C!--delete permanently-->\\n\\t\u003C%else%>\\n\\t\\t\u003C$list filter=\u003C\u003CinputFilter>> variable=\\\"currentRecord\\\">\u003C!-- move all to trashbin -->\\n\\t\\t\\t\u003C$transclude $variable=\\\"move-to-trashbin\\\" tiddler=\u003C\u003CcurrentRecord>> />\\n\\t\\t\u003C/$list>\\n\\t\u003C%endif%>\\n\\\\end\\t\\t \\n\\n\\\\procedure perform-delete()\\n\\\\whitespace notrim\\n\\tWarning! this action cannot be undone!\\n\\t\u003C$button class=\\\"tc-btn-invisible\\\" tooltip=\\\"delete all records or move to trashbin\\\" actions=\u003C\u003Cdelete-all-records-action>> >\\n\\t\\t{{$:/core/images/delete-button}}  delete \\n\\t\u003C/$button> or \\n\\t\u003C$button class=\\\"tc-btn-invisible\\\" tooltip=\\\"cancel the operation\\\" actions='\u003C$action-setfield $tiddler=\\\"$:/temp/dynamictables/delete-all-records\\\" $index=\u003C\u003CcurrentTable>>/>'>\\n\\t\\t{{$:/core/images/close-button}} cancel \\n\\t\u003C/$button>\\n\\\\end\"},\"$:/plugins/kookma/shiraz/tables/procs/dt-helper\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/dt-helper\",\"tags\":\"$:/tags/Table/Procedure\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure baseState()        $:/state/dynamictables\\n\\\\procedure persistantState()  $:/keepstate/dynamictables\\n\\n\\\\function keepstate()       [[$(persistantState)$/$(currentTable)$]substitute[]]\\n\\n\\\\function stateTableFooter() [[$(keepstate)$/footer]substitute[]]\\n\\\\function stateWarningMsg()  [[$(keepstate)$/warning]substitute[]]\\n\\n\\\\function pageStateTiddler()          [[$(keepstate)$/page-number]substitute[]]\\n\\\\function entryPerPageStateTiddler()  [[$(keepstate)$/entry-per-page]substitute[]]\\n\\n\\n\\n\u003C!-- \\n Those tiddlers based on keepstate are permanent.\\n These are tiddlers hold the data and setting for footer, styles and warning (needs to be hold).\\n These state and temporary tiddlers are independent of currentTiddler (host tiddler) and on changing\\n the title of host tiddler will not disconnected to table\\n-->\"},\"$:/plugins/kookma/shiraz/tables/procs/dt-maths\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/dt-maths\",\"tags\":\"$:/tags/Table/Procedure\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\function count()       [\u003CdataType>match[field]] :then[subfilter\u003CinputFilter>get\u003CcurrentColumn>count[]]   :else[subfilter\u003CinputFilter>getindex\u003CcurrentColumn>count[]]\\n\\\\function average(pn:0) [\u003CdataType>match[field]] :then[subfilter\u003CinputFilter>get\u003CcurrentColumn>average[]]:else[subfilter\u003CinputFilter>getindex\u003CcurrentColumn>average[]] :and[fixed\u003Cpn>]\\n\\\\function median(pn:0)  [\u003CdataType>match[field]] :then[subfilter\u003CinputFilter>get\u003CcurrentColumn>median[]] :else[subfilter\u003CinputFilter>getindex\u003CcurrentColumn>median[]]  :and[fixed\u003Cpn>]\\n\\n\\\\function sum(pn:0)     [\u003CdataType>match[field]] :then[subfilter\u003CinputFilter>get\u003CcurrentColumn>sum[]]     :else[subfilter\u003CinputFilter>getindex\u003CcurrentColumn>sum[]]     :and[fixed\u003Cpn>]\\n\\\\function product(pn:0) [\u003CdataType>match[field]] :then[subfilter\u003CinputFilter>get\u003CcurrentColumn>product[]] :else[subfilter\u003CinputFilter>getindex\u003CcurrentColumn>product[]] :and[fixed\u003Cpn>]\\n\\n\\\\function minall(pn:0) [\u003CdataType>match[field]] :then[subfilter\u003CinputFilter>get\u003CcurrentColumn>minall[]]   :else[subfilter\u003CinputFilter>getindex\u003CcurrentColumn>minall[]]  :and[fixed\u003Cpn>]\\n\\\\function maxall(pn:0) [\u003CdataType>match[field]] :then[subfilter\u003CinputFilter>get\u003CcurrentColumn>maxall[]]   :else[subfilter\u003CinputFilter>getindex\u003CcurrentColumn>maxall[]]  :and[fixed\u003Cpn>]\\n\"},\"$:/plugins/kookma/shiraz/tables/procs/dt-pagination\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/dt-pagination\",\"tags\":\"$:/tags/Table/Procedure\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure prev-button()\\n\u003C!-- create previous page button --->\\n\u003C$list filter=\\\"[\u003Cpage-number>compare:number:lt[2]then[yes]else[no]]\\\" variable=state>\\n\u003C$button disabled=\u003C\u003Cstate>> class=\\\"shiraz-dtable-page-prev tc-btn-invisible\\\">\\n{{$:/core/images/chevron-left}}&nbsp;\u003Cstrong>Prev\u003C/strong>\\n\u003C$action-listops $tiddler=\u003C\u003CpageStateTiddler>> $field=text $subfilter=\\\"+[subtract[1]] ~[[1]]\\\"/>\\n\u003C/$button>\\n\u003C/$list>\\n\\\\end\\n\\n\\\\procedure next-button()\\n\u003C!-- create next page button --->\\n\u003C$list filter=\\\"[\u003Chigh>compare:number:gteq\u003Ctotal-entries>then[yes]else[no]]\\\" variable=state> \\n\u003C$button disabled=\u003C\u003Cstate>> class=\\\"shiraz-dtable-page-next tc-btn-invisible\\\">\\n\u003Cstrong>Next\u003C/strong>&nbsp;{{$:/core/images/chevron-right}} \\n\u003C$action-listops $tiddler=\u003C\u003CpageStateTiddler>> $field=text $subfilter=\\\"+[add[1]] ~[[2]]\\\"/>\\n\u003C/$button>\\n\u003C/$list>\\n\\\\end\\n\\n\\\\procedure limit-entries()\\n\u003C!-- set number of entries per page -->\\n\u003C$select tiddler=\u003C\u003CentryPerPageStateTiddler>> default=25 actions=\\\"\\\"\\\"\u003C$action-setfield $tiddler=\u003C\u003CpageStateTiddler>> text=1/>\\\"\\\"\\\">\\n\u003C$list filter='5 10 15 20 25 30 40 50' variable=num>\\n\u003Coption value=\u003C\u003Cnum>>>Limit \u003C$text text=\u003C\u003Cnum>>/>\u003C/option>\\n\u003C/$list>\\n\u003Coption value=\u003C\u003Ctotal-entries>> >Show all\u003C/option>\\n\u003C/$select>\\n\\\\end\"},\"$:/plugins/kookma/shiraz/tables/procs/dt-show-edit-cell\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/dt-show-edit-cell\",\"tags\":\"$:/tags/Table/Procedure\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure show-cell()\\n\\t\u003C%if [\u003CdataType>match[field]] %>\\n\\t\\t\u003C$transclude tiddler=\u003C\u003CcurrentRecord>> field=\u003C\u003CcurrentColumn>> mode=\\\"inline\\\" />\\n\\t\u003C%else%>\\n\\t\\t\u003C$transclude tiddler=\u003C\u003CcurrentRecord>> index=\u003C\u003CcurrentColumn>> mode=\\\"inline\\\" />\\n\\t\u003C%endif%>\\n\\\\end\\t\\n\\\\procedure edit-cell()\\n\\t\u003C%if [\u003CdataType>match[field]] %>\\n\\t\\t\u003C$edit-text tiddler=\u003C\u003CcurrentRecord>> field=\u003C\u003CcurrentColumn>> tag=\\\"input\\\" class=\\\"shiraz-dtable-textbox\\\"/>\\n\\t\u003C%else%>\\n\\t\\t\u003C$edit-text tiddler=\u003C\u003CcurrentRecord>> index=\u003C\u003CcurrentColumn>> tag=\\\"input\\\" class=\\\"shiraz-dtable-textbox\\\"/>\\n\\t\u003C%endif%>\\n\\\\end\\n\\n\\\\procedure show-cell-locked()\\n\\t\u003Cspan class=\\\"shiraz-dtable-locked-cell\\\">\u003C\u003Cshow-cell>>\u003C/span>\\n\\\\end \\n\\n\u003C!--TODO\\nThe show-cell-locked can be customized.\\n-->\"},\"$:/plugins/kookma/shiraz/tables/procs/dt-table-dynamic\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/dt-table-dynamic\",\"tags\":\"$:/tags/Global\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure table-dynamic(filter, fields:\\\"\\\", indexes:\\\"\\\", sortType:\\\"string\\\", caption:\\\"\\\", class:\\\"\\\",\\n                  footerRows:\\\"0\\\", stateTiddler:\\\"\\\", editButton:\\\"yes\\\", pagination:\\\"no\\\", emptyMessage:\\\"filter input is empty\\\")\\n\\n\u003C!--above commands import utility macros-->\\n\\\\import [all[shadows+tiddlers]tag[$:/tags/Table/Procedure]!is[draft]]\\n\u003C$let inputFilter=\\\"[subfilter\u003Cfilter>!has[draft.of]]\\\" >\\n\u003C!--check input filter parameter-->\\n\u003C%if [subfilter\u003CinputFilter>limit[1]] %>\u003C!--check the input filter is not empty -->\\n\u003C$let \\n dataType =     {{{ [\u003Cfields>!is[blank]then[field]] [\u003Cindexes>!is[blank]then[index]] +[last[]] }}}\\n coulmnFilter = {{{ [\u003CdataType>match[field]then\u003Cfields>else\u003Cindexes>] }}} \\n columnsCount = {{{ [subfilter\u003CcoulmnFilter>count[]] }}}\\n \\n currentTable =    {{{ [\u003CstateTiddler>!is[blank]else\u003CcurrentTiddler>]  }}}\\n tempTable   =     {{{ [\u003CbaseState>][\u003CcurrentTable>]    +[join[/]] }}}\\n tempTableSort =   {{{ [\u003CtempTable>] \\\"sortby\\\"           +[join[/]] }}}\\n tempTableExpand = {{{ [\u003CtempTable>] \\\"expand\\\"           +[join[/]] }}}\\n tempTableEdit =   {{{ [\u003CtempTable>] \\\"edit-view-status\\\" +[join[/]] }}}\\n \\n sortIndex =    {{{ [\u003CtempTableSort>getindex[sortIndex]]  }}} \\n sortFlag  =    {{{ [\u003CtempTableSort>getindex[sortFlag]]   }}}\\n>\\n\\n\u003Cdiv data-bs-theme=\u003C\u003Ccolor-scheme>> class=\\\"tbl-container\\\" style=\\\"max-width:100%;\\\">\\n\\t\u003Ctable class=\u003C\u003Cclass>> style=\\\"caption-side:top\\\">\\n\\t\\t\u003C!-- reveal caption and edit button -------------------->\\n\\t\\t\u003Ccaption style=\\\"text-align:left;\\\">\\n\\t\\t\\t\u003C%if [\u003CeditButton>match[yes]] %>\\n\\t\\t\\t\\t\u003Cspan style=\\\"padding-right:5px;padding-left:3px;\\\">\u003C\u003Ctoggle-edit-view>>\u003C/span>\\n\\t\\t\\t\u003C%endif%>\\n\\t\\t\\t\u003C$transclude $variable=\\\"caption\\\"/>\\n\\t\\t\u003C/caption>\\n\\t\\t\u003C!-- create header -------------------->\\n\\t\\t\u003Cthead>\\n\\t\\t\\t\u003C$transclude $tiddler=\\\"$:/plugins/kookma/shiraz/tables/segments/dt-thead\\\"/>\\n\\t\\t\u003C/thead>\\n\\t\\t\u003C!-- reveal main body of table (generate records) -------------------->\\n\\t\\t\u003Ctbody>\\n\\t\\t\\t\u003C$transclude $tiddler=\\\"$:/plugins/kookma/shiraz/tables/segments/dt-tbody\\\"/>\\n\\t\\t\u003C/tbody>\\n\\t\\t\u003C!-- create footer -------------------->\\n\\t\\t\u003Ctfoot class=\\\"shiraz-dtable-footer\\\">\\n\\t\\t\\t\u003C$transclude $tiddler=\\\"$:/plugins/kookma/shiraz/tables/segments/dt-tfoot\\\"/>\\n\\t\\t\u003C/tfoot>\\n\\t\u003C/table>\\n\u003C/div>\u003C!-- container-->\\n\u003C/$let>\\n\u003C%else%>\\n\\t\u003C$transclude $variable=\\\"emptyMessage\\\" />\\n\u003C%endif%>\u003C!--check the input filter is not empty -->\\n\u003C/$let>\\n\\\\end\"},\"$:/plugins/kookma/shiraz/tables/procs/dt-toggle-edit-view\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/dt-toggle-edit-view\",\"tags\":\"$:/tags/Table/Procedure\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\procedure toggle-edit-view()\\n\\\\procedure clear-mark-for-delete() \\t\u003C$action-setfield $tiddler=\\\"$:/temp/dynamictables/delete-all-records\\\" $index=\u003C\u003CcurrentTable>>/>\\n\u003C%if [\u003CtempTableEdit>getindex[mode]match[edit]] %>\\n\u003C$button class=\\\"tc-btn-invisible tc-tiddlylink\\\" setTitle=\u003C\u003CtempTableEdit>> setIndex=\\\"mode\\\" setTo=\\\"view\\\" actions=\u003C\u003Cclear-mark-for-delete>> >{{$:/core/images/done-button}}\u003C/$button>\\n\u003C%else%>\\n\u003C$button class=\\\"tc-btn-invisible tc-tiddlylink\\\" setTitle=\u003C\u003CtempTableEdit>> setIndex=\\\"mode\\\" setTo=\\\"edit\\\">{{$:/core/images/edit-button}}\u003C/$button>\\n\u003C%endif%>\\n\\\\end\\n\u003C!--clear-mark-for-delete\\nclears the status of currentTable if it is marked to be deleted\\n-->\"},\"$:/plugins/kookma/shiraz/tables/procs/dt-warning-message\":{\"title\":\"$:/plugins/kookma/shiraz/tables/procs/dt-warning-message\",\"tags\":\"$:/tags/Table/Procedure show-content\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\\\function mixedtype.criteria() [subfilter\u003CinputFilter>!type[application/x-tiddler-dictionary]!type[application/json]]\\n\\n\\\\procedure show_tiddler_types()\\n\u003Cdiv style=\\\"text-align:left\\\">\\n\u003Cbr>Tiddlers with wrong type:\\n\u003Cul>\\n\u003C$list filter=\\\"[mixedtype.criteria[]]\\\" >\\n\u003Cli>\u003C$link/>&nbsp;(type: \u003C$view field=type/>)\u003C/li>\\n\u003C/$list>\\n\u003C/ul>\\n\u003C/div>\\n\\\\end show_tiddler_types\\n\\n\\\\procedure dismissButton()\\n\u003C$button class=\\\"tc-btn-invisible tc-tiddlylink\\\" style=\\\"fill:white;\\\" tooltip=\\\"Dismiss alert and continue with the current selection!\\\">\\n{{$:/core/images/close-button}}\\n\u003C$action-setfield $tiddler=\u003C\u003CstateWarningMsg>> text=\\\"dissmiss\\\"/>\\n\u003C/$button>\\n\\\\end dismissButton\\n\\n\\\\procedure check_tiddlers_type_for_table_from_indexes()\\n\u003C%if [\u003CdataType>match[index]] [\u003CeditButton>match[yes]] :and[count[]match[2]] %>\u003C!-- only table from data tiddlers and editable-->\\n\\t\u003C%if [mixedtype.criteria[]limit[1]] [\u003CstateWarningMsg>is[missing]] :and[count[]match[2]] %>\\n\\t\\t\u003Ctr class=\\\"tbl-delete-confirm\\\">\\n\\t\\t\\t\u003Cth colspan=\u003C\u003CcolumnsCount>> >\\n\\t\\t\\t\\t''Danger'': Editable dynamic tables created from indexes with mixed types of tiddlers.&nbsp;\u003C\u003CdismissButton>>\\n\\t\\t\\t\\t\u003C\u003Cshow_tiddler_types>>\\n\\t\\t\\t\u003C/th>\\n\\t\\t\u003C/tr>\\n\\t\u003C%endif%>\\n\u003C%endif%>\\n\

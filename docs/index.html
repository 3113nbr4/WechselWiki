{"created":"20260126134603352","text":"\\whitespace trim\n\n\\procedure lingo-base() $:/language/ControlPanel/\n\\function config-title() [[$:/config/PageControlButtons/Visibility/$(listItem)$]substitute[]]\n\n\u003C\u003Clingo Basics/Version/Prompt>>\u003Cspan class=\"tc-tiny-gap-left\">\u003C\u003Cversion>>\u003C/span>\n\n\u003C$let tv-config-toolbar-icons=\"yes\"\n\ttv-config-toolbar-text=\"yes\"\n\ttv-config-toolbar-class=\"\"\n>\n\t\u003C$list filter=\"[all[shadows+tiddlers]tag[$:/tags/PageControls]!has[draft.of]]\" variable=\"listItem\">\n\t\t\u003Cdiv class={{{ [\u003ClistItem>encodeuricomponent[]addprefix[tc-btn-]] tc-sidebar-tools-item +[join[ ]] }}}\n\t\t\tdata-title=\u003C\u003ClistItem>>\n\t\t>\n\t\t\t\u003C$checkbox tiddler=\u003C\u003Cconfig-title>> field=\"text\" checked=\"show\" unchecked=\"hide\" default=\"show\" class=\"tc-tiny-gap-right\"/>\n\t\t\t\t\u003C$transclude $tiddler=\u003C\u003ClistItem>>/>\n\t\t\t\t\u003Ci class=\"tc-tiny-gap-left tc-muted\">\n\t\t\t\t\t\u003C$transclude $tiddler=\u003C\u003ClistItem>> $field=\"description\"/>\n\t\t\t\t\u003C/i>\n\t\t\u003C/div>\n\t\u003C/$list>\n\u003C/$let>\n","title":"$:/core/ui/SideBar/Tools","tags":"","caption":"{{$:/language/SideBar/Tools/Caption}}","modified":"20260126134605369"},

{"created":"20260204010720613","text":"\\whitespace trim\nDie 30 neuesten Einträge nach Erscheinungsmonat:\n\n\u003C$let subfilter=\"!tag[todo]\" dateField=\"created\" limit=30 format=\"MMM YYYY\">\n\u003Cdiv class=\"tc-timeline\">\n\u003C$set name=\"tv-tids\" filter=`[!is[system]$(subfilter)$has\u003CdateField>!sort\u003CdateField>limit\u003Climit>]`>\n\u003C$list filter=`[enlist\u003Ctv-tids>get\u003CdateField>] :map[split[]first[6]join[]addsuffix[0112]] +[unique[]]` variable=\"date\">\n\u003Cdiv class=\"tc-menu-list-item\">\n\u003C$let month= {{{ [\u003Cdate>split[]first[6]join[]] }}} >\n\u003C$text text={{{ [\u003Cdate>format:date\u003Cformat>] }}} />\n\u003C$list filter=`[enlist\u003Ctv-tids>] :filter[get\u003CdateField>prefix\u003Cmonth>]`>\n\u003Cdiv class=\"tc-menu-list-subitem\">\u003C\u003Ctimeline-link>>\u003C/div>\n\u003C/$list>\n\u003C/$let>\n\u003C/div>\n\u003C/$list>\n\u003C/$set>\n\u003C/div>\n\u003C/$let>\n","tags":"$:/tags/SideBar","title":"$:/custom/SideBar/History","modified":"20260206130252322","caption":"Neuheiten","list-after":"Inhalt"},

{"created":"20251224194545649","text":"strong {\nfont-weight: 600\n}\n\n/* Datum letzte Aktualisierung im Tiddler Inhalt im Story River verbergen\n------------------------------------- */\nspan.inhalt {\nfont-size: 0.8em;\nopacity: .7\n}\n.tc-story-river span.inhalt {\ndisplay: none;\n}\n\n/* Refnotes: Referenz-Ziffern im Text entfernen \n------------------------------------- */\n.refnotes-tooltip {\ndisplay: none\n}\n\n/* Table: Kein Umbruch in Spalte 1 \n------------------------------------- */\ntable.tc-first-col-nowrap > tbody > tr > td:nth-of-type(1) {\nwhite-space: nowrap\n}\n\n/* Hide edit button in favor of keybord nav \n------------------------------------- */\nspan.tc-tiddler-controls button:nth-of-type(2) {\ndisplay:none;\n}\n\n\n/* Shiraz sticky-footer \n------------------------------------- */\n.sticky-footer {\nbackground: none; \nfont-size: 0.9em;\ntext-align: right;\npadding: 0.5rem 2rem;\n}\n.sticky-footer a {\ncolor: rgba(0, 0, 0, 0.4);\ntext-decoration: none\n}\n.sticky-footer a:hover {\ncolor: rgba(0, 0, 0, 0.8);\ntext-decoration: none\n}\n\n\n/* toc-draft-styles\n------------------------------------- */\nspan.tc-toc-caption.todo {\n  opacity:.6; \n  background: none; \n  /*&::after { content: \"✎\" };*/\n}\n\n\n/* tiddler-erfahrung-styles \n------------------------------------- */\n[data-tags*=\"Eigene Erfahrung\"]  {\nbackground-color: #f4f4f4  /* blau 5777d91a,5777d933,5777d94d,5777d959,5777d966, yellow ffd700cc #ffd700e6,#edd966, edd466e6,#eecc6659,eecc6680,#eecc6699, lila d2c6de [data-tiddler-title=\"Eigene Erfahrung\"], */;\n}\n[data-tags*=\"Eigene Erfahrung\"] .tc-subtitle  {\ncolor: #333;\n}\n[data-tags*=\"Eigene Erfahrung\"].tc-tiddler-frame {\nborder: 1px solid #d2c6de!important;\n}\n","title":"$:/custom/Styles","tags":"$:/tags/Stylesheet","modified":"20260302103008140","type":"text/css"},

"Wenn es existiert, zeigt diese Feld an, dass das \\\"Text-Feld\\\" dynamisch vom Server geladen wird.\"},\"$:/language/Filters/AllTiddlers\":{\"title\":\"$:/language/Filters/AllTiddlers\",\"text\":\"Alle Tiddler außer System-Tiddler\"},\"$:/language/Filters/RecentSystemTiddlers\":{\"title\":\"$:/language/Filters/RecentSystemTiddlers\",\"text\":\"Kürzlich veränderte Tiddler, inklusive System-Tiddler\"},\"$:/language/Filters/RecentTiddlers\":{\"title\":\"$:/language/Filters/RecentTiddlers\",\"text\":\"Kürzlich veränderte Tiddler\"},\"$:/language/Filters/AllTags\":{\"title\":\"$:/language/Filters/AllTags\",\"text\":\"Alle Tags außer System-Tags\"},\"$:/language/Filters/Missing\":{\"title\":\"$:/language/Filters/Missing\",\"text\":\"Fehlende Tiddler\"},\"$:/language/Filters/Drafts\":{\"title\":\"$:/language/Filters/Drafts\",\"text\":\"Entwurf Tiddler\"},\"$:/language/Filters/Orphans\":{\"title\":\"$:/language/Filters/Orphans\",\"text\":\"Waisen Tiddler\"},\"$:/language/Filters/SystemTiddlers\":{\"title\":\"$:/language/Filters/SystemTiddlers\",\"text\":\"System-Tiddler\"},\"$:/language/Filters/ShadowTiddlers\":{\"title\":\"$:/language/Filters/ShadowTiddlers\",\"text\":\"Schatten-Tiddler\"},\"$:/language/Filters/OverriddenShadowTiddlers\":{\"title\":\"$:/language/Filters/OverriddenShadowTiddlers\",\"text\":\"Überschriebene Schatten-Tiddler\"},\"$:/language/Filters/SessionTiddlers\":{\"title\":\"$:/language/Filters/SessionTiddlers\",\"text\":\"Tiddler, die seit dem letzten Laden verändert wurden\"},\"$:/language/Filters/SystemTags\":{\"title\":\"$:/language/Filters/SystemTags\",\"text\":\"System-Tags\"},\"$:/language/Filters/StoryList\":{\"title\":\"$:/language/Filters/StoryList\",\"text\":\"Tiddler im \\\"story river\\\", außer \u003C$text text=\\\"$:/AdvancedSearch\\\"/>\"},\"$:/language/Filters/TypedTiddlers\":{\"title\":\"$:/language/Filters/TypedTiddlers\",\"text\":\"Nicht \\\"wiki-text\\\" Tiddler\"},\"GettingStarted\":{\"title\":\"GettingStarted\",\"text\":\"\\\\define lingo-base() $:/language/ControlPanel/Basics/\\nWillkommen bei ~TiddlyWiki, einem persönlichen nicht-linearen Web-Notizbuch.\\n\\nVor dem Start, vergewissern Sie sich, dass Sie dieses Wiki auch wirklich speichern können. Weitere Informationen finden Sie für:\\n\\n* Österreich: https://tiddlywiki.com/languages/de-AT\\n* Deutschland: https://tiddlywiki.com/languages/de-DE\\n* Allgemein (englisch): https://tiddlywiki.com \\n\\nErste Schritte:\\n\\n* Erstellen Sie einen neuen Tiddler mit dem \\\"Plus-Button\\\" in der rechten Navigationsleiste.\\n* Einstellungen können im [[Kontrollpanel|$:/ControlPanel]] vorgenommen werden. Siehe: \\\"Zahnrad-Button\\\" \\n** Das Anzeigen dieses Tiddlers können Sie verhindern, indem Sie die \\\"~DefaultTiddlers\\\" im ''Basis-Tab'' verändern.\\n* Speichern wird mit dem \\\"Speichern-Button\\\" in der Navigationsleiste ausgelöst. \\n* Österreich: [[Weitere Informationen zu WikiText|https://tiddlywiki.com/languages/de-AT/index.html#WikiText]]\\n* Deutschland: [[Weitere Informationen zu WikiText|https://tiddlywiki.com/languages/de-DE/index.html#WikiText]]\\n\\nHinweis: Die österreichische und deutsche Version unterscheiden sich momentan nur in der Flagge, die bei der Standard Sprachauswahl angezeigt wird. In Zukunft können Beschriftungen der Benutzeroberfläche geringfügig von einander abweichen. zB: Jänner - Januar.\\n\\n!! Einrichten dieser ~TiddlyWiki\\n\\n\u003Cdiv class=\\\"tc-control-panel\\\">\\n\\n|tc-table-no-border tc-first-col-min-width tc-first-link-nowrap|k\\n| \u003C$link to=\\\"$:/SiteTitle\\\">\u003C\u003Clingo Title/Prompt>>\u003C/$link>|\u003C$edit-text tiddler=\\\"$:/SiteTitle\\\" default=\\\"\\\" tag=\\\"input\\\"/> |\\n| \u003C$link to=\\\"$:/SiteSubtitle\\\">\u003C\u003Clingo Subtitle/Prompt>>\u003C/$link>|\u003C$edit-text tiddler=\\\"$:/SiteSubtitle\\\" default=\\\"\\\" tag=\\\"input\\\"/> |\\n|^ \u003C$link to=\\\"$:/DefaultTiddlers\\\">\u003C\u003Clingo DefaultTiddlers/Prompt>>\u003C/$link>\u003Cbr>\u003C\u003Clingo DefaultTiddlers/TopHint>>| \u003C$edit-text tag=\\\"textarea\\\" tiddler=\\\"$:/DefaultTiddlers\\\"/>\u003Cbr>//\u003C\u003Clingo DefaultTiddlers/BottomHint>>// |\\n\u003C/div>\\n\\nSee the [[control panel|$:/ControlPanel]] for more options.\\n\"},\"$:/language/Help/build\":{\"title\":\"$:/language/Help/build\",\"description\":\"Ausführen, von vorkonfigurierten Befehlen.\",\"text\":\"Dieser Befehl erstellt eine Zielversion, der aktuellen Wiki Edition. Sind keine Ziele spezifiziert, dann werden all konfigurierten Ziele erstellt.\\n\\n```\\n--build \u003Ctarget> [\u003Ctarget> ...]\\n```\\n\\nZiele werden in der `tiddlywiki.info` Datei, im Wiki Verzeichnis konfiguriert.\\n\"},\"$:/language/Help/clearpassword\":{\"title\":\"$:/language/Help/clearpassword\",\"description\":\"Lösche das Passwort, das für die vorhergehenden Verschlüsselungen verwendet wurde.\",\"text\":\"Lösche das Passwort, das für die vorhergehenden Verschlüsselungen verwendet wurde.\\n\\n```\\n--clearpassword\\n```\\n\"},\"$:/language/Help/commands\":{\"title\":\"$:/language/Help/commands\",\"description\":\"Ausführen von Befehlen aus einem Filter\",\"text\":\"Sequentielle Abarbeitung von Befehlen aus einem Filter.\\n\\n```\\n--commands \u003Cfilter>\\n```\\n\\nBeispiele\\n\\n```\\n--commands \\\"[enlist:raw{$:/build-commands-as-text}]\\\"\\n```\\n\\n```\\n--commands \\\"[{$:/build-commands-as-json}jsonindexes[]] :map[{$:/build-commands-as-json}jsonget\u003CcurrentTiddler>]\\\"\\n```\"},\"$:/language/Help/default\":{\"title\":\"$:/language/Help/default\",\"text\":\"\\\\define commandTitle()\\n$:/language/Help/$(command)$\\n\\\\end\\n```\\nVerwendung: tiddlywiki [\u003Cwikifolder>] [--\u003Ccommand> [\u003Cargs>...]...]\\n```\\n\\nVerfügbare Befehle:\\n\\n\u003Cul>\\n\u003C$list filter=\\\"[commands[]sort[title]]\\\" variable=\\\"command\\\">\\n\u003Cli>\u003C$link to=\u003C\u003CcommandTitle>>>\u003C$macrocall $name=\\\"command\\\" $type=\\\"text/plain\\\" $output=\\\"text/plain\\\"/>\u003C/$link>: \u003C$transclude tiddler=\u003C\u003CcommandTitle>> field=\\\"description\\\"/>\u003C/li>\\n\u003C/$list>\\n\u003C/ul>\\n\\nDetailierte Informationen zu den Befehlen:\\n\\n```\\ntiddlywiki --help \u003Ccommand>\\n```\\n\"},\"$:/language/Help/deletetiddlers\":{\"title\":\"$:/language/Help/deletetiddlers\",\"description\":\"Löscht eine Gruppe von Tiddlern\",\"text\":\"\u003C\u003C.from-version \\\"5.1.20\\\">> Löscht eine Gruppe von Tiddlern, die über einen Filter definiert werden.\\n\\n```\\n--deletetiddlers \u003Cfilter>\\n```\"},\"$:/language/Help/editions\":{\"title\":\"$:/language/Help/editions\",\"description\":\"Listet alle verfügbaren TiddlyWiki Editionen auf\",\"text\":\"Listet alle verfügbaren TiddlyWiki Editionen auf.\\n\\n```\\n--editions\\n```\\n\\nSie können ein neues Wiki mit dem `--init` Befehl erstellen. Dabei wird eine der angezeigten Editionen \\\"geklont\\\".\\n\"},\"$:/language/Help/fetch\":{\"title\":\"$:/language/Help/fetch\",\"description\":\"Laden mehrerer Tiddler über eine URL\",\"text\":\"Abrufen eines oder mehrerer Tiddler über HTTP/HTTPS. Importieren der tiddler, die dem Filter entsprechen. Umwandeln der ankommenden Titel, wenn nötig.\\n\\n```\\n--fetch file \u003Curl> \u003Cimport-filter> \u003Ctransform-filter>\\n--fetch files \u003Curl-filter> \u003Cimport-filter> \u003Ctransform-filter>\\n--fetch raw-file \u003Curl> \u003Ctransform-filter>\\n--fetch raw-files \u003Curl-filter> \u003Ctransform-filter>\\n```\\n\\nWird der `file` oder `raw-file` Parameter verwendet, wird nur eine einzelne Datei geladen. Der erste Parameter ist die URL von der die Datei ''importiert'' werden soll.\\n\\nWird der `files` Parameter verwendet, werden mehrere Dateien geholt. In diesem Fall ist der erste Parameter ein Filter, der eine Liste von URLs ergibt, von denen die Dateien gelesen werden sollen. Zum Beispiel: Mehrere Tiddler sind getaggt mit: `remote-server` und enthalten ein Feld: `url`. ... Der Filter `[tag[remote-server]get[url]]` wird alle verfügbaren URLs ansprechen.\\n\\nWerden die `raw-file` oder `raw-files` Varianten verwendet, wird der Klartext der Datei importiert. Es wird nicht versucht die Import-Logik anzuwenden.\\n\\nDer `\u003Cimport-filter>` Parameter spezifiziert jene Tiddler, die importiert werden sollen. Ohne diesen Parameter wird standardmäßig `[all[tiddlers]]` als Filter verwendet.\\n\\nDer `\u003Ctransform-filter>` Parameter, spezifiziert einen Filter, mit dem der Tiddler Name verändert werden kann. zB: `[addprefix[$:/meinImport/]]` würde `$:/meinImport/` allen Tiddler Namen voran stellen.\\n\\nWird `--verbose` vor dem `--fetch` Befehl benutzt, dann werden erweiterte Diagnose Infos ausgegeben.\\n\\nHinweis: TiddlyWiki wird ''keine'' veraltete Plugins importieren.\\n\\nDas folgende Beispiel wird alle \\\"nicht-system\\\" Tiddler von https://tiddlywiki.com holen und in ein `JSON` file speichern.\\n\\n```\\ntiddlywiki --verbose --fetch file \\\"https://tiddlywiki.com/\\\" \\\"[!is[system]]\\\" \\\"\\\" --rendertiddler \\\"$:/core/templates/exporters/JsonFile\\\" output.json text/plain \\\"\\\" exportFilter \\\"[!is[system]]\\\"\\n```\\n\\nDas folgende Beispiel holt die \\\"favicon\\\" Datei von tiddlywiki.com und speichert sie als \\\"output.ico\\\".\\n\\n```\\ntiddlywiki --verbose --fetch raw-file \\\"https://tiddlywiki.com/favicon.ico\\\" \\\"[[Icon Tiddler]]\\\" --savetiddler \\\"Icon Tiddler\\\" output.ico\\n```\\n\\n''Wichtig!''\\n\\nEs wird darauf hingewiesen, dass der Parameter `\\\"[[Icon Tiddler]]\\\"` für den `--fetch` Befehl zusätzliche Klammern enthält. Er wird hier als Tranformations-Filter verwendet!\\n\\nDer zweite `\\\"Icon Tiddler\\\"` Parameter für `--savetiddler` enthält keine eckigen Klammern. Er wird als Dateiname verwendet\\n\\n\"},\"$:/language/Help/help\":{\"title\":\"$:/language/Help/help\",\"description\":\"Anzeige der Hilfe für die TiddlyWiki Befehle.\",\"text\":\"Anzeige der Hilfe für die ~TiddlyWiki Befehle.\\n\\nBeispiel:\\n\\n```\\n--help [\u003Ccommand>]\\n```\\n\\nWird der Parameter \u003Ccommand> nicht angegeben, werden alle Befehle aufgelistet.\\n\"},\"$:/language/Help/import\":{\"title\":\"$:/language/Help/import\",\"description\":\"Importiert mehrere Tiddler aus einer Datei.\",\"text\":\"Dieser Befehl importiert / extrahiert Tiddler aus folgenden Dateien:\\n\\n* TiddlyWiki `*.html`\\n* `*.tiddler`\\n* `*.tid`\\n* `*.json`\\n* oder andere lokale `.text` Dateien\\n\\nDer `\u003Cdeserializer>` Parameter muss angegeben werden. Anders als beim `--load` Befehl, der diese Information aus der Dateiendung ableiten kann.\\n\\n```\\n--import \u003Cfilepath> \u003Cdeserializer> [\u003Ctitle>] [\u003Cencoding>]\\n```\\n\\nTiddlyWiki enthält folgende `deserializer` Standard-Typen:\\n\\n* application/javascript\\n* application/json\\n* application/x-tiddler\\n* application/x-tiddler-html-div\\n* application/x-tiddlers\\n* text/html\\n* text/plain\\n\\nDer Tiddler-Titel entspricht nach dem Import, dem Dateinamen.\\n\\nDie Zeichenkodierung ist auf \\\"utf8\\\" eingestellt. Sie kann aber auf \\\"base64\\\" für binäre Daten geändert werden.\\n\\nHinweis: TiddlyWiki importiert nur neuere Plugins, als jene, die bereits geladen sind.\\n\"},\"$:/language/Help/init\":{\"title\":\"$:/language/Help/init\",\"description\":\"Initialisiere eine neues Wiki Verzeichnis.\",\"text\":\"Initialisiere eine neues [[Wiki Verzeichnis|WikiFolders]] mit der Kopie einer Edition.\\n\\n```\\n--init \u003Cedition> [\u003Cedition> ...]\\n```\\n\\nBeispiel:\\n\\n```\\ntiddlywiki ./MyWikiFolder --init empty\\n```\\n\\nAnmerkung:\\n\\n* Das Wiki Verzeichnis wird angelegt, wenn es nicht existiert.\\n* Der \u003Cedition> Parameter ist standardmäßig: ''empty''.\\n* Der --init Befehl bricht ab, wenn das angegebene Verzeichnis nicht leer ist.\\n* Der --init Befehl löscht alle `includeWikis` Definitionen aus der neuen `tiddlywiki.info` Datei.\\n* Wenn mehrere Editionen importiert werden, wird die zuletzt importierte `tidlywiki.info` Datei aktiv sein. Alle anderen weden überschrieben.\\n\\n* `--editions` listet alle verfügbaren Editionen auf.\\n\"},\"$:/language/Help/listen\":{\"title\":\"$:/language/Help/listen\",\"description\":\"Definiert das HTTP-Server Interface für Tiddlywiki\",\"text\":\"Stellt das Wiki mit einem HTTP-Server zur Verfügung.\\n\\nDer \\\"listen\\\" Parameter wird wie folgt verwendet:\\n\\n```\\n--listen [\u003Cname>=\u003Cwert>]...\\n```\\n\\nAlle Parameter sind optional, die Reihenfolge ist beliebig und es werden \\\"sichere\\\" standard Parameter verwendet.\\n\\nMögliche Parameter:\\n\\n* ''host'' - Host-Name, von dem übertragen wird. (Standard: \\\"127.0.0.1\\\" alias \\\"localhost\\\")\\n* ''path-prefix'' - Pfad-prefix, der auf alle Pfade angewendet wird\\n* ''port'' - Port Nummer, die überwacht werden soll; Nicht-numerische Werte werden als System Umgebungs-Variable interpretiert. (Standard: 8080)\\n* ''credentials'' - Pfad zur Authentifizierungsdatei im CSV-format. Angabe ist relativ zum Wiki-Verzeichnis\\n* ''anon-username'' - Name, der für anonymer Benutzer verwendet wird, um bearbeitete Tiddler zu markieren\\n* ''username'' - Benutzername für die Basis-Authentifizierung\\n* ''password'' - Passwort für die Basis-Authentifizierung\\n* ''authenticated-user-header'' - Optionaler HTTP Header-Name für vertrauenswürdige, authentifizierte Benutzer\\n* ''readers'' - Komma-separierte Liste für Benutzer, mit Schreiberlaubnis\\n* ''writers'' - Komma-separierte Liste für Benutzer, mit Leseerlaubnis\\n* ''csrf-disable'' - \\\"yes\\\" bedeutet, dass CSRF Überprüfungen deaktiviert sind. (Standard: \\\"no\\\")\\n* ''root-tiddler'' - Tiddler, der für den \\\"Root-Pfad\\\" verwendet wird. (Standard: \\\"$:/core/save/all\\\")\\n* ''root-render-type'' - Darstellungs-Type, die für den Root-Tiddler verwendet wird. (Standard: \\\"text/plain\\\")\\n* ''root-serve-type'' - Inhalts-Type, die für den Root-Tiddler verwendet wird. (Standard: \\\"text/html\\\")\\n* ''tls-cert'' - Pfad zur \\\"TLS Zertifikat\\\" Datei (relativ zum Wiki Verzeichnis)\\n* ''tls-key'' - Pfad zur \\\"TLS Schlüssel\\\" Datei (relativ zum Wiki Verzeichnis)\\n* ''debug-level'' - \\\"debug\\\" bewikt eine detailierte Anzeige der HTTP Anfrage-Parameter. (Standard: \\\"none\\\")\\n* ''gzip'' - Wenn auf \\\"yes\\\" gesetzt, dann wird gzip Kompression aktiviert. (Standard: \\\"no\\\")\\n* ''use-browser-cache'' - Ist dieser Parameter auf \\\"yes\\\" gesetzt kann der Browser Inhalte zwischenspeichern um Übertragungsbandbreite zu sparen. (Standard: \\\"no\\\")\\n\\nFür weitere Sicherheitshinweise und Informationen für die Verwendung in lokalen Netzwerken siehe: WebServer auf TiddlyWiki.com\\n\"},\"$:/language/Help/load\":{\"title\":\"$:/language/Help/load\",\"description\":\"Lade Tiddler von einer Datei.\",\"text\":\"Lade Tiddler aus einer TiddlyWiki `.html`, `.tiddler`, `.tid`, `.json` oder anderen lokalen Datei.\\n\\nDie Verarbeitung der geladenen Datei wird anhand der Datei-Erweiterung bestimmt. Verwenden sie den alternativen `import` Befehl, wenn sie die verarbeitungsweise ändern möchten.\\n\\n\\n```\\n--load \u003Cfilepath> [noerror]\\n--load \u003Cdirpath> [noerror]\\n```\\n\\nDer \\\"load\\\" Befehl erzeugt eine Fehlermeldung, wenn keine Tiddler gefunden werden. Dieses Verhalten kann mit dem Parameter \\\"noerror\\\" unterdrückt werden.\\n\\nUm Daten aus einer verschlüsselten TiddlyWiki Datei zu laden, muss zuerst mit dem \\\"password\\\" Parameter ein Passwort definiert werden. \\n\\nBeispiel:\\n\\n```\\ntiddlywiki ./MyWiki --password hier-sicheres-passwort-verwenden --load my_encrypted_wiki.html\\n```\\n\\nHinweis: TiddlyWiki wird nur neuere Versionen eines bestehenden Plugins laden!\\n\"},\"$:/language/Help/makelibrary\":{\"title\":\"$:/language/Help/makelibrary\",\"description\":\"Erstellt die \\\"Upgrade Bibliothek\\\", die vom \\\"upgrade\\\" Prozess benötigt wird\",\"text\":\"Erstellt den tiddler: `$:/UpgradeLibrary`, der vom \\\"upgrade\\\" Prozess benötigt wird.\\n\\nDie \\\"Upgrade Bibliothek\\\" ist ein \\\"normales\\\" Plugin, vom Typ: `library`. Es enthält eine Kopie jedes Plugins, Themas und Sprachpacketes, das im TiddlyWiki Archiv enthalten ist.\\n\\nDieser Befehl ist ein \\\"interner\\\" Befehl! Er ist nur relevant für Benutzer, die einen spezifischen \\\"Upgrade Prezess\\\" erstellen müssen. zB: Umwandeln von einem Tiddler in mehrere Tiddler, um Inkompatibilitäten zu vermeiden.\\n\\n```\\n--makelibrary \u003Ctitle>\\n```\\n\\nDas \\\"title\\\" Argument ist standardmäßig: `$:/UpgradeLibrary`.\\n\"},\"$:/language/Help/notfound\":{\"title\":\"$:/language/Help/notfound\",\"text\":\"Keine Hilfe zu diesem Thema gefunden!\"},\"$:/language/Help/output\":{\"title\":\"$:/language/Help/output\",\"description\":\"Setzt das Basis Ausgabeverzeichnis für alle folgenden Befehle.\",\"text\":\"Setzt das Basis Ausgabeverzeichnis für alle folgenden Befehle. Das Standard Verzeichnis heißt: \\\"output\\\" und ist ein Unterverzeichnis des \\\"edition\\\" Verzeichnisses.\\n\\n```\\n--output \u003Cpathname>\\n```\\n\\nIst das spezifizierte Verzeichnis \\\"relativ\\\", dann wird es relativ zum bestehenden Arbeitsverzeichnis angelegt.\\nZum Beispiel: `--output .` setzt das Ausgabeverzeichnis auf das aktuelle Verzeichnis.\\n\"},\"$:/language/Help/password\":{\"title\":\"$:/language/Help/password\",\"description\":\"Setzen eines Passwortes für Verschlüsselungsoperationen.\",\"text\":\"Setzen eines Passwortes für Verschlüsselungsoperationen\\n\\n```\\n--password \u003Cpassword>\\n```\\n\\nHinweis: Diese Option kann nicht verwendet werden, um ein \\\"Server Passwort\\\" festzulegen! Informationen zum Server Passwort siehe [[ServerCommand]].\\n\"},\"$:/language/Help/render\":{\"title\":\"$:/language/Help/render\",\"description\":\"Ausgabe individueller Tiddler in Dateien\",\"text\":\"Individuelle Tiddler werden anhand von Filtern spezifiziert, gelesen und in Dateien umgewandelt.\\n\\nOptionell kann eine Template-Datei angegeben werden. In diesem Fall wird nicht der Inhalt des Tiddlers, sondern des Templates übersetzt. Die `currentTiddler` Variable wird auf den Titel, des auszugebenden, Tiddlers gesetzt.\\n\\nEs können noch zusätzliche Variablen per Name und Wert gesetzt werden.\\n\\n```\\n--render \u003Ctiddler-filter> [\u003Cfilename-filter>] [\u003Crender-type>] [\u003Ctemplate>] [ [\u003Cname>] [\u003Cvalue>] ]*\\n```\\n\\n* ''tiddler-filter'': Ein Filter, der die Auszugebenden Tiddler eindeutig spezifiziert.\\n* ''filename-filter'': [Option] Filter, der aus Tiddler Titeln, Pfadnamen generiert. Wenn weggelassen, dann wird der Standard verwendet: `[is[tiddler]addsuffix[.html]]`, welcher den Titel als Dateiname verwendet.\\n* ''render-type'': [Option] Ausgabe Typ: `text/html` (Standard) generiert HTML Text und `text/plain` gibt den \\\"reinen\\\" Text Inhalt zurück. `text/plain` ignoriert HTML Marker und andere \\\"nicht-druckbare\\\" Zeichen.\\n* ''template'': [Option] Template, das verwendet werden soll\\n* ''name'': [Option] Name einer zusätzlichen Variablen.\\n* ''value'': [Option] Wert dieser zusätzlichen Variablen.\\n\\nStandardmäßig sind die Dateinamen \\\"relativ\\\" zum `output` Verzeichnis, des `edition` Verzeichnisses.\\n\\nMit dem `--output` Befehl kann die Ausgabe in jedes beliebige Verzeichnis umgeleitet werden.\\n\\nWichtig:\\n\\n* Das `output` Verzeichnis wird nicht gelöscht, bevor neue Dateien geschrieben werden.\\n* Verzeichnisse und Dateien werden automatisch angelegt, sollten sie nicht vorhanden sein.\\n* Wenn eine Datei Leerzeichen enthält, dann muss dies ''doppelt'' angezeigt werden. Für TiddlyWiki mit eckigen Klammern `[[]]` und für die Kommandozeile mit Hochkomma \\\"\\\". Zum Beispiel: `--render \\\"[[Motovun Jack.jpg]]\\\"`\\n* Dateinamens-Filter zeigen immer auf den Titel, des gerade bearbeiteten Tiddlers. Das erlaubt uns, diesen als Basis für den Dateinamen zu verwenden. zB: `[encodeuricomponent[]addprefix[static/]]` ... Verwendet eine URI-Enkodierung für jeden Dateinamen und stellt das Wort `static/` als Pfadname voran.\\n* Es können mehrere ''name/value'' Paare verwendet werden.\\n* Der `--render` Befehl ist flexibler und ersetzt daher `--rendertiddler` und `--rendertiddlers`, welche mit V5.1.15 auslaufen!\\n\\nBeispiel:\\n\\n* `--render '[!is[system]]' '[encodeuricomponent[]addprefix[tiddlers/]addsuffix[.html]]'` ... Übersetzt alle Nicht-System Tiddler und schreibt sie in ein Unterverzeichnis `tiddlers/` mit URL-kodiertem Titel und der Erweiterung `.html`\\n\\n* `--render '.' 'tiddlers.json' 'text/plain' '$:/core/templates/exporters/JsonFile' 'exportFilter' '[tag[HelloThere]]'` -- Übersetzt all Tiddler mit dem Tag: \\\"HelloThere\\\" in eine JSON Datei mit dem namen \\\"tiddlers.json\\\"\\n\"},\"$:/language/Help/rendertiddler\":{\"title\":\"$:/language/Help/rendertiddler\",\"description\":\"Ausgabe eines individuellen Tiddlers, in einem spezifizierten Format.\",\"text\":\"''WICHTIG:''\\n\\n* Der `--rendertiddler` Befehl wird ab V5.1.15 durch `--render` ersetzt.\\n* `--rendertiddler` wird auslaufen und sollte daher nicht mehr verwendet werden!\\n\\nAusgabe eines individuellen Tiddlers, in einem spezifizierten Format (standard: `text/html`) und Dateinamen.\\n\\nOptional kann ein Template tiddler angegeben werden. Die \\\"currentTiddler\\\" Variable wird auf den Tiddler gesetzt, der zu rendern ist.\\n\\n```\\n--rendertiddler \u003Ctitle> \u003Cfilename> [\u003Ctype>] [\u003Ctemplate>] [\u003Cname>] [\u003Cvalue>]\\n```\\n\\nStandardmäßig ist das `output` Verzeichnis ein Unterverzeichnis im `edition` Verzeichnis. Der `--output` Befehl kann verwendet werden, um ein anderes Verzeichnis auszuwählen.\\n\\nNicht vorhandene Verzeichnisse werden automatisch erstellt.\\n\\n''Beispiel:''\\n\\nDer folgende Befehl speichert alle tiddler mit dem `tag: done` in eine `JSON` Datei mit dem Namen: `output.json`. Das Template `$:/core/templates/exporters/JsonFile` wird auf die zu speichernden Daten angewandt.\\n\\n```\\n--rendertiddler \\\"$:/core/templates/exporters/JsonFile\\\" output.json text/plain \\\"\\\" exportFilter \\\"[tag[done]]\\\"\\n```\\n\"},\"$:/language/Help/rendertiddlers\":{\"title\":\"$:/language/Help/rendertiddlers\",\"description\":\"Gefilterte Ausgabe von Tiddlern, in einem spezifizierten Format.\",\"text\":\"''WICHTIG:''\\n\\n* Der `--rendertiddlers` Befehl wird ab V5.1.15 durch `--render` ersetzt.\\n* `--rendertiddlers` wird auslaufen und sollte daher nicht mehr verwendet werden!\\n\\nGefilterte Ausgabe mehrerer Tiddler, in ein angegebenes Dateiformat (standard: `text/html`) mit spezifischer Erweiterung (Standard: `.html`).\\n\\n```\\n--rendertiddlers '\u003Cfilter>' \u003Ctemplate> \u003Cpathname> [\u003Ctype>] [\u003Cextension>] [\\\"noclean\\\"]\\n```\\n\\nBeispiel:\\n\\n```\\n--rendertiddlers '[!is[system]]' $:/core/templates/static.tiddler.html ./static text/plain\\n```\\n\\nStandardmäßig ist das `output` Verzeichnis ein Unterverzeichnis im `edition` Verzeichnis. Der `--output` Befehl kann verwendet werden, um ein anderes Verzeichnis auszuwählen.\\n\\nNicht vorhandene Verzeichnisse werden automatisch erstellt und enthaltene Dateien werden gelöscht. Mit dem \\\"noclean\\\" Parameter, kann das löschen vorhandener Dateien unterdrückt werden.\\n\"},\"$:/language/Help/save\":{\"title\":\"$:/language/Help/save\",\"description\":\"Speichert Klartext Tiddler als Dateien\",\"text\":\"Speichert einzelne oder mehrere Klartext Tiddler als Text oder im Binärformat in Dateien. Die zu speichernden Tiddler werden über Filter spezifiziert.\\n\\n```\\n--save \u003Ctiddler-filter> \u003Cfilename-filter>\\n```\\n\\n* ''tiddler-filter'': Ein Filter, der die zu speichernden Tiddler anzeigt.\\n* ''filename-filter'': [Option] Ein Filter, der die Tiddler Titel in Verzeichnis Namen aufspaltet. Wenn nicht spezifiziert, dann wird: `[is[tiddler]]` verwendet. `[is[tiddler]]` übernimmt den Tiddler Titel unverändert.\\n\\nStandardmäßig sind die Dateinamen \\\"relativ\\\" zum `output` Verzeichnis, des `edition` Verzeichnisses.\\n\\nMit dem `--output` Befehl kann die Ausgabe in jedes beliebige Verzeichnis umgeleitet werden.\\n\\nHinweise:\\n\\n* Das `output` Verzeichnis wird nicht gelöscht, bevor neue Dateien geschrieben werden.\\n* Verzeichnisse und Dateien werden automatisch angelegt, sollten sie nicht vorhanden sein.\\n* Wenn eine Datei Leerzeichen enthält, dann muss dies ''doppelt'' angezeigt werden. Für TiddlyWiki mit eckigen Klammern `[[]]` und für die Kommandozeile mit Hochkomma \\\"\\\". Zum Beispiel: `--render \\\"[[Motovun Jack.jpg]]\\\"`\\n* Dateinamens-Filter zeigen immer auf den Titel, des gerade umzusetzenden Tiddlers. Das erlaubt uns, diesen als Basis für den Dateinamen zu verwenden. zB: `[encodeuricomponent[]addprefix[static/]]` ... Verwendet eine URI-Enkodierung für jeden Dateinamen und stellt das Wort `static/` als Pfadname voran.\\n* Der `--save` Befehl ist flexibler und ersetzt daher `--savetiddler` und `--savetiddlers`, welche mit V5.1.15 auslaufen!\\n\\nBeispiel:\\n\\n* `--save \\\"[!is[system]is[image]]\\\" \\\"[encodeuricomponent[]addprefix[tiddlers/]]\\\"` -- Übersetzt alle Nicht-System Bild Tiddler in Datein und schreibt diese URL-kodiert in das Unterverzeichnis `tiddlers/`\\n\"},\"$:/language/Help/savetiddler\":{\"title\":\"$:/language/Help/savetiddler\",\"description\":\"Speichert einen Tiddler als File.\",\"text\":\"''WICHTIG:''\\n\\n* Der `--savetiddler` Befehl wird ab V5.1.15 durch `--save` ersetzt. \\n* `--savetiddler` wird auslaufen und sollte daher nicht mehr verwendet werden!\\n\\nSpeichert einen individuellen Tiddler im Text- oder Binärformat mit dem angegebenen Dateinamen.\\n\\n```\\n--savetiddler \u003Ctitle> \u003Cfilename>\\n```\\n\\nStandardmäßig ist das `output` Verzeichnis ein Unterverzeichnis im `edition` Verzeichnis. Der `--output` Befehl kann verwendet werden, um ein anderes Verzeichnis auszuwählen.\\n\\nNicht vorhandene Verzeichnisse werden automatisch erstellt.\\n\"},\"$:/language/Help/savetiddlers\":{\"title\":\"$:/language/Help/savetiddlers\",\"description\":\"Speichert eine Gruppe von Tiddler in ein Verzeichnis\",\"text\":\"''WICHTIG:''\\n\\n* Der `--savetiddlers` Befehl wird ab V5.1.15 durch `--save` ersetzt. \\n* `--savetiddlers` wird auslaufen und sollte daher nicht mehr verwendet werden!\\n\\nSpeichert eine Gruppe von Tiddler im Text- oder Binärformat in ein angegebenes Verzeichnis.\\n\\n```\\n--savetiddlers \u003Cfilter> \u003Cpathname> [\\\"noclean\\\"]\\n```\\n\\nStandardmäßig ist das `output` Verzeichnis ein Unterverzeichnis im `edition` Verzeichnis. Der `--output` Befehl kann verwendet werden, um ein anderes Verzeichnis auszuwählen.\\n\\nWichtig: Alle Dateien im Ausgabeverzeichnis werden automatisch gelöscht, wenn dieser Befehl verwendet wird. Um dies zu verhindern kann der ''noclean'' Parameter verwendet werden.\\n\\nNicht vorhandene Verzeichnisse im Pfadnamen werden automatisch erstellt.\\n\"},\"$:/language/Help/savewikifolder\":{\"title\":\"$:/language/Help/savewikifolder\",\"description\":\"Speichert ein Wiki in einen neues Verzeichnis\",\"text\":\"\u003C\u003C.from-version \\\"5.1.20\\\">> Speichert das aktuelle Wiki als ein Wiki-Verzeichnis. Inklusive Tiddlern, Plugins und Konfiguration:\\n\\n```\\n--savewikifolder \u003Cwikifolderpath> [\u003Cfilter>] [ [\u003Cname>=\u003Cvalue>] ]*\\n```\\n\\n* Das Zielverzeichnis muss leer sein, oder nicht existent\\n* Der \\\"filter\\\" Parameter definiert, welche Tiddler inkludiert werden. Diser Parameter is optional. Standard: `[all[tiddlers]]`\\n* Plugins des offiziellen Plugin-Verzeichnisses werden durch Referenzen zu den Plugins in der `tiddlywiki.info` Datei ersetzt.\\n* Drittanbieter Plugins werden in ihre eigenen Verzeichnisse entpackt\\n\\nFolgende Optionen werden unterstützt:\\n\\n* ''filter'': Ein \\\"Filter-Run\\\" der die Tiddler definiert, die ausgegeben werden sollen.\\n\\n* ''explodePlugins'': Standard ist: \\\"yes\\\"\\n** \\\"yes\\\": wird Plugins \\\"aufspalten\\\" und einzelne \\\"Shadow Tiddler\\\" in ein  \\\"tiddlers/\u003Cplugin>\\\" Verzeichnis speichern.\\n** \\\"no\\\": Wird das \\\"aufspalten\\\" von Plugins in einzelne \\\"Shadow Tiddler\\\" unterbinden. Das plugin selbst wird als 1 JSON Tiddler gespeichert.\\n\\nDiese Funktionen werden vor allem dazu verwendet, eine Wiki-Datei in einzelne Tiddler in einem Wiki-Verzeichnis umzuwandeln:\\n\\n```\\ntiddlywiki --load ./mywiki.html --savewikifolder ./mywikifolder\\n```\\n\\nDer folgende Befehl wird das Plugin als JSON-Tiddler in das \\\"tiddlers\\\" Verzeichnis speichern:\\n\\n```\\ntiddlywiki --load ./mywiki.html --savewikifolder ./mywikifolder explodePlugins=no\\n```\"},\"$:/language/Help/server\":{\"title\":\"$:/language/Help/server\",\"description\":\"(Dieser Befehl ist abgekündigt! - Neu ist: \\\"listen\\\") -- Stellt einen HTTP server für TiddlyWiki zur Verfügung.\",\"text\":\"''WICHTIG:''\\n\\n* Dieser Befehl ist abgekündigt!\\n* Wird durch: \\\"listen\\\" ersetzt.\\n\\nTiddlyWiki bringt einen einfachen Web-Server mit.\\n\\nDer Server kann spezifische Tiddler im angegebenen Format anzeigen (rendern). Zudem können einzelne, oder mehrere Tiddler im JSON Format übertragen werden. Die unterstützten HTTP Funktionen sind: `GET`, `PUT` und `DELETE`\\n\\n```\\n--server \u003Cport> \u003Croot-tiddler> \u003Croot-render-type> \u003Croot-serve-type> \u003Cusername> \u003Cpassword> \u003Chost> \u003Cpath-prefix> \u003Cdebug-level>\\n```\\n\\nDie Parameter sind: \\n\\n* ''port'' - Port Nummer mit der kommuniziert werden soll (Standard: \\\"8080\\\"). Ein \\\"nicht-numerisher\\\" Wert wird als System-Umgebungsvariable interpretiert, von der der Wert gelesen werden soll.\\n* ''root-tiddler'' - Der Tiddler, der als ~Basis-Tiddler verwendet werden soll ( Standard: \\\"$:/core/save/all\\\").\\n* ''root-render-type'' -  MIME-Type, zu dem der ~Basis-Tiddler \\\"gerendert\\\" werden soll ( Standard: \\\"text/plain\\\").\\n* ''root-serve-type'' - MIME-Type, mit dem der Basis-Tiddler ausgeliefert werden soll ( Standard: \\\"text/html\\\").\\n* ''username'' - Benutzer Name, mit dem veränderte Tiddler signiert werden.\\n* ''password'' - Passwort mit dem eine sehr \\\"simple\\\" Zugangsbeschränkung aufgebaut werden kann.\\n* ''host'' - ~Host-Name von dem ausgeliefert werden soll. Host ist optional ( Standard: \\\"127.0.0.1\\\" oder auch \\\"localhost\\\").\\n* ''path-prefix'' - Optionales prefix für Pfade.\\n* ''debug-level'' - \\\"debug\\\" bewikt eine detailierte Anzeige der HTTP Anfrage-Parameter. (Standard: \\\"none\\\")\\n\\nWenn beim Serverstart ein Passwort angegeben wird, dann wird der Benutzer aufgefordert den Benutzernamen und das Passwort einzugeben, bevor ein Wiki angezeigt wird. ACHTUNG: Das Passwort wird im Klartext übertragen. Diese Vorgehensweise ist nicht für den Einsatz im Netz geeignet.\\n\\nBeispiel:\\n\\n```\\n--server 8080 $:/core/save/all text/plain text/html MeinBenutzerName passw0rt\\n```\\n\\nDer Name und das Passwort können als \\\"leere\\\" Zeichenketten definiert werden, wenn ein \\\"hostname\\\" oder \\\"pathprefix\\\" nötig ist, jedoch kein Passwort verwendet werden soll.\\n\\n```\\n--server 8080 $:/core/save/all text/plain text/html \\\"\\\" \\\"\\\" 192.168.0.245\\n```\\n\\nWenn Sie eine Addresse wie oben verwenden, dann ist der Server für das lokale Netzwerk sichtbar. Weitere Sicherheitshinweise finden sie unter: WebServer auf tiddlywiki.com\\n\\nEs ist möglich mehrere TiddlyWiki Server gleichzeitig zu starten. Jeder Server muss jedoch mit einem eigenen Port gestartet werden. Es kann sinnvoll sein, den Prozess mit lokalen \\\"Umgebungsvariable\\\" zu starten. Hier wird \\\"MEINE_PORT_NUMMER\\\" als Beispiel verwendet.\\n\\n\\n```\\n--server MEINE_PORT_NUMMER $:/core/save/all text/plain text/html MyUserName passw0rd\\n```\"},\"$:/language/Help/setfield\":{\"title\":\"$:/language/Help/setfield\",\"description\":\"Experimentell - Setzt ein Tiddler \\\"field\\\" auf einen bestimmten Wert\",\"text\":\"//Wichtig! Dieser Befehl is experimentell und kann während der Betaphase geändert oder ersetzt werden!//\\n\\nSetzt ein spezifiziertes Feld, für eine Gruppe von Tiddlern. Ein Template wird \\\"wikifiziert\\\" und das Ergebnis in das Feld geschrieben. Die `currentTiddler` Variable wird auf den jeweiligen Tiddler gesetzt.\\n\\n```\\n--setfield \u003Cfilter> \u003Cfieldname> \u003Ctemplatetitle> \u003Crendertype>\\n```\\n\\nThe parameters are:\\n\\n* ''filter'' - Filter, der die zu modifizierenden Tiddler auswählt.\\n* ''fieldname'' - Das zu verändernde Feld (Standardwert: \\\"text\\\").\\n* ''templatetitle'' - Der zu wikifizierende Vorlagen Tiddler, dessen Ergebnis in das Feld geschrieben wird. Wenn Leer, dann wird das Feld gelöscht.\\n* ''rendertype'' - Der Text Typ für den \\\"rendering\\\" Vorgang (Standardwert: \\\"text/plain\\\"; \\\"text/html\\\" kann verwendet werden, um \\\"HTML tags\\\" zu erzeugen).\\n\"},\"$:/language/Help/unpackplugin\":{\"title\":\"$:/language/Help/unpackplugin\",\"description\":\"Extrahiere Tiddler aus einem Plugin\",\"text\":\"Extrahiert alle Tiddler aus einem plugin und schreibt diese als einzelne Tiddler Dateien:\\n\\n```\\n--unpackplugin \u003Ctitle>\\n```\\n\"},\"$:/language/Help/verbose\":{\"title\":\"$:/language/Help/verbose\",\"description\":\"Aktiviert die erweiterte Fehlerausgabe.\",\"text\":\"Aktiviert die erweiterte Fehlerausgabe. Nützlich um Fehler zu finden.\\n\\n```\\n--verbose\\n```\\n\"},\"$:/language/Help/version\":{\"title\":\"$:/language/Help/version\",\"description\":\"Gibt die Versionsnummer von TiddlyWiki aus.\",\"text\":\"Gibt die Versionsnummer von TiddlyWiki aus.\\n\\n```\\n--version\\n```\\n\"},\"$:/language/Import/Editor/Import/Heading\":{\"title\":\"$:/language/Import/Editor/Import/Heading\",\"text\":\"Bilder in den Editor importieren.\"},\"$:/language/Import/Imported/Hint\":{\"title\":\"$:/language/Import/Imported/Hint\",\"text\":\"Folgende Tiddler wurden importiert:\"},\"$:/language/Import/Listing/Cancel/Caption\":{\"title\":\"$:/language/Import/Listing/Cancel/Caption\",\"text\":\"Abbrechen\"},\"$:/language/Import/Listing/Cancel/Warning\":{\"title\":\"$:/language/Import/Listing/Cancel/Warning\",\"text\":\"Möchten Sie den Import abbrechen?\"},\"$:/language/Import/Listing/Hint\":{\"title\":\"$:/language/Import/Listing/Hint\",\"text\":\"Diese Tiddler können importiert werden:\"},\"$:/language/Import/Listing/Import/Caption\":{\"title\":\"$:/language/Import/Listing/Import/Caption\",\"text\":\"Importieren\"},\"$:/language/Import/Listing/Select/Caption\":{\"title\":\"$:/language/Import/Listing/Select/Caption\",\"text\":\"Auswahl\"},\"$:/language/Import/Listing/Status/Caption\":{\"title\":\"$:/language/Import/Listing/Status/Caption\",\"text\":\"Status\"},\"$:/language/Import/Listing/Title/Caption\":{\"title\":\"$:/language/Import/Listing/Title/Caption\",\"text\":\"Titel\"},\"$:/language/Import/Listing/Preview\":{\"title\":\"$:/language/Import/Listing/Preview\",\"text\":\"Vorschau:\"},\"$:/language/Import/Listing/Preview/Text\":{\"title\":\"$:/language/Import/Listing/Preview/Text\",\"text\":\"Text\"},\"$:/language/Import/Listing/Preview/TextRaw\":{\"title\":\"$:/language/Import/Listing/Preview/TextRaw\",\"text\":\"Text - roh\"},\"$:/language/Import/Listing/Preview/Fields\":{\"title\":\"$:/language/Import/Listing/Preview/Fields\",\"text\":\"Felder\"},\"$:/language/Import/Listing/Preview/Diff\":{\"title\":\"$:/language/Import/Listing/Preview/Diff\",\"text\":\"Diff - Text\"},\"$:/language/Import/Listing/Preview/DiffFields\":{\"title\":\"$:/language/Import/Listing/Preview/DiffFields\",\"text\":\"Diff - Felder\"},\"$:/language/Import/Listing/Rename/Tooltip\":{\"title\":\"$:/language/Import/Listing/Rename/Tooltip\",\"text\":\"Tiddler vorm Importieren umbenennen\"},\"$:/language/Import/Listing/Rename/Prompt\":{\"title\":\"$:/language/Import/Listing/Rename/Prompt\",\"text\":\"Umbenennen in:\"},\"$:/language/Import/Listing/Rename/ConfirmRename\":{\"title\":\"$:/language/Import/Listing/Rename/ConfirmRename\",\"text\":\"Tiddler umbenennen\"},\"$:/language/Import/Listing/Rename/CancelRename\":{\"title\":\"$:/language/Import/Listing/Rename/CancelRename\",\"text\":\"Abbrechen\"},\"$:/language/Import/Listing/Rename/OverwriteWarning\":{\"title\":\"$:/language/Import/Listing/Rename/OverwriteWarning\",\"text\":\"Ein Tiddler mit diesem Titel existiert bereits.\"},\"$:/language/Import/Upgrader/Plugins/Suppressed/Incompatible\":{\"title\":\"$:/language/Import/Upgrader/Plugins/Suppressed/Incompatible\",\"text\":\"Unterdrückte, inkompatible oder veraltete \\\"plugins\\\".\"},\"$:/language/Import/Upgrader/Plugins/Suppressed/Version\":{\"title\":\"$:/language/Import/Upgrader/Plugins/Suppressed/Version\",\"text\":\"Einige \\\"plugins\\\" weden unterdrückt! Importierte plugins: \u003C\u003Cincoming>> sind älter als existierende: \u003C\u003Cexisting>>.\"},\"$:/language/Import/Upgrader/Plugins/Upgraded\":{\"title\":\"$:/language/Import/Upgrader/Plugins/Upgraded\",\"text\":\"Aktualisieren der plugins von: \u003C\u003Cincoming>> nach: \u003C\u003Cupgraded>>.\"},\"$:/language/Import/Upgrader/State/Suppressed\":{\"title\":\"$:/language/Import/Upgrader/State/Suppressed\",\"text\":\"Unterdrückte temporäre Status Tiddler.\"},\"$:/language/Import/Upgrader/System/Disabled\":{\"title\":\"$:/language/Import/Upgrader/System/Disabled\",\"text\":\"Deaktivierter \\\"System-Tiddler\\\".\"},\"$:/language/Import/Upgrader/System/Suppressed\":{\"title\":\"$:/language/Import/Upgrader/System/Suppressed\",\"text\":\"Unterdrückte \\\"System Tiddler\\\".\"},\"$:/language/Import/Upgrader/System/Warning\":{\"title\":\"$:/language/Import/Upgrader/System/Warning\",\"text\":\"\\\"Core Modul Tiddler\\\".\"},\"$:/language/Import/Upgrader/System/Alert\":{\"title\":\"$:/language/Import/Upgrader/System/Alert\",\"text\":\"Sie sind dabei einen Tiddler zu importieren, der einen \\\"Core Tiddler\\\" überschreibt. Diese Aktion wird nicht empfohlen! Das System kann instabil werden.\"},\"$:/language/Import/Upgrader/ThemeTweaks/Created\":{\"title\":\"$:/language/Import/Upgrader/ThemeTweaks/Created\",\"text\":\"Migrieren der \\\"theme tweaks\\\" von: \u003C$text text=\u003C\u003Cfrom>>/>.\"},\"$:/language/Import/Upgrader/Tiddler/Disabled\":{\"title\":\"$:/language/Import/Upgrader/Tiddler/Disabled\",\"text\":\"Deaktivierter Tiddler.\"},\"$:/language/Import/Upgrader/Tiddler/Selected\":{\"title\":\"$:/language/Import/Upgrader/Tiddler/Selected\",\"text\":\"Ausgewählter Tiddler.\"},\"$:/language/Import/Upgrader/Tiddler/Unselected\":{\"title\":\"$:/language/Import/Upgrader/Tiddler/Unselected\",\"text\":\"Auswahl aufgehoben.\"},\"$:/language/AboveStory/ClassicPlugin/Warning\":{\"title\":\"$:/language/AboveStory/ClassicPlugin/Warning\",\"text\":\"Es scheint, Sie möchten ein Plugin verwenden, dass für [[TiddlyWiki Classic|https://tiddlywiki.com/#TiddlyWikiClassic]] entwickelt wurde. Diese Plugins können jedoch mit ~TiddlyWiki Version 5 nicht verwendet werden. ~TiddlyWiki Classic plugin erkannt:\"},\"$:/language/BinaryWarning/Prompt\":{\"title\":\"$:/language/BinaryWarning/Prompt\",\"text\":\"Dieser Tiddler enthält binäre Daten.\"},\"$:/language/ClassicWarning/Hint\":{\"title\":\"$:/language/ClassicWarning/Hint\",\"text\":\"Dieser Tiddler wurde im TiddlyWiki Classic Format erstellt. Dieses Format ist nur teilweise kompatibel mit TiddlyWiki Version 5. Mehr Info finden Sie unter: https://tiddlywiki.com/static/Upgrading.html\"},\"$:/language/ClassicWarning/Upgrade/Caption\":{\"title\":\"$:/language/ClassicWarning/Upgrade/Caption\",\"text\":\"upgrade\"},\"$:/language/CloseAll/Button\":{\"title\":\"$:/language/CloseAll/Button\",\"text\":\"alle schließen\"},\"$:/language/ColourPicker/Recent\":{\"title\":\"$:/language/ColourPicker/Recent\",\"text\":\"Kürzlich:\"},\"$:/language/ConfirmCancelTiddler\":{\"title\":\"$:/language/ConfirmCancelTiddler\",\"text\":\"Wollen Sie die Änderungen im Tiddler: \\\"\u003C$text text=\u003C\u003Ctitle>>/>\\\" verwerfen?\"},\"$:/language/ConfirmDeleteTiddler\":{\"title\":\"$:/language/ConfirmDeleteTiddler\",\"text\":\"Wollen Sie den Tiddler: \\\"\u003C$text text=\u003C\u003Ctitle>>/>\\\" löschen?\"},\"$:/language/ConfirmDeleteTiddlers\":{\"title\":\"$:/language/ConfirmDeleteTiddlers\",\"text\":\"Wollen Sie \u003C\u003CresultCount>> Tiddler löschen?\"},\"$:/language/ConfirmOverwriteTiddler\":{\"title\":\"$:/language/ConfirmOverwriteTiddler\",\"text\":\"Tiddler: \\\"\u003C$text text=\u003C\u003Ctitle>>/>\\\" existiert! OK überschreibt den tiddler!\"},\"$:/language/ConfirmEditShadowTiddler\":{\"title\":\"$:/language/ConfirmEditShadowTiddler\",\"text\":\"Sie sind dabei, einen Schatten-Tiddler zu verändern. Zukünftige, automatische Anpassungen werden dadurch unterdrückt. Sie können Ihre Änderungen rückgängig machen, indem Sie diesen Tiddler wieder löschen. Wollen Sie den Tiddler: \\\"\u003C$text text=\u003C\u003Ctitle>>/>\\\" ändern?\"},\"$:/language/ConfirmAction\":{\"title\":\"$:/language/ConfirmAction\",\"text\":\"Möchten Sie weitermachen?\"},\"$:/language/Count\":{\"title\":\"$:/language/Count\",\"text\":\"Anzahl\"},\"$:/language/DefaultNewTiddlerTitle\":{\"title\":\"$:/language/DefaultNewTiddlerTitle\",\"text\":\"Neuer Tiddler\"},\"$:/language/Diffs/CountMessage\":{\"title\":\"$:/language/Diffs/CountMessage\",\"text\":\"\u003C\u003Cdiff-count>> Unterschied(e)\"},\"$:/language/DropMessage\":{\"title\":\"$:/language/DropMessage\",\"text\":\"Hierher ziehen (oder Escape um abzubrechen)\"},\"$:/language/Encryption/Cancel\":{\"title\":\"$:/language/Encryption/Cancel\",\"text\":\"Abbrechen\"},\"$:/language/Encryption/ConfirmClearPassword\":{\"title\":\"$:/language/Encryption/ConfirmClearPassword\",\"text\":\"Wollen Sie das Passwort löschen? Damit wird die Verschlüsselung beim nächsten Speichervorgang abgeschalten!\"},\"$:/language/Encryption/PromptSetPassword\":{\"title\":\"$:/language/Encryption/PromptSetPassword\",\"text\":\"Der TiddlyWiki Inhalt wird mit dem nächsten Speichern verschlüsselt!\"},\"$:/language/Encryption/Username\":{\"title\":\"$:/language/Encryption/Username\",\"text\":\"Benutzername\"},\"$:/language/Encryption/Password\":{\"title\" ursacht ist:\"},\"$:/language/InternalJavaScriptError/Title\":{\"title\":\"$:/language/InternalJavaScriptError/Title\",\"text\":\"Interner JavaScript Fehler\"},\"$:/language/InternalJavaScriptError/Hint\":{\"title\":\"$:/language/InternalJavaScriptError/Hint\",\"text\":\"Es tut uns leid, aber bitte starten Sie Ihr TiddlyWiki neu, indem sie die Seite im Browser neu laden.\"},\"$:/language/LayoutSwitcher/Description\":{\"title\":\"$:/language/LayoutSwitcher/Description\",\"text\":\"\\\"Layout\\\" Selektor anzeigen\"},\"$:/language/LazyLoadingWarning\":{\"title\":\"$:/language/LazyLoadingWarning\",\"text\":\"\u003Cp>Lade externe Datei von ''\u003C$text text={{!!_canonical_uri}}/>''\u003C/p>\u003Cp>Wenn diese Meldung nicht automatisch gelöscht wird, dann verwenden Sie wahrscheinlich einen Browser der diese Funktion nicht unterstützt. Oder die Tiddler \\\"conent-type\\\" Eistellung passt nicht, zu der, der externen Datei. Siehe https://tiddlywiki.com/#ExternalText\u003C/p>\"},\"$:/language/LoginToTiddlySpace\":{\"title\":\"$:/language/LoginToTiddlySpace\",\"text\":\"Login bei TiddlySpace\"},\"$:/language/Manager/Controls/FilterByTag/None\":{\"title\":\"$:/language/Manager/Controls/FilterByTag/None\",\"text\":\"(kein)\"},\"$:/language/Manager/Controls/FilterByTag/Prompt\":{\"title\":\"$:/language/Manager/Controls/FilterByTag/Prompt\",\"text\":\"Filtern nach tag:\"},\"$:/language/Manager/Controls/Order/Prompt\":{\"title\":\"$:/language/Manager/Controls/Order/Prompt\",\"text\":\"Invertiert\"},\"$:/language/Manager/Controls/Search/Placeholder\":{\"title\":\"$:/language/Manager/Controls/Search/Placeholder\",\"text\":\"Suche\"},\"$:/language/Manager/Controls/Search/Prompt\":{\"title\":\"$:/language/Manager/Controls/Search/Prompt\",\"text\":\"Suche:\"},\"$:/language/Manager/Controls/Show/Option/Tags\":{\"title\":\"$:/language/Manager/Controls/Show/Option/Tags\",\"text\":\"Tags\"},\"$:/language/Manager/Controls/Show/Option/Tiddlers\":{\"title\":\"$:/language/Manager/Controls/Sho
